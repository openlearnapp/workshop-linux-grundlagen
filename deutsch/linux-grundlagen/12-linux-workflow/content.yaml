version: 2
number: 12
title: "Professioneller Linux-Workflow"
description: "Pipes, Redirects, Aliases und xargs — die Kommandozeile wie ein Profi nutzen"
image: "images/lesson-header.svg"
image_caption: "Workflow-Diagramm mit Terminal, Git und SSH"
sections:
  - title: "Pipes — Befehle zusammenstecken"
    image: "images/section-01-pipes.svg"
    explanation: |
      Stell dir vor, du baust eine Fabrik mit Fließband.
      Jede Station macht genau eine Sache —
      und das Ergebnis wandert zur nächsten Station weiter.

      Genau so funktionieren **Pipes** (Röhren) in Linux.
      Das Zeichen dafür ist der senkrechte Strich: `|`

      Beispiel: Du willst wissen, welcher Ordner am meisten Platz frisst.
      ```
      du -sh /home/* | sort -rh | head -5
      ```

      Das Fließband:
      1. `du -sh /home/*` → misst die Größe jedes Ordners
      2. `| sort -rh` → sortiert von groß nach klein
      3. `| head -5` → zeigt nur die Top 5

      Das ist die Stärke von Linux:
      Kleine Werkzeuge, jedes für eine Sache — zusammen sehr mächtig.
      Das nennt sich **Unix-Philosophie** (die Idee hinter Linux und Unix).
    examples:
      - q: "ps aux | grep python | grep -v grep"
        a: "Zeigt alle laufenden Python-Programme — das zweite grep entfernt sich selbst aus der Liste"
        rel:
          - ["pipe-operator", "| leitet Ausgabe eines Befehls als Eingabe an den nächsten", "Pipe |"]
          - ["grep-v-grep", "grep -v grep entfernt die grep-Zeile aus der Prozessliste", "grep -v grep"]
        labels: ["Scripting", "Prozesse"]
      - q: "cat /var/log/nginx/access.log | awk '{print $1}' | sort | uniq -c | sort -rn | head -10"
        a: "Findet die 10 IP-Adressen, die am häufigsten auf die Webseite zugegriffen haben"
        rel:
          - ["awk-ip", "awk '{print $1}' gibt das erste Feld (IP) jeder Zeile aus", "awk print"]
          - ["uniq-c", "uniq -c zählt aufeinanderfolgende gleiche Zeilen", "uniq -c"]
        labels: ["Scripting", "Netzwerk"]
      - q: "find /var/log -name \"*.log\" -mtime +30 | xargs ls -lh"
        a: "Findet Log-Dateien älter als 30 Tage und zeigt ihre Größe an"
        rel:
          - ["find-cmd", "Dateien nach verschiedenen Kriterien suchen", "Befehl find"]
          - ["find-mtime", "-mtime +30 = zuletzt modifiziert vor mehr als 30 Tagen", "find -mtime"]
          - ["xargs-cmd", "Ausgabe als Argumente an nächsten Befehl übergeben", "Befehl xargs"]
        labels: ["Scripting", "Dateisystem"]

  - title: "Redirects — Ausgaben woanders hinschicken"
    image: "images/section-02-redirects.svg"
    explanation: |
      Normalerweise erscheint alles, was ein Befehl ausgibt, direkt im Terminal.
      Mit **Redirects** (Umleitungen) kannst du das ändern —
      und die Ausgabe in eine Datei schreiben.

      Das Zeichen dafür ist der Pfeil `>`:
      ```
      ls -la > verzeichnis.txt
      ```
      Jetzt steht die Liste nicht im Terminal, sondern in der Datei!

      Achtung: `>` überschreibt immer die Datei.
      Mit `>>` hängst du stattdessen ans Ende an:
      ```
      echo "Heute war alles gut" >> tagebuch.txt
      ```

      Und manchmal gibt es Fehlermeldungen, die du loswerden willst.
      Das "schwarze Loch" von Linux heißt `/dev/null` —
      alles was dort hinkommt, verschwindet spurlos:
      ```
      find / -name "*.conf" 2>/dev/null
      ```
      Das `2>` leitet die Fehlermeldungen um —
      du siehst nur die echten Ergebnisse, nicht die Fehler.
    examples:
      - q: "ls -la > verzeichnis.txt"
        a: "Speichert die Verzeichnisliste in eine Datei — überschreibt die Datei wenn sie existiert"
        rel:
          - ["redirect-out", "> leitet Standardausgabe in Datei (überschreibend)", "Redirect >"]
        labels: ["Scripting", "Dateisystem"]
      - q: "echo \"[$(date)] Server gestartet\" >> /var/log/myapp.log"
        a: "Hängt eine Zeile ans Ende der Log-Datei an — nichts wird überschrieben"
        rel:
          - ["redirect-append", ">> hängt Ausgabe an Datei an (kein Überschreiben)", "Redirect >>"]
        labels: ["Scripting"]
      - q: "find / -name \"*.conf\" 2>/dev/null"
        a: "Sucht nach Konfigurationsdateien — Fehlermeldungen werden ins schwarze Loch geschickt"
        rel:
          - ["dev-null", "/dev/null verwirft alle Ausgaben — das schwarze Loch", "/dev/null"]
          - ["redirect-stderr", "2> leitet Standardfehler (stderr) um", "Redirect 2>"]
        labels: ["Scripting", "Dateisystem"]
      - q: "wc -l < /etc/passwd"
        a: "Zählt die Zeilen in /etc/passwd — die Datei wird als Eingabe verwendet"
        rel:
          - ["redirect-input", "< verwendet Dateiinhalt als Eingabe für Befehl", "Redirect <"]
        labels: ["Scripting"]

  - title: "Aliases und .bashrc — Linux nach Hause einrichten"
    image: "images/section-03-bashrc.svg"
    explanation: |
      Stell dir vor, du tippst jeden Tag dieselben langen Befehle.
      Das ist wie wenn du immer den vollen Namen sagst statt einem Spitznamen.

      **Aliases** (Kurzbefehl-Namen) lösen das.
      Du kannst lange Befehle unter einem kurzen Namen speichern:
      ```
      alias ll='ls -la'
      ```
      Ab jetzt reicht `ll` statt `ls -la`!

      Diese Aliases speicherst du in der Datei `~/.bashrc`.
      Das ist deine persönliche Linux-Konfiguration —
      sie wird jedes Mal geladen, wenn du ein Terminal öffnest.

      Ein paar nützliche Aliases für die .bashrc:
      ```
      alias ll='ls -la'
      alias update='sudo apt update && sudo apt upgrade -y'
      alias myip='curl -s https://ipinfo.io/ip'
      alias ..='cd ..'
      alias ...='cd ../..'
      alias gs='git status'
      ```

      Nach dem Bearbeiten der .bashrc musst du sie neu laden:
      ```
      source ~/.bashrc
      ```
      `source` bedeutet: "Lies diese Datei und wende alles an."
      Danach sind deine neuen Aliases sofort verfügbar.
    examples:
      - q: "alias ll='ls -la --color=auto'"
        a: "Erstellt den Kurzbefehl 'll' — ab jetzt reicht ll statt ls -la --color=auto"
        rel:
          - ["alias-cmd", "Kurzbefehle für häufige oder lange Befehle erstellen", "Befehl alias"]
        labels: ["Konfiguration"]
      - q: "alias update='sudo apt update && sudo apt upgrade -y'"
        a: "Macht das komplette System-Update mit einem einzigen Wort aufrufbar"
        rel:
          - ["alias-complex", "Alias für komplexe Befehlskette — Tipp nach Wort anstatt langer Befehlsfolge", "Alias Beispiel"]
        labels: ["Konfiguration"]
      - q: "source ~/.bashrc"
        a: "Lädt die Bash-Konfiguration neu — neue Aliases sind sofort aktiv ohne Terminal-Neustart"
        rel:
          - ["source-cmd", "Konfigurationsdatei in aktuelle Shell laden", "source / ."]
          - ["bashrc-reload", "~/.bashrc neu laden nach Änderungen", "source ~/.bashrc"]
        labels: ["Konfiguration"]
      - q: "alias | grep git"
        a: "Zeigt alle Aliases, die das Wort 'git' enthalten — alias ohne Argument zeigt alle"
        rel:
          - ["alias-list", "alias ohne Argument listet alle definierten Aliases", "alias ohne Argumente"]
        labels: ["Konfiguration"]
      - q: "unalias ll"
        a: "Entfernt den Alias 'll' — gilt nur für die aktuelle Terminal-Sitzung"
        rel:
          - ["unalias-cmd", "Definierten Alias wieder entfernen", "Befehl unalias"]
        labels: ["Konfiguration"]

  - title: "🖥️ Terminal-Check"
    image: "images/section-04-check.svg"
    explanation: |
      Teste jetzt dein Wissen — gib die Befehle direkt ein!
    examples:
      - q: "Welches Zeichen verbindet zwei Befehle per Pipe?"
        type: input
        a: "|"
        labels: ["Scripting"]
      - q: "Was macht '>>' im Gegensatz zu '>'?"
        type: select
        options:
          - text: ">> hängt die Ausgabe an die Datei an, > überschreibt sie"
            correct: true
          - text: ">> überschreibt die Datei, > hängt an"
          - text: ">> leitet Fehler um, > leitet Ausgabe um"
          - text: ">> und > machen dasselbe"
        labels: ["Scripting"]
      - q: "Wie werden Änderungen in der ~/.bashrc sofort wirksam?"
        type: select
        options:
          - text: "source ~/.bashrc"
            correct: true
          - text: "reload ~/.bashrc"
          - text: "bash --refresh"
          - text: "apply ~/.bashrc"
        labels: ["Konfiguration"]
      - q: "Welche dieser Aussagen über Aliases und Pipes stimmen?"
        type: multiple-choice
        options:
          - text: "alias erstellt Abkürzungen für häufige Befehle"
            correct: true
          - text: "| leitet die Ausgabe als Eingabe an den nächsten Befehl weiter"
            correct: true
          - text: "/dev/null verwirft alle Ausgaben"
            correct: true
          - text: "source speichert Befehle dauerhaft im Terminal"
        labels: ["Scripting", "Konfiguration"]
