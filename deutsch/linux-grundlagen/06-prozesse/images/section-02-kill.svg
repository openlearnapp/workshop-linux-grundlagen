<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210">
  <defs>
    <style>
      .f { font-family: sans-serif; }
      @keyframes fTi  { 0%,3%{opacity:0}  7%,87%{opacity:1} 92%,100%{opacity:0} }
      @keyframes fSub { 0%,8%{opacity:0} 12%,87%{opacity:1} 92%,100%{opacity:0} }
      @keyframes fC1  { 0%,12%{opacity:0} 18%,87%{opacity:1} 92%,100%{opacity:0} }
      @keyframes fC2  { 0%,30%{opacity:0} 36%,87%{opacity:1} 92%,100%{opacity:0} }
      @keyframes fC3  { 0%,48%{opacity:0} 54%,87%{opacity:1} 92%,100%{opacity:0} }
      @keyframes fFt  { 0%,78%{opacity:0} 82%,87%{opacity:1} 92%,100%{opacity:0} }
      .ti  { opacity:0; animation: fTi  11s infinite; }
      .sub { opacity:0; animation: fSub 11s infinite; }
      .c1  { opacity:0; animation: fC1  11s infinite; }
      .c2  { opacity:0; animation: fC2  11s infinite; }
      .c3  { opacity:0; animation: fC3  11s infinite; }
      .ft  { opacity:0; animation: fFt  11s infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="640" height="210" rx="12" fill="#0d1117"/>

  <!-- Header bar -->
  <rect width="640" height="38" rx="12" fill="#161b22"/>
  <rect y="26" width="640" height="12" fill="#161b22"/>

  <!-- Title -->
  <text class="f ti" x="320" y="24" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="bold" letter-spacing="1">kill — PROGRAMME BEENDEN</text>

  <!-- Subtitle -->
  <text class="f sub" x="320" y="54" text-anchor="middle" font-size="11" fill="#8b949e">Prozesse gezielt stoppen</text>

  <!-- Card 1: kill PID (red) -->
  <g class="c1">
    <rect x="14" y="64" width="192" height="96" rx="10" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
    <text x="110" y="93" text-anchor="middle" font-size="28">❌</text>
    <text class="f" x="110" y="115" text-anchor="middle" font-size="13" fill="#f85149" font-weight="bold">kill PID</text>
    <text class="f" x="110" y="131" text-anchor="middle" font-size="10" fill="#8b949e">Prozess mit Nummer</text>
    <text class="f" x="110" y="148" text-anchor="middle" font-size="10" fill="#8b949e">beenden</text>
  </g>

  <!-- Card 2: kill -9 (red dark) -->
  <g class="c2">
    <rect x="224" y="64" width="192" height="96" rx="10" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
    <text x="320" y="93" text-anchor="middle" font-size="28">🛑</text>
    <text class="f" x="320" y="115" text-anchor="middle" font-size="13" fill="#f85149" font-weight="bold">kill -9 PID</text>
    <text class="f" x="320" y="131" text-anchor="middle" font-size="10" fill="#8b949e">Sofort beenden</text>
    <text class="f" x="320" y="148" text-anchor="middle" font-size="10" fill="#8b949e">(Notaus)</text>
  </g>

  <!-- Card 3: pkill (orange) -->
  <g class="c3">
    <rect x="434" y="64" width="192" height="96" rx="10" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
    <text x="530" y="93" text-anchor="middle" font-size="28">🔍</text>
    <text class="f" x="530" y="115" text-anchor="middle" font-size="13" fill="#f0883e" font-weight="bold">pkill name</text>
    <text class="f" x="530" y="131" text-anchor="middle" font-size="10" fill="#8b949e">Prozess nach Name</text>
    <text class="f" x="530" y="148" text-anchor="middle" font-size="10" fill="#8b949e">suchen und beenden</text>
  </g>

  <!-- Footer -->
  <g class="ft">
    <rect x="14" y="172" width="612" height="28" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text class="f" x="320" y="191" text-anchor="middle" font-size="10" fill="#8b949e">kill -9 = SIGKILL — sofortiger Abbruch ohne Aufräumen</text>
  </g>
</svg>
