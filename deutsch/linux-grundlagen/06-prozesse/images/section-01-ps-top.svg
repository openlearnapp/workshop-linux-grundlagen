<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210">
  <defs>
    <style>
      .f { font-family: sans-serif; }
      @keyframes fTi  { 0%,3%{opacity:0}  7%,87%{opacity:1} 92%,100%{opacity:0} }
      @keyframes fSub { 0%,8%{opacity:0} 12%,87%{opacity:1} 92%,100%{opacity:0} }
      @keyframes fC1  { 0%,12%{opacity:0} 18%,87%{opacity:1} 92%,100%{opacity:0} }
      @keyframes fC2  { 0%,30%{opacity:0} 36%,87%{opacity:1} 92%,100%{opacity:0} }
      @keyframes fC3  { 0%,48%{opacity:0} 54%,87%{opacity:1} 92%,100%{opacity:0} }
      .ti  { opacity:0; animation: fTi  11s infinite; }
      .sub { opacity:0; animation: fSub 11s infinite; }
      .c1  { opacity:0; animation: fC1  11s infinite; }
      .c2  { opacity:0; animation: fC2  11s infinite; }
      .c3  { opacity:0; animation: fC3  11s infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="640" height="210" rx="12" fill="#0d1117"/>

  <!-- Header bar -->
  <rect width="640" height="38" rx="12" fill="#161b22"/>
  <rect y="26" width="640" height="12" fill="#161b22"/>

  <!-- Title -->
  <text class="f ti" x="320" y="24" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="bold" letter-spacing="1">ps UND top — WAS LÄUFT GERADE?</text>

  <!-- Subtitle -->
  <text class="f sub" x="320" y="54" text-anchor="middle" font-size="11" fill="#8b949e">Laufende Programme im Überblick</text>

  <!-- Card 1: ps aux (blue) -->
  <g class="c1">
    <rect x="14" y="64" width="192" height="96" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="110" y="93" text-anchor="middle" font-size="28">📋</text>
    <text class="f" x="110" y="115" text-anchor="middle" font-size="13" fill="#58a6ff" font-weight="bold">ps aux</text>
    <text class="f" x="110" y="131" text-anchor="middle" font-size="10" fill="#8b949e">Alle laufenden Programme</text>
    <text class="f" x="110" y="148" text-anchor="middle" font-size="10" fill="#8b949e">anzeigen</text>
  </g>

  <!-- Card 2: top (green) -->
  <g class="c2">
    <rect x="224" y="64" width="192" height="96" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
    <text x="320" y="93" text-anchor="middle" font-size="28">📊</text>
    <text class="f" x="320" y="115" text-anchor="middle" font-size="13" fill="#3fb950" font-weight="bold">top</text>
    <text class="f" x="320" y="131" text-anchor="middle" font-size="10" fill="#8b949e">Live-Prozessmonitor</text>
    <text class="f" x="320" y="148" text-anchor="middle" font-size="10" fill="#8b949e">(wie Task-Manager)</text>
  </g>

  <!-- Card 3: PID (orange) -->
  <g class="c3">
    <rect x="434" y="64" width="192" height="96" rx="10" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
    <text x="530" y="93" text-anchor="middle" font-size="28">🔢</text>
    <text class="f" x="530" y="115" text-anchor="middle" font-size="13" fill="#f0883e" font-weight="bold">PID</text>
    <text class="f" x="530" y="131" text-anchor="middle" font-size="10" fill="#8b949e">Jeder Prozess hat eine</text>
    <text class="f" x="530" y="148" text-anchor="middle" font-size="10" fill="#8b949e">eindeutige ID-Nummer</text>
  </g>
</svg>
