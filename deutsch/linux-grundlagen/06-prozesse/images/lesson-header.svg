<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 270">
  <defs>
    <style>
      .f { font-family: sans-serif; }
      @keyframes fTi  { 0%,3%{opacity:0}  7%,87%{opacity:1} 92%,100%{opacity:0} }
      @keyframes fSub { 0%,8%{opacity:0} 12%,87%{opacity:1} 92%,100%{opacity:0} }
      @keyframes fC1  { 0%,12%{opacity:0} 18%,87%{opacity:1} 92%,100%{opacity:0} }
      @keyframes fC2  { 0%,30%{opacity:0} 36%,87%{opacity:1} 92%,100%{opacity:0} }
      @keyframes fC3  { 0%,48%{opacity:0} 54%,87%{opacity:1} 92%,100%{opacity:0} }
      .ti  { opacity:0; animation: fTi  11s infinite; }
      .sub { opacity:0; animation: fSub 11s infinite; }
      .c1  { opacity:0; animation: fC1  11s infinite; }
      .c2  { opacity:0; animation: fC2  11s infinite; }
      .c3  { opacity:0; animation: fC3  11s infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="640" height="270" rx="12" fill="#0d1117"/>

  <!-- Header bar -->
  <rect width="640" height="38" rx="12" fill="#161b22"/>
  <rect y="26" width="640" height="12" fill="#161b22"/>

  <!-- Header title -->
  <text class="f ti" x="320" y="24" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="bold" letter-spacing="1">L06 · LINUX GRUNDLAGEN</text>

  <!-- Hero emoji -->
  <text class="ti" x="320" y="108" text-anchor="middle" font-size="52">⚙️</text>

  <!-- Main title -->
  <text class="f ti" x="320" y="140" text-anchor="middle" font-size="22" fill="#e6edf3" font-weight="bold">Prozesse</text>

  <!-- Subtitle -->
  <text class="f sub" x="320" y="160" text-anchor="middle" font-size="12" fill="#8b949e">ps · top · kill · Jobs im Hintergrund</text>

  <!-- Card 1: ps & top (blue) -->
  <g class="c1">
    <rect x="28" y="178" width="178" height="72" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="117" y="202" text-anchor="middle" font-size="22">👁️</text>
    <text class="f" x="117" y="222" text-anchor="middle" font-size="13" fill="#58a6ff" font-weight="bold">ps &amp; top</text>
    <text class="f" x="117" y="238" text-anchor="middle" font-size="10" fill="#8b949e">Was läuft gerade?</text>
  </g>

  <!-- Card 2: kill (red) -->
  <g class="c2">
    <rect x="231" y="178" width="178" height="72" rx="10" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
    <text x="320" y="202" text-anchor="middle" font-size="22">❌</text>
    <text class="f" x="320" y="222" text-anchor="middle" font-size="13" fill="#f85149" font-weight="bold">kill</text>
    <text class="f" x="320" y="238" text-anchor="middle" font-size="10" fill="#8b949e">Programme beenden</text>
  </g>

  <!-- Card 3: background jobs (orange) -->
  <g class="c3">
    <rect x="434" y="178" width="178" height="72" rx="10" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
    <text x="523" y="202" text-anchor="middle" font-size="22">🔄</text>
    <text class="f" x="523" y="222" text-anchor="middle" font-size="13" fill="#f0883e" font-weight="bold">&amp;</text>
    <text class="f" x="523" y="238" text-anchor="middle" font-size="10" fill="#8b949e">Hintergrundjobs</text>
  </g>
</svg>
