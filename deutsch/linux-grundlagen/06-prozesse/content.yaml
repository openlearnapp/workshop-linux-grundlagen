version: 2
number: 6
title: "Prozesse"
description: "Lern wie du siehst welche Programme gerade laufen und wie du sie steuerst"
image: "images/lesson-header.svg"
image_caption: "Prozessbaum mit PID-Nummern und Ressourcenanzeige"
sections:
  - title: "ps und top — was läuft gerade?"
    image: "images/section-01-ps-top.svg"
    explanation: |
      Ein **Prozess** (Process) ist ein Programm, das gerade läuft.

      Wenn du einen Browser öffnest, startet ein Prozess.
      Wenn du Musik hörst, läuft ein Prozess.
      Mehrere Prozesse können gleichzeitig laufen — wie mehrere Apps gleichzeitig!

      Jeder Prozess bekommt eine eindeutige Nummer: die **PID** (Process ID — Prozess-Ausweis).
      Mit dieser Nummer kannst du den Prozess später steuern.

      Befehle um Prozesse zu sehen:

      | Befehl | Was er zeigt |
      |--------|--------------|
      | `ps` | Nur Prozesse in deinem aktuellen Terminal-Fenster |
      | `ps aux` | Alle Prozesse aller Benutzer mit Details (a=alle, u=user-Format, x=auch ohne Terminal) |
      | `top` | Live-Übersicht wie ein Task-Manager — alles in Echtzeit! |
      | `htop` | Wie top, aber bunter und einfacher zu bedienen (muss erst installiert werden) |
      | `pgrep firefox` | Sucht die PID eines bestimmten Programms nach Name |

      In `top`: Mit `q` beenden, mit `M` nach Speicher sortieren, mit `P` nach CPU sortieren.
    examples:
      - q: "ps aux"
        a: "Alle laufenden Prozesse aller Benutzer mit PID, CPU-Nutzung, RAM-Nutzung und dem gestarteten Befehl"
        rel:
          - ["ps-cmd", "Process Status — laufende Prozesse anzeigen", "Befehl ps"]
          - ["ps-aux", "a=alle User, u=user-Format, x=auch ohne Terminal", "Flags aux"]
        labels: ["Prozesse"]
      - q: "ps aux | grep nginx"
        a: "Zeigt nur Prozesse, die 'nginx' im Namen haben — super zum Suchen!"
        rel:
          - ["ps-grep", "Prozessliste nach bestimmtem Prozessnamen filtern", "ps aux | grep"]
        labels: ["Prozesse"]
      - q: "top"
        a: "Öffnet eine Live-Übersicht aller Prozesse mit CPU- und RAM-Nutzung — q zum Beenden"
        rel:
          - ["top-cmd", "Interaktiver Prozess-Monitor in Echtzeit", "Befehl top"]
        labels: ["Prozesse"]
      - q: "pgrep -l python"
        a: "Zeigt alle Python-Prozesse mit ihrer PID-Nummer an"
        rel:
          - ["pgrep-cmd", "Prozesse nach Namen suchen und PIDs ausgeben", "Befehl pgrep"]
          - ["pgrep-l", "List — Prozessnamen zusätzlich zur PID anzeigen", "Flag -l"]
        labels: ["Prozesse"]

  - title: "kill — Programme beenden"
    image: "images/section-02-kill.svg"
    explanation: |
      Was machst du, wenn ein Programm einfriert und nicht mehr reagiert?
      Du beendest es! Im Terminal machst du das mit `kill`.

      `kill` schickt ein **Signal** (eine Nachricht) an einen Prozess.
      Der Name klingt gefährlich, aber das ist er nicht — es ist einfach ein Befehl.

      Die zwei wichtigsten Signale:

      | Signal | Nummer | Was passiert? |
      |--------|--------|---------------|
      | SIGTERM | 15 | Bitte hör auf — das Programm kann noch aufräumen (Standard) |
      | SIGKILL | 9 | Sofort stopp — kein Aufräumen, egal was |

      **So gehst du vor:**

      Zuerst die PID des Programms herausfinden:
      ```
      ps aux | grep firefox
      ```
      Dann sanft beenden:
      ```
      kill 1234
      ```
      Wenn das nicht hilft, erzwingen:
      ```
      kill -9 1234
      ```

      Mit `killall` kannst du alle Prozesse mit einem Namen auf einmal beenden:
      ```
      killall firefox
      ```
    examples:
      - q: "kill 1234"
        a: "Schickt SIGTERM (sanfte Beende-Bitte) an den Prozess mit der PID-Nummer 1234"
        rel:
          - ["kill-cmd", "Signal an Prozess senden (Standard: SIGTERM = sanftes Beenden)", "Befehl kill"]
        labels: ["Prozesse"]
      - q: "kill -9 1234"
        a: "Beendet den Prozess sofort — SIGKILL kann das Programm nicht ignorieren"
        rel:
          - ["kill-9", "SIGKILL — sofortiges Beenden, nicht abfangbar", "Signal -9"]
        labels: ["Prozesse"]
      - q: "kill -1 $(pgrep nginx)"
        a: "Schickt nginx die Bitte, seine Einstellungen neu zu laden — ohne dass der Server stoppt"
        rel:
          - ["kill-1", "SIGHUP — Konfiguration neu laden", "Signal -1"]
          - ["command-substitution", "$() führt einen Befehl aus und verwendet seine Ausgabe", "$(befehl)"]
        labels: ["Prozesse", "Konfiguration"]
      - q: "killall -9 firefox"
        a: "Beendet alle Firefox-Prozesse sofort — nützlich wenn der Browser hängt"
        rel:
          - ["killall-cmd", "Alle Prozesse mit gegebenem Namen beenden", "Befehl killall"]
        labels: ["Prozesse"]

  - title: "Hintergrundjobs — mehrere Dinge gleichzeitig"
    image: "images/section-03-background.svg"
    explanation: |
      Normalerweise wartet das Terminal, bis ein Befehl fertig ist.
      Aber was wenn du gleichzeitig etwas anderes tun willst?

      Dann schickst du den Prozess in den **Hintergrund** (Background)!
      Dafür hängst du einfach `&` an das Ende des Befehls:
      ```
      python3 server.py &
      [1] 5892
      ```
      Das `[1]` ist die Job-Nummer, `5892` ist die PID. Das Terminal ist sofort wieder frei!

      | Befehl/Taste | Was passiert? |
      |-------------|---------------|
      | `befehl &` | Direkt im Hintergrund starten |
      | `Strg+Z` | Laufenden Prozess pausieren |
      | `bg` | Pausierten Prozess im Hintergrund weiterlaufen lassen |
      | `fg` | Hintergrundprozess wieder in den Vordergrund holen |
      | `jobs` | Alle Hintergrundprozesse anzeigen |
      | `nohup befehl &` | Hintergrundprozess der weiterläuft, auch wenn du das Terminal schließt |

      Stell dir vor: Du startest einen Download-Prozess mit `&` im Hintergrund,
      und kannst gleichzeitig weiter tippen — genau wie mehrere Apps gleichzeitig!
    examples:
      - q: "sleep 60 &"
        a: "Startet einen Warte-Prozess für 60 Sekunden im Hintergrund — das Terminal bleibt sofort frei"
        rel:
          - ["background-amp", "& am Ende startet Prozess im Hintergrund", "& Operator"]
          - ["sleep-cmd", "Für N Sekunden warten — oft in Skripten verwendet", "Befehl sleep"]
        labels: ["Prozesse"]
      - q: "jobs -l"
        a: "Zeigt alle Hintergrundprozesse mit ihrer Job-Nummer und PID"
        rel:
          - ["jobs-cmd", "Liste aller Hintergrundprozesse des aktuellen Terminals", "Befehl jobs"]
          - ["jobs-l", "Long — zusätzlich PIDs der Jobs anzeigen", "Flag -l"]
        labels: ["Prozesse"]
      - q: "fg %1"
        a: "Holt den Hintergrundprozess Nummer 1 wieder in den Vordergrund"
        rel:
          - ["fg-cmd", "Foreground — Hintergrundprozess in den Vordergrund bringen", "Befehl fg"]
        labels: ["Prozesse"]
      - q: "nohup python3 webserver.py > server.log 2>&1 &"
        a: "Startet einen Webserver, der auch nach dem Schließen des Terminals weiterläuft — Ausgabe wird in server.log gespeichert"
        rel:
          - ["nohup-cmd", "No Hangup — Prozess läuft weiter wenn Terminal geschlossen wird", "Befehl nohup"]
          - ["redirect-stderr", "2>&1 leitet Fehlermeldungen in dieselbe Datei wie normale Ausgabe", "2>&1"]
        labels: ["Prozesse", "Scripting"]

  - title: "Terminal-Check"
    image: "images/section-04-check.svg"
    explanation: |
      Teste jetzt dein Wissen!
    examples:
      - q: "Welcher Befehl zeigt alle laufenden Prozesse aller Benutzer?"
        type: input
        a: "ps aux"
        labels: ["Prozesse"]
      - q: "Was bewirkt 'kill -9 1234'?"
        type: select
        options:
          - text: "Beendet den Prozess sofort und erzwungen (SIGKILL)"
            correct: true
          - text: "Bittet den Prozess höflich aufzuhören (SIGTERM)"
          - text: "Pausiert den Prozess mit PID 1234"
          - text: "Startet den Prozess neu"
        labels: ["Prozesse"]
      - q: "Wie startet man einen Prozess direkt im Hintergrund?"
        type: select
        options:
          - text: "Befehl mit & am Ende ausführen"
            correct: true
          - text: "Befehl mit bg am Anfang ausführen"
          - text: "Befehl mit nohup am Ende ausführen"
          - text: "Strg+Z vor dem Befehl drücken"
        labels: ["Prozesse"]
      - q: "Welche dieser Aussagen über Prozess-Signale stimmen?"
        type: multiple-choice
        options:
          - text: "SIGTERM (15) ist das sanfte Beenden"
            correct: true
          - text: "SIGKILL (9) kann nicht abgefangen werden"
            correct: true
          - text: "SIGHUP (1) lädt die Konfiguration neu"
            correct: true
          - text: "SIGPAUSE (7) ist das Standard-Signal"
        labels: ["Prozesse"]
