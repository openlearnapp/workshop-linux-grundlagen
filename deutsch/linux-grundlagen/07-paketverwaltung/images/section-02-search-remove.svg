<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210">
  <defs>
    <style>
      .f { font-family: sans-serif; }
      .ti { opacity: 0; animation: fadeIn 11s infinite; }
      .c1 { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 0.5s; }
      .c2 { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 1.4s; }
      .c3 { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 2.3s; }
      .ft { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 3.0s; }
      @keyframes fadeIn {
        0%,2%{opacity:0}
        7%,87%{opacity:1}
        92%,100%{opacity:0}
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="640" height="210" rx="12" fill="#0d1117"/>

  <!-- Header bar -->
  <rect width="640" height="38" rx="12" fill="#161b22"/>
  <rect y="26" width="640" height="12" fill="#161b22"/>

  <!-- Header title -->
  <text class="f ti" x="320" y="24" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="bold" letter-spacing="1">Programme suchen, entfernen und aufräumen</text>

  <!-- Card 1: apt search -->
  <g class="c1">
    <rect x="20" y="50" width="186" height="140" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="113" y="90" text-anchor="middle" font-size="34">🔍</text>
    <text class="f" x="113" y="114" text-anchor="middle" font-size="13" fill="#58a6ff" font-weight="bold">apt search</text>
    <text class="f" x="113" y="133" text-anchor="middle" font-size="11" fill="#8b949e">Programme suchen</text>
    <rect x="40" y="148" width="146" height="26" rx="6" fill="#0d1117"/>
    <text class="f" x="113" y="166" text-anchor="middle" font-size="10" fill="#58a6ff">apt search vim</text>
  </g>

  <!-- Card 2: apt autoremove -->
  <g class="c2">
    <rect x="227" y="50" width="186" height="140" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
    <text x="320" y="90" text-anchor="middle" font-size="34">🧹</text>
    <text class="f" x="320" y="114" text-anchor="middle" font-size="13" fill="#3fb950" font-weight="bold">apt autoremove</text>
    <text class="f" x="320" y="130" text-anchor="middle" font-size="10" fill="#8b949e">Nicht mehr benötigte</text>
    <text class="f" x="320" y="144" text-anchor="middle" font-size="10" fill="#8b949e">Pakete löschen</text>
    <rect x="247" y="148" width="146" height="26" rx="6" fill="#0d1117"/>
    <text class="f" x="320" y="166" text-anchor="middle" font-size="10" fill="#3fb950">apt autoremove</text>
  </g>

  <!-- Card 3: apt show -->
  <g class="c3">
    <rect x="434" y="50" width="186" height="140" rx="10" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
    <text x="527" y="90" text-anchor="middle" font-size="34">ℹ️</text>
    <text class="f" x="527" y="114" text-anchor="middle" font-size="13" fill="#f0883e" font-weight="bold">apt show</text>
    <text class="f" x="527" y="133" text-anchor="middle" font-size="11" fill="#8b949e">Info über ein Paket</text>
    <rect x="454" y="148" width="146" height="26" rx="6" fill="#0d1117"/>
    <text class="f" x="527" y="166" text-anchor="middle" font-size="10" fill="#f0883e">apt show vim</text>
  </g>

  <!-- Footer -->
  <text class="f ft" x="320" y="202" text-anchor="middle" font-size="11" fill="#484f58">Regelmäßiges Aufräumen hält dein System sauber ✓</text>
</svg>
