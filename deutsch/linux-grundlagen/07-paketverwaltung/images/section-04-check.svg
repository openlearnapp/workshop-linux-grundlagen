<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230">
  <defs>
    <style>
      .f { font-family: sans-serif; }
      .ti { opacity: 0; animation: fadeIn 11s infinite; }
      .c1 { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 0.4s; }
      .c2 { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 1.2s; }
      .c3 { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 2.0s; }
      .c4 { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 2.8s; }
      .ft { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 3.4s; }
      @keyframes fadeIn {
        0%,2%{opacity:0}
        7%,87%{opacity:1}
        92%,100%{opacity:0}
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="640" height="230" rx="12" fill="#0d1117"/>

  <!-- Header bar -->
  <rect width="640" height="38" rx="12" fill="#161b22"/>
  <rect y="26" width="640" height="12" fill="#161b22"/>

  <!-- Header title -->
  <text class="f ti" x="320" y="24" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="bold" letter-spacing="1">✅  Zusammenfassung — Paketverwaltung</text>

  <!-- Card 1: apt update -->
  <g class="c1">
    <rect x="16" y="50" width="142" height="158" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="87" y="88" text-anchor="middle" font-size="30">🔄</text>
    <text class="f" x="87" y="112" text-anchor="middle" font-size="12" fill="#58a6ff" font-weight="bold">apt update</text>
    <text class="f" x="87" y="130" text-anchor="middle" font-size="10" fill="#8b949e">Paketliste</text>
    <text class="f" x="87" y="144" text-anchor="middle" font-size="10" fill="#8b949e">aktualisieren</text>
    <rect x="26" y="156" width="122" height="36" rx="6" fill="#0d1117"/>
    <text class="f" x="87" y="172" text-anchor="middle" font-size="9" fill="#484f58">Schritt 1</text>
    <text class="f" x="87" y="185" text-anchor="middle" font-size="9" fill="#58a6ff">Immer zuerst!</text>
  </g>

  <!-- Card 2: apt install -->
  <g class="c2">
    <rect x="170" y="50" width="142" height="158" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
    <text x="241" y="88" text-anchor="middle" font-size="30">📦</text>
    <text class="f" x="241" y="112" text-anchor="middle" font-size="12" fill="#3fb950" font-weight="bold">apt install</text>
    <text class="f" x="241" y="130" text-anchor="middle" font-size="10" fill="#8b949e">Programme</text>
    <text class="f" x="241" y="144" text-anchor="middle" font-size="10" fill="#8b949e">installieren</text>
    <rect x="180" y="156" width="122" height="36" rx="6" fill="#0d1117"/>
    <text class="f" x="241" y="172" text-anchor="middle" font-size="9" fill="#484f58">Schritt 2</text>
    <text class="f" x="241" y="185" text-anchor="middle" font-size="9" fill="#3fb950">Software holen</text>
  </g>

  <!-- Card 3: apt remove -->
  <g class="c3">
    <rect x="324" y="50" width="142" height="158" rx="10" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
    <text x="395" y="88" text-anchor="middle" font-size="30">🗑️</text>
    <text class="f" x="395" y="112" text-anchor="middle" font-size="12" fill="#f85149" font-weight="bold">apt remove</text>
    <text class="f" x="395" y="130" text-anchor="middle" font-size="10" fill="#8b949e">Programme</text>
    <text class="f" x="395" y="144" text-anchor="middle" font-size="10" fill="#8b949e">entfernen</text>
    <rect x="334" y="156" width="122" height="36" rx="6" fill="#0d1117"/>
    <text class="f" x="395" y="172" text-anchor="middle" font-size="9" fill="#484f58">Bei Bedarf</text>
    <text class="f" x="395" y="185" text-anchor="middle" font-size="9" fill="#f85149">Aufräumen</text>
  </g>

  <!-- Card 4: autoremove -->
  <g class="c4">
    <rect x="478" y="50" width="146" height="158" rx="10" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
    <text x="551" y="88" text-anchor="middle" font-size="30">🧹</text>
    <text class="f" x="551" y="112" text-anchor="middle" font-size="12" fill="#f0883e" font-weight="bold">autoremove</text>
    <text class="f" x="551" y="130" text-anchor="middle" font-size="10" fill="#8b949e">System</text>
    <text class="f" x="551" y="144" text-anchor="middle" font-size="10" fill="#8b949e">aufräumen</text>
    <rect x="488" y="156" width="126" height="36" rx="6" fill="#0d1117"/>
    <text class="f" x="551" y="172" text-anchor="middle" font-size="9" fill="#484f58">Regelmäßig</text>
    <text class="f" x="551" y="185" text-anchor="middle" font-size="9" fill="#f0883e">Platz sparen</text>
  </g>

  <!-- Footer -->
  <text class="f ft" x="320" y="222" text-anchor="middle" font-size="11" fill="#484f58">Du kennst jetzt die wichtigsten apt-Befehle ✓</text>
</svg>
