<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 270">
  <defs>
    <style>
      .f { font-family: sans-serif; }
      .ti { opacity: 0; animation: fadeIn 11s infinite; }
      .sub { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 0.4s; }
      .c1 { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 0.8s; }
      .c2 { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 1.6s; }
      .c3 { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 2.4s; }
      .ft { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 3.0s; }
      @keyframes fadeIn {
        0%,2%{opacity:0}
        7%,87%{opacity:1}
        92%,100%{opacity:0}
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="640" height="270" rx="12" fill="#0d1117"/>

  <!-- Header bar -->
  <rect width="640" height="38" rx="12" fill="#161b22"/>
  <rect y="26" width="640" height="12" fill="#161b22"/>

  <!-- Header label -->
  <text class="f ti" x="320" y="24" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="bold" letter-spacing="1">LEKTION 07</text>

  <!-- Hero emoji -->
  <text class="ti" x="320" y="105" text-anchor="middle" font-size="54">📦</text>

  <!-- Main title -->
  <text class="f ti" x="320" y="135" text-anchor="middle" font-size="28" fill="#e6edf3" font-weight="bold">Paketverwaltung</text>

  <!-- Subtitle -->
  <text class="f sub" x="320" y="160" text-anchor="middle" font-size="13" fill="#8b949e">apt · dpkg · snap — der App Store von Linux</text>

  <!-- Card 1: apt -->
  <g class="c1">
    <rect x="24" y="178" width="184" height="74" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
    <text x="116" y="204" text-anchor="middle" font-size="22">📦</text>
    <text class="f" x="116" y="223" text-anchor="middle" font-size="13" fill="#3fb950" font-weight="bold">apt</text>
    <text class="f" x="116" y="240" text-anchor="middle" font-size="11" fill="#8b949e">Hauptwerkzeug</text>
  </g>

  <!-- Card 2: dpkg -->
  <g class="c2">
    <rect x="228" y="178" width="184" height="74" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="320" y="204" text-anchor="middle" font-size="22">🔧</text>
    <text class="f" x="320" y="223" text-anchor="middle" font-size="13" fill="#58a6ff" font-weight="bold">dpkg</text>
    <text class="f" x="320" y="240" text-anchor="middle" font-size="11" fill="#8b949e">Direkt installieren</text>
  </g>

  <!-- Card 3: snap -->
  <g class="c3">
    <rect x="432" y="178" width="184" height="74" rx="10" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
    <text x="524" y="204" text-anchor="middle" font-size="22">🔵</text>
    <text class="f" x="524" y="223" text-anchor="middle" font-size="13" fill="#bc8cff" font-weight="bold">snap</text>
    <text class="f" x="524" y="240" text-anchor="middle" font-size="11" fill="#8b949e">Neue Pakete</text>
  </g>

  <!-- Footer -->
  <text class="f ft" x="320" y="264" text-anchor="middle" font-size="11" fill="#484f58">Linux macht Software-Installation einfach ✓</text>
</svg>
