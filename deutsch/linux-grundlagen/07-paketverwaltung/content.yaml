version: 2
number: 7
title: "Paketverwaltung"
description: "apt, snap und dpkg — Software installieren, aktualisieren und verwalten unter Ubuntu/Debian"
image: "images/lesson-header.svg"
image_caption: "Paket-Boxen mit apt, dnf und snap Labels"
sections:
  - title: "apt — der App Store von Linux"
    image: "images/section-01-apt.svg"
    explanation: |
      Stell dir vor: Du hast ein neues Handy.
      Du gehst in den App Store, suchst eine App und tippst auf "Installieren".
      Fertig!

      Linux hat genau das auch — nur über das Terminal.
      Das Programm heißt **apt** (sprich: "apt").

      Bevor du etwas installierst, sagst du Linux:
      "Schau mal nach, was es Neues gibt!"
      ```
      sudo apt update
      ```

      Dann installierst du ein Programm — zum Beispiel den Browser Firefox:
      ```
      sudo apt install firefox
      ```

      Das bedeutet Schritt für Schritt:
      - `sudo` — "Ich bin der Chef hier, ich darf das"
      - `apt install` — "Installiere bitte..."
      - `firefox` — "...dieses Programm"

      Und wenn du alle Programme auf dem neuesten Stand bringen willst:
      ```
      sudo apt upgrade
      ```

      Merke: `apt update` holt nur die **Liste** der neuen Versionen.
      `apt upgrade` installiert dann wirklich die Neuigkeiten.
    examples:
      - q: "sudo apt update"
        a: "Holt die aktuelle Liste aller verfügbaren Programme — wie ein Blick in den App Store"
        rel:
          - ["apt-cmd", "Advanced Package Tool — Paketverwaltung für Debian/Ubuntu", "Befehl apt"]
          - ["apt-update", "Paketlisten von Servern aktualisieren (nicht die Pakete selbst)", "apt update"]
        labels: ["Konfiguration"]
      - q: "sudo apt upgrade"
        a: "Aktualisiert alle installierten Programme auf die neueste Version"
        rel:
          - ["apt-upgrade", "Alle installierten Pakete auf neueste Version aktualisieren", "apt upgrade"]
        labels: ["Konfiguration"]
      - q: "sudo apt install git curl wget"
        a: "Installiert gleich drei Programme auf einmal — einfach alle Namen hintereinander schreiben"
        rel:
          - ["apt-install", "Paket(e) installieren", "apt install"]
        labels: ["Konfiguration"]
      - q: "sudo apt update && sudo apt upgrade -y"
        a: "Update und Upgrade in einem Schritt — -y sagt automatisch Ja zu allen Fragen"
        rel:
          - ["apt-y-flag", "Yes — alle Rückfragen automatisch bestätigen", "Flag -y"]
        labels: ["Konfiguration"]

  - title: "Programme suchen, entfernen und aufräumen"
    image: "images/section-02-search-remove.svg"
    explanation: |
      Du weißt nicht genau, wie ein Programm heißt?
      Kein Problem — du kannst danach suchen:
      ```
      apt search "text editor"
      ```

      Das ist wie die Suchfunktion im App Store.
      Linux zeigt dir alle Programme, die zu deiner Suche passen.

      Wenn du ein Programm nicht mehr brauchst, kannst du es entfernen:
      ```
      sudo apt remove firefox
      ```

      Oder komplett löschen (auch alle Einstellungen):
      ```
      sudo apt purge firefox
      ```

      Und nach dem Aufräumen löscht du alte, unnötige Reste:
      ```
      sudo apt autoremove
      ```

      Das ist wie "Speicher bereinigen" auf dem Handy —
      Programme, die niemand mehr braucht, werden entfernt.
    examples:
      - q: "apt search \"text editor\""
        a: "Sucht nach Programmen mit 'text editor' im Namen — wie die Suche im App Store"
        rel:
          - ["apt-search", "In Paketdatenbank suchen", "apt search"]
        labels: ["Konfiguration"]
      - q: "apt show nodejs"
        a: "Zeigt Details zu nodejs: Version, Größe, Beschreibung — bevor du es installierst"
        rel:
          - ["apt-show", "Detaillierte Informationen zu einem Paket anzeigen", "apt show"]
        labels: ["Konfiguration"]
      - q: "sudo apt remove --purge apache2"
        a: "Entfernt Apache2 komplett — auch alle Einstellungen werden gelöscht"
        rel:
          - ["apt-purge", "Paket und alle Konfigurationsdateien komplett entfernen", "apt purge / --purge"]
        labels: ["Konfiguration"]
      - q: "sudo apt autoremove && sudo apt clean"
        a: "Alten Ballast entfernen und Speicherplatz freigeben — wie Frühjahrsputz für Linux"
        rel:
          - ["apt-autoremove", "Automatisch installierte, nicht mehr benötigte Pakete entfernen", "apt autoremove"]
          - ["apt-clean", "Heruntergeladene Paketdateien aus Cache löschen", "apt clean"]
        labels: ["Konfiguration"]

  - title: "dpkg und snap — andere Wege zur Installation"
    image: "images/section-03-dpkg-snap.svg"
    explanation: |
      Manchmal ist ein Programm nicht im normalen App Store von Linux.
      Dann gibt es andere Wege:

      **Weg 1: .deb-Datei direkt installieren**
      Eine `.deb`-Datei (sprich: "deb") ist wie eine Installationsdatei für Linux.
      Das Werkzeug dafür heißt **dpkg** (sprich: "dee-pee-kay-gee").
      ```
      sudo dpkg -i google-chrome.deb
      ```
      Das `-i` steht für "install" (englisch für "installieren").

      **Weg 2: snap**
      **Snap** ist ein moderneres System — Programme laufen dabei extra sicher,
      abgetrennt vom Rest des Systems, wie in einer kleinen Schachtel.
      ```
      snap install vlc
      ```

      **Weg 3: Installationsskript**
      Viele Profi-Programme haben einen eigenen Installationshelfer:
      ```
      curl -fsSL https://get.docker.com | sudo sh
      ```
      Das lädt den Helfer herunter und startet ihn sofort.
    examples:
      - q: "sudo dpkg -i vscode.deb"
        a: "Installiert eine heruntergeladene .deb-Datei direkt — wie eine Installationsdatei öffnen"
        rel:
          - ["dpkg-cmd", "Debian Package — .deb-Dateien direkt verwalten", "Befehl dpkg"]
          - ["dpkg-i", "Install — .deb-Datei installieren", "Flag -i"]
        labels: ["Konfiguration"]
      - q: "dpkg -l | grep \"^ii\""
        a: "Zeigt alle korrekt installierten Programme — ii bedeutet 'korrekt installiert'"
        rel:
          - ["dpkg-l", "List — alle bekannten Pakete und ihren Status", "dpkg -l"]
        labels: ["Konfiguration"]
      - q: "snap install code --classic"
        a: "Visual Studio Code über snap installieren — --classic gibt dem Programm mehr Rechte"
        rel:
          - ["snap-cmd", "Snap-Paketsystem — isolierte, auto-updatende Apps", "Befehl snap"]
          - ["snap-classic", "Classic confinement — volles Systemzugriff für IDE-artige Programme", "Flag --classic"]
        labels: ["Konfiguration"]
      - q: "snap list"
        a: "Zeigt alle Programme an, die über snap installiert wurden"
        rel:
          - ["snap-list", "Alle installierten snap-Pakete auflisten", "snap list"]
        labels: ["Konfiguration"]

  - title: "🖥️ Terminal-Check"
    image: "images/section-04-check.svg"
    explanation: |
      Teste jetzt dein Wissen — gib die Befehle direkt ein!
    examples:
      - q: "Welcher Befehl aktualisiert die Programmliste unter Ubuntu?"
        type: input
        a: "sudo apt update"
        labels: ["Konfiguration"]
      - q: "Was ist der Unterschied zwischen 'apt update' und 'apt upgrade'?"
        type: select
        options:
          - text: "update holt neue Programmlisten, upgrade installiert die Updates selbst"
            correct: true
          - text: "update installiert Programme, upgrade entfernt alte"
          - text: "update und upgrade machen dasselbe"
          - text: "upgrade holt neue Programmlisten, update installiert die Updates"
        labels: ["Konfiguration"]
      - q: "Welcher Befehl entfernt ein Programm inkl. aller Einstellungen?"
        type: select
        options:
          - text: "sudo apt purge nginx"
            correct: true
          - text: "sudo apt remove nginx"
          - text: "sudo apt delete nginx"
          - text: "sudo apt uninstall nginx"
        labels: ["Konfiguration"]
      - q: "Welche dieser Aussagen über apt stimmen?"
        type: multiple-choice
        options:
          - text: "apt kann mehrere Programme auf einmal installieren"
            correct: true
          - text: "apt autoremove entfernt nicht mehr benötigte Programme"
            correct: true
          - text: "apt search sucht in der Programmdatenbank"
            correct: true
          - text: "apt braucht keine Administratorrechte"
        labels: ["Konfiguration"]
