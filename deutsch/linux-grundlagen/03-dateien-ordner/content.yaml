version: 2
number: 3
title: "Dateien & Ordner"
description: "Lern wie du Dateien und Ordner erstellst, kopierst, umbenennst und löschst"
image: "images/lesson-header.svg"
image_caption: "Verzeichnisbaum mit Dateien und Ordnern"
sections:
  - title: "Erstellen — touch und mkdir"
    image: "images/section-01-create.svg"
    explanation: |
      Bevor du Dateien bearbeiten kannst, musst du sie erstellen.
      Dafür gibt es zwei einfache Befehle:

      **`touch`** erstellt eine leere Datei:
      ```
      touch notizen.txt
      ```
      Das ist wie ein leeres Blatt Papier anlegen.
      Du kannst auch mehrere Dateien auf einmal erstellen:
      ```
      touch seite.html stil.css
      ```

      **`mkdir`** erstellt einen neuen Ordner.
      MKDIR steht für "Make Directory" — also "erstelle einen Ordner":
      ```
      mkdir fotos
      ```

      Das `-p` Flag bei `mkdir` ist besonders praktisch:
      Es erstellt gleich mehrere Ordner auf einmal, auch wenn Zwischenordner fehlen:
      ```
      mkdir -p projekte/meine-webseite/bilder
      ```
      Das erstellt `projekte`, darin `meine-webseite`, und darin `bilder` —
      alles in einem Schritt!
    examples:
      - q: "touch README.md"
        a: "Erstellt eine leere Datei namens README.md im aktuellen Ordner"
        rel:
          - ["touch-cmd", "Leere Datei erstellen oder Timestamp aktualisieren", "Befehl touch"]
        labels: ["Dateisystem"]
      - q: "touch index.html style.css app.js"
        a: "Erstellt drei Dateien gleichzeitig — touch kann beliebig viele Namen auf einmal bekommen"
        rel:
          - ["touch-multiple", "Mehrere Dateien gleichzeitig mit touch erstellen", "touch Datei1 Datei2"]
        labels: ["Dateisystem"]
      - q: "mkdir -p ~/projekte/meine-webseite/assets/img"
        a: "Erstellt den gesamten Ordnerpfad auf einmal — alle fehlenden Ordner dazwischen werden auch erstellt"
        rel:
          - ["mkdir-cmd", "Make Directory — Verzeichnis erstellen", "Befehl mkdir"]
          - ["mkdir-p", "Parents — alle Zwischenverzeichnisse automatisch erstellen", "Flag -p"]
        labels: ["Dateisystem"]

  - title: "Kopieren und Verschieben — cp und mv"
    image: "images/section-02-copy-move.svg"
    explanation: |
      Stell dir vor, du arbeitest mit Papieren auf deinem Schreibtisch:

      **`cp`** ist wie ein Kopierer — das Original bleibt, du bekommst eine Kopie.
      CP steht für "Copy" (englisch für "kopieren"):
      ```
      cp notizen.txt notizen-backup.txt
      ```
      Für ganze Ordner brauchst du `-r` (rekursiv, also "mit allem drin"):
      ```
      cp -r fotos/ fotos-backup/
      ```

      **`mv`** ist wie ein Umzug — das Original verschwindet vom alten Ort.
      MV steht für "Move" (englisch für "verschieben"):
      ```
      mv entwurf.txt fertig.txt
      ```
      Wenn du keinen anderen Ordner angibst, benennt `mv` die Datei einfach um!

      | Befehl | Was passiert? |
      |--------|---------------|
      | `cp datei.txt kopie.txt` | Kopie mit neuem Namen |
      | `cp datei.txt /tmp/` | In anderen Ordner kopieren |
      | `cp -r ordner/ backup/` | Ganzen Ordner kopieren |
      | `mv alt.txt neu.txt` | Umbenennen |
      | `mv datei.txt ~/dokumente/` | Verschieben |
    examples:
      - q: "cp ~/.bashrc ~/.bashrc.backup"
        a: "Erstellt eine Sicherheitskopie der Bash-Einstellungsdatei — gut vor Änderungen!"
        rel:
          - ["cp-cmd", "Copy — Dateien und Verzeichnisse kopieren", "Befehl cp"]
          - ["bashrc", "Bash-Konfigurationsdatei für Einstellungen und Abkürzungen", "~/.bashrc"]
        labels: ["Dateisystem"]
      - q: "cp -r /etc/nginx/ ~/nginx-backup/"
        a: "Kopiert den gesamten nginx-Einstellungsordner als Backup in deinen persönlichen Ordner"
        rel:
          - ["cp-r", "Recursive — Verzeichnisse inkl. Inhalt kopieren", "Flag -r"]
        labels: ["Dateisystem", "Konfiguration"]
      - q: "mv entwurf.txt final.txt"
        a: "Benennt die Datei um — aus 'entwurf.txt' wird 'final.txt', kein Original mehr"
        rel:
          - ["mv-cmd", "Move — Dateien verschieben oder umbenennen", "Befehl mv"]
        labels: ["Dateisystem"]
      - q: "mv ~/Downloads/*.pdf ~/Dokumente/PDFs/"
        a: "Alle PDF-Dateien aus dem Downloads-Ordner in den PDFs-Ordner verschieben"
        rel:
          - ["glob-star", "Das Sternchen * ist ein Platzhalter — passt auf beliebige Zeichen", "Wildcard *"]
          - ["mv-multiple", "Mehrere Dateien mit Platzhaltern verschieben", "mv *.pdf Ziel/"]
        labels: ["Dateisystem"]

  - title: "Löschen — rm und rmdir"
    image: "images/section-03-delete.svg"
    explanation: |
      Jetzt kommt ein wichtiger Hinweis — bitte gut lesen!

      **Linux hat keinen Papierkorb.**
      Was mit `rm` gelöscht wird, ist **sofort und für immer** weg.
      Es gibt kein Rückgängigmachen!

      | Befehl | Was passiert? |
      |--------|---------------|
      | `rm datei.txt` | Datei löschen (unwiderruflich!) |
      | `rm -i datei.txt` | Löschen, aber vorher nachfragen (`-i` = interactive = "frag mich") |
      | `rm *.tmp` | Alle Dateien, die auf .tmp enden, löschen |
      | `rmdir leerer-ordner/` | Einen leeren Ordner löschen |
      | `rm -r ordner/` | Einen Ordner mit allem drin löschen |

      **Goldene Regel:** Bevor du etwas löschst, schau dir an was gelöscht wird:
      ```
      ls *.tmp
      ```
      Erst wenn du sicher bist, dann:
      ```
      rm *.tmp
      ```

      Merke dir: `rm -i` ist dein Freund am Anfang — er fragt immer nach!
    examples:
      - q: "rm -i wichtige-datei.txt"
        a: "Löscht die Datei, fragt aber vorher nach — für Anfänger sehr empfohlen!"
        rel:
          - ["rm-cmd", "Remove — Dateien löschen (kein Papierkorb!)", "Befehl rm"]
          - ["rm-i", "Interactive — vor dem Löschen nachfragen", "Flag -i"]
        labels: ["Dateisystem"]
      - q: "rm -r ~/projekte/altes-projekt/"
        a: "Löscht den Ordner 'altes-projekt' und alles darin — Vorsicht, kein Papierkorb!"
        rel:
          - ["rm-r", "Recursive — Verzeichnisse und Inhalt löschen", "Flag -r"]
        labels: ["Dateisystem"]
      - q: "rmdir leerer-ordner/"
        a: "Löscht nur einen leeren Ordner — gibt eine Fehlermeldung wenn noch Dateien drin sind"
        rel:
          - ["rmdir-cmd", "Remove Directory — nur leere Verzeichnisse löschen", "Befehl rmdir"]
        labels: ["Dateisystem"]
      - q: "ls *.log && rm *.log"
        a: "Erst alle .log-Dateien anzeigen, dann erst löschen — das sichere Vorgehen!"
        rel:
          - ["safe-delete", "Erst ls, dann rm — sicheres Löschen mit Vorschau", "Best Practice"]
        labels: ["Dateisystem"]

  - title: "Terminal-Check"
    image: "images/section-04-check.svg"
    explanation: |
      Teste jetzt dein Wissen!
    examples:
      - q: "Welcher Befehl erstellt eine leere Datei namens 'notizen.txt'?"
        type: input
        a: "touch notizen.txt"
        labels: ["Dateisystem"]
      - q: "Was macht das Flag '-p' bei 'mkdir -p projekte/web/assets'?"
        type: select
        options:
          - text: "Erstellt alle fehlenden Zwischenordner automatisch"
            correct: true
          - text: "Fragt vor dem Erstellen nach"
          - text: "Zeigt den erstellten Ordner an"
          - text: "Schützt den Ordner vor dem Löschen"
        labels: ["Dateisystem"]
      - q: "Welcher Befehl benennt eine Datei von 'entwurf.txt' zu 'final.txt' um?"
        type: select
        options:
          - text: "mv entwurf.txt final.txt"
            correct: true
          - text: "cp entwurf.txt final.txt"
          - text: "rename entwurf.txt final.txt"
          - text: "touch final.txt entwurf.txt"
        labels: ["Dateisystem"]
      - q: "Welche dieser Aussagen über 'rm' stimmen?"
        type: multiple-choice
        options:
          - text: "rm löscht Dateien ohne Papierkorb"
            correct: true
          - text: "rm -r löscht Ordner mit allem drin"
            correct: true
          - text: "rm -i fragt vor dem Löschen nach"
            correct: true
          - text: "rm kann das Löschen rückgängig machen"
        labels: ["Dateisystem"]
