<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210">
  <style>
    .f { font-family: sans-serif; }
    .ti { animation: tia 11s infinite; }
    @keyframes tia { 0%,3%{opacity:0} 7%,87%{opacity:1} 92%,100%{opacity:0} }
    .c1 { animation: c1a 11s infinite; }
    @keyframes c1a { 0%,8%{opacity:0} 14%,87%{opacity:1} 92%,100%{opacity:0} }
    .c2 { animation: c2a 11s infinite; }
    @keyframes c2a { 0%,28%{opacity:0} 34%,87%{opacity:1} 92%,100%{opacity:0} }
    .c3 { animation: c3a 11s infinite; }
    @keyframes c3a { 0%,48%{opacity:0} 54%,87%{opacity:1} 92%,100%{opacity:0} }
    .ft { animation: fta 11s infinite; }
    @keyframes fta { 0%,78%{opacity:0} 82%,87%{opacity:1} 92%,100%{opacity:0} }
  </style>

  <!-- Background -->
  <rect width="640" height="210" rx="12" fill="#0d1117"/>

  <!-- Header bar -->
  <rect width="640" height="38" rx="12" fill="#161b22"/>
  <rect y="26" width="640" height="12" fill="#161b22"/>

  <!-- Header title -->
  <text class="f ti" x="320" y="24" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="bold" letter-spacing="1">KOPIEREN UND VERSCHIEBEN — cp und mv</text>

  <!-- Card 1: cp (blue) -->
  <g class="c1">
    <rect x="16" y="50" width="192" height="143" rx="10" fill="#0d1520" stroke="#58a6ff" stroke-width="2"/>
    <text class="f" x="112" y="90" text-anchor="middle" font-size="30">📋</text>
    <text class="f" x="112" y="114" text-anchor="middle" font-size="13" fill="#58a6ff" font-weight="bold">cp</text>
    <text class="f" x="112" y="133" text-anchor="middle" font-size="9" fill="#8b949e">Kopiert Dateien.</text>
    <text class="f" x="112" y="148" text-anchor="middle" font-size="9" fill="#3fb950" font-weight="bold">Original bleibt!</text>
    <rect x="30" y="160" width="164" height="20" rx="5" fill="#0d1f3a"/>
    <text class="f" x="112" y="174" text-anchor="middle" font-size="9" fill="#58a6ff">$ cp datei.txt kopie.txt</text>
  </g>

  <!-- Card 2: mv (orange) -->
  <g class="c2">
    <rect x="224" y="50" width="192" height="143" rx="10" fill="#0d1520" stroke="#f0883e" stroke-width="2"/>
    <text class="f" x="320" y="90" text-anchor="middle" font-size="30">📦</text>
    <text class="f" x="320" y="114" text-anchor="middle" font-size="13" fill="#f0883e" font-weight="bold">mv</text>
    <text class="f" x="320" y="133" text-anchor="middle" font-size="9" fill="#8b949e">Verschiebt oder</text>
    <text class="f" x="320" y="148" text-anchor="middle" font-size="9" fill="#8b949e">umbenennt Dateien</text>
    <rect x="238" y="160" width="164" height="20" rx="5" fill="#2a1a0d"/>
    <text class="f" x="320" y="174" text-anchor="middle" font-size="9" fill="#f0883e">$ mv alt.txt neu.txt</text>
  </g>

  <!-- Card 3: cp -r (green) -->
  <g class="c3">
    <rect x="432" y="50" width="192" height="143" rx="10" fill="#0d1520" stroke="#3fb950" stroke-width="2"/>
    <text class="f" x="528" y="90" text-anchor="middle" font-size="30">🔄</text>
    <text class="f" x="528" y="114" text-anchor="middle" font-size="13" fill="#3fb950" font-weight="bold">cp -r</text>
    <text class="f" x="528" y="133" text-anchor="middle" font-size="9" fill="#8b949e">Ganzen Ordner</text>
    <text class="f" x="528" y="148" text-anchor="middle" font-size="9" fill="#8b949e">kopieren (-r = rekursiv)</text>
    <rect x="446" y="160" width="164" height="20" rx="5" fill="#0d2a10"/>
    <text class="f" x="528" y="174" text-anchor="middle" font-size="9" fill="#3fb950">$ cp -r ordner/ backup/</text>
  </g>

  <!-- Footer -->
  <g class="ft">
    <text class="f" x="320" y="204" text-anchor="middle" font-size="9" fill="#484f58">cp = kopieren (Original bleibt) · mv = verschieben/umbenennen · -r = rekursiv für Ordner</text>
  </g>
</svg>
