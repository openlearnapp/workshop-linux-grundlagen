<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230">
  <style>
    .f { font-family: sans-serif; }
    .ti { animation: tia 11s infinite; }
    @keyframes tia { 0%,3%{opacity:0} 7%,87%{opacity:1} 92%,100%{opacity:0} }
    .c1 { animation: c1a 11s infinite; }
    @keyframes c1a { 0%,8%{opacity:0} 14%,87%{opacity:1} 92%,100%{opacity:0} }
    .c2 { animation: c2a 11s infinite; }
    @keyframes c2a { 0%,28%{opacity:0} 34%,87%{opacity:1} 92%,100%{opacity:0} }
    .c3 { animation: c3a 11s infinite; }
    @keyframes c3a { 0%,48%{opacity:0} 54%,87%{opacity:1} 92%,100%{opacity:0} }
    .c4 { animation: c4a 11s infinite; }
    @keyframes c4a { 0%,65%{opacity:0} 71%,87%{opacity:1} 92%,100%{opacity:0} }
    .ft { animation: fta 11s infinite; }
    @keyframes fta { 0%,78%{opacity:0} 82%,87%{opacity:1} 92%,100%{opacity:0} }
  </style>

  <!-- Background -->
  <rect width="640" height="230" rx="12" fill="#0d1117"/>

  <!-- Header bar -->
  <rect width="640" height="38" rx="12" fill="#161b22"/>
  <rect y="26" width="640" height="12" fill="#161b22"/>

  <!-- Header title -->
  <text class="f ti" x="320" y="24" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="bold" letter-spacing="1">ERSTELLEN — touch und mkdir</text>

  <!-- Card 1: touch datei.txt (green) -->
  <g class="c1">
    <rect x="10" y="48" width="148" height="168" rx="10" fill="#0d1520" stroke="#3fb950" stroke-width="2"/>
    <text class="f" x="84" y="88" text-anchor="middle" font-size="30">✏️</text>
    <text class="f" x="84" y="112" text-anchor="middle" font-size="11" fill="#3fb950" font-weight="bold">touch datei.txt</text>
    <text class="f" x="84" y="132" text-anchor="middle" font-size="9" fill="#8b949e">Neue leere Datei</text>
    <text class="f" x="84" y="147" text-anchor="middle" font-size="9" fill="#8b949e">erstellen</text>
    <rect x="24" y="162" width="120" height="22" rx="5" fill="#0d2a10"/>
    <text class="f" x="84" y="177" text-anchor="middle" font-size="9" fill="#3fb950">$ touch datei.txt</text>
  </g>

  <!-- Card 2: mkdir ordner (blue) -->
  <g class="c2">
    <rect x="166" y="48" width="148" height="168" rx="10" fill="#0d1520" stroke="#58a6ff" stroke-width="2"/>
    <text class="f" x="240" y="88" text-anchor="middle" font-size="30">📁</text>
    <text class="f" x="240" y="112" text-anchor="middle" font-size="11" fill="#58a6ff" font-weight="bold">mkdir ordner</text>
    <text class="f" x="240" y="132" text-anchor="middle" font-size="9" fill="#8b949e">Neuen Ordner</text>
    <text class="f" x="240" y="147" text-anchor="middle" font-size="9" fill="#8b949e">erstellen</text>
    <rect x="180" y="162" width="120" height="22" rx="5" fill="#0d1f3a"/>
    <text class="f" x="240" y="177" text-anchor="middle" font-size="9" fill="#58a6ff">$ mkdir ordner</text>
  </g>

  <!-- Card 3: mkdir -p a/b/c (orange) -->
  <g class="c3">
    <rect x="322" y="48" width="148" height="168" rx="10" fill="#0d1520" stroke="#f0883e" stroke-width="2"/>
    <text class="f" x="396" y="88" text-anchor="middle" font-size="30">📂</text>
    <text class="f" x="396" y="112" text-anchor="middle" font-size="11" fill="#f0883e" font-weight="bold">mkdir -p a/b/c</text>
    <text class="f" x="396" y="132" text-anchor="middle" font-size="9" fill="#8b949e">Ganze Ordner-Kette</text>
    <text class="f" x="396" y="147" text-anchor="middle" font-size="9" fill="#8b949e">auf einmal anlegen</text>
    <rect x="336" y="162" width="120" height="22" rx="5" fill="#2a1a0d"/>
    <text class="f" x="396" y="177" text-anchor="middle" font-size="9" fill="#f0883e">$ mkdir -p a/b/c</text>
  </g>

  <!-- Card 4: touch *.txt (purple) -->
  <g class="c4">
    <rect x="478" y="48" width="152" height="168" rx="10" fill="#0d1520" stroke="#bc8cff" stroke-width="2"/>
    <text class="f" x="554" y="88" text-anchor="middle" font-size="30">📝</text>
    <text class="f" x="554" y="112" text-anchor="middle" font-size="11" fill="#bc8cff" font-weight="bold">touch *.txt</text>
    <text class="f" x="554" y="132" text-anchor="middle" font-size="9" fill="#8b949e">Mehrere Dateien</text>
    <text class="f" x="554" y="147" text-anchor="middle" font-size="9" fill="#8b949e">gleichzeitig</text>
    <rect x="492" y="162" width="124" height="22" rx="5" fill="#1a0d2a"/>
    <text class="f" x="554" y="177" text-anchor="middle" font-size="9" fill="#bc8cff">$ touch a.txt b.txt</text>
  </g>

  <!-- Footer -->
  <g class="ft">
    <text class="f" x="320" y="224" text-anchor="middle" font-size="9" fill="#484f58">touch erstellt Dateien · mkdir erstellt Ordner · -p erlaubt verschachtelte Pfade</text>
  </g>
</svg>
