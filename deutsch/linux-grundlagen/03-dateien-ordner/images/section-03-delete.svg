<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210">
  <style>
    .f { font-family: sans-serif; }
    .ti { animation: tia 11s infinite; }
    @keyframes tia { 0%,3%{opacity:0} 7%,87%{opacity:1} 92%,100%{opacity:0} }
    .c1 { animation: c1a 11s infinite; }
    @keyframes c1a { 0%,8%{opacity:0} 14%,87%{opacity:1} 92%,100%{opacity:0} }
    .c2 { animation: c2a 11s infinite; }
    @keyframes c2a { 0%,28%{opacity:0} 34%,87%{opacity:1} 92%,100%{opacity:0} }
    .c3 { animation: c3a 11s infinite; }
    @keyframes c3a { 0%,48%{opacity:0} 54%,87%{opacity:1} 92%,100%{opacity:0} }
    .ft { animation: fta 11s infinite; }
    @keyframes fta { 0%,68%{opacity:0} 72%,87%{opacity:1} 92%,100%{opacity:0} }
  </style>

  <!-- Background -->
  <rect width="640" height="210" rx="12" fill="#0d1117"/>

  <!-- Header bar -->
  <rect width="640" height="38" rx="12" fill="#161b22"/>
  <rect y="26" width="640" height="12" fill="#161b22"/>

  <!-- Header title -->
  <text class="f ti" x="320" y="24" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="bold" letter-spacing="1">LÖSCHEN — rm und rmdir</text>

  <!-- Card 1: rm datei.txt (red) -->
  <g class="c1">
    <rect x="16" y="50" width="192" height="143" rx="10" fill="#0d1520" stroke="#f85149" stroke-width="2"/>
    <text class="f" x="112" y="90" text-anchor="middle" font-size="30">🗑️</text>
    <text class="f" x="112" y="114" text-anchor="middle" font-size="12" fill="#f85149" font-weight="bold">rm datei.txt</text>
    <text class="f" x="112" y="132" text-anchor="middle" font-size="9" fill="#8b949e">Datei löschen —</text>
    <text class="f" x="112" y="147" text-anchor="middle" font-size="9" fill="#f85149" font-weight="bold">unwiderruflich!</text>
    <rect x="30" y="160" width="164" height="20" rx="5" fill="#2a0d0d"/>
    <text class="f" x="112" y="174" text-anchor="middle" font-size="9" fill="#f85149">$ rm datei.txt</text>
  </g>

  <!-- Card 2: rmdir ordner (orange) -->
  <g class="c2">
    <rect x="224" y="50" width="192" height="143" rx="10" fill="#0d1520" stroke="#f0883e" stroke-width="2"/>
    <text class="f" x="320" y="90" text-anchor="middle" font-size="30">📂</text>
    <text class="f" x="320" y="114" text-anchor="middle" font-size="12" fill="#f0883e" font-weight="bold">rmdir ordner</text>
    <text class="f" x="320" y="132" text-anchor="middle" font-size="9" fill="#8b949e">Leeren Ordner</text>
    <text class="f" x="320" y="147" text-anchor="middle" font-size="9" fill="#8b949e">löschen</text>
    <rect x="238" y="160" width="164" height="20" rx="5" fill="#2a1a0d"/>
    <text class="f" x="320" y="174" text-anchor="middle" font-size="9" fill="#f0883e">$ rmdir ordner</text>
  </g>

  <!-- Card 3: rm -ri (green/safe) -->
  <g class="c3">
    <rect x="432" y="50" width="192" height="143" rx="10" fill="#0d1520" stroke="#3fb950" stroke-width="2"/>
    <text class="f" x="528" y="90" text-anchor="middle" font-size="30">⚠️</text>
    <text class="f" x="528" y="114" text-anchor="middle" font-size="12" fill="#3fb950" font-weight="bold">rm -ri</text>
    <text class="f" x="528" y="132" text-anchor="middle" font-size="9" fill="#8b949e">Mit Bestätigung</text>
    <text class="f" x="528" y="147" text-anchor="middle" font-size="9" fill="#3fb950" font-weight="bold">löschen — sicherer!</text>
    <rect x="446" y="160" width="164" height="20" rx="5" fill="#0d2a10"/>
    <text class="f" x="528" y="174" text-anchor="middle" font-size="9" fill="#3fb950">$ rm -ri ordner/</text>
  </g>

  <!-- Footer warning -->
  <g class="ft">
    <rect x="16" y="196" width="608" height="1" rx="0" fill="#f85149" opacity="0.3"/>
    <text class="f" x="320" y="206" text-anchor="middle" font-size="9" fill="#f85149" opacity="0.8">⚠ rm -rf löscht alles ohne Rückfrage — vorsichtig benutzen!</text>
  </g>
</svg>
