<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210">
  <defs>
    <style>
      .f { font-family: sans-serif; }
      @keyframes fTi  { 0%,3%{opacity:0}  7%,87%{opacity:1} 92%,100%{opacity:0} }
      @keyframes fSub { 0%,8%{opacity:0} 12%,87%{opacity:1} 92%,100%{opacity:0} }
      @keyframes fC1  { 0%,12%{opacity:0} 18%,87%{opacity:1} 92%,100%{opacity:0} }
      @keyframes fC2  { 0%,30%{opacity:0} 36%,87%{opacity:1} 92%,100%{opacity:0} }
      @keyframes fC3  { 0%,48%{opacity:0} 54%,87%{opacity:1} 92%,100%{opacity:0} }
      @keyframes fFt  { 0%,78%{opacity:0} 82%,87%{opacity:1} 92%,100%{opacity:0} }
      .ti  { opacity:0; animation: fTi  11s infinite; }
      .sub { opacity:0; animation: fSub 11s infinite; }
      .c1  { opacity:0; animation: fC1  11s infinite; }
      .c2  { opacity:0; animation: fC2  11s infinite; }
      .c3  { opacity:0; animation: fC3  11s infinite; }
      .ft  { opacity:0; animation: fFt  11s infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="640" height="210" rx="12" fill="#0d1117"/>

  <!-- Header bar -->
  <rect width="640" height="38" rx="12" fill="#161b22"/>
  <rect y="26" width="640" height="12" fill="#161b22"/>

  <!-- Title -->
  <text class="f ti" x="320" y="24" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="bold" letter-spacing="1">chmod — BERECHTIGUNGEN ÄNDERN</text>

  <!-- Subtitle -->
  <text class="f sub" x="320" y="54" text-anchor="middle" font-size="11" fill="#8b949e">Zwei Methoden: Zahlen oder Buchstaben</text>

  <!-- Card 1: chmod 755 numbers (orange) -->
  <g class="c1">
    <rect x="14" y="64" width="192" height="96" rx="10" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
    <text x="110" y="93" text-anchor="middle" font-size="28">🔢</text>
    <text class="f" x="110" y="115" text-anchor="middle" font-size="13" fill="#f0883e" font-weight="bold">chmod 755</text>
    <text class="f" x="110" y="131" text-anchor="middle" font-size="10" fill="#8b949e">Zahlen-System:</text>
    <text class="f" x="110" y="148" text-anchor="middle" font-size="10" fill="#8b949e">4=lesen · 2=schreiben · 1=ausführen</text>
  </g>

  <!-- Card 2: chmod u+x letters (blue) -->
  <g class="c2">
    <rect x="224" y="64" width="192" height="96" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="320" y="93" text-anchor="middle" font-size="28">🔤</text>
    <text class="f" x="320" y="115" text-anchor="middle" font-size="13" fill="#58a6ff" font-weight="bold">chmod u+x</text>
    <text class="f" x="320" y="131" text-anchor="middle" font-size="10" fill="#8b949e">Buchstaben-System:</text>
    <text class="f" x="320" y="148" text-anchor="middle" font-size="10" fill="#8b949e">u=user · g=group · o=others</text>
  </g>

  <!-- Card 3: chmod -R recursive (green) -->
  <g class="c3">
    <rect x="434" y="64" width="192" height="96" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
    <text x="530" y="93" text-anchor="middle" font-size="28">📁</text>
    <text class="f" x="530" y="115" text-anchor="middle" font-size="13" fill="#3fb950" font-weight="bold">chmod -R</text>
    <text class="f" x="530" y="131" text-anchor="middle" font-size="10" fill="#8b949e">Alle Dateien in einem</text>
    <text class="f" x="530" y="148" text-anchor="middle" font-size="10" fill="#8b949e">Ordner auf einmal ändern</text>
  </g>

  <!-- Footer tip -->
  <g class="ft">
    <rect x="14" y="172" width="612" height="28" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text class="f" x="320" y="191" text-anchor="middle" font-size="10" fill="#8b949e">755 = rwxr-xr-x · 644 = rw-r--r-- · Häufigste Werte!</text>
  </g>
</svg>
