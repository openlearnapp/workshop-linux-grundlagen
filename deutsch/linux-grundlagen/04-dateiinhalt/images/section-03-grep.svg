<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="640" height="160" fill="url(#bg)" rx="8"/>
  <!-- Decorative elements -->
  <circle cx="80" cy="60" r="2" fill="#58a6ff" opacity="0.15"/><circle cx="95" cy="45" r="1.5" fill="#58a6ff" opacity="0.1"/><circle cx="70" cy="100" r="1" fill="#58a6ff" opacity="0.12"/>
  <circle cx="560" cy="60" r="2" fill="#58a6ff" opacity="0.15"/><circle cx="545" cy="100" r="1.5" fill="#58a6ff" opacity="0.1"/><circle cx="570" cy="45" r="1" fill="#58a6ff" opacity="0.12"/>
  <!-- Icon -->
  
  <!-- Text lines (faded) -->
  <line x1="280" y1="45" x2="360" y2="45" stroke="#8b949e" stroke-width="1.5" opacity="0.15"/>
  <line x1="280" y1="55" x2="350" y2="55" stroke="#8b949e" stroke-width="1.5" opacity="0.15"/>
  <!-- Highlighted match -->
  <rect x="295" y="61" width="36" height="12" rx="2" fill="#3fb950" opacity="0.15"/>
  <line x1="280" y1="67" x2="360" y2="67" stroke="#3fb950" stroke-width="2" opacity="0.7"/>
  <!-- More faded lines -->
  <line x1="280" y1="79" x2="355" y2="79" stroke="#8b949e" stroke-width="1.5" opacity="0.15"/>
  <line x1="280" y1="89" x2="345" y2="89" stroke="#8b949e" stroke-width="1.5" opacity="0.15"/>
  <!-- Magnifying glass -->
  <circle cx="340" cy="100" r="14" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.6"/>
  <line x1="350" y1="110" x2="362" y2="122" stroke="#58a6ff" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>
  <!-- Accent bar -->
  <rect x="220" y="152" width="200" height="3" fill="#58a6ff" opacity="0.5" rx="1.5"/>
</svg>
