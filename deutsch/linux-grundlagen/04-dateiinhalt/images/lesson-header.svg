<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>

  <!-- Terminal window -->
  <rect x="60" y="25" width="520" height="310" rx="8" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <rect x="60" y="25" width="520" height="30" rx="8" fill="#21262d"/>
  <rect x="60" y="45" width="520" height="10" fill="#21262d"/>
  <circle cx="82" cy="40" r="6" fill="#f85149"/>
  <circle cx="102" cy="40" r="6" fill="#f0883e"/>
  <circle cx="122" cy="40" r="6" fill="#3fb950"/>

  <!-- cat command -->
  <text x="80" y="78" font-family="monospace" font-size="13" fill="#8b949e">$</text>
  <text x="95" y="78" font-family="monospace" font-size="13" fill="#f0883e"> cat</text>
  <text x="135" y="78" font-family="monospace" font-size="13" fill="#e6edf3"> server.log</text>
  <text x="80" y="96" font-family="monospace" font-size="11" fill="#8b949e">[2024-01-15 08:30:01] INFO  Server started</text>
  <text x="80" y="112" font-family="monospace" font-size="11" fill="#8b949e">[2024-01-15 08:30:02] INFO  Port 8080</text>
  <text x="80" y="128" font-family="monospace" font-size="11" fill="#f85149">[2024-01-15 09:15:33] ERROR Connection refused</text>
  <text x="80" y="144" font-family="monospace" font-size="11" fill="#8b949e">[2024-01-15 09:15:34] INFO  Retrying...</text>

  <!-- Divider -->
  <line x1="80" y1="158" x2="560" y2="158" stroke="#30363d" stroke-width="1" stroke-dasharray="4"/>

  <!-- head command -->
  <text x="80" y="178" font-family="monospace" font-size="13" fill="#8b949e">$</text>
  <text x="95" y="178" font-family="monospace" font-size="13" fill="#58a6ff"> head</text>
  <text x="145" y="178" font-family="monospace" font-size="13" fill="#e6edf3"> -n 3 data.csv</text>
  <text x="80" y="196" font-family="monospace" font-size="11" fill="#3fb950">id,name,score</text>
  <text x="80" y="212" font-family="monospace" font-size="11" fill="#8b949e">1,alice,95</text>
  <text x="80" y="228" font-family="monospace" font-size="11" fill="#8b949e">2,bob,87</text>

  <!-- Divider -->
  <line x1="80" y1="242" x2="560" y2="242" stroke="#30363d" stroke-width="1" stroke-dasharray="4"/>

  <!-- grep command -->
  <text x="80" y="262" font-family="monospace" font-size="13" fill="#8b949e">$</text>
  <text x="95" y="262" font-family="monospace" font-size="13" fill="#bc8cff"> grep</text>
  <text x="145" y="262" font-family="monospace" font-size="13" fill="#e6edf3"> "ERROR" server.log</text>
  <text x="80" y="280" font-family="monospace" font-size="11" fill="#8b949e">[2024-01-15 09:15:33] </text>
  <text x="265" y="280" font-family="monospace" font-size="11" fill="#f85149" font-weight="bold">ERROR</text>
  <text x="313" y="280" font-family="monospace" font-size="11" fill="#8b949e"> Connection refused</text>

  <!-- Cursor -->
  <text x="80" y="308" font-family="monospace" font-size="13" fill="#8b949e">$</text>
  <rect x="95" y="296" width="8" height="15" fill="#e6edf3" opacity="0.7"/>
</svg>