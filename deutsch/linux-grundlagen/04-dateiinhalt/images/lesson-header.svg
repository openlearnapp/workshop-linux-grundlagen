<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 270">
  <style>
    .f { font-family: sans-serif; }
    .ti { animation: tia 11s infinite; }
    @keyframes tia { 0%,3%{opacity:0} 7%,87%{opacity:1} 92%,100%{opacity:0} }
    .c1 { animation: c1a 11s infinite; }
    @keyframes c1a { 0%,8%{opacity:0} 14%,87%{opacity:1} 92%,100%{opacity:0} }
    .c2 { animation: c2a 11s infinite; }
    @keyframes c2a { 0%,28%{opacity:0} 34%,87%{opacity:1} 92%,100%{opacity:0} }
    .c3 { animation: c3a 11s infinite; }
    @keyframes c3a { 0%,48%{opacity:0} 54%,87%{opacity:1} 92%,100%{opacity:0} }
    .ft { animation: fta 11s infinite; }
    @keyframes fta { 0%,78%{opacity:0} 82%,87%{opacity:1} 92%,100%{opacity:0} }
  </style>

  <!-- Background -->
  <rect width="640" height="270" rx="12" fill="#0d1117"/>

  <!-- Header bar -->
  <rect width="640" height="38" rx="12" fill="#161b22"/>
  <rect y="26" width="640" height="12" fill="#161b22"/>

  <!-- Header label -->
  <text class="f ti" x="320" y="24" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="bold" letter-spacing="1">L04 · LINUX GRUNDLAGEN</text>

  <!-- Hero section -->
  <g class="ti">
    <text class="f" x="320" y="100" text-anchor="middle" font-size="54">📖</text>
    <text class="f" x="320" y="135" text-anchor="middle" font-size="22" fill="#e6edf3" font-weight="bold">Dateiinhalt</text>
    <text class="f" x="320" y="158" text-anchor="middle" font-size="12" fill="#8b949e" letter-spacing="2">cat · less · head · tail · grep</text>
  </g>

  <!-- Card 1: Lesen (blue) -->
  <g class="c1">
    <rect x="16" y="174" width="192" height="80" rx="10" fill="#0d1520" stroke="#58a6ff" stroke-width="2"/>
    <text class="f" x="112" y="206" text-anchor="middle" font-size="26">📖</text>
    <text class="f" x="112" y="226" text-anchor="middle" font-size="12" fill="#58a6ff" font-weight="bold">Lesen</text>
    <text class="f" x="112" y="243" text-anchor="middle" font-size="10" fill="#8b949e">cat, less, more</text>
  </g>

  <!-- Card 2: Ausschnitt (orange) -->
  <g class="c2">
    <rect x="224" y="174" width="192" height="80" rx="10" fill="#0d1520" stroke="#f0883e" stroke-width="2"/>
    <text class="f" x="320" y="206" text-anchor="middle" font-size="26">✂️</text>
    <text class="f" x="320" y="226" text-anchor="middle" font-size="12" fill="#f0883e" font-weight="bold">Ausschnitt</text>
    <text class="f" x="320" y="243" text-anchor="middle" font-size="10" fill="#8b949e">head &amp; tail</text>
  </g>

  <!-- Card 3: Suchen (green) -->
  <g class="c3">
    <rect x="432" y="174" width="192" height="80" rx="10" fill="#0d1520" stroke="#3fb950" stroke-width="2"/>
    <text class="f" x="528" y="206" text-anchor="middle" font-size="26">🔍</text>
    <text class="f" x="528" y="226" text-anchor="middle" font-size="12" fill="#3fb950" font-weight="bold">Suchen</text>
    <text class="f" x="528" y="243" text-anchor="middle" font-size="10" fill="#8b949e">grep</text>
  </g>

  <!-- Footer -->
  <g class="ft">
    <text class="f" x="320" y="264" text-anchor="middle" font-size="9" fill="#484f58">Lektion 4 von 12 · Linux Grundlagen Workshop</text>
  </g>
</svg>
