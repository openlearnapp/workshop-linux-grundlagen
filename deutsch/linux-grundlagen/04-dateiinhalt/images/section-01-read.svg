<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210">
  <style>
    .f { font-family: sans-serif; }
    .ti { animation: tia 11s infinite; }
    @keyframes tia { 0%,3%{opacity:0} 7%,87%{opacity:1} 92%,100%{opacity:0} }
    .c1 { animation: c1a 11s infinite; }
    @keyframes c1a { 0%,8%{opacity:0} 14%,87%{opacity:1} 92%,100%{opacity:0} }
    .c2 { animation: c2a 11s infinite; }
    @keyframes c2a { 0%,28%{opacity:0} 34%,87%{opacity:1} 92%,100%{opacity:0} }
    .c3 { animation: c3a 11s infinite; }
    @keyframes c3a { 0%,48%{opacity:0} 54%,87%{opacity:1} 92%,100%{opacity:0} }
    .ft { animation: fta 11s infinite; }
    @keyframes fta { 0%,78%{opacity:0} 82%,87%{opacity:1} 92%,100%{opacity:0} }
  </style>

  <!-- Background -->
  <rect width="640" height="210" rx="12" fill="#0d1117"/>

  <!-- Header bar -->
  <rect width="640" height="38" rx="12" fill="#161b22"/>
  <rect y="26" width="640" height="12" fill="#161b22"/>

  <!-- Header title -->
  <text class="f ti" x="320" y="24" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="bold" letter-spacing="1">cat, less UND more — DATEIEN LESEN</text>

  <!-- Card 1: cat (blue) -->
  <g class="c1">
    <rect x="16" y="50" width="192" height="143" rx="10" fill="#0d1520" stroke="#58a6ff" stroke-width="2"/>
    <text class="f" x="112" y="90" text-anchor="middle" font-size="30">📄</text>
    <text class="f" x="112" y="114" text-anchor="middle" font-size="13" fill="#58a6ff" font-weight="bold">cat</text>
    <text class="f" x="112" y="133" text-anchor="middle" font-size="9" fill="#8b949e">Ganzen Inhalt</text>
    <text class="f" x="112" y="148" text-anchor="middle" font-size="9" fill="#8b949e">sofort anzeigen</text>
    <rect x="30" y="160" width="164" height="20" rx="5" fill="#0d1f3a"/>
    <text class="f" x="112" y="174" text-anchor="middle" font-size="9" fill="#58a6ff">$ cat datei.txt</text>
  </g>

  <!-- Card 2: less (purple) -->
  <g class="c2">
    <rect x="224" y="50" width="192" height="143" rx="10" fill="#0d1520" stroke="#bc8cff" stroke-width="2"/>
    <text class="f" x="320" y="90" text-anchor="middle" font-size="30">📜</text>
    <text class="f" x="320" y="114" text-anchor="middle" font-size="13" fill="#bc8cff" font-weight="bold">less</text>
    <text class="f" x="320" y="133" text-anchor="middle" font-size="9" fill="#8b949e">Scrollen mit Pfeiltasten,</text>
    <text class="f" x="320" y="148" text-anchor="middle" font-size="9" fill="#8b949e">q zum Beenden</text>
    <rect x="238" y="160" width="164" height="20" rx="5" fill="#1a0d2a"/>
    <text class="f" x="320" y="174" text-anchor="middle" font-size="9" fill="#bc8cff">$ less datei.txt</text>
  </g>

  <!-- Card 3: more (orange) -->
  <g class="c3">
    <rect x="432" y="50" width="192" height="143" rx="10" fill="#0d1520" stroke="#f0883e" stroke-width="2"/>
    <text class="f" x="528" y="90" text-anchor="middle" font-size="30">📃</text>
    <text class="f" x="528" y="114" text-anchor="middle" font-size="13" fill="#f0883e" font-weight="bold">more</text>
    <text class="f" x="528" y="133" text-anchor="middle" font-size="9" fill="#8b949e">Seite für Seite</text>
    <text class="f" x="528" y="148" text-anchor="middle" font-size="9" fill="#8b949e">durchblättern</text>
    <rect x="446" y="160" width="164" height="20" rx="5" fill="#2a1a0d"/>
    <text class="f" x="528" y="174" text-anchor="middle" font-size="9" fill="#f0883e">$ more datei.txt</text>
  </g>

  <!-- Footer -->
  <g class="ft">
    <text class="f" x="320" y="204" text-anchor="middle" font-size="9" fill="#484f58">cat = alles auf einmal · less = scrollen · more = seitenweise · q = beenden</text>
  </g>
</svg>
