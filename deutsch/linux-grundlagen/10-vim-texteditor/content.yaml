version: 2
number: 10
title: "Vim & Texteditoren"
description: "nano für Einsteiger, vim für Profis — Dateien direkt im Terminal bearbeiten"
image: "images/lesson-header.svg"
image_caption: "Vim-Interface mit Modus-Anzeigen (Normal, Insert, Visual, Command)"
sections:
  - title: "nano — der benutzerfreundliche Einstieg"
    explanation: |
      **Warum ist das wichtig?** Auf Servern gibt es keine grafische Oberfläche.
      Du musst Konfigurationsdateien direkt im Terminal bearbeiten — `nano` ist der
      einfachste Weg, `vim` der mächtigste.

      **nano** zeigt am unteren Rand alle wichtigen Tastenkombinationen an:
      - `Ctrl+O` dann `Enter`: Speichern (Write **O**ut)
      - `Ctrl+X`: Beenden (e**X**it)
      - `Ctrl+W`: Suchen (**W**here is)
      - `Ctrl+K`: Zeile ausschneiden (**K**ut)
      - `Ctrl+U`: Einfügen (**U**ncut)
      - `Ctrl+G`: Hilfe (**G**et help)

      nano öffnen und sofort eine Datei bearbeiten:
      ```bash
      nano /etc/hosts
      sudo nano /etc/nginx/sites-available/default
      ```
    examples:
      - q: "nano ~/.bashrc"
        a: "Bash-Konfiguration mit nano bearbeiten — Ctrl+O speichern, Ctrl+X beenden"
        rel:
          - ["nano-cmd", "Benutzerfreundlicher Terminal-Texteditor mit Tastaturhinweisen", "Befehl nano"]
          - ["nano-save", "Ctrl+O dann Enter — Datei in nano speichern", "nano Ctrl+O"]
        labels: ["Editor", "Konfiguration"]
      - q: "nano -l /etc/hosts"
        a: "Hosts-Datei mit Zeilennummern bearbeiten — hilfreich bei langen Dateien"
        rel:
          - ["nano-l", "Line numbers — Zeilennummern in nano anzeigen", "nano Flag -l"]
        labels: ["Editor"]
      - q: "nano +50 app.conf"
        a: "Nano öffnet direkt bei Zeile 50 — spart Scrollen in langen Konfigurationen"
        rel:
          - ["nano-jump-line", "+N öffnet Datei direkt bei Zeile N", "nano +Zeilennummer"]
        labels: ["Editor"]

  - title: "vim — der Profi-Editor"
    explanation: |
      **vim** (Vi Improved) ist mächtig aber zunächst verwirrend, weil es **Modi** hat:

      | Modus | Aktivierung | Wofür? |
      |-------|-------------|--------|
      | **Normal** | `Esc` | Navigation, Befehle |
      | **Insert** | `i`, `a`, `o` | Text eingeben |
      | **Visual** | `v`, `V` | Text markieren |
      | **Command** | `:` | Speichern, Beenden, Suchen |

      **Das Wichtigste zum Starten:**
      1. vim öffnet sich im Normal-Modus
      2. `i` drücken → Insert-Modus → Text tippen
      3. `Esc` → zurück in Normal-Modus
      4. `:w` → speichern
      5. `:q` → beenden
      6. `:wq` → speichern und beenden
      7. `:q!` → beenden ohne speichern (erzwingen)

      **Warum vim lernen?** Es ist auf *jedem* Linux-System vorinstalliert. Wenn du auf
      einem frisch installierten Server bist, ist vim immer verfügbar.
    examples:
      - q: "vim /etc/nginx/nginx.conf"
        a: "Nginx-Konfiguration mit vim öffnen — immer verfügbar, auch auf minimalen Servern"
        rel:
          - ["vim-cmd", "Vi Improved — mächtiger modaler Terminal-Texteditor", "Befehl vim"]
        labels: ["Editor", "Konfiguration"]
      - q: ":wq"
        a: "In vim: Datei speichern (write) und beenden (quit) — im Command-Modus eingeben"
        rel:
          - ["vim-wq", "Write Quit — in vim speichern und beenden", ":wq"]
          - ["vim-command-mode", "Doppelpunkt : aktiviert den Command-Modus in vim", "vim :"]
        labels: ["Editor"]
      - q: ":q!"
        a: "vim beenden ohne zu speichern — ! erzwingt die Aktion"
        rel:
          - ["vim-q-bang", "Quit ohne Speichern erzwingen — alle Änderungen verwerfen", ":q!"]
        labels: ["Editor"]
      - q: "i"
        a: "Insert-Modus aktivieren — jetzt kann Text eingegeben werden"
        rel:
          - ["vim-insert", "i — in Insert-Modus wechseln (vor Cursor), a = nach Cursor", "vim i"]
        labels: ["Editor"]

  - title: "vim Navigation und Suchen"
    explanation: |
      Im **Normal-Modus** navigierst du ohne Pfeiltasten (effizienter!):

      | Taste | Aktion |
      |-------|--------|
      | `h`, `j`, `k`, `l` | Links, Runter, Hoch, Rechts |
      | `w` | Nächstes Wort vorwärts |
      | `b` | Vorheriges Wort rückwärts |
      | `0` | Zeilenanfang |
      | `$` | Zeilenende |
      | `gg` | Anfang der Datei |
      | `G` | Ende der Datei |
      | `50G` | Zu Zeile 50 springen |

      **Suchen und Ersetzen in vim:**
      ```
      /suchbegriff      → vorwärts suchen, n = nächster Treffer
      ?suchbegriff      → rückwärts suchen
      :%s/alt/neu/g     → alle Vorkommen ersetzen
      :%s/alt/neu/gc    → mit Bestätigung ersetzen
      ```
    examples:
      - q: ":%s/localhost/example.com/g"
        a: "In vim: alle Vorkommen von 'localhost' durch 'example.com' ersetzen"
        rel:
          - ["vim-substitute", ":%s/alt/neu/g — Suchen und Ersetzen in der ganzen Datei", "vim :%s"]
          - ["vim-g-flag", "g = global — alle Vorkommen in einer Zeile ersetzen", "Vim Flag /g"]
        labels: ["Editor"]
      - q: "/ERROR"
        a: "In vim: nach ERROR suchen — n für nächsten Treffer, N für vorherigen"
        rel:
          - ["vim-search", "/Begriff vorwärts suchen in vim", "vim /"]
        labels: ["Editor"]
      - q: "dd"
        a: "In vim (Normal-Modus): aktuelle Zeile löschen — p zum Einfügen"
        rel:
          - ["vim-dd", "Delete — ganze Zeile in vim löschen (und in Buffer speichern)", "vim dd"]
        labels: ["Editor"]
      - q: "yy"
        a: "In vim: aktuelle Zeile kopieren (yank) — p zum Einfügen an nächste Stelle"
        rel:
          - ["vim-yy", "Yank — Zeile kopieren in vim", "vim yy"]
          - ["vim-p", "Put/Paste — kopierten/gelöschten Inhalt einfügen", "vim p"]
        labels: ["Editor"]

  - title: "🖥️ Terminal-Check"
    explanation: |
      Teste jetzt dein Wissen — gib die Befehle direkt ein!
    examples:
      - q: "Welcher vim-Befehl speichert und beendet den Editor?"
        type: input
        a: ":wq"
        labels: ["Editor"]
      - q: "Wie wechselt man in vim in den Insert-Modus?"
        type: select
        options:
          - text: "Taste 'i' drücken"
            correct: true
          - text: "Taste 'Esc' drücken"
          - text: "':i' eingeben"
          - text: "Taste 'v' drücken"
        labels: ["Editor"]
      - q: "Was macht ':q!' in vim?"
        type: select
        options:
          - text: "Beendet vim ohne zu speichern"
            correct: true
          - text: "Speichert und beendet vim"
          - text: "Sucht nach dem Zeichen !"
          - text: "Öffnet eine neue Datei"
        labels: ["Editor"]
      - q: "Welche dieser vim-Modi existieren?"
        type: multiple-choice
        options:
          - text: "Normal-Modus"
            correct: true
          - text: "Insert-Modus"
            correct: true
          - text: "Visual-Modus"
            correct: true
          - text: "Debug-Modus"
        labels: ["Editor"]
