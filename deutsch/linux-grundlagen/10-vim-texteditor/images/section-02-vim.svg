<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230" width="640" height="230">
<style>
  .f { font-family: sans-serif; }
  .ti { animation: tia 11s infinite; }
  @keyframes tia { 0%,3%{opacity:0} 7%,87%{opacity:1} 92%,100%{opacity:0} }
  .sub { animation: suba 11s infinite; }
  @keyframes suba { 0%,8%{opacity:0} 12%,87%{opacity:1} 92%,100%{opacity:0} }
  .c1 { animation: c1a 11s infinite; }
  @keyframes c1a { 0%,12%{opacity:0} 18%,87%{opacity:1} 92%,100%{opacity:0} }
  .c2 { animation: c2a 11s infinite; }
  @keyframes c2a { 0%,30%{opacity:0} 36%,87%{opacity:1} 92%,100%{opacity:0} }
  .c3 { animation: c3a 11s infinite; }
  @keyframes c3a { 0%,48%{opacity:0} 54%,87%{opacity:1} 92%,100%{opacity:0} }
  .c4 { animation: c4a 11s infinite; }
  @keyframes c4a { 0%,65%{opacity:0} 71%,87%{opacity:1} 92%,100%{opacity:0} }
  .ft { animation: fta 11s infinite; }
  @keyframes fta { 0%,78%{opacity:0} 82%,87%{opacity:1} 92%,100%{opacity:0} }
</style>

<rect width="640" height="230" rx="12" fill="#0d1117"/>
<rect width="640" height="38" rx="12" fill="#161b22"/>
<rect y="26" width="640" height="12" fill="#161b22"/>
<text class="f ti" x="320" y="24" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="bold" letter-spacing="1">vim — der Profi-Editor</text>

<text class="f sub" x="320" y="52" text-anchor="middle" font-size="10" fill="#6e7681">Modi verstehen — Normal, Insert, Speichern, Beenden</text>

<!-- Card 1 -->
<g class="c1">
  <rect x="16" y="60" width="142" height="155" rx="10" fill="#0d1520" stroke="#58a6ff" stroke-width="2"/>
  <text x="87" y="100" text-anchor="middle" font-size="26">📖</text>
  <text class="f" x="87" y="120" text-anchor="middle" font-size="11" fill="#58a6ff" font-weight="bold">Normal-Mode</text>
  <text class="f" x="87" y="139" text-anchor="middle" font-size="9" fill="#8b949e">Standard beim Öffnen</text>
  <text class="f" x="87" y="155" text-anchor="middle" font-size="9" fill="#8b949e">Navigieren möglich</text>
  <text class="f" x="87" y="170" text-anchor="middle" font-size="9" fill="#8b949e">ESC drücken zum</text>
  <text class="f" x="87" y="185" text-anchor="middle" font-size="9" fill="#8b949e">Zurückkehren</text>
</g>

<!-- Card 2 -->
<g class="c2">
  <rect x="166" y="60" width="142" height="155" rx="10" fill="#0d1520" stroke="#3fb950" stroke-width="2"/>
  <text x="237" y="100" text-anchor="middle" font-size="26">✏️</text>
  <text class="f" x="237" y="120" text-anchor="middle" font-size="11" fill="#3fb950" font-weight="bold">Insert-Mode</text>
  <text class="f" x="237" y="139" text-anchor="middle" font-size="9" fill="#8b949e">i drücken zum Starten</text>
  <text class="f" x="237" y="155" text-anchor="middle" font-size="9" fill="#8b949e">Text schreiben</text>
  <text class="f" x="237" y="170" text-anchor="middle" font-size="9" fill="#8b949e">-- INSERT -- unten</text>
  <text class="f" x="237" y="185" text-anchor="middle" font-size="9" fill="#8b949e">sichtbar</text>
</g>

<!-- Card 3 -->
<g class="c3">
  <rect x="316" y="60" width="142" height="155" rx="10" fill="#0d1520" stroke="#f0883e" stroke-width="2"/>
  <text x="387" y="100" text-anchor="middle" font-size="26">💾</text>
  <text class="f" x="387" y="120" text-anchor="middle" font-size="11" fill="#f0883e" font-weight="bold">Speichern</text>
  <text class="f" x="387" y="139" text-anchor="middle" font-size="9" fill="#8b949e">:w eingeben</text>
  <text class="f" x="387" y="155" text-anchor="middle" font-size="9" fill="#8b949e">im Normal-Mode</text>
  <text class="f" x="387" y="170" text-anchor="middle" font-size="9" fill="#8b949e">dann Enter drücken</text>
  <text class="f" x="387" y="185" text-anchor="middle" font-size="9" fill="#8b949e">Datei wird gespeichert</text>
</g>

<!-- Card 4 -->
<g class="c4">
  <rect x="466" y="60" width="158" height="155" rx="10" fill="#0d1520" stroke="#bc8cff" stroke-width="2"/>
  <text x="545" y="100" text-anchor="middle" font-size="26">🚪</text>
  <text class="f" x="545" y="120" text-anchor="middle" font-size="11" fill="#bc8cff" font-weight="bold">Beenden</text>
  <text class="f" x="545" y="139" text-anchor="middle" font-size="9" fill="#8b949e">:q! Beenden</text>
  <text class="f" x="545" y="155" text-anchor="middle" font-size="9" fill="#8b949e">ohne Speichern</text>
  <text class="f" x="545" y="170" text-anchor="middle" font-size="9" fill="#8b949e">:wq Speichern</text>
  <text class="f" x="545" y="185" text-anchor="middle" font-size="9" fill="#8b949e">und Beenden</text>
</g>

<text class="f ft" x="320" y="223" text-anchor="middle" font-size="9" fill="#6e7681">ESC → Normal-Mode · i → Schreiben · :wq → Speichern und beenden</text>
</svg>
