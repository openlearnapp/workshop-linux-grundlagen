version: 2
number: 11
title: "Systeminformationen"
description: "df, du, free, uname und history — den Systemzustand im Blick behalten"
image: "images/lesson-header.svg"
image_caption: "Dashboard mit CPU-, RAM- und Disk-Auslastungsanzeigen"
sections:
  - title: "Speicherplatz — df und du"
    image: "images/section-01-disk.svg"
    explanation: |
      Stell dir vor, dein Computer ist wie ein Zimmer.
      Wenn das Zimmer voll ist, passt nichts mehr rein —
      und der Computer fängt an, sich zu verschlucken.

      Mit **df** (Disk Free — "freier Platz auf dem Datenträger")
      siehst du, wie voll deine Festplatte ist:
      ```
      df -h
      ```
      Das `-h` steht für "human-readable" (menschenlesbar) —
      es zeigt GB und MB statt riesige Zahlen.

      Mit **du** (Disk Usage — "Speicherverbrauch") schaust du,
      welcher Ordner am meisten Platz frisst:
      ```
      du -sh ~/Downloads/*
      ```
      - `s` = summary (nur die Gesamtgröße, nicht jede Datei einzeln)
      - `h` = human-readable (GB/MB statt Bytes)

      Tipp: Wenn du die größten Ordner finden willst, kombiniere du mit sort:
      ```
      du -h --max-depth=1 /var | sort -rh | head -10
      ```
      Das zeigt die 10 größten Ordner in `/var` — sortiert von groß nach klein.
    examples:
      - q: "df -h"
        a: "Zeigt alle Festplatten-Bereiche mit freiem und belegtem Platz in GB/MB"
        rel:
          - ["df-cmd", "Disk Free — Festplattenauslastung anzeigen", "Befehl df"]
          - ["df-h", "Human-readable — Größen in KB/MB/GB statt Bytes", "Flag -h"]
        labels: ["Dateisystem"]
      - q: "df -h /"
        a: "Zeigt nur den Hauptbereich des Computers (/) — der wichtigste Platz"
        rel:
          - ["df-root", "Auslastung der Root-Partition / prüfen", "df -h /"]
        labels: ["Dateisystem"]
      - q: "du -sh ~/Downloads/*"
        a: "Zeigt die Größe jeder Datei und jedes Ordners im Downloads-Ordner"
        rel:
          - ["du-cmd", "Disk Usage — Speicherverbrauch von Dateien/Ordnern", "Befehl du"]
          - ["du-sh", "s=summary (Gesamtgröße), h=human-readable", "Flags -sh"]
        labels: ["Dateisystem"]
      - q: "du -h --max-depth=1 /var | sort -rh | head -10"
        a: "Findet die 10 größten Ordner in /var — praktisch zum Aufspüren von Speicherfressern"
        rel:
          - ["du-max-depth", "Nur bis zu einer bestimmten Verzeichnistiefe anzeigen", "--max-depth=1"]
          - ["sort-rh", "r=reverse (absteigend), h=human-readable Größen sortieren", "sort -rh"]
        labels: ["Dateisystem"]

  - title: "Arbeitsspeicher und CPU — free und uptime"
    image: "images/section-02-memory.svg"
    explanation: |
      Dein Computer hat zwei Arten von Speicher:
      - **Festplatte** — wie ein Bücherregal: viel Platz, aber langsam
      - **Arbeitsspeicher (RAM)** — wie dein Schreibtisch: schnell, aber begrenzt

      Mit **free** siehst du, wie voll dein Schreibtisch gerade ist:
      ```
      free -h
      ```

      Die Ausgabe sieht ungefähr so aus:
      ```
                    total   used   free  shared  cache  available
      Mem:           15Gi   4.2Gi  8.1Gi  512Mi  3.1Gi    10.4Gi
      Swap:          2.0Gi  0B     2.0Gi
      ```

      Wichtig: Schau auf die Spalte **available** — das ist der wirklich freie Platz.
      Die Spalte `free` allein sagt nicht viel, weil Linux Speicher oft für Cache nutzt.

      **Swap** ist wie eine Notfallerweiterung des Schreibtischs —
      Linux legt selten benutzte Sachen kurz auf die Festplatte.
      Wenn Swap voll ist, wird der Computer langsam.

      Mit **uptime** siehst du, wie lange dein Computer schon läuft:
      ```
      uptime
      ```
      Es zeigt auch die **Load Average** (Auslastung) —
      kleine Zahlen bedeuten: alles ist entspannt.
    examples:
      - q: "free -h"
        a: "Zeigt den Arbeitsspeicher-Verbrauch in GB/MB — available-Spalte ist das Wichtigste"
        rel:
          - ["free-cmd", "RAM-Auslastung und Swap-Nutzung anzeigen", "Befehl free"]
          - ["free-h", "Human-readable — Speicher in MB/GB statt Bytes", "free -h"]
        labels: ["Basics"]
      - q: "uptime"
        a: "Zeigt wie lange der Computer läuft, wie viele Nutzer da sind und wie ausgelastet er ist"
        rel:
          - ["uptime-cmd", "Systemlaufzeit und Auslastung der letzten Minuten", "Befehl uptime"]
          - ["load-average", "Durchschnittliche CPU-Auslastung: 1=100% bei einem Kern", "Load Average"]
        labels: ["Basics"]
      - q: "vmstat 2 5"
        a: "Zeigt System-Statistiken alle 2 Sekunden, insgesamt 5 Mal — für Profis"
        rel:
          - ["vmstat-cmd", "Virtual Memory Statistics — detaillierte System-Performance-Daten", "Befehl vmstat"]
        labels: ["Basics"]

  - title: "history — was habe ich zuletzt gemacht?"
    image: "images/section-03-history.svg"
    explanation: |
      Hast du einen Befehl eingegeben, den du wieder brauchst —
      aber nicht mehr weißt, wie er genau lautete?

      Linux erinnert sich für dich!
      **history** zeigt alle Befehle, die du zuletzt eingegeben hast:
      ```
      history
      ```

      Nützliche Tricks mit history:
      - `history 20` — nur die letzten 20 Befehle
      - `!!` — letzten Befehl sofort wiederholen
      - `!50` — Befehl Nummer 50 aus der Liste ausführen
      - `history | grep ssh` — nur SSH-Befehle aus der Liste suchen

      Und der Geheimtipp der Profis: **Ctrl+R**
      Drücke Ctrl+R und tippe ein Wort —
      Linux sucht automatisch rückwärts in der history und zeigt den letzten passenden Befehl.
      Das spart unglaublich viel Tipparbeit!

      Und noch ein Blick in das Innere des Computers —
      Linux speichert viele Informationen in speziellen "Dateien" unter `/proc`:
      ```
      cat /proc/cpuinfo | grep "model name" | head -1
      ```
      Das zeigt dir, welche CPU in deinem Computer steckt.
    examples:
      - q: "history | tail -20"
        a: "Zeigt die letzten 20 eingegebenen Befehle — praktisch zum Nachschauen"
        rel:
          - ["history-cmd", "Verlauf der eingegebenen Befehle anzeigen", "Befehl history"]
        labels: ["Basics"]
      - q: "history | grep \"apt install\""
        a: "Sucht in der history nach allen Befehlen, die apt install enthalten"
        rel:
          - ["history-grep", "history mit grep kombinieren — spezifische Befehle aus Verlauf suchen", "history | grep"]
        labels: ["Basics"]
      - q: "!!"
        a: "Wiederholt den letzten Befehl sofort — besonders nützlich als: sudo !!"
        rel:
          - ["bang-bang", "!! führt den zuletzt eingegebenen Befehl erneut aus", "!!"]
          - ["sudo-bang-bang", "sudo !! — letzten Befehl mit Administratorrechten wiederholen", "sudo !!"]
        labels: ["Basics"]
      - q: "cat /proc/cpuinfo | grep \"model name\" | head -1"
        a: "Zeigt das CPU-Modell deines Computers — /proc ist ein Fenster in den Kernel"
        rel:
          - ["proc-cpuinfo", "Kernel-Datei mit detaillierten CPU-Informationen", "/proc/cpuinfo"]
          - ["proc-filesystem", "/proc ist kein echtes Dateisystem — enthält Kernel-Infos als Dateien", "/proc"]
        labels: ["Basics"]

  - title: "🖥️ Terminal-Check"
    image: "images/section-04-check.svg"
    explanation: |
      Teste jetzt dein Wissen — gib die Befehle direkt ein!
    examples:
      - q: "Welcher Befehl zeigt die Festplattenauslastung aller Bereiche an?"
        type: input
        a: "df -h"
        labels: ["Dateisystem"]
      - q: "Was zeigt die 'available'-Spalte bei 'free -h'?"
        type: select
        options:
          - text: "Den wirklich verfügbaren Arbeitsspeicher"
            correct: true
          - text: "Den freien Festplattenspeicher"
          - text: "Den belegten Swap-Speicher"
          - text: "Die CPU-Auslastung in Prozent"
        labels: ["Basics"]
      - q: "Welcher Befehl sucht in der Befehlshistorie nach 'apt install'?"
        type: select
        options:
          - text: "history | grep \"apt install\""
            correct: true
          - text: "history search \"apt install\""
          - text: "grep history \"apt install\""
          - text: "find history -name \"apt install\""
        labels: ["Basics"]
      - q: "Welche dieser Befehle geben Systeminformationen aus?"
        type: multiple-choice
        options:
          - text: "df -h"
            correct: true
          - text: "free -h"
            correct: true
          - text: "uptime"
            correct: true
          - text: "chmod 755"
        labels: ["Basics"]
