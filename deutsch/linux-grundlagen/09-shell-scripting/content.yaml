version: 2
number: 9
title: "Shell Scripting Basics"
description: "Variablen, if-Bedingungen und Schleifen — eigene Skripte schreiben und Aufgaben automatisieren"
image: "images/lesson-header.svg"
image_caption: "Code-Editor mit Bash-Skript und Syntax-Highlighting"
sections:
  - title: "Dein erstes Skript — Shebang und Variablen"
    image: "images/section-01-shebang.svg"
    explanation: |
      **Warum ist das wichtig?** Shell-Scripting ist der Schlüssel zur Automatisierung.
      Alles was du mehrfach im Terminal tippst, kann in ein Skript — und dann mit einem
      einzigen Befehl ausgeführt werden.

      **Das erste Skript:**
      ```bash
      #!/bin/bash
      # Das ist ein Kommentar

      NAME="Alice"
      DATUM=$(date +%Y-%m-%d)

      echo "Hallo, $NAME!"
      echo "Heute ist: $DATUM"
      ```

      Die erste Zeile `#!/bin/bash` heißt **Shebang** — sie sagt dem System, mit welchem
      Interpreter das Skript ausgeführt werden soll.

      **Variablen:**
      - Ohne `$`: Zuweisung: `NAME="Alice"` (kein Leerzeichen um `=`!)
      - Mit `$`: Verwendung: `echo $NAME`
      - `$(befehl)`: Befehlsausgabe als Variable
    examples:
      - q: "#!/bin/bash"
        a: "Shebang — erste Zeile jedes Bash-Skripts, gibt den Interpreter an"
        rel:
          - ["shebang", "Erste Zeile eines Skripts die den Interpreter festlegt", "#!/bin/bash"]
        labels: ["Scripting"]
      - q: "NAME=\"Alice\" && echo \"Hallo, $NAME\""
        a: "Variable setzen und sofort verwenden — kein Leerzeichen um das Gleichheitszeichen!"
        rel:
          - ["bash-variable", "Variable in Bash: NAME=wert (ohne $), $NAME (bei Verwendung)", "Variable"]
        labels: ["Scripting"]
      - q: "HEUTE=$(date +%d.%m.%Y)"
        a: "Befehlsausgabe in Variable speichern — $(date) gibt das aktuelle Datum zurück"
        rel:
          - ["command-sub", "Befehlssubstitution: $(befehl) speichert Ausgabe in Variable", "$()"]
          - ["date-format", "Datumsformat: %d=Tag, %m=Monat, %Y=Jahr", "date +Format"]
        labels: ["Scripting"]
      - q: "echo \"Pfad: $HOME, User: $USER\""
        a: "Eingebaute Umgebungsvariablen nutzen — HOME und USER sind immer verfügbar"
        rel:
          - ["env-var-user", "Umgebungsvariable mit aktuellem Benutzernamen", "$USER"]
          - ["env-var-home", "Umgebungsvariable mit Pfad zum Home-Verzeichnis", "$HOME"]
        labels: ["Scripting"]

  - title: "if-Bedingungen — Entscheidungen im Skript"
    image: "images/section-02-if.svg"
    explanation: |
      Bedingte Ausführung macht Skripte intelligent:

      ```bash
      #!/bin/bash
      DATEI="/etc/nginx/nginx.conf"

      if [ -f "$DATEI" ]; then
          echo "Nginx ist installiert"
      elif [ -d "/etc/apache2" ]; then
          echo "Apache ist installiert"
      else
          echo "Kein Webserver gefunden"
      fi
      ```

      **Wichtige Test-Operatoren:**
      | Operator | Bedeutung |
      |----------|-----------|
      | `-f datei` | Datei existiert und ist eine Datei |
      | `-d pfad` | Pfad existiert und ist ein Verzeichnis |
      | `-z "$var"` | Variable ist leer |
      | `-n "$var"` | Variable ist nicht leer |
      | `"$a" = "$b"` | Strings sind gleich |
      | `$a -eq $b` | Zahlen sind gleich |
      | `$a -gt $b` | a ist größer als b (greater than) |
    examples:
      - q: "if [ -f \"~/.ssh/id_ed25519\" ]; then echo \"SSH-Key vorhanden\"; fi"
        a: "Prüft ob SSH-Key existiert — -f testet auf vorhandene Datei"
        rel:
          - ["if-bash", "if [ Bedingung ]; then Befehle; fi — Grundstruktur", "if-then-fi"]
          - ["test-f", "-f testet ob Datei existiert (file)", "Testoperator -f"]
        labels: ["Scripting", "Sicherheit"]
      - q: "[ -d /var/www ] && echo \"Webverzeichnis existiert\""
        a: "Kurzform: && führt zweiten Befehl nur aus wenn erste Bedingung wahr ist"
        rel:
          - ["test-d", "-d testet ob Verzeichnis existiert (directory)", "Testoperator -d"]
        labels: ["Scripting"]
      - q: "if [ \"$USER\" = \"root\" ]; then echo \"Du bist root!\"; fi"
        a: "Prüft ob das Skript als root ausgeführt wird — wichtig für Installationsskripte"
        rel:
          - ["string-compare", "Strings in Bash mit = vergleichen", "String-Vergleich"]
        labels: ["Scripting", "Sicherheit"]

  - title: "Schleifen — Wiederholungen automatisieren"
    image: "images/section-03-loops.svg"
    explanation: |
      Schleifen führen Befehle mehrfach aus — ideal für Batch-Operationen:

      **for-Schleife:**
      ```bash
      for DATEI in *.log; do
          echo "Verarbeite: $DATEI"
          gzip "$DATEI"
      done
      ```

      **while-Schleife:**
      ```bash
      ZAEHLER=1
      while [ $ZAEHLER -le 5 ]; do
          echo "Durchlauf $ZAEHLER"
          ZAEHLER=$((ZAEHLER + 1))
      done
      ```

      **Praktisches Beispiel — Backup-Skript:**
      ```bash
      #!/bin/bash
      DATUM=$(date +%Y%m%d)
      for ORDNER in ~/dokumente ~/bilder ~/projekte; do
          tar -czf "/backup/${DATUM}_$(basename $ORDNER).tar.gz" "$ORDNER"
          echo "Backup erstellt: $ORDNER"
      done
      ```
    examples:
      - q: "for i in 1 2 3 4 5; do echo \"Zahl: $i\"; done"
        a: "For-Schleife über eine Liste — gibt Zahl 1 bis 5 aus"
        rel:
          - ["for-loop", "For-Schleife: for VAR in LISTE; do ... done", "for-do-done"]
        labels: ["Scripting"]
      - q: "for USER in alice bob charlie; do useradd \"$USER\"; done"
        a: "Mehrere Benutzer auf einmal anlegen — typische Sysadmin-Aufgabe"
        rel:
          - ["for-list", "For-Schleife über eine Liste von Werten", "for VAR in Wert1 Wert2"]
        labels: ["Scripting", "Sicherheit"]
      - q: "for f in /var/log/*.log; do echo \"$(wc -l < $f) Zeilen: $f\"; done"
        a: "Zeilen aller Log-Dateien zählen und auflisten"
        rel:
          - ["for-glob", "For-Schleife mit Glob-Muster über Dateien", "for f in *.ext"]
          - ["wc-l", "Word Count -l — Zeilen einer Datei zählen", "wc -l"]
        labels: ["Scripting", "Dateisystem"]
      - q: "while true; do df -h / | grep '/'; sleep 60; done"
        a: "Festplattenauslastung jede Minute überwachen — Endlosschleife mit sleep"
        rel:
          - ["while-loop", "While-Schleife: while Bedingung; do ... done", "while-do-done"]
          - ["while-true", "while true — Endlosschleife, nur mit Ctrl+C beenden", "while true"]
        labels: ["Scripting"]

  - title: "🖥️ Terminal-Check"
    image: "images/section-04-check.svg"
    explanation: |
      Teste jetzt dein Wissen — gib die Befehle direkt ein!
    examples:
      - q: "Wie lautet die erste Zeile jedes Bash-Skripts (Shebang)?"
        type: input
        a: "#!/bin/bash"
        labels: ["Scripting"]
      - q: "Was ist bei der Zuweisung einer Bash-Variable zu beachten?"
        type: select
        options:
          - text: "Kein Leerzeichen um das Gleichheitszeichen: NAME=\"Alice\""
            correct: true
          - text: "Immer $ vor dem Variablennamen: $NAME=\"Alice\""
          - text: "Variablen müssen in Großbuchstaben sein"
          - text: "Variablen müssen mit export deklariert werden"
        labels: ["Scripting"]
      - q: "Welche Syntax schließt eine if-Bedingung in Bash korrekt ab?"
        type: select
        options:
          - text: "fi"
            correct: true
          - text: "end"
          - text: "endif"
          - text: "done"
        labels: ["Scripting"]
      - q: "Welche dieser Aussagen über Shell Scripting stimmen?"
        type: multiple-choice
        options:
          - text: "$() speichert Befehlsausgabe in einer Variable"
            correct: true
          - text: "for-Schleifen enden mit 'done'"
            correct: true
          - text: "-f prüft ob eine Datei existiert"
            correct: true
          - text: "Leerzeichen um = sind bei Variablen Pflicht"
        labels: ["Scripting"]
