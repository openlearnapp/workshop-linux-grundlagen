<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210" width="640" height="210">
<style>
  .f { font-family: sans-serif; }
  .ti { animation: tia 11s infinite; }
  @keyframes tia { 0%,3%{opacity:0} 7%,87%{opacity:1} 92%,100%{opacity:0} }
  .sub { animation: suba 11s infinite; }
  @keyframes suba { 0%,8%{opacity:0} 12%,87%{opacity:1} 92%,100%{opacity:0} }
  .c1 { animation: c1a 11s infinite; }
  @keyframes c1a { 0%,12%{opacity:0} 18%,87%{opacity:1} 92%,100%{opacity:0} }
  .c2 { animation: c2a 11s infinite; }
  @keyframes c2a { 0%,30%{opacity:0} 36%,87%{opacity:1} 92%,100%{opacity:0} }
  .c3 { animation: c3a 11s infinite; }
  @keyframes c3a { 0%,48%{opacity:0} 54%,87%{opacity:1} 92%,100%{opacity:0} }
  .ft { animation: fta 11s infinite; }
  @keyframes fta { 0%,78%{opacity:0} 82%,87%{opacity:1} 92%,100%{opacity:0} }
</style>

<rect width="640" height="210" rx="12" fill="#0d1117"/>
<rect width="640" height="38" rx="12" fill="#161b22"/>
<rect y="26" width="640" height="12" fill="#161b22"/>
<text class="f ti" x="320" y="24" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="bold" letter-spacing="1">Schleifen — etwas viele Male wiederholen</text>

<text class="f sub" x="320" y="52" text-anchor="middle" font-size="10" fill="#6e7681">for · while · break · continue</text>

<!-- Card 1 -->
<g class="c1">
  <rect x="16" y="60" width="192" height="135" rx="10" fill="#0d1520" stroke="#3fb950" stroke-width="2"/>
  <text x="112" y="95" text-anchor="middle" font-size="26">🔁</text>
  <text class="f" x="112" y="116" text-anchor="middle" font-size="12" fill="#3fb950" font-weight="bold">for</text>
  <text class="f" x="112" y="134" text-anchor="middle" font-size="9" fill="#8b949e">Für jedes Element</text>
  <text class="f" x="112" y="149" text-anchor="middle" font-size="9" fill="#8b949e">tue etwas</text>
  <text class="f" x="112" y="164" text-anchor="middle" font-size="9" fill="#8b949e">for i in 1 2 3; do</text>
  <text class="f" x="112" y="180" text-anchor="middle" font-size="9" fill="#8b949e">echo $i; done</text>
</g>

<!-- Card 2 -->
<g class="c2">
  <rect x="224" y="60" width="192" height="135" rx="10" fill="#0d1520" stroke="#58a6ff" stroke-width="2"/>
  <text x="320" y="95" text-anchor="middle" font-size="26">🔄</text>
  <text class="f" x="320" y="116" text-anchor="middle" font-size="12" fill="#58a6ff" font-weight="bold">while</text>
  <text class="f" x="320" y="134" text-anchor="middle" font-size="9" fill="#8b949e">Solange Bedingung gilt</text>
  <text class="f" x="320" y="149" text-anchor="middle" font-size="9" fill="#8b949e">Wiederhole den Block</text>
  <text class="f" x="320" y="164" text-anchor="middle" font-size="9" fill="#8b949e">while [ $i -lt 5 ]</text>
  <text class="f" x="320" y="180" text-anchor="middle" font-size="9" fill="#8b949e">do ... done</text>
</g>

<!-- Card 3 -->
<g class="c3">
  <rect x="432" y="60" width="192" height="135" rx="10" fill="#0d1520" stroke="#f0883e" stroke-width="2"/>
  <text x="528" y="95" text-anchor="middle" font-size="26">⏭️</text>
  <text class="f" x="528" y="116" text-anchor="middle" font-size="12" fill="#f0883e" font-weight="bold">break / continue</text>
  <text class="f" x="528" y="134" text-anchor="middle" font-size="9" fill="#8b949e">break: Schleife beenden</text>
  <text class="f" x="528" y="149" text-anchor="middle" font-size="9" fill="#8b949e">continue: überspringen</text>
  <text class="f" x="528" y="164" text-anchor="middle" font-size="9" fill="#8b949e">Kontrolle über</text>
  <text class="f" x="528" y="180" text-anchor="middle" font-size="9" fill="#8b949e">Schleifenablauf</text>
</g>

<text class="f ft" x="320" y="204" text-anchor="middle" font-size="9" fill="#6e7681">for i in *.txt; do echo "$i"; done — Dateien automatisch verarbeiten</text>
</svg>
