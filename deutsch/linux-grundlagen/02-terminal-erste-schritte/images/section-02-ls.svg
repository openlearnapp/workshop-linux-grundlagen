<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230" width="640" height="230">
<style>
  .f { font-family: sans-serif; }
  .ti { animation: tia 12s infinite; }
  @keyframes tia { 0%,3%{opacity:0} 7%,87%{opacity:1} 92%,100%{opacity:0} }
  .c1 { animation: c1a 12s infinite; }
  @keyframes c1a { 0%,8%{opacity:0} 14%,87%{opacity:1} 92%,100%{opacity:0} }
  .c2 { animation: c2a 12s infinite; }
  @keyframes c2a { 0%,28%{opacity:0} 34%,87%{opacity:1} 92%,100%{opacity:0} }
  .c3 { animation: c3a 12s infinite; }
  @keyframes c3a { 0%,48%{opacity:0} 54%,87%{opacity:1} 92%,100%{opacity:0} }
  .c4 { animation: c4a 12s infinite; }
  @keyframes c4a { 0%,65%{opacity:0} 71%,87%{opacity:1} 92%,100%{opacity:0} }
  .ft { animation: fta 12s infinite; }
  @keyframes fta { 0%,78%{opacity:0} 82%,87%{opacity:1} 92%,100%{opacity:0} }
</style>

<!-- Background -->
<rect width="640" height="230" rx="12" fill="#0d1117"/>

<!-- Header bar -->
<rect width="640" height="38" rx="12" fill="#161b22"/>
<rect y="26" width="640" height="12" fill="#161b22"/>
<text class="f ti" x="320" y="24" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="bold" letter-spacing="1">ls — schau was im Ordner ist</text>

<!-- CARD 1: ls (top-left) -->
<g class="c1">
  <rect x="16" y="48" width="296" height="82" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="40" y="80" font-size="26">📋</text>
  <text class="f" x="76" y="69" font-size="14" fill="#58a6ff" font-weight="bold">ls</text>
  <line x1="76" y1="76" x2="300" y2="76" stroke="#58a6ff" stroke-width="0.5" opacity="0.3"/>
  <text class="f" x="76" y="93" font-size="11" fill="#e6edf3">Dateien &amp; Ordner auflisten</text>
  <text class="f" x="76" y="110" font-size="10" fill="#8b949e">Zeigt den Inhalt des Ordners</text>
  <text class="f" x="295" y="122" text-anchor="end" font-size="9" fill="#58a6ff">einfachster Befehl</text>
</g>

<!-- CARD 2: ls -l (top-right) -->
<g class="c2">
  <rect x="328" y="48" width="296" height="82" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="352" y="80" font-size="26">🔍</text>
  <text class="f" x="388" y="69" font-size="14" fill="#3fb950" font-weight="bold">ls -l</text>
  <line x1="388" y1="76" x2="612" y2="76" stroke="#3fb950" stroke-width="0.5" opacity="0.3"/>
  <text class="f" x="388" y="93" font-size="11" fill="#e6edf3">Details: Rechte · Größe · Datum</text>
  <text class="f" x="388" y="110" font-size="10" fill="#8b949e">Lange Liste mit allen Infos</text>
  <text class="f" x="607" y="122" text-anchor="end" font-size="9" fill="#3fb950">-l = long</text>
</g>

<!-- CARD 3: ls -a (bottom-left) -->
<g class="c3">
  <rect x="16" y="142" width="296" height="78" rx="10" fill="#161b22" stroke="#f0883e" stroke-width="2"/>
  <text x="40" y="174" font-size="26">👁️</text>
  <text class="f" x="76" y="166" font-size="14" fill="#f0883e" font-weight="bold">ls -a</text>
  <line x1="76" y1="172" x2="300" y2="172" stroke="#f0883e" stroke-width="0.5" opacity="0.3"/>
  <text class="f" x="76" y="188" font-size="10" fill="#e6edf3">Versteckte Dateien auch anzeigen</text>
  <text class="f" x="76" y="204" font-size="10" fill="#8b949e">z.B. .bashrc · .profile</text>
  <text class="f" x="295" y="212" text-anchor="end" font-size="9" fill="#f0883e">. = versteckt</text>
</g>

<!-- CARD 4: ls -la (bottom-right) -->
<g class="c4">
  <rect x="328" y="142" width="296" height="78" rx="10" fill="#161b22" stroke="#bc8cff" stroke-width="2"/>
  <text x="352" y="174" font-size="26">✨</text>
  <text class="f" x="388" y="166" font-size="14" fill="#bc8cff" font-weight="bold">ls -la</text>
  <line x1="388" y1="172" x2="612" y2="172" stroke="#bc8cff" stroke-width="0.5" opacity="0.3"/>
  <text class="f" x="388" y="188" font-size="10" fill="#e6edf3">Alles zusammen — der Allrounder!</text>
  <text class="f" x="388" y="204" font-size="10" fill="#8b949e">Details + versteckte Dateien</text>
  <text class="f" x="607" y="212" text-anchor="end" font-size="9" fill="#bc8cff">Profi-Befehl ⭐</text>
</g>

<!-- Footer -->
<text class="f ft" x="320" y="226" text-anchor="middle" font-size="9" fill="#6e7681">Ordner werden in Blau angezeigt, ausführbare Dateien in Grün — praktisch!</text>
</svg>
