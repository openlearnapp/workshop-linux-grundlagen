<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="640" height="160" fill="url(#bg)" rx="8"/>
  <!-- Decorative elements -->
  <circle cx="80" cy="60" r="2" fill="#3fb950" opacity="0.4"/><circle cx="95" cy="45" r="1.5" fill="#3fb950" opacity="0.35"/><circle cx="70" cy="100" r="1" fill="#3fb950" opacity="0.35"/>
  <circle cx="560" cy="60" r="2" fill="#3fb950" opacity="0.4"/><circle cx="545" cy="100" r="1.5" fill="#3fb950" opacity="0.35"/><circle cx="570" cy="45" r="1" fill="#3fb950" opacity="0.35"/>
  <!-- Icon -->
  
  <!-- Folder path visualization -->
  <rect x="240" y="55" width="40" height="30" rx="4" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="248" y="74" font-family="monospace" font-size="9" fill="#3fb950">~</text>
  <!-- Arrow -->
  <line x1="285" y1="70" x2="310" y2="70" stroke="#3fb950" stroke-width="1.5" opacity="0.9"/>
  <polyline points="306,65 312,70 306,75" fill="none" stroke="#3fb950" stroke-width="1.5" opacity="0.9"/>
  <!-- Target folder -->
  <rect x="315" y="55" width="55" height="30" rx="4" fill="#21262d" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="320" y="74" font-family="monospace" font-size="9" fill="#58a6ff">Docs/</text>
  <!-- Arrow -->
  <line x1="375" y1="70" x2="400" y2="70" stroke="#58a6ff" stroke-width="1.5" opacity="0.9"/>
  <polyline points="396,65 402,70 396,75" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.9"/>
  <!-- Deep folder -->
  <rect x="405" y="55" width="40" height="30" rx="4" fill="#21262d" stroke="#f0883e" stroke-width="1.5"/>
  <text x="413" y="74" font-family="monospace" font-size="9" fill="#f0883e">pdf</text>
  <!-- cd command -->
  <text x="296" y="115" font-family="monospace" font-size="10" fill="#3fb950" opacity="0.5">cd ~/Docs/pdf</text>
  <!-- Accent bar -->
  <rect x="180" y="152" width="280" height="4" fill="#3fb950" opacity="0.8" rx="1.5"/>
</svg>
