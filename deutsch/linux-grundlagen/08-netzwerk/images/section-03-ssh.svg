<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230">
  <defs>
    <style>
      .f { font-family: sans-serif; }
      .ti { opacity: 0; animation: fadeIn 11s infinite; }
      .c1 { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 0.4s; }
      .c2 { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 1.2s; }
      .c3 { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 2.0s; }
      .c4 { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 2.8s; }
      .ft { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 3.4s; }
      @keyframes fadeIn {
        0%,2%{opacity:0}
        7%,87%{opacity:1}
        92%,100%{opacity:0}
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="640" height="230" rx="12" fill="#0d1117"/>

  <!-- Header bar -->
  <rect width="640" height="38" rx="12" fill="#161b22"/>
  <rect y="26" width="640" height="12" fill="#161b22"/>

  <!-- Header title -->
  <text class="f ti" x="320" y="24" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="bold" letter-spacing="1">SSH — sicher auf einen anderen Computer verbinden</text>

  <!-- Card 1: SSH -->
  <g class="c1">
    <rect x="16" y="50" width="142" height="158" rx="10" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
    <text x="87" y="88" text-anchor="middle" font-size="30">🔐</text>
    <text class="f" x="87" y="112" text-anchor="middle" font-size="12" fill="#f0883e" font-weight="bold">SSH</text>
    <text class="f" x="87" y="128" text-anchor="middle" font-size="10" fill="#8b949e">Sichere</text>
    <text class="f" x="87" y="141" text-anchor="middle" font-size="10" fill="#8b949e">verschlüsselte</text>
    <text class="f" x="87" y="154" text-anchor="middle" font-size="10" fill="#8b949e">Verbindung</text>
    <rect x="26" y="160" width="122" height="26" rx="6" fill="#0d1117"/>
    <text class="f" x="87" y="178" text-anchor="middle" font-size="9" fill="#f0883e">Secure Shell</text>
  </g>

  <!-- Card 2: ssh user@host -->
  <g class="c2">
    <rect x="170" y="50" width="142" height="158" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="241" y="88" text-anchor="middle" font-size="30">🖥️</text>
    <text class="f" x="241" y="112" text-anchor="middle" font-size="11" fill="#58a6ff" font-weight="bold">ssh user@host</text>
    <text class="f" x="241" y="130" text-anchor="middle" font-size="10" fill="#8b949e">Verbindung</text>
    <text class="f" x="241" y="144" text-anchor="middle" font-size="10" fill="#8b949e">aufbauen</text>
    <rect x="180" y="156" width="122" height="26" rx="6" fill="#0d1117"/>
    <text class="f" x="241" y="174" text-anchor="middle" font-size="9" fill="#58a6ff">ssh ali@192.168.1.1</text>
  </g>

  <!-- Card 3: ssh-keygen -->
  <g class="c3">
    <rect x="324" y="50" width="142" height="158" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
    <text x="395" y="88" text-anchor="middle" font-size="30">🔑</text>
    <text class="f" x="395" y="112" text-anchor="middle" font-size="12" fill="#3fb950" font-weight="bold">ssh-keygen</text>
    <text class="f" x="395" y="128" text-anchor="middle" font-size="10" fill="#8b949e">Schlüsselpaar</text>
    <text class="f" x="395" y="142" text-anchor="middle" font-size="10" fill="#8b949e">erstellen</text>
    <rect x="334" y="156" width="122" height="26" rx="6" fill="#0d1117"/>
    <text class="f" x="395" y="174" text-anchor="middle" font-size="9" fill="#3fb950">Passwortlos!</text>
  </g>

  <!-- Card 4: scp -->
  <g class="c4">
    <rect x="478" y="50" width="146" height="158" rx="10" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
    <text x="551" y="88" text-anchor="middle" font-size="30">📂</text>
    <text class="f" x="551" y="112" text-anchor="middle" font-size="12" fill="#bc8cff" font-weight="bold">scp</text>
    <text class="f" x="551" y="128" text-anchor="middle" font-size="10" fill="#8b949e">Dateien sicher</text>
    <text class="f" x="551" y="142" text-anchor="middle" font-size="10" fill="#8b949e">übertragen</text>
    <rect x="488" y="156" width="126" height="26" rx="6" fill="#0d1117"/>
    <text class="f" x="551" y="174" text-anchor="middle" font-size="9" fill="#bc8cff">scp datei user@host</text>
  </g>

  <!-- Footer -->
  <text class="f ft" x="320" y="222" text-anchor="middle" font-size="11" fill="#484f58">SSH = sicher · exit = trennen · scp = Dateien übertragen ✓</text>
</svg>
