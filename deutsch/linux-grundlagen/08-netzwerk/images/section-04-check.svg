<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230">
  <defs>
    <style>
      .f { font-family: sans-serif; }
      .ti { opacity: 0; animation: fadeIn 11s infinite; }
      .c1 { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 0.4s; }
      .c2 { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 1.2s; }
      .c3 { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 2.0s; }
      .c4 { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 2.8s; }
      .ft { opacity: 0; animation: fadeIn 11s infinite; animation-delay: 3.4s; }
      @keyframes fadeIn {
        0%,2%{opacity:0}
        7%,87%{opacity:1}
        92%,100%{opacity:0}
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="640" height="230" rx="12" fill="#0d1117"/>

  <!-- Header bar -->
  <rect width="640" height="38" rx="12" fill="#161b22"/>
  <rect y="26" width="640" height="12" fill="#161b22"/>

  <!-- Header title -->
  <text class="f ti" x="320" y="24" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="bold" letter-spacing="1">✅  Zusammenfassung — Netzwerk</text>

  <!-- Card 1: ping -->
  <g class="c1">
    <rect x="16" y="50" width="142" height="158" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="87" y="88" text-anchor="middle" font-size="30">📡</text>
    <text class="f" x="87" y="112" text-anchor="middle" font-size="12" fill="#58a6ff" font-weight="bold">ping</text>
    <text class="f" x="87" y="130" text-anchor="middle" font-size="10" fill="#8b949e">Erreichbarkeit</text>
    <text class="f" x="87" y="144" text-anchor="middle" font-size="10" fill="#8b949e">testen</text>
    <rect x="26" y="156" width="122" height="36" rx="6" fill="#0d1117"/>
    <text class="f" x="87" y="172" text-anchor="middle" font-size="9" fill="#484f58">Ist das Internet</text>
    <text class="f" x="87" y="185" text-anchor="middle" font-size="9" fill="#58a6ff">erreichbar?</text>
  </g>

  <!-- Card 2: ip addr -->
  <g class="c2">
    <rect x="170" y="50" width="142" height="158" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
    <text x="241" y="88" text-anchor="middle" font-size="30">🌐</text>
    <text class="f" x="241" y="112" text-anchor="middle" font-size="12" fill="#3fb950" font-weight="bold">ip addr</text>
    <text class="f" x="241" y="130" text-anchor="middle" font-size="10" fill="#8b949e">IP-Adresse</text>
    <text class="f" x="241" y="144" text-anchor="middle" font-size="10" fill="#8b949e">anzeigen</text>
    <rect x="180" y="156" width="122" height="36" rx="6" fill="#0d1117"/>
    <text class="f" x="241" y="172" text-anchor="middle" font-size="9" fill="#484f58">Meine Adresse</text>
    <text class="f" x="241" y="185" text-anchor="middle" font-size="9" fill="#3fb950">im Netzwerk</text>
  </g>

  <!-- Card 3: curl/wget -->
  <g class="c3">
    <rect x="324" y="50" width="142" height="158" rx="10" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
    <text x="395" y="88" text-anchor="middle" font-size="30">📥</text>
    <text class="f" x="395" y="112" text-anchor="middle" font-size="12" fill="#f0883e" font-weight="bold">curl / wget</text>
    <text class="f" x="395" y="130" text-anchor="middle" font-size="10" fill="#8b949e">Herunterladen</text>
    <text class="f" x="395" y="144" text-anchor="middle" font-size="10" fill="#8b949e">aus dem Internet</text>
    <rect x="334" y="156" width="122" height="36" rx="6" fill="#0d1117"/>
    <text class="f" x="395" y="172" text-anchor="middle" font-size="9" fill="#484f58">Dateien holen</text>
    <text class="f" x="395" y="185" text-anchor="middle" font-size="9" fill="#f0883e">ohne Browser</text>
  </g>

  <!-- Card 4: SSH -->
  <g class="c4">
    <rect x="478" y="50" width="146" height="158" rx="10" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
    <text x="551" y="88" text-anchor="middle" font-size="30">🔐</text>
    <text class="f" x="551" y="112" text-anchor="middle" font-size="12" fill="#bc8cff" font-weight="bold">SSH</text>
    <text class="f" x="551" y="130" text-anchor="middle" font-size="10" fill="#8b949e">Sicher</text>
    <text class="f" x="551" y="144" text-anchor="middle" font-size="10" fill="#8b949e">verbinden</text>
    <rect x="488" y="156" width="126" height="36" rx="6" fill="#0d1117"/>
    <text class="f" x="551" y="172" text-anchor="middle" font-size="9" fill="#484f58">Remote-Zugriff</text>
    <text class="f" x="551" y="185" text-anchor="middle" font-size="9" fill="#bc8cff">verschlüsselt</text>
  </g>

  <!-- Footer -->
  <text class="f ft" x="320" y="222" text-anchor="middle" font-size="11" fill="#484f58">Du kennst jetzt die wichtigsten Netzwerk-Befehle ✓</text>
</svg>
