version: 2
number: 8
title: "Netzwerk"
description: "ping, curl, wget, ssh und ip — Netzwerkverbindungen testen, Daten übertragen und remote arbeiten"
image: "images/lesson-header.svg"
image_caption: "Netzwerktopologie mit Router, Server und Clients"
sections:
  - title: "Netzwerk prüfen — ping, ip und ss"
    image: "images/section-01-network.svg"
    explanation: |
      Stell dir vor, du schickst einem Freund einen Brief.
      Du willst wissen: "Kommt der Brief überhaupt an?"

      Im Internet macht das der Befehl **ping**.
      Er schickt kleine Test-Pakete an eine Adresse und misst,
      ob und wie schnell sie ankommen:
      ```
      ping -c 4 google.com
      ```
      Das `-c 4` bedeutet: "Schick genau 4 Test-Pakete."

      Mit **ip addr** siehst du die Adresse deines Computers im Netzwerk —
      ähnlich wie deine Hausnummer:
      ```
      ip addr show
      ```

      Und mit **ss** siehst du, welche "Türen" (Ports) auf deinem Computer offen sind:
      ```
      ss -tulpn
      ```
      Das klingt kompliziert, ist aber einfach:
      - `t` = TCP-Verbindungen (die häufigste Art)
      - `u` = UDP-Verbindungen (für schnelle Daten wie Videos)
      - `l` = Nur die offenen Türen zeigen
      - `p` = Welches Programm hat die Tür auf?
      - `n` = Zahlen statt Namen anzeigen
    examples:
      - q: "ping -c 4 google.com"
        a: "Schickt 4 Test-Pakete an Google — prüft ob das Internet funktioniert"
        rel:
          - ["ping-cmd", "Netzwerk-Erreichbarkeit und Latenz testen", "Befehl ping"]
          - ["ping-c", "Count — Anzahl der gesendeten Pakete begrenzen", "Flag -c"]
        labels: ["Netzwerk"]
      - q: "ip addr show"
        a: "Zeigt die Netzwerk-Adresse deines Computers — wie deine Hausnummer im Internet"
        rel:
          - ["ip-cmd", "Modernes Netzwerk-Verwaltungstool (ersetzt ifconfig)", "Befehl ip"]
          - ["ip-addr", "IP-Adressen aller Netzwerkinterfaces anzeigen", "ip addr"]
        labels: ["Netzwerk"]
      - q: "ss -tulpn"
        a: "Zeigt alle offenen Ports und welche Programme sie benutzen"
        rel:
          - ["ss-cmd", "Socket Statistics — Netzwerkverbindungen und offene Ports", "Befehl ss"]
          - ["ss-tulpn", "t=TCP, u=UDP, l=listening, p=prozess, n=numerisch", "Flags -tulpn"]
        labels: ["Netzwerk"]

  - title: "curl und wget — Daten aus dem Internet holen"
    image: "images/section-02-curl-wget.svg"
    explanation: |
      Dein Browser lädt Webseiten herunter — das siehst du.
      Aber was, wenn du Daten ins Terminal holen willst,
      ohne einen Browser zu öffnen?

      Dafür gibt es **curl** (sprich: "curl") und **wget** (sprich: "w-get").

      **curl** ist wie ein unsichtbarer Browser:
      ```
      curl https://example.com
      ```
      Es zeigt dir den Inhalt einer Webseite direkt im Terminal.

      Mit curl kannst du auch deine eigene Internet-Adresse herausfinden:
      ```
      curl -s https://ipinfo.io/ip
      ```
      Das `-s` steht für "silent" (englisch für "still") —
      es zeigt nur das Ergebnis, ohne Fortschrittsanzeige.

      **wget** ist besser für das Herunterladen großer Dateien:
      ```
      wget https://example.com/grossedatei.zip
      ```
      wget speichert die Datei direkt auf deinem Computer.
      curl zeigt sie nur an — das ist der wichtigste Unterschied.
    examples:
      - q: "curl -I https://example.com"
        a: "Zeigt nur die Kopfzeilen (Header) der Webseite — wie ein Blick auf den Briefumschlag"
        rel:
          - ["curl-cmd", "Client URL — HTTP-Anfragen stellen und Daten übertragen", "Befehl curl"]
          - ["curl-I", "Head — nur HTTP-Response-Header anzeigen", "Flag -I"]
        labels: ["Netzwerk"]
      - q: "curl -s https://ipinfo.io/ip"
        a: "Zeigt deine eigene Internet-Adresse an — -s macht die Ausgabe sauber"
        rel:
          - ["curl-s", "Silent — Fortschrittsanzeige und Fehlermeldungen unterdrücken", "Flag -s"]
        labels: ["Netzwerk"]
      - q: "wget -O nodejs.tar.gz https://nodejs.org/dist/v20.0.0/node-v20.0.0.tar.gz"
        a: "Lädt eine Datei herunter und speichert sie unter einem eigenen Namen"
        rel:
          - ["wget-cmd", "Web Get — Dateien aus dem Internet herunterladen", "Befehl wget"]
          - ["wget-O", "Output — Datei unter anderem Namen speichern", "Flag -O"]
        labels: ["Netzwerk"]
      - q: "curl -fsSL https://get.docker.com | sudo sh"
        a: "Lädt ein Installationsskript herunter und führt es sofort aus"
        rel:
          - ["curl-fssl", "f=fail silent, s=silent, S=errors, L=redirects folgen", "Flags -fsSL"]
        labels: ["Netzwerk", "Konfiguration"]

  - title: "SSH — sicher auf einen anderen Computer verbinden"
    image: "images/section-03-ssh.svg"
    explanation: |
      Stell dir vor, du sitzt zu Hause, aber arbeitest an einem Computer,
      der 1000 km entfernt in einem Rechenzentrum steht.

      Genau das macht **SSH** (Secure Shell — "sichere Schale").
      Alles, was du tippst, wird verschlüsselt übertragen.
      Niemand kann mitlesen.

      So verbindest du dich:
      ```
      ssh alice@192.168.1.100
      ```
      Das bedeutet: "Verbinde dich als Nutzer 'alice' mit dem Computer 192.168.1.100"

      Noch sicherer als ein Passwort sind **SSH-Schlüssel**.
      Das ist wie ein magischer Ausweis — du musst kein Passwort mehr tippen:
      ```
      ssh-keygen -t ed25519 -C "mein-laptop"
      ```
      Das erstellt einen Schlüssel.
      Mit `-t ed25519` wählst du einen modernen, sicheren Typ.

      Dann schickst du deinen Ausweis an den anderen Computer:
      ```
      ssh-copy-id alice@server.example.com
      ```
      Ab jetzt kommst du rein — ohne Passwort!

      Dateien übertragen geht mit **scp** (Secure Copy — "sichere Kopie"):
      ```
      scp meine-datei.txt alice@server:/home/alice/
      ```
    examples:
      - q: "ssh alice@192.168.1.100"
        a: "Verbindet sich als 'alice' mit dem Computer 192.168.1.100 — alles verschlüsselt"
        rel:
          - ["ssh-cmd", "Secure Shell — verschlüsselte Remote-Verbindung", "Befehl ssh"]
        labels: ["Netzwerk", "Sicherheit"]
      - q: "ssh-keygen -t ed25519 -C \"alice@meinlaptop\""
        a: "Erstellt einen modernen SSH-Schlüssel — wie ein digitaler Ausweis"
        rel:
          - ["ssh-keygen", "SSH-Schlüsselpaar generieren", "Befehl ssh-keygen"]
          - ["ed25519", "Moderner Algorithmus für SSH-Schlüssel, empfohlen seit 2022", "Schlüsseltyp Ed25519"]
        labels: ["Netzwerk", "Sicherheit"]
      - q: "ssh-copy-id -i ~/.ssh/id_ed25519.pub alice@server.example.com"
        a: "Schickt deinen Schlüssel an den Server — danach kein Passwort mehr nötig"
        rel:
          - ["ssh-copy-id", "Öffentlichen SSH-Schlüssel auf Remote-Server installieren", "Befehl ssh-copy-id"]
        labels: ["Netzwerk", "Sicherheit"]
      - q: "scp -r ~/projekte/webseite/ alice@server:/var/www/html/"
        a: "Kopiert einen ganzen Ordner sicher auf einen anderen Computer"
        rel:
          - ["scp-cmd", "Secure Copy — verschlüsselte Dateiübertragung via SSH", "Befehl scp"]
          - ["scp-r", "Recursive — Verzeichnisse übertragen", "Flag -r"]
        labels: ["Netzwerk"]

  - title: "🖥️ Terminal-Check"
    image: "images/section-04-check.svg"
    explanation: |
      Teste jetzt dein Wissen — gib die Befehle direkt ein!
    examples:
      - q: "Welcher Befehl testet die Erreichbarkeit von google.com mit 4 Paketen?"
        type: input
        a: "ping -c 4 google.com"
        labels: ["Netzwerk"]
      - q: "Was macht 'curl -s https://ipinfo.io/ip'?"
        type: select
        options:
          - text: "Zeigt die eigene Internet-Adresse an"
            correct: true
          - text: "Testet die Geschwindigkeit der Internetverbindung"
          - text: "Lädt die IP-Datenbank herunter"
          - text: "Zeigt alle Netzwerkkarten"
        labels: ["Netzwerk"]
      - q: "Welcher Befehl zeigt alle offenen Ports und die zugehörigen Programme?"
        type: select
        options:
          - text: "ss -tulpn"
            correct: true
          - text: "ip addr show"
          - text: "ping -a localhost"
          - text: "netstat --list"
        labels: ["Netzwerk"]
      - q: "Welche dieser Aussagen über SSH stimmen?"
        type: multiple-choice
        options:
          - text: "SSH verschlüsselt die Verbindung"
            correct: true
          - text: "SSH-Schlüssel sind sicherer als Passwörter"
            correct: true
          - text: "ssh-keygen erstellt ein Schlüsselpaar"
            correct: true
          - text: "SSH sendet Passwörter im Klartext"
        labels: ["Netzwerk", "Sicherheit"]
