version: 2
number: 1
title: "Was ist Linux?"
description: "Lern was Linux ist, wo es überall steckt und wie du es sofort ausprobieren kannst"
image: "images/lesson-header.svg"
image_caption: "Tux Penguin mit Server-Racks"
sections:
  - title: "Linux — die Software, die alles steuert"
    image: "images/section-01-history.svg"
    explanation: |
      **Linux** ist ein Betriebssystem.

      Ein Betriebssystem (kurz: OS, von englisch "Operating System") ist die wichtigste
      Software auf deinem Computer. Es sorgt dafür, dass alles funktioniert:
      dass du tippen kannst, dass Programme starten, dass der Bildschirm leuchtet.

      Windows und macOS sind auch Betriebssysteme. Linux ist eine weitere Möglichkeit —
      und hat einen riesigen Vorteil:

      Linux ist **kostenlos** und jeder darf es benutzen, verändern und weitergeben.
      Das nennt man **Open Source** (englisch für "offene Quelle" —
      der Bauplan ist für alle sichtbar).

      Linux steckt überall — auch wenn du es nicht weißt:
      - Fast alle **Webseiten** laufen auf Linux-Servern (ein Server ist ein Computer,
        der rund um die Uhr läuft und Daten bereitstellt)
      - **Android-Handys** basieren auf Linux
      - **Smart-TVs**, Waschmaschinen, Autos — oft Linux drin!
      - **Raspberry Pi** (ein Mini-Computer für ca. 35€) läuft mit Linux

      Super! Jetzt weißt du schon, was Linux ist.
    examples:
      - q: "uname -r"
        a: "Zeigt die Version des Linux-Kerns an (z.B. 5.15.0-91-generic) — der Kern ist das Herzstück von Linux"
        rel:
          - ["uname", "Unix Name — Systeminformationen anzeigen", "Befehl"]
          - ["uname-r", "Kernel-Release-Version ausgeben", "Flag -r = release"]
        labels: ["Basics"]
      - q: "uname -a"
        a: "Alle Systeminformationen auf einmal: Kernel-Version, Computername und mehr"
        rel:
          - ["uname-a", "Alle Systeminfos (All)", "Flag -a = all"]
        labels: ["Basics"]
      - q: "cat /etc/os-release"
        a: "Zeigt welche Linux-Version installiert ist (z.B. Ubuntu 22.04)"
        rel:
          - ["os-release", "Datei mit Distribution und Versionsinformationen", "/etc/os-release"]
          - ["cat-cmd", "Dateiinhalt im Terminal ausgeben", "Befehl cat"]
        labels: ["Basics", "Dateisystem"]

  - title: "Linux sofort ausprobieren — ohne Installation"
    image: "images/section-02-try-linux.svg"
    explanation: |
      Du musst gar nichts installieren, um Linux auszuprobieren!

      **Direkt im Browser (empfohlen für Anfänger):**

      Geh auf **webminal.org** — das ist ein echtes Linux-Terminal,
      das direkt im Browser läuft. Kostenlos, keine Installation, sofort los!

      **Auf Windows:**

      Öffne die Suche (Windows-Taste), tippe "PowerShell" und gib ein:
      ```
      wsl --install
      ```
      Das installiert Ubuntu (eine beliebte Linux-Version) direkt in Windows.
      Danach kannst du Ubuntu wie eine normale App starten!

      **Auf einem Mac:**

      Öffne das Terminal (Finder → Programme → Dienstprogramme → Terminal).
      macOS ist dem Linux sehr ähnlich — fast alle Befehle aus diesem Kurs funktionieren!

      **Empfehlung:** Starte mit **webminal.org**.
      Kein Risiko, kein Download — einfach loslegen!
    examples:
      - q: "uname -s"
        a: "Zeigt das Betriebssystem an — bei Linux steht da 'Linux', bei macOS steht 'Darwin'"
        rel:
          - ["uname-s", "System name — zeigt ob Linux, Darwin (macOS), etc.", "Flag -s = system"]
        labels: ["Basics"]
      - q: "wsl --install"
        a: "Installiert WSL2 (Windows Subsystem for Linux) und Ubuntu auf Windows — gibt Linux in Windows!"
        rel:
          - ["wsl-install", "WSL2 und Ubuntu auf Windows 10/11 installieren", "Windows PowerShell Befehl"]
          - ["wsl2", "Windows Subsystem for Linux — Linux direkt in Windows integriert", "WSL2"]
        labels: ["Basics", "Installation"]
      - q: "bash --version"
        a: "Zeigt die installierte Bash-Version — Bash ist das Programm, das deine Befehle versteht"
        rel:
          - ["bash-version", "Bash-Shell-Version anzeigen", "Befehl bash --version"]
          - ["bash-shell", "Bash — das Programm, das Befehle im Terminal entgegennimmt und ausführt", "Shell"]
        labels: ["Basics"]

  - title: "Linux-Varianten — für jeden etwas dabei"
    image: "images/section-02-distros.svg"
    explanation: |
      Linux gibt es in vielen Varianten. Man nennt sie **Distributionen**
      (gesprochen: dis-tri-bu-TSIO-nen), kurz: Distros.

      Stell dir vor: Der Linux-Kern (der innerste Teil, der die Hardware steuert)
      ist wie ein Motor. Verschiedene Teams bauen dann unterschiedliche Autos darum herum.

      Das sind die bekanntesten Linux-Varianten:

      | Name | Für wen? |
      |------|----------|
      | **Ubuntu** | Super für Anfänger — viel Hilfe online, einfach zu installieren |
      | **Debian** | Sehr stabil — wird gerne auf Servern eingesetzt |
      | **Raspberry Pi OS** | Extra für den Raspberry Pi Mini-Computer gemacht |
      | **Kali Linux** | Für Sicherheitsforschung (erst wenn du Grundlagen kennst!) |

      In diesem Kurs lernst du Befehle, die auf **allen** Linux-Varianten funktionieren.
      Das ist das Tolle: Einmal lernen, überall anwenden!
    examples:
      - q: "lsb_release -a"
        a: "Zeigt welche Linux-Variante (Distribution) und welche Version installiert ist"
        rel:
          - ["lsb-release", "Linux Standard Base Informationen anzeigen", "Befehl lsb_release"]
          - ["lsb-a-flag", "Alle verfügbaren LSB-Infos ausgeben", "Flag -a"]
        labels: ["Basics"]
      - q: "hostnamectl"
        a: "Zeigt den Computernamen, das Betriebssystem und die Kernel-Version übersichtlich an"
        rel:
          - ["hostnamectl", "Hostname und Systeminformationen verwalten", "Befehl"]
        labels: ["Basics"]
      - q: "arch"
        a: "Zeigt den Prozessor-Typ an — z.B. x86_64 bedeutet: 64-Bit-Computer (der normale PC/Laptop)"
        rel:
          - ["arch-cmd", "Prozessorarchitektur anzeigen", "Befehl arch"]
          - ["x86-64", "64-Bit Intel/AMD Architektur, heute Standard bei PCs und Laptops", "Architektur"]
        labels: ["Basics"]

  - title: "Das Linux-Dateisystem — alles hat seinen Platz"
    image: "images/section-03-filesystem.svg"
    explanation: |
      In Linux sind alle Dateien in einem großen Baum organisiert.

      Der Baum beginnt ganz oben mit `/` — das nennt man **Root**
      (englisch für "Wurzel"). Von dort aus verzweigen sich alle Ordner.

      Das sind die wichtigsten Ordner und was drin ist:

      | Ordner | Was ist drin? |
      |--------|---------------|
      | `/home` | Dein persönlicher Ordner — wie dein Zimmer |
      | `/etc` | Einstellungsdateien für das System (wie die Systemsteuerung) |
      | `/bin` | Programme, die jeder benutzen darf (z.B. ls, cd) |
      | `/tmp` | Temporäre Dateien — werden beim Neustart gelöscht |
      | `/dev` | Geräte wie Festplatten und USB-Sticks (als Dateien!) |

      Das Zeichen `~` (Tilde, auf der Tastatur oben links) ist eine Abkürzung
      für deinen persönlichen Ordner. Wenn du `alice` heißt,
      steht `~` für `/home/alice`.

      Probier es aus! Tippe `ls /` im Terminal, um den Inhalt der Wurzel zu sehen.
    examples:
      - q: "ls /"
        a: "Zeigt alle Ordner ganz oben im Dateisystem — die Wurzel (Root) des Baums"
        rel:
          - ["ls-cmd", "List — Verzeichnisinhalt anzeigen", "Befehl ls"]
          - ["root-dir", "Das oberste Verzeichnis des Linux-Dateisystems", "/ (Root)"]
        labels: ["Dateisystem"]
      - q: "ls /etc | head -5"
        a: "Zeigt die ersten 5 Einträge im Einstellungs-Ordner /etc"
        rel:
          - ["etc-dir", "Konfigurationsdateien des Systems", "Verzeichnis /etc"]
          - ["pipe-head", "Ausgabe durch pipe an head weitergeben", "| head -5"]
        labels: ["Dateisystem", "Konfiguration"]
      - q: "echo $HOME"
        a: "Zeigt den Pfad zu deinem persönlichen Ordner an (z.B. /home/alice)"
        rel:
          - ["echo-cmd", "Text oder Variable im Terminal ausgeben", "Befehl echo"]
          - ["home-var", "Umgebungsvariable mit Pfad zum Home-Verzeichnis", "$HOME"]
        labels: ["Dateisystem", "Basics"]

  - title: "Terminal-Check"
    image: "images/section-04-check.svg"
    explanation: |
      Teste jetzt dein Wissen!
    examples:
      - q: "Welcher Befehl zeigt die aktuelle Linux-Kernel-Version an?"
        type: input
        a: "uname -r"
        labels: ["Basics"]
      - q: "Was macht der Befehl 'lsb_release -a'?"
        type: select
        options:
          - text: "Zeigt die genaue Distribution und Version"
            correct: true
          - text: "Löscht alle Log-Dateien"
          - text: "Aktualisiert den Linux-Kern"
          - text: "Startet das System neu"
        labels: ["Basics"]
      - q: "Welcher Befehl zeigt, welche Linux-Version installiert ist?"
        type: select
        options:
          - text: "cat /etc/os-release"
            correct: true
          - text: "cat /etc/passwd"
          - text: "ls /usr/bin"
          - text: "echo $PATH"
        labels: ["Basics"]
      - q: "Welche dieser Aussagen über Linux stimmen?"
        type: multiple-choice
        options:
          - text: "Linux ist Open Source"
            correct: true
          - text: "Linux läuft auf fast allen Webservern weltweit"
            correct: true
          - text: "Linux hat nur eine einzige Variante"
          - text: "Android basiert auf Linux"
            correct: true
        labels: ["Basics"]
