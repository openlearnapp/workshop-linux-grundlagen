version: 2
number: 1
title: "Was ist Linux?"
description: "Geschichte, Distributionen und warum Linux 96% aller Server weltweit antreibt"
image: "images/lesson-header.svg"
image_caption: "Tux Penguin mit Server-Racks"
sections:
  - title: "Ein Student verändert die Welt"
    image: "images/section-01-history.svg"
    explanation: |
      Im Jahr **1991** schrieb ein 21-jähriger Informatikstudent an der Universität Helsinki
      eine E-Mail, die die Welt verändern sollte:

      > *"Ich entwickle ein freies Betriebssystem (nur ein Hobby, wird nicht groß und professionell sein
      > wie GNU)"* — Linus Torvalds, 25. August 1991

      Heute, über 30 Jahre später, läuft **Linux** auf:
      - **96%** aller Webserver weltweit
      - **100%** der schnellsten Supercomputer
      - Milliarden von Android-Smartphones
      - Smart-TVs, Routern, Autos, Raumstationen

      **Warum ist das wichtig?** Wer Linux versteht, versteht die Infrastruktur des Internets.
      Jeder Klick, jede Website, jede App läuft irgendwo auf einem Linux-Server.
    examples:
      - q: "uname -r"
        a: "Zeigt die aktuelle Linux-Kernel-Version an (z.B. 5.15.0-91-generic)"
        rel:
          - ["uname", "Unix Name — Systeminformationen anzeigen", "Befehl"]
          - ["uname-r", "Kernel-Release-Version ausgeben", "Flag -r = release"]
        labels: ["Basics"]
      - q: "uname -a"
        a: "Alle Systeminformationen auf einmal: Kernel, Hostname, Architektur"
        rel:
          - ["uname-a", "Alle Systeminfos (All)", "Flag -a = all"]
        labels: ["Basics"]
      - q: "cat /etc/os-release"
        a: "Zeigt welche Linux-Distribution und Version installiert ist"
        rel:
          - ["os-release", "Datei mit Distribution und Versionsinformationen", "/etc/os-release"]
          - ["cat-cmd", "Dateiinhalt im Terminal ausgeben", "Befehl cat"]
        labels: ["Basics", "Dateisystem"]

  - title: "Linux sofort ausprobieren — ohne Installation"
    image: "images/section-02-try-linux.svg"
    explanation: |
      Bevor du weiter lernst: **Hast du schon Zugang zu einem Linux-Terminal?**

      Du brauchst kein neues Betriebssystem zu installieren. Es gibt viele einfache Wege:

      **Sofort im Browser (kein Download nötig):**
      - **webminal.org** — echtes Ubuntu-Terminal im Browser, kostenlos, keine Installation
      - **JSLinux (bellard.org/jslinux)** — Linux direkt im Browser, keine Anmeldung nötig
      - **replit.com** — Online-IDE mit Linux-Terminal

      **Auf Windows:**
      - **WSL2 (Windows Subsystem for Linux)** — ein echter Ubuntu-Linux-Kern direkt in Windows
      - Einmal in der PowerShell eingeben: `wsl --install` — danach Ubuntu starten

      **Auf macOS:**
      - **Terminal.app** öffnen — macOS ist Unix-basiert, fast alle Linux-Befehle funktionieren
      - Finder → Programme → Dienstprogramme → Terminal

      **Als virtuelle Maschine (für tieferes Lernen):**
      - **VirtualBox** (kostenlos) + Ubuntu ISO herunterladen → Linux in einem Fenster

      **Als echter Mini-Computer:**
      - **Raspberry Pi** (~35€) — vollständiger Linux-Rechner, ideal zum Experimentieren

      **Empfehlung für Einsteiger:** Starte mit **webminal.org** im Browser
      oder installiere **WSL2** auf Windows — kein Risiko, sofort los!
    examples:
      - q: "uname -s"
        a: "Zeigt das Betriebssystem an — bei Linux: 'Linux', bei macOS: 'Darwin'"
        rel:
          - ["uname-s", "System name — zeigt ob Linux, Darwin (macOS), etc.", "Flag -s = system"]
        labels: ["Basics"]
      - q: "wsl --install"
        a: "Installiert WSL2 + Ubuntu auf Windows 10/11 — danach Ubuntu direkt in Windows nutzen (PowerShell als Admin)"
        rel:
          - ["wsl-install", "WSL2 und Ubuntu auf Windows 10/11 installieren", "Windows PowerShell Befehl"]
          - ["wsl2", "Windows Subsystem for Linux — Linux-Kernel direkt in Windows integriert", "WSL2"]
        labels: ["Basics", "Installation"]
      - q: "bash --version"
        a: "Zeigt die installierte Bash-Version an — funktioniert auf Linux, macOS und WSL"
        rel:
          - ["bash-version", "Bash-Shell-Version anzeigen", "Befehl bash --version"]
          - ["bash-shell", "Bash — Bourne Again Shell, Standard-Shell auf Linux", "Shell"]
        labels: ["Basics"]

  - title: "Distributionen — Linux für jeden Zweck"
    image: "images/section-02-distros.svg"
    explanation: |
      Linux ist kein einzelnes Betriebssystem, sondern ein **Kern (Kernel)**, um den herum
      verschiedene Unternehmen und Communities vollständige Systeme gebaut haben.
      Diese heißen **Distributionen** (kurz: Distros).

      | Distribution | Stärke | Zielgruppe |
      |-------------|--------|------------|
      | **Ubuntu** | Einfache Installation, viel Support | Einsteiger, Desktop |
      | **Debian** | Stabilität, langer Support | Server, Systemadmins |
      | **Fedora** | Modernste Software | Entwickler |
      | **Arch Linux** | Maximale Kontrolle | Fortgeschrittene |
      | **Kali Linux** | Sicherheitstools vorinstalliert | Penetrationstester |
      | **Raspberry Pi OS** | Optimiert für Mini-Computer | Maker, IoT |

      **Der entscheidende Unterschied zu Windows/macOS:** Linux ist **Open Source** —
      jeder kann den Quellcode lesen, verändern und weitergeben.
    examples:
      - q: "lsb_release -a"
        a: "Zeigt die genaue Distribution und Version (z.B. Ubuntu 22.04 LTS)"
        rel:
          - ["lsb-release", "Linux Standard Base Informationen anzeigen", "Befehl lsb_release"]
          - ["lsb-a-flag", "Alle verfügbaren LSB-Infos ausgeben", "Flag -a"]
        labels: ["Basics"]
      - q: "hostnamectl"
        a: "Zeigt Hostname, Betriebssystem, Kernel und Architektur in übersichtlicher Form"
        rel:
          - ["hostnamectl", "Hostname und Systeminformationen verwalten", "Befehl"]
        labels: ["Basics"]
      - q: "arch"
        a: "Gibt die Prozessorarchitektur aus (z.B. x86_64 für 64-Bit-System)"
        rel:
          - ["arch-cmd", "Prozessorarchitektur anzeigen", "Befehl arch"]
          - ["x86-64", "64-Bit Intel/AMD Architektur, heute Standard", "Architektur"]
        labels: ["Basics"]

  - title: "Das Linux-Dateisystem — alles ist eine Datei"
    image: "images/section-03-filesystem.svg"
    explanation: |
      Linux folgt einer Philosophie: **alles ist eine Datei** — auch Geräte, Prozesse und
      Netzwerkverbindungen sind als Dateien repräsentiert.

      Das Dateisystem startet immer bei `/` (Root — der Wurzel):

      | Ordner | Inhalt |
      |--------|--------|
      | `/home` | Persönliche Ordner der Benutzer |
      | `/etc` | Konfigurationsdateien des Systems |
      | `/bin`, `/usr/bin` | Ausführbare Programme (Befehle) |
      | `/var/log` | Log-Dateien (Systemprotokolle) |
      | `/tmp` | Temporäre Dateien, werden beim Neustart gelöscht |
      | `/dev` | Gerätedateien (Festplatten, USB, etc.) |

      Das Tilde-Zeichen `~` ist eine Abkürzung für das eigene Home-Verzeichnis:
      `/home/benutzer` wird zu `~`
    examples:
      - q: "ls /"
        a: "Zeigt den Inhalt des Root-Verzeichnisses — die oberste Ebene des Dateisystems"
        rel:
          - ["ls-cmd", "List — Verzeichnisinhalt anzeigen", "Befehl ls"]
          - ["root-dir", "Das oberste Verzeichnis des Linux-Dateisystems", "/ (Root)"]
        labels: ["Dateisystem"]
      - q: "ls /etc | head -5"
        a: "Listet die ersten 5 Einträge im Konfigurationsordner /etc"
        rel:
          - ["etc-dir", "Konfigurationsdateien des Systems", "Verzeichnis /etc"]
          - ["pipe-head", "Ausgabe durch pipe an head weitergeben", "| head -5"]
        labels: ["Dateisystem", "Konfiguration"]
      - q: "echo $HOME"
        a: "Gibt den Pfad zum eigenen Home-Verzeichnis aus (z.B. /home/alice)"
        rel:
          - ["echo-cmd", "Text oder Variable im Terminal ausgeben", "Befehl echo"]
          - ["home-var", "Umgebungsvariable mit Pfad zum Home-Verzeichnis", "$HOME"]
        labels: ["Dateisystem", "Basics"]

  - title: "🖥️ Terminal-Check"
    image: "images/section-04-check.svg"
    explanation: |
      Teste jetzt dein Wissen — gib die Befehle direkt ein!
    examples:
      - q: "Welcher Befehl zeigt die aktuelle Linux-Kernel-Version an?"
        type: input
        a: "uname -r"
        labels: ["Basics"]
      - q: "Was macht der Befehl 'lsb_release -a'?"
        type: select
        options:
          - text: "Zeigt die genaue Distribution und Version"
            correct: true
          - text: "Löscht alle Log-Dateien"
          - text: "Aktualisiert den Linux-Kernel"
          - text: "Startet das System neu"
        labels: ["Basics"]
      - q: "Welcher Befehl zeigt, welche Linux-Distribution installiert ist?"
        type: select
        options:
          - text: "cat /etc/os-release"
            correct: true
          - text: "cat /etc/passwd"
          - text: "ls /usr/bin"
          - text: "echo $PATH"
        labels: ["Basics"]
      - q: "Welche dieser Aussagen über Linux stimmen?"
        type: multiple-choice
        options:
          - text: "Linux ist Open Source"
            correct: true
          - text: "Linux läuft auf 96% aller Webserver"
            correct: true
          - text: "Linux hat nur eine einzige Distribution"
          - text: "Android basiert auf Linux"
            correct: true
        labels: ["Basics"]
