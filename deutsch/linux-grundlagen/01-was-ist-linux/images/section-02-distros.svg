<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230" width="640" height="230">
<style>
  .f { font-family: sans-serif; }
  .fm { font-family: monospace; }
  .ti { animation: tia 11s infinite; }
  @keyframes tia { 0%,3%{opacity:0} 7%,87%{opacity:1} 92%,100%{opacity:0} }
  .sub { animation: suba 11s infinite; }
  @keyframes suba { 0%,8%{opacity:0} 12%,87%{opacity:1} 92%,100%{opacity:0} }
  .c1 { animation: c1a 11s infinite; }
  @keyframes c1a { 0%,12%{opacity:0} 18%,87%{opacity:1} 92%,100%{opacity:0} }
  .c2 { animation: c2a 11s infinite; }
  @keyframes c2a { 0%,30%{opacity:0} 36%,87%{opacity:1} 92%,100%{opacity:0} }
  .c3 { animation: c3a 11s infinite; }
  @keyframes c3a { 0%,48%{opacity:0} 54%,87%{opacity:1} 92%,100%{opacity:0} }
  .c4 { animation: c4a 11s infinite; }
  @keyframes c4a { 0%,65%{opacity:0} 71%,87%{opacity:1} 92%,100%{opacity:0} }
  .ft { animation: fta 11s infinite; }
  @keyframes fta { 0%,78%{opacity:0} 82%,87%{opacity:1} 92%,100%{opacity:0} }
</style>

<rect width="640" height="230" rx="12" fill="#0d1117"/>
<rect width="640" height="38" rx="12" fill="#161b22"/>
<rect y="26" width="640" height="12" fill="#161b22"/>
<text class="f ti" x="320" y="24" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="bold" letter-spacing="1">Linux Varianten (Distros)</text>

<!-- Subtitle: same kernel -->
<text class="f sub" x="320" y="52" text-anchor="middle" font-size="10" fill="#6e7681">Alle teilen denselben Kern — wie verschiedene Autos mit gleichem Motor</text>

<!-- UBUNTU -->
<g class="c1">
  <rect x="12" y="60" width="142" height="155" rx="10" fill="#1f1209" stroke="#f0883e" stroke-width="2"/>
  <rect x="12" y="60" width="142" height="32" rx="10" fill="#f0883e"/>
  <rect x="12" y="78" width="142" height="14" fill="#f0883e"/>
  <text class="f" x="83" y="81" text-anchor="middle" font-size="12" fill="#0d1117" font-weight="bold">Ubuntu</text>
  <text x="83" y="114" text-anchor="middle" font-size="26" fill="#f0883e">🟠</text>
  <text class="f" x="83" y="138" text-anchor="middle" font-size="10" fill="#e6edf3" font-weight="bold">Für Anfänger</text>
  <text class="f" x="83" y="154" text-anchor="middle" font-size="9" fill="#8b949e">Viel Community-</text>
  <text class="f" x="83" y="168" text-anchor="middle" font-size="9" fill="#8b949e">Hilfe online</text>
  <text class="f" x="83" y="185" text-anchor="middle" font-size="11" fill="#f0883e">★★★★★</text>
  <text class="f" x="83" y="200" text-anchor="middle" font-size="8" fill="#6e7681">Empfehlung #1</text>
</g>

<!-- DEBIAN -->
<g class="c2">
  <rect x="166" y="60" width="142" height="155" rx="10" fill="#0d1520" stroke="#58a6ff" stroke-width="2"/>
  <rect x="166" y="60" width="142" height="32" rx="10" fill="#58a6ff"/>
  <rect x="166" y="78" width="142" height="14" fill="#58a6ff"/>
  <text class="f" x="237" y="81" text-anchor="middle" font-size="12" fill="#0d1117" font-weight="bold">Debian</text>
  <text x="237" y="114" text-anchor="middle" font-size="26" fill="#58a6ff">🔵</text>
  <text class="f" x="237" y="138" text-anchor="middle" font-size="10" fill="#e6edf3" font-weight="bold">Für Server</text>
  <text class="f" x="237" y="154" text-anchor="middle" font-size="9" fill="#8b949e">Sehr stabil</text>
  <text class="f" x="237" y="168" text-anchor="middle" font-size="9" fill="#8b949e">Profi-System</text>
  <text class="f" x="237" y="185" text-anchor="middle" font-size="11" fill="#58a6ff">★★★★☆</text>
  <text class="f" x="237" y="200" text-anchor="middle" font-size="8" fill="#6e7681">Fortgeschrittene</text>
</g>

<!-- RASPBERRY PI OS -->
<g class="c3">
  <rect x="320" y="60" width="142" height="155" rx="10" fill="#180a0a" stroke="#f85149" stroke-width="2"/>
  <rect x="320" y="60" width="142" height="32" rx="10" fill="#f85149"/>
  <rect x="320" y="78" width="142" height="14" fill="#f85149"/>
  <text class="f" x="391" y="81" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Raspberry Pi OS</text>
  <text x="391" y="114" text-anchor="middle" font-size="26" fill="#f85149">🍓</text>
  <text class="f" x="391" y="138" text-anchor="middle" font-size="10" fill="#e6edf3" font-weight="bold">Für den Mini-PC</text>
  <text class="f" x="391" y="154" text-anchor="middle" font-size="9" fill="#8b949e">Raspberry Pi</text>
  <text class="f" x="391" y="168" text-anchor="middle" font-size="9" fill="#8b949e">Basteln &amp; IoT</text>
  <text class="f" x="391" y="185" text-anchor="middle" font-size="11" fill="#f85149">★★★★☆</text>
  <text class="f" x="391" y="200" text-anchor="middle" font-size="8" fill="#6e7681">Maker &amp; Bastler</text>
</g>

<!-- KALI LINUX -->
<g class="c4">
  <rect x="474" y="60" width="152" height="155" rx="10" fill="#0d0d12" stroke="#6e7681" stroke-width="1.5"/>
  <rect x="474" y="60" width="152" height="32" rx="10" fill="#21262d"/>
  <rect x="474" y="78" width="152" height="14" fill="#21262d"/>
  <text class="f" x="550" y="81" text-anchor="middle" font-size="12" fill="#8b949e" font-weight="bold">Kali Linux</text>
  <text x="550" y="114" text-anchor="middle" font-size="26" fill="#6e7681">🔐</text>
  <text class="f" x="550" y="138" text-anchor="middle" font-size="10" fill="#8b949e" font-weight="bold">Für Sicherheitsprofis</text>
  <text class="f" x="550" y="154" text-anchor="middle" font-size="9" fill="#6e7681">Penetration Testing</text>
  <text class="f" x="550" y="168" text-anchor="middle" font-size="9" fill="#6e7681">Hacking-Tools</text>
  <text class="f" x="550" y="183" text-anchor="middle" font-size="10" fill="#f85149">⚠ Erst Grundlagen!</text>
  <text class="f" x="550" y="200" text-anchor="middle" font-size="8" fill="#6e7681">Für Fortgeschrittene</text>
</g>

<text class="f ft" x="320" y="223" text-anchor="middle" font-size="9" fill="#6e7681">In diesem Kurs lernst du Befehle, die auf ALLEN Linux-Varianten funktionieren!</text>
</svg>
