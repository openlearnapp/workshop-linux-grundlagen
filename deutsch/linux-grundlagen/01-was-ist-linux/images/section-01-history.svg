<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210" width="640" height="210">
<style>
  .f { font-family: sans-serif; }
  .fm { font-family: monospace; }
  /* title */
  .ti { animation: tia 9s infinite; }
  @keyframes tia { 0%,4%{opacity:0} 8%,87%{opacity:1} 92%,100%{opacity:0} }
  /* card 1 */
  .c1 { animation: c1a 9s infinite; }
  @keyframes c1a { 0%,8%{opacity:0} 14%,87%{opacity:1} 92%,100%{opacity:0} }
  /* card 2 */
  .c2 { animation: c2a 9s infinite; }
  @keyframes c2a { 0%,30%{opacity:0} 36%,87%{opacity:1} 92%,100%{opacity:0} }
  /* card 3 */
  .c3 { animation: c3a 9s infinite; }
  @keyframes c3a { 0%,52%{opacity:0} 58%,87%{opacity:1} 92%,100%{opacity:0} }
  /* footer */
  .ft { animation: fta 9s infinite; }
  @keyframes fta { 0%,68%{opacity:0} 72%,87%{opacity:1} 92%,100%{opacity:0} }
</style>

<!-- Background -->
<rect width="640" height="210" rx="12" fill="#0d1117"/>

<!-- Top label bar -->
<rect width="640" height="38" rx="12" fill="#161b22"/>
<rect y="26" width="640" height="12" fill="#161b22"/>
<text class="f ti" x="320" y="24" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="bold" letter-spacing="1">Was ist ein Betriebssystem?</text>

<!-- CARD 1: Betriebssystem -->
<g class="c1">
  <rect x="16" y="48" width="190" height="148" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="111" y="82" text-anchor="middle" font-size="32" fill="#58a6ff">💻</text>
  <text class="f" x="111" y="106" text-anchor="middle" font-size="12" fill="#58a6ff" font-weight="bold">Betriebssystem</text>
  <line x1="36" y1="114" x2="186" y2="114" stroke="#58a6ff" stroke-width="0.5" opacity="0.3"/>
  <text class="f" x="111" y="130" text-anchor="middle" font-size="10" fill="#8b949e">Wie Windows oder macOS</text>
  <text class="f" x="111" y="148" text-anchor="middle" font-size="10" fill="#8b949e">Es steuert Hardware</text>
  <text class="f" x="111" y="166" text-anchor="middle" font-size="10" fill="#8b949e">und lässt Programme</text>
  <text class="f" x="111" y="182" text-anchor="middle" font-size="10" fill="#8b949e">miteinander reden</text>
</g>

<!-- CARD 2: Open Source -->
<g class="c2">
  <rect x="224" y="48" width="190" height="148" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="319" y="82" text-anchor="middle" font-size="32" fill="#3fb950">🔓</text>
  <text class="f" x="319" y="106" text-anchor="middle" font-size="12" fill="#3fb950" font-weight="bold">Open Source</text>
  <line x1="244" y1="114" x2="394" y2="114" stroke="#3fb950" stroke-width="0.5" opacity="0.3"/>
  <text class="f" x="319" y="130" text-anchor="middle" font-size="10" fill="#8b949e">Kostenlos — jeder darf</text>
  <text class="f" x="319" y="148" text-anchor="middle" font-size="10" fill="#8b949e">es nutzen, verändern</text>
  <text class="f" x="319" y="166" text-anchor="middle" font-size="10" fill="#8b949e">und weitergeben</text>
  <text class="f" x="319" y="184" text-anchor="middle" font-size="10" fill="#3fb950" font-weight="bold">= Bauplan für alle!</text>
</g>

<!-- CARD 3: Überall -->
<g class="c3">
  <rect x="432" y="48" width="190" height="148" rx="10" fill="#161b22" stroke="#f0883e" stroke-width="2"/>
  <text x="527" y="82" text-anchor="middle" font-size="32" fill="#f0883e">🌍</text>
  <text class="f" x="527" y="106" text-anchor="middle" font-size="12" fill="#f0883e" font-weight="bold">Überall dabei</text>
  <line x1="452" y1="114" x2="602" y2="114" stroke="#f0883e" stroke-width="0.5" opacity="0.3"/>
  <text class="f" x="527" y="130" text-anchor="middle" font-size="10" fill="#8b949e">96% aller Webserver</text>
  <text class="f" x="527" y="148" text-anchor="middle" font-size="10" fill="#8b949e">Android-Handys</text>
  <text class="f" x="527" y="166" text-anchor="middle" font-size="10" fill="#8b949e">Smart-TVs · Autos</text>
  <text class="f" x="527" y="184" text-anchor="middle" font-size="10" fill="#f0883e" font-weight="bold">Raspberry Pi &amp; mehr</text>
</g>

<!-- Footer hint -->
<text class="f ft" x="320" y="204" text-anchor="middle" font-size="9" fill="#6e7681">Linux läuft auf mehr Geräten als jedes andere Betriebssystem der Welt</text>
</svg>
