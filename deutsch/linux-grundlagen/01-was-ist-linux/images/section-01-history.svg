<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <rect width="640" height="160" fill="#0d1117" rx="10" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Title bar -->
  <rect x="1" y="1" width="638" height="28" rx="10" fill="#161b22"/>
  <rect x="1" y="20" width="638" height="9" fill="#161b22"/>
  <circle cx="18" cy="14" r="5" fill="#f85149" opacity="0.8"/>
  <circle cx="34" cy="14" r="5" fill="#f0883e" opacity="0.8"/>
  <circle cx="50" cy="14" r="5" fill="#3fb950" opacity="0.8"/>
  <text x="320" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Geschichte von Linux</text>
  <!-- Timeline -->
  <line x1="100" y1="80" x2="540" y2="80" stroke="#30363d" stroke-width="2"/>
  <!-- 1991 -->
  <circle cx="160" cy="80" r="6" fill="#58a6ff"/>
  <text x="160" y="65" text-anchor="middle" font-family="monospace" font-size="10" fill="#58a6ff" font-weight="bold">1991</text>
  <text x="160" y="105" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">Linus Torvalds</text>
  <text x="160" y="116" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">schreibt Linux</text>
  <!-- Server -->
  <circle cx="300" cy="80" r="6" fill="#3fb950"/>
  <text x="300" y="65" text-anchor="middle" font-family="monospace" font-size="10" fill="#3fb950" font-weight="bold">96%</text>
  <text x="300" y="105" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">aller Server</text>
  <text x="300" y="116" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">laufen Linux</text>
  <!-- Android -->
  <circle cx="440" cy="80" r="6" fill="#f0883e"/>
  <text x="440" y="65" text-anchor="middle" font-family="monospace" font-size="10" fill="#f0883e" font-weight="bold">3 Mrd.</text>
  <text x="440" y="105" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">Android-Geräte</text>
  <text x="440" y="116" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">nutzen Linux</text>
  <!-- Dots on timeline -->
  <circle cx="220" cy="80" r="3" fill="#30363d"/>
  <circle cx="370" cy="80" r="3" fill="#30363d"/>
  <circle cx="500" cy="80" r="3" fill="#30363d"/>
  <!-- Command hint -->
  <text x="320" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff" opacity="0.5">$ uname -r  →  Kernel-Version anzeigen</text>
</svg>
