<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210" width="640" height="210">
<style>
  .f { font-family: sans-serif; }
  .fm { font-family: monospace; }
  .ti { animation: tia 10s infinite; }
  @keyframes tia { 0%,4%{opacity:0} 8%,87%{opacity:1} 92%,100%{opacity:0} }
  .c1 { animation: c1a 10s infinite; }
  @keyframes c1a { 0%,8%{opacity:0} 14%,87%{opacity:1} 92%,100%{opacity:0} }
  .c2 { animation: c2a 10s infinite; }
  @keyframes c2a { 0%,33%{opacity:0} 39%,87%{opacity:1} 92%,100%{opacity:0} }
  .c3 { animation: c3a 10s infinite; }
  @keyframes c3a { 0%,58%{opacity:0} 64%,87%{opacity:1} 92%,100%{opacity:0} }
  .ft { animation: fta 10s infinite; }
  @keyframes fta { 0%,75%{opacity:0} 79%,87%{opacity:1} 92%,100%{opacity:0} }
</style>

<rect width="640" height="210" rx="12" fill="#0d1117"/>
<rect width="640" height="38" rx="12" fill="#161b22"/>
<rect y="26" width="640" height="12" fill="#161b22"/>
<text class="f ti" x="320" y="24" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="bold" letter-spacing="1">3 Wege Linux auszuprobieren</text>

<!-- OPTION 1: Browser (recommended) -->
<g class="c1">
  <rect x="16" y="48" width="190" height="150" rx="10" fill="#0a1f0e" stroke="#3fb950" stroke-width="2.5"/>
  <!-- "Empfohlen" badge -->
  <rect x="52" y="40" width="118" height="18" rx="9" fill="#3fb950"/>
  <text class="f" x="111" y="53" text-anchor="middle" font-size="9" fill="#0d1117" font-weight="bold">★ EMPFOHLEN</text>
  <text x="111" y="88" text-anchor="middle" font-size="34" fill="#3fb950">🌐</text>
  <text class="f" x="111" y="112" text-anchor="middle" font-size="12" fill="#3fb950" font-weight="bold">Im Browser</text>
  <line x1="36" y1="120" x2="186" y2="120" stroke="#3fb950" stroke-width="0.5" opacity="0.3"/>
  <text class="f" x="111" y="137" text-anchor="middle" font-size="10" fill="#8b949e">Geh auf</text>
  <text class="fm" x="111" y="153" text-anchor="middle" font-size="10" fill="#3fb950">webminal.org</text>
  <text class="f" x="111" y="170" text-anchor="middle" font-size="10" fill="#8b949e">Kein Download!</text>
  <text class="f" x="111" y="186" text-anchor="middle" font-size="10" fill="#8b949e">Sofort loslegen ✓</text>
</g>

<!-- OPTION 2: Windows -->
<g class="c2">
  <rect x="224" y="48" width="190" height="150" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="319" y="88" text-anchor="middle" font-size="34" fill="#58a6ff">🪟</text>
  <text class="f" x="319" y="112" text-anchor="middle" font-size="12" fill="#58a6ff" font-weight="bold">Windows → WSL</text>
  <line x1="244" y1="120" x2="394" y2="120" stroke="#58a6ff" stroke-width="0.5" opacity="0.3"/>
  <text class="f" x="319" y="137" text-anchor="middle" font-size="10" fill="#8b949e">PowerShell öffnen</text>
  <text class="f" x="319" y="153" text-anchor="middle" font-size="10" fill="#8b949e">und eingeben:</text>
  <text class="fm" x="319" y="171" text-anchor="middle" font-size="10" fill="#58a6ff">wsl --install</text>
  <text class="f" x="319" y="188" text-anchor="middle" font-size="10" fill="#8b949e">Ubuntu in Windows!</text>
</g>

<!-- OPTION 3: Mac -->
<g class="c3">
  <rect x="432" y="48" width="190" height="150" rx="10" fill="#161b22" stroke="#f0883e" stroke-width="2"/>
  <text x="527" y="88" text-anchor="middle" font-size="34" fill="#f0883e">🍎</text>
  <text class="f" x="527" y="112" text-anchor="middle" font-size="12" fill="#f0883e" font-weight="bold">Mac → Terminal</text>
  <line x1="452" y1="120" x2="602" y2="120" stroke="#f0883e" stroke-width="0.5" opacity="0.3"/>
  <text class="f" x="527" y="137" text-anchor="middle" font-size="10" fill="#8b949e">Finder → Programme</text>
  <text class="f" x="527" y="153" text-anchor="middle" font-size="10" fill="#8b949e">→ Dienstprogramme</text>
  <text class="f" x="527" y="171" text-anchor="middle" font-size="10" fill="#f0883e" font-weight="bold">→ Terminal</text>
  <text class="f" x="527" y="188" text-anchor="middle" font-size="10" fill="#8b949e">Befehle funktionieren!</text>
</g>

<text class="f ft" x="320" y="204" text-anchor="middle" font-size="9" fill="#6e7681">Alle drei Methoden sind kostenlos — kein Risiko, nichts kaputt machen möglich!</text>
</svg>
