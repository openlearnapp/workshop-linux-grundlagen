<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="640" height="160" fill="url(#bg)" rx="8"/>

  <!-- Decorative dots -->
  <circle cx="80" cy="60" r="2" fill="#58a6ff" opacity="0.4"/><circle cx="95" cy="45" r="1.5" fill="#58a6ff" opacity="0.35"/><circle cx="70" cy="100" r="1" fill="#58a6ff" opacity="0.35"/>
  <circle cx="560" cy="60" r="2" fill="#58a6ff" opacity="0.4"/><circle cx="545" cy="100" r="1.5" fill="#58a6ff" opacity="0.35"/><circle cx="570" cy="45" r="1" fill="#58a6ff" opacity="0.35"/>

  <!-- Browser window -->
  <rect x="195" y="15" width="250" height="130" rx="7" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <!-- Browser top bar -->
  <rect x="195" y="15" width="250" height="26" rx="7" fill="#161b22"/>
  <rect x="195" y="29" width="250" height="12" fill="#161b22"/>
  <!-- Traffic light dots -->
  <circle cx="214" cy="28" r="4.5" fill="#f85149" opacity="0.85"/>
  <circle cx="229" cy="28" r="4.5" fill="#f0883e" opacity="0.85"/>
  <circle cx="244" cy="28" r="4.5" fill="#3fb950" opacity="0.85"/>
  <!-- URL bar -->
  <rect x="258" y="21" width="148" height="14" rx="5" fill="#0d1117" opacity="0.7"/>
  <text x="263" y="31.5" font-family="monospace" font-size="7.5" fill="#8b949e">webminal.org</text>

  <!-- Terminal content -->
  <text x="212" y="62" font-family="monospace" font-size="10.5" fill="#3fb950">user@linux:~$</text>
  <text x="212" y="79" font-family="monospace" font-size="10.5" fill="#e6edf3">uname -s</text>
  <text x="212" y="96" font-family="monospace" font-size="10.5" fill="#58a6ff">Linux</text>
  <text x="212" y="113" font-family="monospace" font-size="10.5" fill="#3fb950">user@linux:~$</text>
  <!-- Blinking cursor -->
  <rect x="212" y="118" width="7" height="11" fill="#3fb950" opacity="0.9" rx="1"/>

  <!-- Accent bar -->
  <rect x="180" y="152" width="280" height="4" fill="#58a6ff" opacity="0.8" rx="1.5"/>
</svg>
