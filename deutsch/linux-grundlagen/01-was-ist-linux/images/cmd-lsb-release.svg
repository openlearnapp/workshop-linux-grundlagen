<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180">
<defs><style>
.f{font-family:sans-serif}
.m{font-family:'Courier New',Courier,monospace}
.a1{animation:a1 10s infinite}@keyframes a1{0%,5%{opacity:0}18%,82%{opacity:1}92%,100%{opacity:0}}
.a2{animation:a2 10s infinite}@keyframes a2{0%,28%{opacity:0}40%,82%{opacity:1}92%,100%{opacity:0}}
.a3{animation:a3 10s infinite}@keyframes a3{0%,50%{opacity:0}62%,82%{opacity:1}92%,100%{opacity:0}}
</style></defs>
<!-- Background -->
<rect width="640" height="180" rx="12" fill="#0d1117"/>
<!-- Terminal header bar -->
<rect width="640" height="38" rx="12" fill="#161b22"/>
<rect y="26" width="640" height="12" fill="#161b22"/>
<!-- macOS dots -->
<circle cx="22" cy="19" r="6" fill="#ff5f57"/>
<circle cx="40" cy="19" r="6" fill="#febc2e"/>
<circle cx="58" cy="19" r="6" fill="#28c840"/>
<!-- Terminal label -->
<text x="320" y="24" class="f" font-size="12" fill="#8b949e" text-anchor="middle">Terminal — Distribution</text>
<!-- Command prompt line -->
<text x="22" y="70" class="m a1" font-size="15" fill="#3fb950">❯</text>
<text x="38" y="70" class="m a1" font-size="15" font-weight="bold" fill="#79c0ff">lsb_release -a</text>
<!-- Output line 1 -->
<text x="22" y="96" class="m a2" font-size="14" fill="#ffa657">Distributor ID: Ubuntu</text>
<!-- Output line 2 -->
<text x="22" y="115" class="m a2" font-size="13" fill="#8b949e">Release: 22.04  Codename: jammy</text>
<!-- Divider -->
<rect x="22" y="128" width="596" height="1" fill="#30363d" opacity="0.8"/>
<!-- Explanation -->
<text x="22" y="150" class="f a3" font-size="13" fill="#58a6ff">💡 Zeigt deine Linux-Distribution und Versionsnummer</text>
<text x="22" y="168" class="f a3" font-size="11" fill="#8b949e">LSB = Linux Standard Base Informationen</text>
<!-- Flag badge -->
<rect x="522" y="8" width="104" height="22" rx="11" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
<text x="574" y="23" class="f" font-size="11" fill="#8b949e" text-anchor="middle">-a = all</text>
</svg>
