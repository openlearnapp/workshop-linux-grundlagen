<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 120">
<defs><style>
.f{font-family:sans-serif}
.m{font-family:'Courier New',Courier,monospace}
.a1{animation:a1 10s infinite}@keyframes a1{0%,5%{opacity:0}18%,82%{opacity:1}92%,100%{opacity:0}}
.a2{animation:a2 10s infinite}@keyframes a2{0%,28%{opacity:0}40%,82%{opacity:1}92%,100%{opacity:0}}
.a3{animation:a3 10s infinite}@keyframes a3{0%,50%{opacity:0}62%,82%{opacity:1}92%,100%{opacity:0}}
</style></defs>
<rect width="640" height="120" rx="10" fill="#0d1117"/>
<rect width="640" height="28" rx="10" fill="#161b22"/>
<rect y="18" width="640" height="10" fill="#161b22"/>
<circle cx="18" cy="14" r="4.5" fill="#ff5f57"/>
<circle cx="33" cy="14" r="4.5" fill="#febc2e"/>
<circle cx="48" cy="14" r="4.5" fill="#28c840"/>
<text x="320" y="19" class="f" font-size="11" fill="#8b949e" text-anchor="middle">Home-Verzeichnis</text>
<text x="18" y="48" class="m a1" font-size="13" fill="#3fb950">❯</text>
<text x="31" y="48" class="m a1" font-size="13" font-weight="bold" fill="#79c0ff">echo $HOME</text>
<text x="18" y="67" class="m a2" font-size="12" fill="#ffa657">/home/alice</text>
<text x="18" y="83" class="f a2" font-size="11" fill="#8b949e">(~ ist die Kurzform für $HOME)</text>
<rect x="18" y="92" width="604" height="1" fill="#30363d"/>
<text x="18" y="109" class="f a3" font-size="12" fill="#58a6ff">💡 Zeigt den Pfad zu deinem persönlichen Ordner</text>
<rect x="536" y="5" width="90" height="18" rx="9" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
<text x="581" y="18" class="f" font-size="10" fill="#8b949e" text-anchor="middle">$HOME = ~</text>
</svg>
