<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 120">
<defs><style>
.f{font-family:sans-serif}
.m{font-family:monospace}
.ani{animation:fa 10s infinite}@keyframes fa{0%,5%{opacity:0}20%,80%{opacity:1}95%,100%{opacity:0}}
</style></defs>
<!-- Background -->
<rect width="640" height="120" rx="10" fill="#0d1117"/>
<!-- Left accent bar -->
<rect width="5" height="120" rx="2" fill="#3fb950"/>
<!-- Icon box (left) -->
<rect x="12" y="10" width="74" height="100" rx="8" fill="#0a1a0d"/>
<text x="49" y="62" class="f" font-size="30" text-anchor="middle">🔍</text>
<!-- Command + description (middle) -->
<text x="100" y="38" class="m ani" font-size="18" font-weight="bold" fill="#e6edf3">uname -s</text>
<text x="100" y="60" class="f ani" font-size="12" fill="#8b949e">Betriebssystem-Name anzeigen</text>
<text x="100" y="78" class="f ani" font-size="12" fill="#8b949e">Linux, Darwin (macOS), Windows</text>
<text x="100" y="99" class="f ani" font-size="11" fill="#3fb950" font-weight="bold">-s = system name</text>
<!-- Output box (right) -->
<rect x="400" y="10" width="228" height="100" rx="8" fill="#0a1a0d" stroke="#3fb950" stroke-width="1.5"/>
<text x="414" y="32" class="f" font-size="11" fill="#3fb950" font-weight="bold">Ausgabe:</text>
<text x="414" y="55" class="m ani" font-size="12" fill="#e6edf3">Linux</text>
<text x="414" y="72" class="m ani" font-size="12" fill="#e6edf3">(bei macOS: Darwin)</text>
<text x="414" y="91" class="f ani" font-size="11" fill="#8b949e">OS-Erkennung</text>
</svg>
