<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="640" height="160" fill="url(#bg)" rx="8"/>
  <!-- Decorative dots -->
  <circle cx="80" cy="50" r="2" fill="#58a6ff" opacity="0.3"/>
  <circle cx="560" cy="50" r="2" fill="#58a6ff" opacity="0.3"/>
  <circle cx="95" cy="110" r="1.5" fill="#3fb950" opacity="0.25"/>
  <circle cx="545" cy="110" r="1.5" fill="#f0883e" opacity="0.25"/>

  <!-- Root / -->
  <rect x="295" y="10" width="50" height="22" rx="4" fill="#21262d" stroke="#58a6ff" stroke-width="2"/>
  <text x="315" y="26" font-family="monospace" font-size="14" fill="#58a6ff" text-anchor="middle">/</text>

  <!-- Branches from root -->
  <line x1="270" y1="32" x2="200" y2="52" stroke="#30363d" stroke-width="1.5"/>
  <line x1="300" y1="32" x2="270" y2="52" stroke="#30363d" stroke-width="1.5"/>
  <line x1="320" y1="32" x2="320" y2="52" stroke="#30363d" stroke-width="1.5"/>
  <line x1="340" y1="32" x2="370" y2="52" stroke="#30363d" stroke-width="1.5"/>
  <line x1="370" y1="32" x2="440" y2="52" stroke="#30363d" stroke-width="1.5"/>

  <!-- /bin -->
  <rect x="178" y="52" width="44" height="20" rx="3" fill="#21262d" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="186" y="66" font-family="monospace" font-size="10" fill="#bc8cff">bin</text>

  <!-- /etc -->
  <rect x="248" y="52" width="44" height="20" rx="3" fill="#21262d" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="258" y="66" font-family="monospace" font-size="10" fill="#58a6ff">etc</text>

  <!-- /home -->
  <rect x="298" y="52" width="50" height="20" rx="3" fill="#21262d" stroke="#3fb950" stroke-width="2"/>
  <text x="305" y="66" font-family="monospace" font-size="10" fill="#3fb950" font-weight="bold">home</text>

  <!-- /var -->
  <rect x="353" y="52" width="44" height="20" rx="3" fill="#21262d" stroke="#f0883e" stroke-width="1.5"/>
  <text x="363" y="66" font-family="monospace" font-size="10" fill="#f0883e">var</text>

  <!-- /tmp -->
  <rect x="418" y="52" width="44" height="20" rx="3" fill="#21262d" stroke="#8b949e" stroke-width="1"/>
  <text x="428" y="66" font-family="monospace" font-size="10" fill="#8b949e">tmp</text>

  <!-- Sub-branches from /home -->
  <line x1="315" y1="72" x2="280" y2="92" stroke="#3fb950" stroke-width="1" opacity="0.6"/>
  <line x1="328" y1="72" x2="360" y2="92" stroke="#3fb950" stroke-width="1" opacity="0.6"/>

  <!-- /home/user -->
  <rect x="254" y="92" width="54" height="18" rx="3" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="261" y="105" font-family="monospace" font-size="9" fill="#3fb950">user</text>

  <!-- /home/reza -->
  <rect x="336" y="92" width="52" height="18" rx="3" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="343" y="105" font-family="monospace" font-size="9" fill="#3fb950">reza</text>

  <!-- Sub-branches from /home/user -->
  <line x1="272" y1="110" x2="248" y2="125" stroke="#30363d" stroke-width="1" opacity="0.5"/>
  <line x1="288" y1="110" x2="310" y2="125" stroke="#30363d" stroke-width="1" opacity="0.5"/>

  <!-- Files under user -->
  <rect x="226" y="125" width="48" height="15" rx="2" fill="#161b22" stroke="#8b949e" stroke-width="0.8" opacity="0.7"/>
  <text x="232" y="136" font-family="monospace" font-size="7" fill="#8b949e">Docs/</text>
  <rect x="290" y="125" width="48" height="15" rx="2" fill="#161b22" stroke="#8b949e" stroke-width="0.8" opacity="0.7"/>
  <text x="296" y="136" font-family="monospace" font-size="7" fill="#8b949e">.bashrc</text>

  <!-- Accent bar -->
  <rect x="180" y="152" width="280" height="4" fill="#58a6ff" opacity="0.7" rx="1.5"/>
</svg>
