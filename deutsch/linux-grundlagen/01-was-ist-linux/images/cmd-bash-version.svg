<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 120">
<defs><style>
.f{font-family:sans-serif}
.m{font-family:monospace}
.ani{animation:fa 10s infinite}@keyframes fa{0%,5%{opacity:0}20%,80%{opacity:1}95%,100%{opacity:0}}
</style></defs>
<!-- Background -->
<rect width="640" height="120" rx="10" fill="#0d1117"/>
<!-- Left accent bar -->
<rect width="5" height="120" rx="2" fill="#58a6ff"/>
<!-- Icon box (left) -->
<rect x="12" y="10" width="74" height="100" rx="8" fill="#0a1520"/>
<text x="49" y="62" class="f" font-size="30" text-anchor="middle">💻</text>
<!-- Command + description (middle) -->
<text x="100" y="38" class="m ani" font-size="16" font-weight="bold" fill="#e6edf3">bash --version</text>
<text x="100" y="60" class="f ani" font-size="12" fill="#8b949e">Bash-Shell-Version anzeigen</text>
<text x="100" y="78" class="f ani" font-size="12" fill="#8b949e">Bash versteht deine Befehle</text>
<text x="100" y="99" class="f ani" font-size="11" fill="#58a6ff" font-weight="bold">--version = Versionsnummer</text>
<!-- Output box (right) -->
<rect x="400" y="10" width="228" height="100" rx="8" fill="#0a1520" stroke="#58a6ff" stroke-width="1.5"/>
<text x="414" y="32" class="f" font-size="11" fill="#58a6ff" font-weight="bold">Ausgabe:</text>
<text x="414" y="55" class="m ani" font-size="12" fill="#e6edf3">GNU bash, version 5.1.16</text>
<text x="414" y="72" class="m ani" font-size="12" fill="#e6edf3">(x86_64-pc-linux-gnu)</text>
<text x="414" y="91" class="f ani" font-size="11" fill="#8b949e">Deine Shell-Version</text>
</svg>
