name: PR Preview Link

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Post preview link
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref
            const repo = context.repo.repo
            const owner = context.repo.owner

            const previewUrl = `https://open-learn.app/#/add?source=https://cdn.jsdelivr.net/gh/${owner}/${repo}@${branch}/index.yaml`
            const landingUrl = `https://cdn.jsdelivr.net/gh/${owner}/${repo}@${branch}/index.html`

            const body = [
              '## 🔍 Preview',
              '',
              '**Workshop in Open Learn testen** (ohne Merge):',
              '',
              `👉 [Workshop starten (PR-Version)](${previewUrl})`,
              '',
              '> Öffnet Open Learn mit den Inhalten aus diesem PR-Branch.',
              '> jsDelivr CDN — kann bis zu 5 Minuten zum Aktualisieren brauchen.',
            ].join('\n')

            // Find existing preview comment to update instead of duplicating
            const comments = await github.rest.issues.listComments({
              owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            })

            const existing = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('## 🔍 Preview')
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              })
            }
