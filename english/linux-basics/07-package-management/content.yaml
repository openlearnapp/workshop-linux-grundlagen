version: 1
number: 7
title: "Package Management"
description: "apt, snap and dpkg — install, update and manage software under Ubuntu/Debian"
sections:
  - title: "apt — the command line app store"
    explanation: |
      **Why does this matter?** On Linux you don't install software by downloading .exe files,
      but through **package managers**. These fetch programs from trusted sources, resolve
      dependencies, and keep everything up to date.

      The most important package manager for Ubuntu/Debian: **apt** (Advanced Package Tool).

      **The standard workflow:**
      ```bash
      sudo apt update           # 1. Update package list
      sudo apt upgrade          # 2. Upgrade all packages
      sudo apt install nginx    # 3. Install a package
      ```

      **Important:** `update` only refreshes the *list* of available packages,
      not the packages themselves. `upgrade` then updates the actual programs.
    examples:
      - q: "sudo apt update"
        a: "Fetches the latest package lists from all sources — always run this first"
        rel:
          - ["en-apt-cmd", "Advanced Package Tool — package management for Debian/Ubuntu", "apt command"]
          - ["en-apt-update", "Update package lists from servers (not the packages themselves)", "apt update"]
      - q: "sudo apt upgrade"
        a: "Updates all installed packages to the latest version"
        rel:
          - ["en-apt-upgrade", "Update all installed packages to latest version", "apt upgrade"]
      - q: "sudo apt install git curl wget"
        a: "Install three packages at once — apt accepts multiple package names"
        rel:
          - ["en-apt-install", "Install package(s)", "apt install"]
      - q: "sudo apt update && sudo apt upgrade -y"
        a: "Complete update in one command — -y answers all prompts automatically with yes"
        rel:
          - ["en-apt-y", "Yes — automatically confirm all prompts", "flag -y"]

  - title: "Searching, removing and cleaning up packages"
    explanation: |
      `apt` can also search for packages and remove software no longer needed.

      | Command | Effect |
      |---------|--------|
      | `apt search nginx` | Search for packages |
      | `apt show nginx` | Show package details |
      | `apt remove nginx` | Remove package (config remains) |
      | `apt purge nginx` | Remove package + configuration completely |
      | `apt autoremove` | Remove unused dependencies |
      | `apt list --installed` | Show all installed packages |

      **After cleaning up**, run `sudo apt autoremove` — it removes packages that
      were automatically installed but are no longer needed.
    examples:
      - q: "apt search \"text editor\""
        a: "Search for packages with 'text editor' in name or description"
        rel:
          - ["en-apt-search", "Search in package database", "apt search"]
      - q: "apt show nodejs"
        a: "Shows details about nodejs: version, dependencies, description, size"
        rel:
          - ["en-apt-show", "Show detailed information about a package", "apt show"]
      - q: "sudo apt remove --purge apache2"
        a: "Remove Apache2 completely including all configuration files"
        rel:
          - ["en-apt-purge", "Remove package and all configuration files completely", "apt purge / --purge"]
      - q: "sudo apt autoremove && sudo apt clean"
        a: "Remove orphaned packages and clear package cache — frees disk space"
        rel:
          - ["en-apt-autoremove", "Remove automatically installed, no longer needed packages", "apt autoremove"]
          - ["en-apt-clean", "Delete downloaded package files from cache", "apt clean"]

  - title: "dpkg and snap — alternative installation methods"
    explanation: |
      Sometimes a program isn't in the apt repository — then there are other ways:

      **dpkg** installs `.deb` files directly (like an installer, but for Linux):
      ```bash
      sudo dpkg -i google-chrome.deb
      sudo apt install -f    # install missing dependencies afterward
      ```

      **snap** is a newer packaging system from Canonical (Ubuntu):
      - Packages run in isolation (sandboxed)
      - Automatic updates
      - Slightly slower startup than regular apt packages

      **curl + install script** — many programs use this approach:
      ```bash
      curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
      sudo apt install nodejs
      ```
    examples:
      - q: "sudo dpkg -i vscode.deb"
        a: "Installs a locally downloaded .deb file directly"
        rel:
          - ["en-dpkg-cmd", "Debian Package — directly manage .deb files", "dpkg command"]
          - ["en-dpkg-i", "Install — install a .deb file", "flag -i"]
      - q: "dpkg -l | grep \"^ii\""
        a: "List all properly installed packages (ii = installed properly)"
        rel:
          - ["en-dpkg-l", "List — all known packages and their status", "dpkg -l"]
      - q: "snap install code --classic"
        a: "Install Visual Studio Code via snap — --classic allows full system access"
        rel:
          - ["en-snap-cmd", "Snap package system — isolated, auto-updating apps", "snap command"]
          - ["en-snap-classic", "Classic confinement — full system access for IDE-type programs", "flag --classic"]

  - title: "🖥️ Terminal Check"
    explanation: |
      Test your knowledge — type the commands yourself!
    examples:
      - q: "Which command updates the package lists under Ubuntu/Debian?"
        type: input
        a: "sudo apt update"
      - q: "What is the difference between 'apt update' and 'apt upgrade'?"
        type: select
        options:
          - "update fetches new package lists, upgrade updates the packages themselves"
          - "update installs packages, upgrade removes old ones"
          - "update and upgrade do the same thing"
          - "upgrade fetches new package lists, update updates the packages"
        a: "update fetches new package lists, upgrade updates the packages themselves"
      - q: "Which command removes a package including its configuration files?"
        type: select
        options:
          - "sudo apt purge nginx"
          - "sudo apt remove nginx"
          - "sudo apt delete nginx"
          - "sudo apt uninstall nginx"
        a: "sudo apt purge nginx"
      - q: "Which of these statements about apt are true?"
        type: multiple-choice
        options:
          - "apt can install multiple packages at once"
          - "apt autoremove removes no-longer-needed packages"
          - "apt search searches the package database"
          - "apt requires no administrator rights"
        a:
          - "apt can install multiple packages at once"
          - "apt autoremove removes no-longer-needed packages"
          - "apt search searches the package database"
