version: 2
number: 7
title: "Package Management"
description: "apt, snap and dpkg — install, update and manage software under Ubuntu/Debian"
image: "images/lesson-header.svg"
image_caption: "Package boxes with apt, dnf and snap labels"
sections:
  - title: "apt — Linux's app store"
    image: "images/section-01-apt.svg"
    explanation: |
      Imagine: You have a new phone.
      You go to the app store, search for an app and tap "Install".
      Done!

      Linux has exactly that too — just through the terminal.
      The program is called **apt** (pronounced: "apt").

      Before installing anything, you tell Linux:
      "Check what's new!"
      ```
      sudo apt update
      ```

      Then you install a program — for example the Firefox browser:
      ```
      sudo apt install firefox
      ```

      Step by step:
      - `sudo` — "I'm the boss here, I'm allowed to do this"
      - `apt install` — "Please install..."
      - `firefox` — "...this program"

      And if you want to bring all programs up to date:
      ```
      sudo apt upgrade
      ```

      Remember: `apt update` only fetches the **list** of new versions.
      `apt upgrade` then actually installs the updates.
    examples:
      - q: "sudo apt update"
        a: "Fetches the current list of all available programs — like looking at the app store"
        rel:
          - ["en-apt-cmd", "Advanced Package Tool — package management for Debian/Ubuntu", "apt command"]
          - ["en-apt-update", "Update package lists from servers (not the packages themselves)", "apt update"]
        labels: ["Config"]
      - q: "sudo apt upgrade"
        a: "Updates all installed programs to the latest version"
        rel:
          - ["en-apt-upgrade", "Update all installed packages to latest version", "apt upgrade"]
        labels: ["Config"]
      - q: "sudo apt install git curl wget"
        a: "Installs three programs at once — just write all names in a row"
        rel:
          - ["en-apt-install", "Install package(s)", "apt install"]
        labels: ["Config"]
      - q: "sudo apt update && sudo apt upgrade -y"
        a: "Update and upgrade in one step — -y automatically says Yes to all questions"
        rel:
          - ["en-apt-y", "Yes — automatically confirm all prompts", "flag -y"]
        labels: ["Config"]

  - title: "Searching, removing and cleaning up"
    image: "images/section-02-search-remove.svg"
    explanation: |
      Not sure what a program is called exactly?
      No problem — you can search for it:
      ```
      apt search "text editor"
      ```

      That's like the search function in the app store.
      Linux shows you all programs that match your search.

      If you no longer need a program, you can remove it:
      ```
      sudo apt remove firefox
      ```

      Or delete it completely (including all settings):
      ```
      sudo apt purge firefox
      ```

      And after cleaning up, delete old unnecessary leftovers:
      ```
      sudo apt autoremove
      ```

      It's like "clear storage" on your phone —
      programs that nobody needs anymore are removed.
    examples:
      - q: "apt search \"text editor\""
        a: "Searches for programs with 'text editor' in the name — like the search in the app store"
        rel:
          - ["en-apt-search", "Search in package database", "apt search"]
        labels: ["Config"]
      - q: "apt show nodejs"
        a: "Shows details about nodejs: version, size, description — before you install it"
        rel:
          - ["en-apt-show", "Show detailed information about a package", "apt show"]
        labels: ["Config"]
      - q: "sudo apt remove --purge apache2"
        a: "Removes Apache2 completely — all settings are deleted too"
        rel:
          - ["en-apt-purge", "Remove package and all configuration files completely", "apt purge / --purge"]
        labels: ["Config"]
      - q: "sudo apt autoremove && sudo apt clean"
        a: "Remove old clutter and free up space — like spring cleaning for Linux"
        rel:
          - ["en-apt-autoremove", "Remove automatically installed, no longer needed packages", "apt autoremove"]
          - ["en-apt-clean", "Delete downloaded package files from cache", "apt clean"]
        labels: ["Config"]

  - title: "dpkg and snap — other ways to install"
    image: "images/section-03-dpkg-snap.svg"
    explanation: |
      Sometimes a program isn't in Linux's normal app store.
      Then there are other ways:

      **Way 1: Install a .deb file directly**
      A `.deb` file (pronounced "deb") is like an installer file for Linux.
      The tool for this is called **dpkg** (pronounced "dee-pee-kay-gee").
      ```
      sudo dpkg -i google-chrome.deb
      ```
      The `-i` stands for "install".

      **Way 2: snap**
      **Snap** is a more modern system — programs run extra safely,
      separated from the rest of the system, like in a little box.
      ```
      snap install vlc
      ```

      **Way 3: Installation script**
      Many professional programs have their own installation helper:
      ```
      curl -fsSL https://get.docker.com | sudo sh
      ```
      This downloads the helper and runs it immediately.
    examples:
      - q: "sudo dpkg -i vscode.deb"
        a: "Installs a downloaded .deb file directly — like opening an installer file"
        rel:
          - ["en-dpkg-cmd", "Debian Package — directly manage .deb files", "dpkg command"]
          - ["en-dpkg-i", "Install — install a .deb file", "flag -i"]
        labels: ["Config"]
      - q: "dpkg -l | grep \"^ii\""
        a: "Shows all correctly installed programs — ii means 'correctly installed'"
        rel:
          - ["en-dpkg-l", "List — all known packages and their status", "dpkg -l"]
        labels: ["Config"]
      - q: "snap install code --classic"
        a: "Install Visual Studio Code via snap — --classic gives the program more permissions"
        rel:
          - ["en-snap-cmd", "Snap package system — isolated, auto-updating apps", "snap command"]
          - ["en-snap-classic", "Classic confinement — full system access for IDE-type programs", "flag --classic"]
        labels: ["Config"]
      - q: "snap list"
        a: "Shows all programs that were installed via snap"
        rel:
          - ["en-snap-list", "List all installed snap packages", "snap list"]
        labels: ["Config"]

  - title: "Terminal Check"
    image: "images/section-04-check.svg"
    explanation: |
      Test your knowledge — type the commands directly!
    examples:
      - q: "Which command updates the program list under Ubuntu?"
        type: input
        a: "sudo apt update"
        labels: ["Config"]
      - q: "What is the difference between 'apt update' and 'apt upgrade'?"
        type: select
        options:
          - text: "update fetches new program lists, upgrade actually installs the updates"
            correct: true
          - text: "update installs programs, upgrade removes old ones"
          - text: "update and upgrade do the same thing"
          - text: "upgrade fetches new program lists, update installs the updates"
        labels: ["Config"]
      - q: "Which command removes a program including all its settings?"
        type: select
        options:
          - text: "sudo apt purge nginx"
            correct: true
          - text: "sudo apt remove nginx"
          - text: "sudo apt delete nginx"
          - text: "sudo apt uninstall nginx"
        labels: ["Config"]
      - q: "Which of these statements about apt are true?"
        type: multiple-choice
        options:
          - text: "apt can install multiple programs at once"
            correct: true
          - text: "apt autoremove removes no-longer-needed programs"
            correct: true
          - text: "apt search searches the program database"
            correct: true
          - text: "apt requires no administrator rights"
        labels: ["Config"]
