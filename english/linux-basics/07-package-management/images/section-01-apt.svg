<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230">
  <defs>
    <style>
      .f{font-family:sans-serif}
      .ti{animation:tia 11s infinite}@keyframes tia{0%,3%{opacity:0}7%,87%{opacity:1}92%,100%{opacity:0}}
      .c1{animation:c1a 11s infinite}@keyframes c1a{0%,12%{opacity:0}18%,87%{opacity:1}92%,100%{opacity:0}}
      .c2{animation:c2a 11s infinite}@keyframes c2a{0%,30%{opacity:0}36%,87%{opacity:1}92%,100%{opacity:0}}
      .c3{animation:c3a 11s infinite}@keyframes c3a{0%,48%{opacity:0}54%,87%{opacity:1}92%,100%{opacity:0}}
      .c4{animation:c4a 11s infinite}@keyframes c4a{0%,65%{opacity:0}71%,87%{opacity:1}92%,100%{opacity:0}}
      .ft{animation:fta 11s infinite}@keyframes fta{0%,78%{opacity:0}82%,87%{opacity:1}92%,100%{opacity:0}}
    </style>
  </defs>
  <rect width="640" height="230" rx="12" fill="#0d1117"/>
  <rect width="640" height="44" rx="12" fill="#161b22"/>
  <rect y="32" width="640" height="12" fill="#161b22"/>
  <g class="ti">
    <text x="320" y="28" class="f" font-size="14" fill="#e6edf3" text-anchor="middle" font-weight="bold">apt — the App Store of Linux</text>
  </g>
  <g class="c1">
    <rect x="12" y="52" width="145" height="116" rx="8" fill="#0a1a0d"/>
    <rect x="12" y="52" width="145" height="4" rx="2" fill="#3fb950"/>
    <text x="84" y="84" class="f" font-size="24" text-anchor="middle">📦</text>
    <text x="84" y="106" class="f" font-size="13" fill="#3fb950" text-anchor="middle" font-weight="bold">apt install</text>
    <text x="84" y="124" class="f" font-size="11" fill="#8b949e" text-anchor="middle">Install a program</text>
  </g>
  <g class="c2">
    <rect x="169" y="52" width="145" height="116" rx="8" fill="#0d1520"/>
    <rect x="169" y="52" width="145" height="4" rx="2" fill="#58a6ff"/>
    <text x="241" y="84" class="f" font-size="24" text-anchor="middle">🔄</text>
    <text x="241" y="106" class="f" font-size="13" fill="#58a6ff" text-anchor="middle" font-weight="bold">apt update</text>
    <text x="241" y="124" class="f" font-size="11" fill="#8b949e" text-anchor="middle">Update package list</text>
  </g>
  <g class="c3">
    <rect x="326" y="52" width="145" height="116" rx="8" fill="#1a0f08"/>
    <rect x="326" y="52" width="145" height="4" rx="2" fill="#f0883e"/>
    <text x="398" y="84" class="f" font-size="24" text-anchor="middle">⬆️</text>
    <text x="398" y="106" class="f" font-size="13" fill="#f0883e" text-anchor="middle" font-weight="bold">apt upgrade</text>
    <text x="398" y="124" class="f" font-size="11" fill="#8b949e" text-anchor="middle">Update all programs</text>
  </g>
  <g class="c4">
    <rect x="483" y="52" width="145" height="116" rx="8" fill="#180a0a"/>
    <rect x="483" y="52" width="145" height="4" rx="2" fill="#f85149"/>
    <text x="555" y="84" class="f" font-size="24" text-anchor="middle">🗑️</text>
    <text x="555" y="106" class="f" font-size="13" fill="#f85149" text-anchor="middle" font-weight="bold">apt remove</text>
    <text x="555" y="124" class="f" font-size="11" fill="#8b949e" text-anchor="middle">Remove a program</text>
  </g>
  <g class="ft">
    <rect x="12" y="182" width="616" height="34" rx="8" fill="#161b22"/>
    <text x="320" y="204" class="f" font-size="12" fill="#8b949e" text-anchor="middle">Always run 'apt update' before 'apt install'!</text>
  </g>
</svg>
