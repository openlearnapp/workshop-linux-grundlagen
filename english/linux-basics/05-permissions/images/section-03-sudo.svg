<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210">
  <defs><style>
    .f{font-family:sans-serif;}
    .ti{animation:tia 11s infinite}@keyframes tia{0%,3%{opacity:0}7%,87%{opacity:1}92%,100%{opacity:0}}
    .c1{animation:c1a 11s infinite}@keyframes c1a{0%,12%{opacity:0}18%,87%{opacity:1}92%,100%{opacity:0}}
    .c2{animation:c2a 11s infinite}@keyframes c2a{0%,30%{opacity:0}36%,87%{opacity:1}92%,100%{opacity:0}}
    .c3{animation:c3a 11s infinite}@keyframes c3a{0%,48%{opacity:0}54%,87%{opacity:1}92%,100%{opacity:0}}
    .ft{animation:fta 11s infinite}@keyframes fta{0%,78%{opacity:0}82%,87%{opacity:1}92%,100%{opacity:0}}
  </style></defs>
  <rect width="640" height="210" rx="12" fill="#0d1117"/>
  <rect width="640" height="40" rx="12" fill="#161b22"/>
  <rect y="28" width="640" height="12" fill="#161b22"/>
  <g class="ti">
    <text x="320" y="24" class="f" font-size="13" font-weight="bold" fill="#e6edf3" text-anchor="middle">sudo and chown — super rights and ownership</text>
  </g>
  <g class="c1">
    <rect x="20" y="46" width="185" height="148" rx="8" fill="#110d1a" stroke="#bc8cff" stroke-width="1"/>
    <text x="112" y="95" class="f" font-size="28" text-anchor="middle">👑</text>
    <text x="112" y="117" class="f" font-size="12" font-weight="bold" fill="#bc8cff" text-anchor="middle">sudo</text>
    <text x="112" y="135" class="f" font-size="10" fill="#8b949e" text-anchor="middle">Execute as</text>
    <text x="112" y="151" class="f" font-size="10" fill="#8b949e" text-anchor="middle">administrator</text>
  </g>
  <g class="c2">
    <rect x="227" y="46" width="185" height="148" rx="8" fill="#1a0f08" stroke="#f0883e" stroke-width="1"/>
    <text x="319" y="95" class="f" font-size="28" text-anchor="middle">🔄</text>
    <text x="319" y="117" class="f" font-size="12" font-weight="bold" fill="#f0883e" text-anchor="middle">su -</text>
    <text x="319" y="135" class="f" font-size="10" fill="#8b949e" text-anchor="middle">Switch to</text>
    <text x="319" y="151" class="f" font-size="10" fill="#8b949e" text-anchor="middle">admin user</text>
  </g>
  <g class="c3">
    <rect x="434" y="46" width="185" height="148" rx="8" fill="#0d1520" stroke="#58a6ff" stroke-width="1"/>
    <text x="526" y="95" class="f" font-size="28" text-anchor="middle">👤</text>
    <text x="526" y="117" class="f" font-size="12" font-weight="bold" fill="#58a6ff" text-anchor="middle">chown</text>
    <text x="526" y="135" class="f" font-size="10" fill="#8b949e" text-anchor="middle">Change file</text>
    <text x="526" y="151" class="f" font-size="10" fill="#8b949e" text-anchor="middle">owner</text>
  </g>
  <g class="ft">
    <text x="320" y="204" class="f" font-size="10" fill="#6e7681" text-anchor="middle">sudo = superuser do — only use when really necessary!</text>
  </g>
</svg>
