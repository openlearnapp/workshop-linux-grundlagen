version: 2
number: 3
title: "Files & Directories"
description: "touch, mkdir, cp, mv and rm — create, move and delete files and directories"
image: "images/lesson-header.svg"
sections:
  - title: "Creating — touch and mkdir"
    explanation: |
      **Why does this matter?** Everything in Linux starts with files and directories.
      Setting up projects, writing scripts, creating configs — you need these commands daily.

      `touch` creates an empty file (or updates the timestamp of an existing one):
      ```
      touch notes.txt
      touch index.html style.css script.js   # multiple at once!
      ```

      `mkdir` creates a directory:
      ```
      mkdir projects
      mkdir -p projects/website/assets      # entire paths at once!
      ```

      The `-p` flag with `mkdir` is especially useful: it creates all missing
      intermediate directories and doesn't error if the directory already exists.
    examples:
      - q: "touch README.md"
        a: "Creates an empty README.md file in the current directory"
        rel:
          - ["en-touch-cmd", "Create empty file or update timestamp", "touch command"]
        labels: ["Filesystem"]
      - q: "touch index.html style.css app.js"
        a: "Creates three files at once — touch accepts multiple arguments"
        rel:
          - ["en-touch-multiple", "Create multiple files simultaneously with touch", "touch file1 file2"]
        labels: ["Filesystem"]
      - q: "mkdir -p ~/projects/my-website/assets/img"
        a: "Creates the entire directory tree at once, no errors for existing directories"
        rel:
          - ["en-mkdir-cmd", "Make Directory — create a directory", "mkdir command"]
          - ["en-mkdir-p", "Parents — automatically create all intermediate directories", "flag -p"]
        labels: ["Filesystem"]

  - title: "Copying and moving — cp and mv"
    explanation: |
      `cp` copies files or directories, `mv` moves (or renames) them.

      | Command | Effect |
      |---------|--------|
      | `cp file.txt backup.txt` | Copy with new name |
      | `cp file.txt /tmp/` | Copy to different directory |
      | `cp -r folder/ folder_backup/` | Copy folder recursively |
      | `mv old.txt new.txt` | Rename |
      | `mv file.txt /home/alice/` | Move |
      | `mv *.log /var/archive/` | Move multiple files |

      **Key difference:** `cp` keeps the original, `mv` removes it.
      For directories, `cp` requires the `-r` flag (recursive).
    examples:
      - q: "cp ~/.bashrc ~/.bashrc.backup"
        a: "Create a backup of the bash config — always smart before making changes!"
        rel:
          - ["en-cp-cmd", "Copy — copy files and directories", "cp command"]
          - ["en-bashrc", "Bash configuration file for aliases, variables etc.", "~/.bashrc"]
        labels: ["Filesystem"]
      - q: "cp -r /etc/nginx/ ~/nginx-backup/"
        a: "Copy entire Nginx configuration as backup to home directory"
        rel:
          - ["en-cp-r", "Recursive — copy directories including contents", "flag -r"]
        labels: ["Filesystem", "Config"]
      - q: "mv draft.txt final.txt"
        a: "Rename a file — mv without a path simply renames"
        rel:
          - ["en-mv-cmd", "Move — move or rename files", "mv command"]
        labels: ["Filesystem"]
      - q: "mv ~/Downloads/*.pdf ~/Documents/PDFs/"
        a: "Move all PDF files from Downloads to the PDFs folder"
        rel:
          - ["en-glob-star", "Wildcard * matches any characters", "Wildcard *"]
        labels: ["Filesystem"]

  - title: "Deleting — rm and rmdir"
    explanation: |
      ⚠️ **Warning: Linux has no recycle bin!**
      What's deleted with `rm` is **immediately and permanently** gone.

      | Command | Effect |
      |---------|--------|
      | `rm file.txt` | Delete a file |
      | `rm -i file.txt` | Ask before deleting (`-i` = interactive) |
      | `rm *.tmp` | Delete all .tmp files |
      | `rmdir empty-folder/` | Delete an empty directory |
      | `rm -r folder/` | Delete folder with contents |

      ⚠️ **The most dangerous command in Linux:**
      ```
      rm -rf /    # Deletes EVERYTHING on the system — NEVER run this!
      rm -rf /*   # Just as dangerous
      ```
      The `-f` flag (force) suppresses all confirmation prompts. Combined with `-r`
      (recursive) and a wide path: complete catastrophe.

      **Safe alternative:** First use `ls` to check what you're about to delete.
    examples:
      - q: "rm -i important-file.txt"
        a: "Deletes the file but asks for confirmation first — recommended for important files"
        rel:
          - ["en-rm-cmd", "Remove — delete files (no recycle bin!)", "rm command"]
          - ["en-rm-i", "Interactive — ask before deleting", "flag -i"]
        labels: ["Filesystem"]
      - q: "rm -r ~/projects/old-project/"
        a: "Deletes the old-project folder and all its contents"
        rel:
          - ["en-rm-r", "Recursive — delete directories and their contents", "flag -r"]
        labels: ["Filesystem"]
      - q: "rmdir empty-folder/"
        a: "Only deletes empty directories — safer than rm -r, errors on non-empty folder"
        rel:
          - ["en-rmdir-cmd", "Remove Directory — only delete empty directories", "rmdir command"]
        labels: ["Filesystem"]
      - q: "ls *.log && rm *.log"
        a: "First show all .log files, then delete — the safe approach"
        rel:
          - ["en-safe-delete", "First ls, then rm — safe deletion with preview", "Best Practice"]
        labels: ["Filesystem"]

  - title: "🖥️ Terminal Check"
    explanation: |
      Test your knowledge — type the commands yourself!
    examples:
      - q: "Which command creates an empty file called 'notes.txt'?"
        type: input
        a: "touch notes.txt"
        labels: ["Filesystem"]
      - q: "What does the '-p' flag do in 'mkdir -p projects/web/assets'?"
        type: select
        options:
          - text: "Creates all missing intermediate directories automatically"
            correct: true
          - text: "Asks for confirmation before creating"
          - text: "Displays the created folder"
          - text: "Protects the folder from deletion"
        labels: ["Filesystem"]
      - q: "Which command renames a file from 'draft.txt' to 'final.txt'?"
        type: select
        options:
          - text: "mv draft.txt final.txt"
            correct: true
          - text: "cp draft.txt final.txt"
          - text: "rename draft.txt final.txt"
          - text: "touch final.txt draft.txt"
        labels: ["Filesystem"]
      - q: "Which of these statements about 'rm' are true?"
        type: multiple-choice
        options:
          - text: "rm deletes files without a recycle bin"
            correct: true
          - text: "rm -r deletes folders recursively"
            correct: true
          - text: "rm -i asks for confirmation before deleting"
            correct: true
          - text: "rm can undo deletions"
        labels: ["Filesystem"]
