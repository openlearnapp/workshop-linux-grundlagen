version: 2
number: 3
title: "Files & Directories"
description: "Learn how to create, copy, rename and delete files and folders"
image: "images/lesson-header.svg"
image_caption: "Directory tree with files and folders"
sections:
  - title: "Creating — touch and mkdir"
    image: "images/section-01-create.svg"
    explanation: |
      Before you can work with files, you need to create them.
      There are two simple commands for that:

      **`touch`** creates an empty file:
      ```
      touch notes.txt
      ```
      It's like putting a blank sheet of paper on the table.
      You can also create multiple files at once:
      ```
      touch page.html style.css
      ```

      **`mkdir`** creates a new folder.
      MKDIR stands for "Make Directory":
      ```
      mkdir photos
      ```

      The `-p` flag with `mkdir` is especially handy:
      It creates multiple folders at once, even if intermediate folders are missing:
      ```
      mkdir -p projects/my-website/images
      ```
      This creates `projects`, then `my-website` inside it, and `images` inside that —
      all in one step!
    examples:
      - q: "touch README.md"
        a: "Creates an empty README.md file in the current folder"
        rel:
          - ["en-touch-cmd", "Create empty file or update timestamp", "touch command"]
        labels: ["Filesystem"]
      - q: "touch index.html style.css app.js"
        a: "Creates three files at once — touch can take as many names as you want"
        rel:
          - ["en-touch-multiple", "Create multiple files simultaneously with touch", "touch file1 file2"]
        labels: ["Filesystem"]
      - q: "mkdir -p ~/projects/my-website/assets/img"
        a: "Creates the entire folder path at once — all missing folders in between are created too"
        rel:
          - ["en-mkdir-cmd", "Make Directory — create a directory", "mkdir command"]
          - ["en-mkdir-p", "Parents — automatically create all intermediate directories", "flag -p"]
        labels: ["Filesystem"]

  - title: "Copying and moving — cp and mv"
    image: "images/section-02-copy-move.svg"
    explanation: |
      Imagine you're working with papers on your desk:

      **`cp`** is like a photocopier — the original stays, you get a copy.
      CP stands for "Copy":
      ```
      cp notes.txt notes-backup.txt
      ```
      For whole folders you need `-r` (recursive, meaning "including everything inside"):
      ```
      cp -r photos/ photos-backup/
      ```

      **`mv`** is like moving house — the original disappears from the old location.
      MV stands for "Move":
      ```
      mv draft.txt final.txt
      ```
      If you don't give a different folder, `mv` simply renames the file!

      | Command | What happens? |
      |---------|---------------|
      | `cp file.txt copy.txt` | Copy with a new name |
      | `cp file.txt /tmp/` | Copy to another folder |
      | `cp -r folder/ backup/` | Copy whole folder |
      | `mv old.txt new.txt` | Rename |
      | `mv file.txt ~/documents/` | Move |
    examples:
      - q: "cp ~/.bashrc ~/.bashrc.backup"
        a: "Creates a backup of the Bash config file — great before making changes!"
        rel:
          - ["en-cp-cmd", "Copy — copy files and directories", "cp command"]
          - ["en-bashrc", "Bash configuration file for settings and shortcuts", "~/.bashrc"]
        labels: ["Filesystem"]
      - q: "cp -r /etc/nginx/ ~/nginx-backup/"
        a: "Copies the entire nginx settings folder as a backup into your personal folder"
        rel:
          - ["en-cp-r", "Recursive — copy directories including contents", "flag -r"]
        labels: ["Filesystem", "Config"]
      - q: "mv draft.txt final.txt"
        a: "Renames the file — 'draft.txt' becomes 'final.txt', no original remains"
        rel:
          - ["en-mv-cmd", "Move — move or rename files", "mv command"]
        labels: ["Filesystem"]
      - q: "mv ~/Downloads/*.pdf ~/Documents/PDFs/"
        a: "Move all PDF files from the Downloads folder to the PDFs folder"
        rel:
          - ["en-glob-star", "The asterisk * is a wildcard — matches any characters", "Wildcard *"]
          - ["en-mv-multiple", "Move multiple files with wildcards", "mv *.pdf destination/"]
        labels: ["Filesystem"]

  - title: "Deleting — rm and rmdir"
    image: "images/section-03-delete.svg"
    explanation: |
      Here comes an important note — please read carefully!

      **Linux has no recycle bin.**
      What is deleted with `rm` is **immediately and permanently** gone.
      There is no undo!

      | Command | What happens? |
      |---------|---------------|
      | `rm file.txt` | Delete file (permanently!) |
      | `rm -i file.txt` | Delete, but ask first (`-i` = interactive = "ask me") |
      | `rm *.tmp` | Delete all files ending in .tmp |
      | `rmdir empty-folder/` | Delete an empty folder |
      | `rm -r folder/` | Delete a folder with everything inside |

      **Golden rule:** Before deleting, look at what will be deleted:
      ```
      ls *.tmp
      ```
      Only when you're sure, then:
      ```
      rm *.tmp
      ```

      Remember: `rm -i` is your friend at first — it always asks!
    examples:
      - q: "rm -i important-file.txt"
        a: "Deletes the file but asks first — highly recommended for beginners!"
        rel:
          - ["en-rm-cmd", "Remove — delete files (no recycle bin!)", "rm command"]
          - ["en-rm-i", "Interactive — ask before deleting", "flag -i"]
        labels: ["Filesystem"]
      - q: "rm -r ~/projects/old-project/"
        a: "Deletes the 'old-project' folder and everything inside — careful, no recycle bin!"
        rel:
          - ["en-rm-r", "Recursive — delete directories and their contents", "flag -r"]
        labels: ["Filesystem"]
      - q: "rmdir empty-folder/"
        a: "Only deletes an empty folder — gives an error message if files are still inside"
        rel:
          - ["en-rmdir-cmd", "Remove Directory — only delete empty directories", "rmdir command"]
        labels: ["Filesystem"]
      - q: "ls *.log && rm *.log"
        a: "First show all .log files, then delete — the safe approach!"
        rel:
          - ["en-safe-delete", "First ls, then rm — safe deletion with preview", "Best Practice"]
        labels: ["Filesystem"]

  - title: "Terminal Check"
    image: "images/section-04-check.svg"
    explanation: |
      Test your knowledge now!
    examples:
      - q: "Which command creates an empty file called 'notes.txt'?"
        type: input
        a: "touch notes.txt"
        labels: ["Filesystem"]
      - q: "What does the '-p' flag do in 'mkdir -p projects/web/assets'?"
        type: select
        options:
          - text: "Creates all missing intermediate folders automatically"
            correct: true
          - text: "Asks for confirmation before creating"
          - text: "Displays the created folder"
          - text: "Protects the folder from deletion"
        labels: ["Filesystem"]
      - q: "Which command renames a file from 'draft.txt' to 'final.txt'?"
        type: select
        options:
          - text: "mv draft.txt final.txt"
            correct: true
          - text: "cp draft.txt final.txt"
          - text: "rename draft.txt final.txt"
          - text: "touch final.txt draft.txt"
        labels: ["Filesystem"]
      - q: "Which of these statements about 'rm' are true?"
        type: multiple-choice
        options:
          - text: "rm deletes files without a recycle bin"
            correct: true
          - text: "rm -r deletes folders with everything inside"
            correct: true
          - text: "rm -i asks for confirmation before deleting"
            correct: true
          - text: "rm can undo deletions"
        labels: ["Filesystem"]
