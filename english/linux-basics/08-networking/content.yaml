version: 1
number: 8
title: "Networking"
description: "ping, curl, wget, ssh and ip — test connections, transfer data and work remotely"
sections:
  - title: "Checking the network — ping, ip and ss"
    explanation: |
      **Why does this matter?** As a Linux user you'll manage servers, call APIs
      and debug network problems. These commands are the foundation.

      | Command | Purpose |
      |---------|---------|
      | `ping` | Test reachability |
      | `ip addr` | IP addresses of network interfaces |
      | `ip route` | Show routing table |
      | `ss -tulpn` | Open ports and connections |
      | `netstat -tulpn` | Similar to ss (older tool) |

      **Network interfaces** are the connections to the network:
      - `lo` = Loopback (local only, 127.0.0.1)
      - `eth0` or `enp3s0` = wired Ethernet
      - `wlan0` or `wlp2s0` = Wi-Fi
    examples:
      - q: "ping -c 4 google.com"
        a: "Sends 4 ICMP packets to google.com — tests internet connection and latency"
        rel:
          - ["en-ping-cmd", "Test network reachability and latency", "ping command"]
          - ["en-ping-c", "Count — limit the number of packets sent", "flag -c"]
      - q: "ip addr show"
        a: "Show all network interfaces with IP addresses (replaces ifconfig)"
        rel:
          - ["en-ip-cmd", "Modern network management tool (replaces ifconfig)", "ip command"]
          - ["en-ip-addr", "Show IP addresses of all network interfaces", "ip addr"]
      - q: "ss -tulpn"
        a: "Show all open TCP/UDP ports and the associated programs"
        rel:
          - ["en-ss-cmd", "Socket Statistics — network connections and open ports", "ss command"]
          - ["en-ss-tulpn", "t=TCP, u=UDP, l=listening, p=process, n=numeric", "flags -tulpn"]

  - title: "curl and wget — fetching data from the web"
    explanation: |
      `curl` and `wget` are the Swiss Army knives for HTTP requests.

      **curl** (Client URL) — very flexible, ideal for APIs:
      ```bash
      curl https://api.github.com/users/torvalds
      curl -X POST -H "Content-Type: application/json" \
           -d '{"name":"test"}' https://api.example.com/data
      ```

      **wget** — better for downloading large files:
      ```bash
      wget https://releases.ubuntu.com/22.04/ubuntu-22.04-live-server.iso
      wget -c largefile.zip   # resume interrupted download
      ```

      **Difference:** curl outputs response, wget saves directly to file.
    examples:
      - q: "curl -I https://example.com"
        a: "Show only HTTP headers (status code, server, content type) without body"
        rel:
          - ["en-curl-cmd", "Client URL — make HTTP requests and transfer data", "curl command"]
          - ["en-curl-I", "Head — show only HTTP response headers", "flag -I"]
      - q: "curl -s https://ipinfo.io/ip"
        a: "Show your own public IP address — -s suppresses the progress bar"
        rel:
          - ["en-curl-s", "Silent — suppress progress display and error messages", "flag -s"]
      - q: "wget -O nodejs.tar.gz https://nodejs.org/dist/v20.0.0/node-v20.0.0.tar.gz"
        a: "Download file and save it with a custom name"
        rel:
          - ["en-wget-cmd", "Web Get — download files from the internet", "wget command"]
          - ["en-wget-O", "Output — save file under different name", "flag -O"]

  - title: "SSH — securely connecting to remote servers"
    explanation: |
      **SSH** (Secure Shell) is the most important tool for remote server management.
      Everything is transmitted encrypted.

      **Connecting:**
      ```bash
      ssh user@server.example.com
      ssh -p 2222 alice@192.168.1.100    # specify port
      ```

      **SSH keys** are more secure than passwords:
      ```bash
      ssh-keygen -t ed25519 -C "alice@laptop"  # create key pair
      ssh-copy-id alice@server.example.com      # copy key to server
      ssh alice@server.example.com              # now without password!
      ```

      **Transfer files with scp:**
      ```bash
      scp file.txt alice@server:/home/alice/
      scp -r folder/ alice@server:/var/www/
      ```
    examples:
      - q: "ssh alice@192.168.1.100"
        a: "Connect to server via SSH — login with password or SSH key"
        rel:
          - ["en-ssh-cmd", "Secure Shell — encrypted remote connection", "ssh command"]
      - q: "ssh-keygen -t ed25519 -C \"alice@mylaptop\""
        a: "Creates a modern Ed25519 key pair — more secure than the older RSA"
        rel:
          - ["en-ssh-keygen", "Generate SSH key pair", "ssh-keygen command"]
          - ["en-ed25519", "Modern algorithm for SSH keys, recommended since 2022", "Ed25519 key type"]
      - q: "ssh-copy-id -i ~/.ssh/id_ed25519.pub alice@server.example.com"
        a: "Copy public key to server — no password required afterward"
        rel:
          - ["en-ssh-copy-id", "Install public SSH key on remote server", "ssh-copy-id command"]
      - q: "scp -r ~/projects/website/ alice@server:/var/www/html/"
        a: "Transfer the entire website folder to the server via scp"
        rel:
          - ["en-scp-cmd", "Secure Copy — encrypted file transfer via SSH", "scp command"]

  - title: "🖥️ Terminal Check"
    explanation: |
      Test your knowledge — type the commands yourself!
    examples:
      - q: "Which command tests reachability of google.com with 4 packets?"
        type: input
        a: "ping -c 4 google.com"
      - q: "What does 'curl -s https://ipinfo.io/ip' do?"
        type: select
        options:
          - "Shows your own public IP address"
          - "Tests the internet connection speed"
          - "Downloads the IP database"
          - "Shows all network interfaces"
        a: "Shows your own public IP address"
      - q: "Which command shows all open ports and associated programs?"
        type: select
        options:
          - "ss -tulpn"
          - "ip addr show"
          - "ping -a localhost"
          - "netstat --list"
        a: "ss -tulpn"
      - q: "Which of these statements about SSH are true?"
        type: multiple-choice
        options:
          - "SSH encrypts the connection"
          - "SSH keys are more secure than passwords"
          - "ssh-keygen creates a key pair"
          - "SSH sends passwords in plain text"
        a:
          - "SSH encrypts the connection"
          - "SSH keys are more secure than passwords"
          - "ssh-keygen creates a key pair"
