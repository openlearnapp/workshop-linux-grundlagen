<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210">
  <defs>
    <style>
      .f{font-family:sans-serif}
      .ti{animation:tia 11s infinite}@keyframes tia{0%,3%{opacity:0}7%,87%{opacity:1}92%,100%{opacity:0}}
      .c1{animation:c1a 11s infinite}@keyframes c1a{0%,12%{opacity:0}18%,87%{opacity:1}92%,100%{opacity:0}}
      .c2{animation:c2a 11s infinite}@keyframes c2a{0%,30%{opacity:0}36%,87%{opacity:1}92%,100%{opacity:0}}
      .c3{animation:c3a 11s infinite}@keyframes c3a{0%,48%{opacity:0}54%,87%{opacity:1}92%,100%{opacity:0}}
      .ft{animation:fta 11s infinite}@keyframes fta{0%,78%{opacity:0}82%,87%{opacity:1}92%,100%{opacity:0}}
    </style>
  </defs>
  <rect width="640" height="210" rx="12" fill="#0d1117"/>
  <rect width="640" height="44" rx="12" fill="#161b22"/>
  <rect y="32" width="640" height="12" fill="#161b22"/>
  <g class="ti">
    <text x="320" y="28" class="f" font-size="14" fill="#e6edf3" text-anchor="middle" font-weight="bold">curl and wget — get data from the internet</text>
  </g>
  <g class="c1">
    <rect x="20" y="54" width="184" height="112" rx="8" fill="#0d1520"/>
    <rect x="20" y="54" width="184" height="4" rx="2" fill="#58a6ff"/>
    <text x="112" y="86" class="f" font-size="24" text-anchor="middle">🌐</text>
    <text x="112" y="108" class="f" font-size="13" fill="#58a6ff" text-anchor="middle" font-weight="bold">curl</text>
    <text x="112" y="124" class="f" font-size="11" fill="#8b949e" text-anchor="middle">Fetch and display</text>
    <text x="112" y="140" class="f" font-size="11" fill="#8b949e" text-anchor="middle">data from URLs</text>
  </g>
  <g class="c2">
    <rect x="228" y="54" width="184" height="112" rx="8" fill="#0a1a0d"/>
    <rect x="228" y="54" width="184" height="4" rx="2" fill="#3fb950"/>
    <text x="320" y="86" class="f" font-size="24" text-anchor="middle">📥</text>
    <text x="320" y="108" class="f" font-size="13" fill="#3fb950" text-anchor="middle" font-weight="bold">wget</text>
    <text x="320" y="124" class="f" font-size="11" fill="#8b949e" text-anchor="middle">Download files</text>
    <text x="320" y="140" class="f" font-size="11" fill="#8b949e" text-anchor="middle">to local disk</text>
  </g>
  <g class="c3">
    <rect x="436" y="54" width="184" height="112" rx="8" fill="#1a0f08"/>
    <rect x="436" y="54" width="184" height="4" rx="2" fill="#f0883e"/>
    <text x="528" y="86" class="f" font-size="24" text-anchor="middle">💾</text>
    <text x="528" y="108" class="f" font-size="13" fill="#f0883e" text-anchor="middle" font-weight="bold">curl -o</text>
    <text x="528" y="124" class="f" font-size="11" fill="#8b949e" text-anchor="middle">Save output</text>
    <text x="528" y="140" class="f" font-size="11" fill="#8b949e" text-anchor="middle">directly to file</text>
  </g>
  <g class="ft">
    <rect x="20" y="178" width="600" height="24" rx="8" fill="#161b22"/>
    <text x="320" y="195" class="f" font-size="11" fill="#8b949e" text-anchor="middle">curl https://example.com · wget https://example.com/file.zip</text>
  </g>
</svg>
