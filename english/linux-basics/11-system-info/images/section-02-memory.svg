<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="640" height="160" fill="url(#bg)" rx="8"/>
  <!-- Decorative elements -->
  <circle cx="80" cy="60" r="2" fill="#bc8cff" opacity="0.15"/><circle cx="95" cy="45" r="1.5" fill="#bc8cff" opacity="0.1"/><circle cx="70" cy="100" r="1" fill="#bc8cff" opacity="0.12"/>
  <circle cx="560" cy="60" r="2" fill="#bc8cff" opacity="0.15"/><circle cx="545" cy="100" r="1.5" fill="#bc8cff" opacity="0.1"/><circle cx="570" cy="45" r="1" fill="#bc8cff" opacity="0.12"/>
  <!-- Icon -->
  
  <!-- RAM bar -->
  <text x="270" y="45" font-family="monospace" font-size="8" fill="#8b949e">RAM</text>
  <rect x="270" y="50" width="100" height="12" rx="3" fill="#30363d"/>
  <rect x="270" y="50" width="65" height="12" rx="3" fill="#3fb950" opacity="0.5"/>
  <!-- Swap bar -->
  <text x="270" y="78" font-family="monospace" font-size="8" fill="#8b949e">Swap</text>
  <rect x="270" y="83" width="100" height="12" rx="3" fill="#30363d"/>
  <rect x="270" y="83" width="20" height="12" rx="3" fill="#f0883e" opacity="0.5"/>
  <!-- Uptime -->
  <text x="280" y="118" font-family="monospace" font-size="9" fill="#bc8cff" opacity="0.25">uptime: 14 days</text>
  <!-- Accent bar -->
  <rect x="220" y="152" width="200" height="3" fill="#bc8cff" opacity="0.5" rx="1.5"/>
</svg>
