<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 270">
  <defs>
    <style>
      .f{font-family:sans-serif}
      .ti{animation:tia 11s infinite}@keyframes tia{0%,3%{opacity:0}7%,87%{opacity:1}92%,100%{opacity:0}}
      .c1{animation:c1a 11s infinite}@keyframes c1a{0%,12%{opacity:0}18%,87%{opacity:1}92%,100%{opacity:0}}
      .c2{animation:c2a 11s infinite}@keyframes c2a{0%,30%{opacity:0}36%,87%{opacity:1}92%,100%{opacity:0}}
      .c3{animation:c3a 11s infinite}@keyframes c3a{0%,48%{opacity:0}54%,87%{opacity:1}92%,100%{opacity:0}}
      .ft{animation:fta 11s infinite}@keyframes fta{0%,78%{opacity:0}82%,87%{opacity:1}92%,100%{opacity:0}}
    </style>
  </defs>
  <rect width="640" height="270" rx="12" fill="#0d1117"/>
  <rect width="640" height="56" rx="12" fill="#161b22"/>
  <rect y="44" width="640" height="12" fill="#161b22"/>
  <g class="ti">
    <text x="320" y="22" class="f" font-size="13" fill="#8b949e" text-anchor="middle" font-weight="bold">📊 System Information</text>
    <text x="320" y="42" class="f" font-size="12" fill="#58a6ff" text-anchor="middle">df · du · free · uptime · history</text>
  </g>
  <g class="c1">
    <rect x="20" y="68" width="185" height="134" rx="10" fill="#0d1520"/>
    <rect x="20" y="68" width="185" height="4" rx="2" fill="#58a6ff"/>
    <text x="112" y="108" class="f" font-size="30" text-anchor="middle">💾</text>
    <text x="112" y="133" class="f" font-size="15" fill="#58a6ff" text-anchor="middle" font-weight="bold">Storage</text>
    <text x="112" y="154" class="f" font-size="12" fill="#8b949e" text-anchor="middle">df &amp; du</text>
  </g>
  <g class="c2">
    <rect x="228" y="68" width="185" height="134" rx="10" fill="#0a1a0d"/>
    <rect x="228" y="68" width="185" height="4" rx="2" fill="#3fb950"/>
    <text x="320" y="108" class="f" font-size="30" text-anchor="middle">🧠</text>
    <text x="320" y="133" class="f" font-size="15" fill="#3fb950" text-anchor="middle" font-weight="bold">RAM &amp; CPU</text>
    <text x="320" y="154" class="f" font-size="12" fill="#8b949e" text-anchor="middle">free &amp; uptime</text>
  </g>
  <g class="c3">
    <rect x="436" y="68" width="185" height="134" rx="10" fill="#1a0f08"/>
    <rect x="436" y="68" width="185" height="4" rx="2" fill="#f0883e"/>
    <text x="528" y="108" class="f" font-size="30" text-anchor="middle">📜</text>
    <text x="528" y="133" class="f" font-size="15" fill="#f0883e" text-anchor="middle" font-weight="bold">history</text>
    <text x="528" y="154" class="f" font-size="12" fill="#8b949e" text-anchor="middle">Command history</text>
  </g>
  <g class="ft">
    <rect x="20" y="218" width="600" height="36" rx="8" fill="#161b22"/>
    <text x="320" y="241" class="f" font-size="12" fill="#8b949e" text-anchor="middle">Know your system — check resources before they run out</text>
  </g>
</svg>
