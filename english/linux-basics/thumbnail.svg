<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2540;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff41;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#00ff41;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bg)" />

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#4CAF50" stroke-width="1">
    <line x1="0" y1="100" x2="1280" y2="100"/>
    <line x1="0" y1="200" x2="1280" y2="200"/>
    <line x1="0" y1="300" x2="1280" y2="300"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="500" x2="1280" y2="500"/>
    <line x1="0" y1="600" x2="1280" y2="600"/>
    <line x1="0" y1="700" x2="1280" y2="700"/>
    <line x1="100" y1="0" x2="100" y2="800"/>
    <line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="500" y1="0" x2="500" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="700" y1="0" x2="700" y2="800"/>
    <line x1="800" y1="0" x2="800" y2="800"/>
    <line x1="900" y1="0" x2="900" y2="800"/>
    <line x1="1000" y1="0" x2="1000" y2="800"/>
    <line x1="1100" y1="0" x2="1100" y2="800"/>
    <line x1="1200" y1="0" x2="1200" y2="800"/>
  </g>

  <!-- Terminal window frame -->
  <rect x="60" y="60" width="1160" height="680" rx="12" ry="12" fill="#0f1923" stroke="#2a4060" stroke-width="2"/>

  <!-- Title bar -->
  <rect x="60" y="60" width="1160" height="44" rx="12" ry="12" fill="#1a2540"/>
  <rect x="60" y="90" width="1160" height="14" fill="#1a2540"/>

  <!-- Window buttons -->
  <circle cx="96" cy="82" r="8" fill="#ff5f57"/>
  <circle cx="122" cy="82" r="8" fill="#ffbd2e"/>
  <circle cx="148" cy="82" r="8" fill="#28ca41"/>

  <!-- Window title -->
  <text x="640" y="88" font-family="'Courier New', Courier, monospace" font-size="16" fill="#4a6080" text-anchor="middle">bash — 120×40</text>

  <!-- Tux Penguin (stylized SVG) — centered right area -->
  <g transform="translate(900, 200)">
    <!-- Body -->
    <ellipse cx="0" cy="80" rx="90" ry="110" fill="#1a1a2e"/>
    <!-- Belly -->
    <ellipse cx="0" cy="95" rx="55" ry="75" fill="#f5f0e8"/>
    <!-- Head -->
    <ellipse cx="0" cy="-50" rx="65" ry="60" fill="#1a1a2e"/>
    <!-- Face / white area -->
    <ellipse cx="0" cy="-45" rx="42" ry="38" fill="#f5f0e8"/>
    <!-- Eyes -->
    <circle cx="-16" cy="-58" r="10" fill="white"/>
    <circle cx="16" cy="-58" r="10" fill="white"/>
    <circle cx="-14" cy="-56" r="6" fill="#1a1a2e"/>
    <circle cx="18" cy="-56" r="6" fill="#1a1a2e"/>
    <!-- Eye shine -->
    <circle cx="-12" cy="-59" r="2" fill="white"/>
    <circle cx="20" cy="-59" r="2" fill="white"/>
    <!-- Beak -->
    <polygon points="0,-35 -12,-18 12,-18" fill="#f5a623"/>
    <!-- Wings -->
    <ellipse cx="-95" cy="50" rx="28" ry="70" fill="#1a1a2e" transform="rotate(-15,-95,50)"/>
    <ellipse cx="95" cy="50" rx="28" ry="70" fill="#1a1a2e" transform="rotate(15,95,50)"/>
    <!-- Feet -->
    <ellipse cx="-30" cy="185" rx="28" ry="12" fill="#f5a623" transform="rotate(-10,-30,185)"/>
    <ellipse cx="30" cy="185" rx="28" ry="12" fill="#f5a623" transform="rotate(10,30,185)"/>
  </g>

  <!-- Glow overlay under text -->
  <rect x="60" y="104" width="780" height="300" fill="url(#glow)" opacity="0.5"/>

  <!-- Terminal prompt lines -->
  <text x="96" y="160" font-family="'Courier New', Courier, monospace" font-size="22" fill="#4CAF50">user@linux:~$ <tspan fill="#a0c8ff">ls -la /home</tspan></text>
  <text x="96" y="200" font-family="'Courier New', Courier, monospace" font-size="20" fill="#6b8fa8">total 48</text>
  <text x="96" y="228" font-family="'Courier New', Courier, monospace" font-size="20" fill="#6b8fa8">drwxr-xr-x  4 user user 4096 Mar 20 10:23 .</text>
  <text x="96" y="256" font-family="'Courier New', Courier, monospace" font-size="20" fill="#6b8fa8">drwxr-xr-x  3 root root 4096 Mar 20 09:00 ..</text>
  <text x="96" y="284" font-family="'Courier New', Courier, monospace" font-size="20" fill="#00d4ff">drwxr-xr-x  8 user user 4096 Mar 20 10:15 projects</text>
  <text x="96" y="312" font-family="'Courier New', Courier, monospace" font-size="20" fill="#00d4ff">-rw-r--r--  1 user user  220 Mar 20 09:00 .bashrc</text>

  <!-- Blinking cursor line -->
  <text x="96" y="360" font-family="'Courier New', Courier, monospace" font-size="22" fill="#4CAF50">user@linux:~$ <tspan fill="#4CAF50">chmod 755 deploy.sh</tspan></text>

  <!-- Cursor block -->
  <rect x="598" y="340" width="13" height="26" fill="#4CAF50" opacity="0.9"/>

  <!-- Main title -->
  <text x="640" y="510" font-family="'Courier New', Courier, monospace" font-size="80" font-weight="bold" fill="#00ff41" text-anchor="middle" letter-spacing="-1">Linux Grundlagen</text>

  <!-- Subtitle -->
  <text x="640" y="570" font-family="'Courier New', Courier, monospace" font-size="30" fill="#4a7fa0" text-anchor="middle" letter-spacing="4">Kommandozeile · 12 Lektionen</text>

  <!-- Bottom prompt -->
  <text x="640" y="680" font-family="'Courier New', Courier, monospace" font-size="20" fill="#2a5070" text-anchor="middle">$ sudo apt install knowledge  # für absolute Anfänger</text>
</svg>
