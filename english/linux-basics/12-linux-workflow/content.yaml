version: 2
number: 12
title: "Professional Linux Workflow"
description: "Pipes, redirects, aliases and xargs — using the command line like a pro"
image: "images/lesson-header.svg"
image_caption: "Workflow diagram with terminal, git and SSH"
sections:
  - title: "Pipes — connecting commands"
    image: "images/section-01-pipes.svg"
    explanation: |
      Imagine you're building a factory with an assembly line.
      Each station does exactly one thing —
      and the result moves on to the next station.

      That's exactly how **pipes** work in Linux.
      The character for it is the vertical bar: `|`

      Example: You want to know which folder takes up the most space.
      ```
      du -sh /home/* | sort -rh | head -5
      ```

      The assembly line:
      1. `du -sh /home/*` → measures the size of each folder
      2. `| sort -rh` → sorts from big to small
      3. `| head -5` → shows only the top 5

      That's the strength of Linux:
      Small tools, each for one thing — together very powerful.
      This is called the **Unix philosophy** (the idea behind Linux and Unix).
    examples:
      - q: "ps aux | grep python | grep -v grep"
        a: "Shows all running Python programs — the second grep removes itself from the list"
        rel:
          - ["en-pipe-operator", "| passes output of one command as input to the next", "pipe |"]
          - ["en-grep-v-grep", "grep -v grep removes the grep line from the process list", "grep -v grep"]
        labels: ["Scripting", "Processes"]
      - q: "cat /var/log/nginx/access.log | awk '{print $1}' | sort | uniq -c | sort -rn | head -10"
        a: "Finds the 10 IP addresses that accessed the website most often"
        rel:
          - ["en-awk-ip", "awk '{print $1}' outputs the first field (IP) of each line", "awk print"]
          - ["en-uniq-c", "uniq -c counts consecutive identical lines", "uniq -c"]
        labels: ["Scripting", "Network"]
      - q: "find /var/log -name \"*.log\" -mtime +30 | xargs ls -lh"
        a: "Finds log files older than 30 days and shows their size"
        rel:
          - ["en-find-cmd", "Find files based on various criteria", "find command"]
          - ["en-find-mtime", "-mtime +30 = last modified more than 30 days ago", "find -mtime"]
          - ["en-xargs-cmd", "Pass output as arguments to the next command", "xargs command"]
        labels: ["Scripting", "Filesystem"]

  - title: "Redirects — sending output somewhere else"
    image: "images/section-02-redirects.svg"
    explanation: |
      Normally everything a command outputs appears directly in the terminal.
      With **redirects** you can change that —
      and write the output to a file.

      The character for it is the arrow `>`:
      ```
      ls -la > directory.txt
      ```
      Now the list isn't in the terminal, it's in the file!

      Watch out: `>` always overwrites the file.
      With `>>` you append to the end instead:
      ```
      echo "Today everything went well" >> diary.txt
      ```

      And sometimes there are error messages you want to get rid of.
      Linux's "black hole" is called `/dev/null` —
      everything that goes there disappears without a trace:
      ```
      find / -name "*.conf" 2>/dev/null
      ```
      The `2>` redirects error messages —
      you only see the real results, not the errors.
    examples:
      - q: "ls -la > directory.txt"
        a: "Saves the directory listing to a file — overwrites the file if it exists"
        rel:
          - ["en-redirect-out", "> redirects stdout to file (overwriting)", "redirect >"]
        labels: ["Scripting", "Filesystem"]
      - q: "echo \"[$(date)] Server started\" >> /var/log/myapp.log"
        a: "Appends a line to the end of the log file — nothing gets overwritten"
        rel:
          - ["en-redirect-append", ">> appends output to file (no overwriting)", "redirect >>"]
        labels: ["Scripting"]
      - q: "find / -name \"*.conf\" 2>/dev/null"
        a: "Searches for config files — error messages are sent to the black hole"
        rel:
          - ["en-dev-null", "/dev/null discards all output — the black hole", "/dev/null"]
          - ["en-redirect-stderr", "2> redirects stderr (standard error)", "redirect 2>"]
        labels: ["Scripting", "Filesystem"]
      - q: "wc -l < /etc/passwd"
        a: "Counts the lines in /etc/passwd — the file is used as input"
        rel:
          - ["en-redirect-input", "< uses file contents as input to command", "redirect <"]
        labels: ["Scripting"]

  - title: "Aliases and .bashrc — setting up Linux your way"
    image: "images/section-03-bashrc.svg"
    explanation: |
      Imagine you type the same long commands every day.
      That's like always saying someone's full name instead of a nickname.

      **Aliases** (shortcut names) solve that.
      You can save long commands under a short name:
      ```
      alias ll='ls -la'
      ```
      From now on `ll` is enough instead of `ls -la`!

      You save these aliases in the file `~/.bashrc`.
      That's your personal Linux configuration —
      it's loaded every time you open a terminal.

      Some useful aliases for .bashrc:
      ```
      alias ll='ls -la'
      alias update='sudo apt update && sudo apt upgrade -y'
      alias myip='curl -s https://ipinfo.io/ip'
      alias ..='cd ..'
      alias ...='cd ../..'
      alias gs='git status'
      ```

      After editing .bashrc you need to reload it:
      ```
      source ~/.bashrc
      ```
      `source` means: "Read this file and apply everything."
      Then your new aliases are immediately available.
    examples:
      - q: "alias ll='ls -la --color=auto'"
        a: "Creates the shortcut 'll' — from now on ll is enough instead of ls -la --color=auto"
        rel:
          - ["en-alias-cmd", "Create shortcuts for frequent or long commands", "alias command"]
        labels: ["Config"]
      - q: "alias update='sudo apt update && sudo apt upgrade -y'"
        a: "Makes the complete system update callable with a single word"
        rel:
          - ["en-alias-complex", "Alias for complex command chain — one word instead of long command sequence", "alias example"]
        labels: ["Config"]
      - q: "source ~/.bashrc"
        a: "Reloads the Bash config — new aliases are immediately active without restarting the terminal"
        rel:
          - ["en-source-cmd", "Load configuration file into current shell", "source command"]
          - ["en-bashrc-reload", "Reload ~/.bashrc after changes", "source ~/.bashrc"]
        labels: ["Config"]
      - q: "alias | grep git"
        a: "Shows all aliases that contain the word 'git' — alias without argument shows all"
        rel:
          - ["en-alias-list", "alias without argument lists all defined aliases", "alias without arguments"]
        labels: ["Config"]
      - q: "unalias ll"
        a: "Removes the alias 'll' — only effective for the current terminal session"
        rel:
          - ["en-unalias-cmd", "Remove a defined alias", "unalias command"]
        labels: ["Config"]

  - title: "Terminal Check"
    image: "images/section-04-check.svg"
    explanation: |
      Test your knowledge — type the commands directly!
    examples:
      - q: "Which character connects two commands via pipe?"
        type: input
        a: "|"
        labels: ["Scripting"]
      - q: "What does '>>' do compared to '>'?"
        type: select
        options:
          - text: ">> appends the output to the file, > overwrites it"
            correct: true
          - text: ">> overwrites the file, > appends"
          - text: ">> redirects errors, > redirects output"
          - text: ">> and > do the same thing"
        labels: ["Scripting"]
      - q: "How do you apply changes to ~/.bashrc immediately?"
        type: select
        options:
          - text: "source ~/.bashrc"
            correct: true
          - text: "reload ~/.bashrc"
          - text: "bash --refresh"
          - text: "apply ~/.bashrc"
        labels: ["Config"]
      - q: "Which of these statements about aliases and pipes are true?"
        type: multiple-choice
        options:
          - text: "alias creates shortcuts for frequent commands"
            correct: true
          - text: "| passes output as input to the next command"
            correct: true
          - text: "/dev/null discards all output"
            correct: true
          - text: "source permanently saves commands in the terminal"
        labels: ["Scripting", "Config"]
