version: 2
number: 4
title: "File Content"
description: "Learn how to read files, scroll through them and search for specific words"
image: "images/lesson-header.svg"
image_caption: "Terminal with cat, head and grep output"
sections:
  - title: "cat, less and more — reading files"
    image: "images/section-01-read.svg"
    explanation: |
      How do you read files in the terminal? There are different commands —
      depending on the file size, one is better suited than another.

      | Command | Best for? |
      |---------|-----------|
      | `cat` | Show small files completely (cat = "concatenate", to chain together) |
      | `less` | Browse long files page by page — like a book! |
      | `head` | See only the first lines of a file |
      | `tail` | See only the last lines of a file |

      **`cat`** outputs the whole file at once:
      ```
      cat my-file.txt
      ```

      **`less`** is like a book reader for long texts.
      You can scroll through it:
      - Arrow keys or `j`/`k`: one line down/up
      - Spacebar: one page forward
      - `q`: quit (Q like "Quit")
      - `/word`: search for a word

      Give it a try: `less /etc/hostname`
    examples:
      - q: "cat /etc/hostname"
        a: "Shows the computer name of the system — a short file, perfect for cat"
        rel:
          - ["en-cat-content", "Output full file contents", "cat command"]
          - ["en-etc-hostname", "File containing the system's computer name", "/etc/hostname"]
        labels: ["Filesystem", "Config"]
      - q: "cat /etc/passwd"
        a: "Shows all user accounts on the system — name, number, folder, and which shell they use"
        rel:
          - ["en-etc-passwd", "System user database", "/etc/passwd"]
        labels: ["Filesystem", "Security"]
      - q: "less /var/log/syslog"
        a: "Opens the system log for browsing — search with /, quit with q"
        rel:
          - ["en-less-cmd", "Read long files interactively with scrolling", "less command"]
          - ["en-syslog", "The central system log — Linux writes important events here", "/var/log/syslog"]
        labels: ["Filesystem"]

  - title: "head and tail — beginning and end"
    image: "images/section-02-head-tail.svg"
    explanation: |
      Sometimes you don't want to see the whole file — just the beginning or the end.
      That's what `head` and `tail` are for.

      `head` shows the **first** lines (default: the first 10).
      `tail` shows the **last** lines (default: the last 10).

      With `-n` you can choose how many lines you want to see:
      ```
      head -5 file.txt    # First 5 lines
      tail -20 file.txt   # Last 20 lines
      ```

      The **coolest feature of `tail`:** With `-f` you see a file live —
      new lines appear immediately as they are written.
      It's like live TV for files!
      ```
      tail -f /var/log/syslog
      ```
      Use `Ctrl+C` (hold Ctrl and press C) to stop the live view.
    examples:
      - q: "head -20 /etc/ssh/sshd_config"
        a: "Shows the first 20 lines of the SSH server config file (SSH is a way to control computers remotely)"
        rel:
          - ["en-head-cmd", "Show beginning of a file (default: 10 lines)", "head command"]
          - ["en-head-n", "Set number of lines to display", "flag -n"]
          - ["en-sshd-config", "Configuration file for the SSH server", "/etc/ssh/sshd_config"]
        labels: ["Filesystem", "Config"]
      - q: "tail -50 /var/log/auth.log"
        a: "Shows the last 50 lines of the login log — shows who logged in"
        rel:
          - ["en-tail-cmd", "Show end of a file (default: 10 lines)", "tail command"]
          - ["en-auth-log", "Log file for logins and authentications", "/var/log/auth.log"]
        labels: ["Filesystem", "Security"]
      - q: "tail -f /var/log/nginx/access.log"
        a: "Shows all web server accesses live — new entries appear immediately!"
        rel:
          - ["en-tail-f", "Follow — watch file in real time, show new lines immediately", "flag -f"]
        labels: ["Filesystem", "Network"]

  - title: "grep — search like a detective"
    image: "images/section-03-grep.svg"
    explanation: |
      `grep` is your detective tool.
      It searches files for a specific word or phrase — and shows you only
      the lines where the word appears.

      Imagine you have a huge list with 1000 entries
      and you're looking for the word "error". Without grep you'd have to read everything.
      With grep it finds it in seconds!

      | Command | What it searches |
      |---------|-----------------|
      | `grep "hello" file.txt` | All lines with "hello" |
      | `grep -i "Hello" file.txt` | Regardless of upper or lowercase (`-i` = ignore case) |
      | `grep -n "Error" log.txt` | With line number — where exactly is it? |
      | `grep -r "TODO" ~/projects/` | In all files in a folder |
      | `grep -v "OK" result.txt` | All lines WITHOUT "OK" — the problems! |

      You can also combine grep with other commands:
      ```
      cat /etc/passwd | grep alice
      ```
      The `|` (pipe, pronounced "pipe") passes the output of `cat` directly to `grep`.
    examples:
      - q: "grep -i \"error\" /var/log/syslog"
        a: "Searches for 'error' in the system log — regardless of upper or lowercase"
        rel:
          - ["en-grep-cmd", "Search files for lines matching a pattern", "grep command"]
          - ["en-grep-i", "Case-insensitive — ignore upper/lowercase", "flag -i"]
        labels: ["Filesystem"]
      - q: "grep -n \"TODO\" ~/projects/app.py"
        a: "Finds all TODO comments in the code and shows the line numbers"
        rel:
          - ["en-grep-n", "Number — show line numbers of matches", "flag -n"]
        labels: ["Filesystem"]
      - q: "grep -r \"database_url\" ~/projects/"
        a: "Searches all files in the projects folder for 'database_url' — finds forgotten settings too"
        rel:
          - ["en-grep-r", "Recursive — search in directories and subdirectories", "flag -r"]
        labels: ["Filesystem"]
      - q: "grep -v \"^#\" /etc/ssh/sshd_config"
        a: "Shows SSH settings without comment lines (comments start with # and just explain things)"
        rel:
          - ["en-grep-v", "Invert match — show lines WITHOUT the pattern", "flag -v"]
          - ["en-regex-caret", "^ in a pattern means: start of line", "Regex ^"]
        labels: ["Filesystem", "Config"]

  - title: "Terminal Check"
    image: "images/section-04-check.svg"
    explanation: |
      Test your knowledge now!
    examples:
      - q: "Which command lets you browse a file page by page?"
        type: input
        a: "less"
        labels: ["Filesystem"]
      - q: "What does 'tail -f /var/log/syslog' do?"
        type: select
        options:
          - text: "Shows new lines in the file live immediately"
            correct: true
          - text: "Shows the last 10 lines and stops"
          - text: "Deletes the last lines of the file"
          - text: "Searches for the word 'syslog'"
        labels: ["Filesystem"]
      - q: "Which command searches for 'error' regardless of case?"
        type: select
        options:
          - text: "grep -i \"error\" file.txt"
            correct: true
          - text: "grep -n \"error\" file.txt"
          - text: "grep -r \"error\" file.txt"
          - text: "grep -v \"error\" file.txt"
        labels: ["Filesystem"]
      - q: "Which of these grep flags have the right meaning?"
        type: multiple-choice
        options:
          - text: "-i ignores case"
            correct: true
          - text: "-n shows line numbers"
            correct: true
          - text: "-r searches folders recursively"
            correct: true
          - text: "-v shows only matches without context"
        labels: ["Filesystem"]
