version: 2
number: 4
title: "File Content"
description: "cat, less, head, tail and grep — read, browse and filter file contents"
image: "images/lesson-header.svg"
sections:
  - title: "cat, less and more — reading files"
    image: "images/section-01-read.svg"
    explanation: |
      **Why does this matter?** As a Linux user you constantly read files:
      configurations, log files, scripts, database dumps. The right tools mean the
      difference between 10 seconds and 10 minutes.

      | Command | Best for |
      |---------|----------|
      | `cat` | Short files, display completely |
      | `less` | Long files, interactive scrolling |
      | `more` | Similar to less, simpler |
      | `head` | Only the first N lines |
      | `tail` | Only the last N lines |

      In `less`, navigate with:
      - `j`/`k` or arrow keys: line down/up
      - `Space`/`b`: page forward/back
      - `/searchterm`: search
      - `q`: quit
    examples:
      - q: "cat /etc/hostname"
        a: "Shows the system's hostname — a short file, perfect for cat"
        rel:
          - ["en-cat-content", "Output full file contents", "cat command"]
          - ["en-etc-hostname", "File containing the system's computer name", "/etc/hostname"]
        labels: ["Filesystem", "Config"]
      - q: "cat /etc/passwd"
        a: "Shows all user accounts on the system (name, ID, home directory, shell)"
        rel:
          - ["en-etc-passwd", "System user database", "/etc/passwd"]
        labels: ["Filesystem", "Security"]
      - q: "less /var/log/syslog"
        a: "Browse system log interactively — search with /, quit with q"
        rel:
          - ["en-less-cmd", "Read long files interactively with scrolling", "less command"]
          - ["en-syslog", "Central system log with all important events", "/var/log/syslog"]
        labels: ["Filesystem"]

  - title: "head and tail — beginning and end"
    image: "images/section-02-head-tail.svg"
    explanation: |
      `head` and `tail` show the first or last lines of a file respectively.
      Default: 10 lines. Use `-n` to customize the count.

      **The most powerful tail feature:** `tail -f` follows a file in real time:
      ```bash
      tail -f /var/log/nginx/access.log
      ```
      Perfect for server logs while requests come in — you see each access instantly.
      Use `Ctrl+C` to stop the live monitoring.
    examples:
      - q: "head -20 /etc/ssh/sshd_config"
        a: "Shows the first 20 lines of the SSH server configuration"
        rel:
          - ["en-head-cmd", "Show beginning of a file (default: 10 lines)", "head command"]
          - ["en-head-n", "Set number of lines to display", "flag -n"]
        labels: ["Filesystem", "Config"]
      - q: "tail -50 /var/log/auth.log"
        a: "Last 50 lines of the auth log — shows login attempts and authentications"
        rel:
          - ["en-tail-cmd", "Show end of a file (default: 10 lines)", "tail command"]
          - ["en-auth-log", "Log for authentications and sudo usage", "/var/log/auth.log"]
        labels: ["Filesystem", "Security"]
      - q: "tail -f /var/log/nginx/access.log"
        a: "Follow Nginx accesses in real time — perfect for live debugging"
        rel:
          - ["en-tail-f", "Follow — watch file in real time, show new lines immediately", "flag -f"]
        labels: ["Filesystem", "Network"]

  - title: "grep — finding a needle in a haystack"
    image: "images/section-03-grep.svg"
    explanation: |
      `grep` (Global Regular Expression Print) searches files for patterns.
      It is one of the most used Linux tools of all time.

      | Command | Effect |
      |---------|--------|
      | `grep "error" file.txt` | All lines containing "error" |
      | `grep -i "Error" file.txt` | Ignore case |
      | `grep -n "ERROR" log.txt` | With line numbers |
      | `grep -r "TODO" ~/projects/` | Recursively in all subdirectories |
      | `grep -v "DEBUG" app.log` | All lines WITHOUT "DEBUG" |
      | `grep -c "ERROR" app.log` | Only count the matches |

      **Combining with other commands** makes grep especially powerful:
      ```bash
      cat /var/log/auth.log | grep "Failed"
      ```
    examples:
      - q: "grep -i \"error\" /var/log/syslog"
        a: "Search all error messages in the system log, case-insensitive"
        rel:
          - ["en-grep-cmd", "Search files for lines matching a pattern", "grep command"]
          - ["en-grep-i", "Case-insensitive — ignore upper/lowercase", "flag -i"]
        labels: ["Filesystem"]
      - q: "grep -n \"TODO\" ~/projects/app.py"
        a: "Find all TODO comments in the Python script with line numbers"
        rel:
          - ["en-grep-n", "Number — show line numbers of matches", "flag -n"]
        labels: ["Filesystem"]
      - q: "grep -r \"database_url\" ~/projects/"
        a: "Search all files under ~/projects/ for database_url — finds forgotten configs too"
        rel:
          - ["en-grep-r", "Recursive — search in directories and subdirectories", "flag -r"]
        labels: ["Filesystem"]
      - q: "grep -v \"^#\" /etc/ssh/sshd_config"
        a: "Show SSH config but hide all comment lines (starting with #)"
        rel:
          - ["en-grep-v", "Invert match — show lines WITHOUT the pattern", "flag -v"]
          - ["en-regex-caret", "^ in regex = start of line", "Regex ^"]
        labels: ["Filesystem", "Config"]

  - title: "🖥️ Terminal Check"
    image: "images/section-04-check.svg"
    explanation: |
      Test your knowledge — type the commands yourself!
    examples:
      - q: "Which command reads a file interactively with scrolling?"
        type: input
        a: "less"
        labels: ["Filesystem"]
      - q: "What does 'tail -f /var/log/nginx/access.log' do?"
        type: select
        options:
          - text: "Follows the file in real time and shows new lines immediately"
            correct: true
          - text: "Shows the last 10 lines and exits"
          - text: "Deletes the last lines of the file"
          - text: "Searches for the term 'nginx'"
        labels: ["Filesystem"]
      - q: "Which command searches case-insensitively for 'error' in a file?"
        type: select
        options:
          - text: "grep -i \"error\" file.txt"
            correct: true
          - text: "grep -n \"error\" file.txt"
          - text: "grep -r \"error\" file.txt"
          - text: "grep -v \"error\" file.txt"
        labels: ["Filesystem"]
      - q: "Which of these grep flags are described correctly?"
        type: multiple-choice
        options:
          - text: "-i ignores case"
            correct: true
          - text: "-n shows line numbers"
            correct: true
          - text: "-r searches directories recursively"
            correct: true
          - text: "-v shows only matches without context"
        labels: ["Filesystem"]
