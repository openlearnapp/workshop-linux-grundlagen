<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 270">
  <defs><style>
    .f{font-family:sans-serif;}
    .ti{animation:tia 11s infinite}@keyframes tia{0%,3%{opacity:0}7%,87%{opacity:1}92%,100%{opacity:0}}
    .c1{animation:c1a 11s infinite}@keyframes c1a{0%,12%{opacity:0}18%,87%{opacity:1}92%,100%{opacity:0}}
    .c2{animation:c2a 11s infinite}@keyframes c2a{0%,30%{opacity:0}36%,87%{opacity:1}92%,100%{opacity:0}}
    .c3{animation:c3a 11s infinite}@keyframes c3a{0%,48%{opacity:0}54%,87%{opacity:1}92%,100%{opacity:0}}
    .ft{animation:fta 11s infinite}@keyframes fta{0%,78%{opacity:0}82%,87%{opacity:1}92%,100%{opacity:0}}
  </style></defs>
  <rect width="640" height="270" rx="12" fill="#0d1117"/>
  <rect width="640" height="48" rx="12" fill="#161b22"/>
  <rect y="36" width="640" height="12" fill="#161b22"/>
  <g class="ti">
    <text x="320" y="85" class="f" font-size="40" text-anchor="middle">📖</text>
    <text x="320" y="120" class="f" font-size="20" font-weight="bold" fill="#e6edf3" text-anchor="middle">File Content</text>
    <text x="320" y="143" class="f" font-size="11" fill="#6e7681" text-anchor="middle">cat · less · head · tail · grep</text>
  </g>
  <g class="c1">
    <rect x="20" y="157" width="185" height="80" rx="8" fill="#0d1520" stroke="#58a6ff" stroke-width="1"/>
    <text x="112" y="192" class="f" font-size="22" text-anchor="middle">📖</text>
    <text x="112" y="213" class="f" font-size="12" font-weight="bold" fill="#58a6ff" text-anchor="middle">Read</text>
    <text x="112" y="228" class="f" font-size="10" fill="#8b949e" text-anchor="middle">cat, less, more</text>
  </g>
  <g class="c2">
    <rect x="227" y="157" width="185" height="80" rx="8" fill="#1a0f08" stroke="#f0883e" stroke-width="1"/>
    <text x="319" y="192" class="f" font-size="22" text-anchor="middle">✂️</text>
    <text x="319" y="213" class="f" font-size="12" font-weight="bold" fill="#f0883e" text-anchor="middle">Extract</text>
    <text x="319" y="228" class="f" font-size="10" fill="#8b949e" text-anchor="middle">head &amp; tail</text>
  </g>
  <g class="c3">
    <rect x="434" y="157" width="185" height="80" rx="8" fill="#0a1a0d" stroke="#3fb950" stroke-width="1"/>
    <text x="526" y="192" class="f" font-size="22" text-anchor="middle">🔍</text>
    <text x="526" y="213" class="f" font-size="12" font-weight="bold" fill="#3fb950" text-anchor="middle">Search</text>
    <text x="526" y="228" class="f" font-size="10" fill="#8b949e" text-anchor="middle">grep</text>
  </g>
  <g class="ft">
    <text x="320" y="258" class="f" font-size="10" fill="#6e7681" text-anchor="middle">cat = concatenate · less = less is more · grep = global regex print</text>
  </g>
</svg>
