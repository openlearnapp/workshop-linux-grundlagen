            correct: true
          - text: "Press the 'Esc' key"
          - text: "Type ':i'"
          - text: "Press the 'v' key"
        labels: ["Editor"]
      - q: "What does ':q!' do in vim?"
        type: select
        options:
          - text: "Exits vim without saving"
            correct: true
          - text: "Saves and exits vim"
          - text: "Searches for the character !"
          - text: "Opens a new file"
        labels: ["Editor"]
      - q: "Which of these vim modes exist?"
        type: multiple-choice
        options:
