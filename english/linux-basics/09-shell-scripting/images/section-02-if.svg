<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="640" height="160" fill="url(#bg)" rx="8"/>
  <!-- Decorative elements -->
  <circle cx="80" cy="60" r="2" fill="#f0883e" opacity="0.15"/><circle cx="95" cy="45" r="1.5" fill="#f0883e" opacity="0.1"/><circle cx="70" cy="100" r="1" fill="#f0883e" opacity="0.12"/>
  <circle cx="560" cy="60" r="2" fill="#f0883e" opacity="0.15"/><circle cx="545" cy="100" r="1.5" fill="#f0883e" opacity="0.1"/><circle cx="570" cy="45" r="1" fill="#f0883e" opacity="0.12"/>
  <!-- Icon -->
  
  <!-- Diamond (decision) -->
  <polygon points="320,35 355,65 320,95 285,65" fill="none" stroke="#f0883e" stroke-width="2" opacity="0.6"/>
  <text x="311" y="69" font-family="monospace" font-size="10" fill="#f0883e">if</text>
  <!-- True branch -->
  <line x1="355" y1="65" x2="390" y2="65" stroke="#3fb950" stroke-width="1.5" opacity="0.5"/>
  <rect x="390" y="55" width="36" height="20" rx="3" fill="#21262d" stroke="#3fb950" stroke-width="1"/>
  <text x="398" y="69" font-family="monospace" font-size="8" fill="#3fb950">then</text>
  <!-- False branch -->
  <line x1="285" y1="65" x2="250" y2="65" stroke="#f85149" stroke-width="1.5" opacity="0.5"/>
  <rect x="214" y="55" width="36" height="20" rx="3" fill="#21262d" stroke="#f85149" stroke-width="1"/>
  <text x="222" y="69" font-family="monospace" font-size="8" fill="#f85149">else</text>
  <!-- Accent bar -->
  <rect x="220" y="152" width="200" height="3" fill="#f0883e" opacity="0.5" rx="1.5"/>
</svg>
