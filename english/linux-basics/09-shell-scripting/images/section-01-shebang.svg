<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="640" height="160" fill="url(#bg)" rx="8"/>
  <!-- Decorative elements -->
  <circle cx="80" cy="60" r="2" fill="#f0883e" opacity="0.15"/><circle cx="95" cy="45" r="1.5" fill="#f0883e" opacity="0.1"/><circle cx="70" cy="100" r="1" fill="#f0883e" opacity="0.12"/>
  <circle cx="560" cy="60" r="2" fill="#f0883e" opacity="0.15"/><circle cx="545" cy="100" r="1.5" fill="#f0883e" opacity="0.1"/><circle cx="570" cy="45" r="1" fill="#f0883e" opacity="0.12"/>
  <!-- Icon -->
  
  <!-- Script file -->
  <rect x="285" y="28" width="70" height="85" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <!-- Shebang line -->
  <text x="293" y="46" font-family="monospace" font-size="9" fill="#bc8cff">#!/bin/bash</text>
  <!-- Variable -->
  <text x="293" y="62" font-family="monospace" font-size="9" fill="#f0883e">NAME=</text>
  <text x="327" y="62" font-family="monospace" font-size="9" fill="#3fb950">"Linux"</text>
  <!-- Echo -->
  <text x="293" y="78" font-family="monospace" font-size="9" fill="#e6edf3">echo</text>
  <text x="318" y="78" font-family="monospace" font-size="9" fill="#3fb950">$NAME</text>
  <!-- Run indicator -->
  <text x="293" y="100" font-family="monospace" font-size="9" fill="#8b949e" opacity="0.4">▶ run</text>
  <!-- Accent bar -->
  <rect x="220" y="152" width="200" height="3" fill="#f0883e" opacity="0.5" rx="1.5"/>
</svg>
