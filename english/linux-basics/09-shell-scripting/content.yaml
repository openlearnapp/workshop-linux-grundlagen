version: 2
number: 9
title: "Shell Scripting Basics"
description: "Variables, if-conditions and loops — write your own scripts and automate tasks"
image: "images/lesson-header.svg"
image_caption: "Code editor with Bash script and syntax highlighting"
sections:
  - title: "Your first script — shebang and variables"
    image: "images/section-01-shebang.svg"
    explanation: |
      Imagine you have the same task every morning:
      Clean up folders, delete old files, print a message.
      It would be boring if you had to type that by hand every day.

      A **shell script** is like a shopping list for the computer.
      You write down once what it should do —
      and then it does it over and over with the press of a button.

      Here's what a simple script looks like:
      ```
      #!/bin/bash
      # This is a comment — the computer ignores it

      NAME="Alice"
      DATE=$(date +%Y-%m-%d)

      echo "Hello, $NAME!"
      echo "Today is: $DATE"
      ```

      The first line `#!/bin/bash` is called the **shebang**.
      It tells Linux: "Run this script with bash."
      Without this line, Linux doesn't know how to read the script.

      **Variables** (storage places for values):
      - To store: `NAME="Alice"` — no spaces around the `=`!
      - To use: `echo $NAME` — the `$` means: "There's a value stored here"
      - Store a command result: `DATE=$(date)` — what `date` outputs goes into `DATE`
    examples:
      - q: "#!/bin/bash"
        a: "Shebang — must be the first line of every Bash script so Linux can run it"
        rel:
          - ["en-shebang", "First line of a script that specifies the interpreter", "#!/bin/bash"]
        labels: ["Scripting"]
      - q: "NAME=\"Alice\" && echo \"Hello, $NAME\""
        a: "Set variable and use it immediately — no spaces around the equals sign!"
        rel:
          - ["en-bash-variable", "Variable in Bash: NAME=value (without $), $NAME (when using)", "variable"]
        labels: ["Scripting"]
      - q: "TODAY=$(date +%d.%m.%Y)"
        a: "Stores today's date in a variable — $(date) returns the current date"
        rel:
          - ["en-command-sub2", "Command substitution: $(command) stores output in variable", "$()"]
          - ["en-date-format", "Date format: %d=day, %m=month, %Y=year", "date +format"]
        labels: ["Scripting"]
      - q: "echo \"Path: $HOME, User: $USER\""
        a: "Linux automatically provides useful variables — HOME and USER are always available"
        rel:
          - ["en-env-user", "Environment variable with current username", "$USER"]
          - ["en-env-home2", "Environment variable with path to home directory", "$HOME"]
        labels: ["Scripting"]

  - title: "if-conditions — the script thinks along"
    image: "images/section-02-if.svg"
    explanation: |
      Sometimes your script should react differently depending on the situation.
      "If the file exists — then do this. Otherwise do something else."

      That's called an **if-condition**:
      ```
      #!/bin/bash

      if [ -f "/etc/nginx/nginx.conf" ]; then
          echo "Nginx is installed!"
      elif [ -d "/etc/apache2" ]; then
          echo "Apache is installed."
      else
          echo "No web server found."
      fi
      ```

      The `fi` at the end — that's just "if" spelled backwards.
      That's how bash knows the condition is finished.

      Important test characters:
      - `-f file` — Checks: Is that a file?
      - `-d path` — Checks: Is that a folder?
      - `-z "$var"` — Checks: Is the variable empty?
      - `"$a" = "$b"` — Checks: Are two texts equal?
      - `$a -gt $b` — Checks: Is number a greater than b? (gt = greater than)
    examples:
      - q: "if [ -f \"~/.ssh/id_ed25519\" ]; then echo \"SSH key exists\"; fi"
        a: "Checks if an SSH key exists — -f checks if it's a file"
        rel:
          - ["en-if-bash", "if [ condition ]; then commands; fi — basic structure", "if-then-fi"]
          - ["en-test-f", "-f tests whether file exists", "test operator -f"]
        labels: ["Scripting", "Security"]
      - q: "[ -d /var/www ] && echo \"Web directory exists\""
        a: "Shorthand: && means 'and if that's true, then...' — only one line needed"
        rel:
          - ["en-test-d", "-d tests whether directory exists", "test operator -d"]
        labels: ["Scripting"]
      - q: "if [ \"$USER\" = \"root\" ]; then echo \"You are the administrator!\"; fi"
        a: "Checks if the script is running as administrator — useful before system changes"
        rel:
          - ["en-string-compare", "Compare strings in Bash with =", "string comparison"]
        labels: ["Scripting", "Security"]

  - title: "Loops — repeat something many times"
    image: "images/section-03-loops.svg"
    explanation: |
      Imagine you need to rename 100 files.
      By hand that would take forever.
      A **loop** does it in seconds.

      The **for loop** goes through a list, item by item:
      ```
      for FILE in *.log; do
          echo "Processing: $FILE"
          gzip "$FILE"
      done
      ```
      The `do` means "then do this:", `done` means "finished".

      The **while loop** runs as long as a condition is true:
      ```
      COUNTER=1
      while [ $COUNTER -le 5 ]; do
          echo "Run $COUNTER"
          COUNTER=$((COUNTER + 1))
      done
      ```
      `-le` means "less or equal".

      A real example — backup for three folders at once:
      ```
      #!/bin/bash
      DATE=$(date +%Y%m%d)
      for FOLDER in ~/documents ~/pictures ~/projects; do
          tar -czf "/backup/${DATE}_$(basename $FOLDER).tar.gz" "$FOLDER"
          echo "Backup created: $FOLDER"
      done
      ```
    examples:
      - q: "for i in 1 2 3 4 5; do echo \"Number: $i\"; done"
        a: "Loop over the numbers 1 to 5 — prints each number once"
        rel:
          - ["en-for-loop", "For loop: for VAR in LIST; do ... done", "for-do-done"]
        labels: ["Scripting"]
      - q: "for USER in alice bob charlie; do useradd \"$USER\"; done"
        a: "Creates three users at once — instead of typing the same command three times"
        rel:
          - ["en-for-list", "For loop over a list of values", "for VAR in val1 val2"]
        labels: ["Scripting", "Security"]
      - q: "for f in /var/log/*.log; do echo \"$(wc -l < $f) lines: $f\"; done"
        a: "Counts the lines of each log file and prints the result"
        rel:
          - ["en-for-glob", "For loop with glob pattern over files", "for f in *.ext"]
          - ["en-wc-l", "Word Count -l — count lines in a file", "wc -l"]
        labels: ["Scripting", "Filesystem"]
      - q: "while true; do df -h / | grep '/'; sleep 60; done"
        a: "Checks disk space every minute — runs until you press Ctrl+C"
        rel:
          - ["en-while-loop", "While loop: while condition; do ... done", "while-do-done"]
          - ["en-while-true", "while true — infinite loop, only stop with Ctrl+C", "while true"]
        labels: ["Scripting"]

  - title: "Terminal Check"
    image: "images/section-04-check.svg"
    explanation: |
      Test your knowledge — type the commands directly!
    examples:
      - q: "What is the first line of every Bash script (shebang)?"
        type: input
        a: "#!/bin/bash"
        labels: ["Scripting"]
      - q: "What must you watch out for when assigning a Bash variable?"
        type: select
        options:
          - text: "No spaces around the equals sign: NAME=\"Alice\""
            correct: true
          - text: "Always put $ before the variable name: $NAME=\"Alice\""
          - text: "Variables must be in uppercase"
          - text: "Variables must be declared with export"
        labels: ["Scripting"]
      - q: "Which word closes an if-condition in Bash?"
        type: select
        options:
          - text: "fi"
            correct: true
          - text: "end"
          - text: "endif"
          - text: "done"
        labels: ["Scripting"]
      - q: "Which of these statements about shell scripting are true?"
        type: multiple-choice
        options:
          - text: "$() stores the result of a command in a variable"
            correct: true
          - text: "for loops end with 'done'"
            correct: true
          - text: "-f checks whether a file exists"
            correct: true
          - text: "Spaces around = are required for variables"
        labels: ["Scripting"]
