<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230">
  <defs><style>
    .f{font-family:sans-serif;}
    .ti{animation:tia 11s infinite}@keyframes tia{0%,3%{opacity:0}7%,87%{opacity:1}92%,100%{opacity:0}}
    .c1{animation:c1a 11s infinite}@keyframes c1a{0%,12%{opacity:0}18%,87%{opacity:1}92%,100%{opacity:0}}
    .c2{animation:c2a 11s infinite}@keyframes c2a{0%,30%{opacity:0}36%,87%{opacity:1}92%,100%{opacity:0}}
    .c3{animation:c3a 11s infinite}@keyframes c3a{0%,48%{opacity:0}54%,87%{opacity:1}92%,100%{opacity:0}}
    .c4{animation:c4a 11s infinite}@keyframes c4a{0%,65%{opacity:0}71%,87%{opacity:1}92%,100%{opacity:0}}
    .ft{animation:fta 11s infinite}@keyframes fta{0%,78%{opacity:0}82%,87%{opacity:1}92%,100%{opacity:0}}
  </style></defs>
  <rect width="640" height="230" rx="12" fill="#0d1117"/>
  <rect width="640" height="40" rx="12" fill="#161b22"/>
  <rect y="28" width="640" height="12" fill="#161b22"/>
  <g class="ti">
    <text x="320" y="24" class="f" font-size="13" font-weight="bold" fill="#e6edf3" text-anchor="middle">ls — see what's in the folder</text>
  </g>
  <g class="c1">
    <rect x="10" y="46" width="148" height="164" rx="8" fill="#0d1520" stroke="#58a6ff" stroke-width="1"/>
    <text x="84" y="88" class="f" font-size="28" text-anchor="middle">📋</text>
    <text x="84" y="110" class="f" font-size="11" font-weight="bold" fill="#58a6ff" text-anchor="middle">ls</text>
    <text x="84" y="128" class="f" font-size="10" fill="#8b949e" text-anchor="middle">List files</text>
    <text x="84" y="144" class="f" font-size="10" fill="#8b949e" text-anchor="middle">and folders</text>
  </g>
  <g class="c2">
    <rect x="166" y="46" width="148" height="164" rx="8" fill="#0a1a0d" stroke="#3fb950" stroke-width="1"/>
    <text x="240" y="88" class="f" font-size="28" text-anchor="middle">🔍</text>
    <text x="240" y="110" class="f" font-size="11" font-weight="bold" fill="#3fb950" text-anchor="middle">ls -l</text>
    <text x="240" y="128" class="f" font-size="10" fill="#8b949e" text-anchor="middle">Details: permissions</text>
    <text x="240" y="144" class="f" font-size="10" fill="#8b949e" text-anchor="middle">size · date</text>
  </g>
  <g class="c3">
    <rect x="322" y="46" width="148" height="164" rx="8" fill="#1a0f08" stroke="#f0883e" stroke-width="1"/>
    <text x="396" y="88" class="f" font-size="28" text-anchor="middle">👁️</text>
    <text x="396" y="110" class="f" font-size="11" font-weight="bold" fill="#f0883e" text-anchor="middle">ls -a</text>
    <text x="396" y="128" class="f" font-size="10" fill="#8b949e" text-anchor="middle">Hidden files too</text>
    <text x="396" y="144" class="f" font-size="10" fill="#8b949e" text-anchor="middle">(.bashrc etc.)</text>
  </g>
  <g class="c4">
    <rect x="478" y="46" width="148" height="164" rx="8" fill="#110d1a" stroke="#bc8cff" stroke-width="1"/>
    <text x="552" y="88" class="f" font-size="28" text-anchor="middle">✨</text>
    <text x="552" y="110" class="f" font-size="11" font-weight="bold" fill="#bc8cff" text-anchor="middle">ls -la</text>
    <text x="552" y="128" class="f" font-size="10" fill="#8b949e" text-anchor="middle">All combined</text>
    <text x="552" y="144" class="f" font-size="10" fill="#8b949e" text-anchor="middle">the all-rounder!</text>
  </g>
  <g class="ft">
    <text x="320" y="224" class="f" font-size="10" fill="#6e7681" text-anchor="middle">ls = list · -l = long format · -a = all files · -h = human-readable</text>
  </g>
</svg>
