version: 2
number: 2
title: "The Terminal — First Steps"
description: "Get to know the terminal and master your first three commands: pwd, ls and cd"
image: "images/lesson-header.svg"
image_caption: "Terminal window with prompt and commands"
sections:
  - title: "The terminal — your voice to the computer"
    image: "images/section-01-open-terminal.svg"
    explanation: |
      The **terminal** (also called: console, command line, or shell) is like
      a direct line to the computer. Instead of clicking with the mouse, you type
      commands — and the computer responds with text.

      That might sound complicated, but it's really simple!
      You learn a few words (the commands) — and the computer does exactly that.

      When you open the terminal, you see the **prompt**
      (the computer is waiting for your input):
      ```
      alice@ubuntu:~$
      ```
      This means:
      - `alice` = your username (your name)
      - `ubuntu` = the name of your computer
      - `~` = you're currently in your personal folder
      - `$` = you are a regular user (not an administrator)

      Your **first important command:** `pwd`
      It shows you which folder you're currently in.
      PWD stands for "Print Working Directory" — show me my working folder.
    examples:
      - q: "pwd"
        a: "Shows the path to the current folder — e.g. /home/alice. You always know where you are!"
        rel:
          - ["en-pwd", "Print Working Directory — show current directory", "command"]
        labels: ["Basics"]
      - q: "whoami"
        a: "Shows your username — as in 'Who am I?'"
        rel:
          - ["en-whoami", "Print the current username", "command"]
        labels: ["Basics"]
      - q: "date"
        a: "Shows the current date and time"
        rel:
          - ["en-date-cmd", "Display current date and time", "date command"]
        labels: ["Basics"]

  - title: "ls — see what's in the folder"
    image: "images/section-02-ls.svg"
    explanation: |
      `ls` shows you what's inside a folder.
      LS stands for "list".

      Just like a light switch has extras you can turn on,
      there are **flags** (small options you add after a `-`):

      | Command | What it shows |
      |---------|--------------|
      | `ls` | Just the names of files and folders |
      | `ls -l` | Details: who can do what, size, when changed |
      | `ls -a` | Also hidden files (those starting with a dot, e.g. `.bashrc`) |
      | `ls -la` | Details AND hidden files together |
      | `ls -lh` | File sizes in readable form (KB, MB, GB instead of long numbers) |

      Super tip: You can write `-l` and `-a` together as `-la` —
      that's a shortcut!

      Here's what a detail line looks like:
      ```
      -rw-r--r-- 1 alice alice 4096 Mar 20 10:23 notes.txt
      ```
      That's: permissions — owner — size — date — filename.
      You'll learn more about permissions in Lesson 5!
    examples:
      - q: "ls -la"
        a: "All files including hidden files with details (permissions, size, date) — very useful!"
        rel:
          - ["en-ls-l", "Long format — detailed view", "flag -l"]
          - ["en-ls-a", "All — including hidden files (.dotfiles)", "flag -a"]
        labels: ["Basics", "Filesystem"]
      - q: "ls -lh /var/log"
        a: "Shows files in the log folder with easy-to-read sizes (KB, MB)"
        rel:
          - ["en-ls-h", "Human-readable — readable file sizes (KB/MB/GB)", "flag -h"]
          - ["en-var-log", "System log directory — where Linux stores logs", "/var/log"]
        labels: ["Filesystem"]
      - q: "ls -lt ~/.ssh"
        a: "Shows files in the SSH folder, newest file first"
        rel:
          - ["en-ls-t", "Time — sort by modification time, newest first", "flag -t"]
          - ["en-ssh-dir", "Directory for SSH keys and configuration", "~/.ssh"]
        labels: ["Filesystem", "Security"]
      - q: "ls -la /etc/nginx/"
        a: "Show all files in the nginx folder with details (nginx is a web server program)"
        rel:
          - ["en-nginx-dir", "Configuration directory of the Nginx web server", "/etc/nginx/"]
        labels: ["Filesystem", "Config"]

  - title: "cd — move from folder to folder"
    image: "images/section-03-cd.svg"
    explanation: |
      With `cd` you move between folders.
      CD stands for "Change Directory".

      Think of the filesystem like a house: each room is a folder.
      With `cd` you go from room to room.

      | Command | What happens? |
      |---------|---------------|
      | `cd /` | All the way up — to the root of the filesystem |
      | `cd ~` | Back to your personal folder (also: just `cd`) |
      | `cd ..` | Go one folder up (like Backspace) |
      | `cd ../..` | Go two folders up |
      | `cd -` | Go back to the last folder (like the back button in a browser!) |
      | `cd /etc` | Jump directly to a specific folder |

      **Secret trick — Tab key:**
      Type `cd /etc/ngi` and then press `Tab` (the key above Caps Lock).
      The terminal automatically completes to `cd /etc/nginx/` — saves a lot of typing!
    examples:
      - q: "cd /var/log"
        a: "Goes directly to the log folder — this is called an absolute path (always starts with /)"
        rel:
          - ["en-cd-cmd", "Change Directory — switch directories", "cd command"]
          - ["en-absolute-path", "Path that always starts with /, independent of location", "absolute path"]
        labels: ["Filesystem"]
      - q: "cd .."
        a: "Go one folder up — from /home/alice you get to /home"
        rel:
          - ["en-dotdot", "Two dots = parent directory (the folder above)", ".."]
        labels: ["Filesystem"]
      - q: "cd ~"
        a: "Always back to your personal folder — no matter where you are"
        rel:
          - ["en-tilde", "Shortcut for your own home directory", "~"]
        labels: ["Filesystem"]
      - q: "cd -"
        a: "Jumps to the last visited folder — super handy!"
        rel:
          - ["en-cd-minus", "Return to previous directory", "cd -"]
        labels: ["Filesystem"]
      - q: "cd /home/alice/projects && pwd"
        a: "Goes to the projects folder and then immediately shows the path"
        rel:
          - ["en-double-amp", "Run two commands in a row — second runs only if the first succeeded", "&&"]
        labels: ["Filesystem"]

  - title: "Terminal Check"
    image: "images/section-04-check.svg"
    explanation: |
      Test your knowledge now!
    examples:
      - q: "Which command shows your current folder?"
        type: input
        a: "pwd"
        labels: ["Basics"]
      - q: "What does the command 'ls -la' do?"
        type: select
        options:
          - text: "Show all files including hidden ones, with details"
            correct: true
          - text: "Delete all files"
          - text: "Undo the last action"
          - text: "Show log files"
        labels: ["Basics", "Filesystem"]
      - q: "Which command switches to the last visited folder?"
        type: select
        options:
          - text: "cd -"
            correct: true
          - text: "cd .."
          - text: "cd ~"
          - text: "cd /"
        labels: ["Filesystem"]
      - q: "Which of these flags belong to the 'ls' command?"
        type: multiple-choice
        options:
          - text: "-l"
            correct: true
          - text: "-a"
            correct: true
          - text: "-x"
          - text: "-h"
            correct: true
          - text: "-t"
            correct: true
        labels: ["Basics"]
