<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230">
  <defs><style>
    .f{font-family:sans-serif;}
    .ti{animation:tia 11s infinite}@keyframes tia{0%,3%{opacity:0}7%,87%{opacity:1}92%,100%{opacity:0}}
    .r{animation:ra 11s infinite}@keyframes ra{0%,8%{opacity:0}14%,87%{opacity:1}92%,100%{opacity:0}}
    .n1{animation:n1a 11s infinite}@keyframes n1a{0%,20%{opacity:0}26%,87%{opacity:1}92%,100%{opacity:0}}
    .n2{animation:n2a 11s infinite}@keyframes n2a{0%,32%{opacity:0}38%,87%{opacity:1}92%,100%{opacity:0}}
    .n3{animation:n3a 11s infinite}@keyframes n3a{0%,44%{opacity:0}50%,87%{opacity:1}92%,100%{opacity:0}}
    .n4{animation:n4a 11s infinite}@keyframes n4a{0%,56%{opacity:0}62%,87%{opacity:1}92%,100%{opacity:0}}
    .n5{animation:n5a 11s infinite}@keyframes n5a{0%,65%{opacity:0}71%,87%{opacity:1}92%,100%{opacity:0}}
    .ft{animation:fta 11s infinite}@keyframes fta{0%,75%{opacity:0}80%,87%{opacity:1}92%,100%{opacity:0}}
  </style></defs>
  <rect width="640" height="230" rx="12" fill="#0d1117"/>
  <rect width="640" height="40" rx="12" fill="#161b22"/>
  <rect y="28" width="640" height="12" fill="#161b22"/>
  <g class="ti">
    <text x="320" y="24" class="f" font-size="13" font-weight="bold" fill="#e6edf3" text-anchor="middle">The Linux Filesystem — everything has its place</text>
  </g>
  <!-- Root node -->
  <g class="r">
    <rect x="271" y="52" width="98" height="30" rx="6" fill="#1a0f08" stroke="#f0883e" stroke-width="1.5"/>
    <text x="320" y="72" class="f" font-size="14" font-weight="bold" fill="#f0883e" text-anchor="middle">/  (root)</text>
    <!-- trunk -->
    <line x1="320" y1="82" x2="320" y2="96" stroke="#30363d" stroke-width="1.5"/>
    <!-- horizontal bar -->
    <line x1="76" y1="96" x2="564" y2="96" stroke="#30363d" stroke-width="1.5"/>
    <!-- verticals down -->
    <line x1="76" y1="96" x2="76" y2="112" stroke="#30363d" stroke-width="1.5"/>
    <line x1="198" y1="96" x2="198" y2="112" stroke="#30363d" stroke-width="1.5"/>
    <line x1="320" y1="96" x2="320" y2="112" stroke="#30363d" stroke-width="1.5"/>
    <line x1="442" y1="96" x2="442" y2="112" stroke="#30363d" stroke-width="1.5"/>
    <line x1="564" y1="96" x2="564" y2="112" stroke="#30363d" stroke-width="1.5"/>
  </g>
  <!-- Node /home (blue) -->
  <g class="n1">
    <rect x="28" y="112" width="96" height="52" rx="6" fill="#0d1520" stroke="#58a6ff" stroke-width="1"/>
    <text x="76" y="134" class="f" font-size="11" font-weight="bold" fill="#58a6ff" text-anchor="middle">/home</text>
    <text x="76" y="150" class="f" font-size="9" fill="#8b949e" text-anchor="middle">Your personal</text>
    <text x="76" y="162" class="f" font-size="9" fill="#8b949e" text-anchor="middle">folder (~)</text>
  </g>
  <!-- Node /etc (green) -->
  <g class="n2">
    <rect x="150" y="112" width="96" height="52" rx="6" fill="#0a1a0d" stroke="#3fb950" stroke-width="1"/>
    <text x="198" y="134" class="f" font-size="11" font-weight="bold" fill="#3fb950" text-anchor="middle">/etc</text>
    <text x="198" y="150" class="f" font-size="9" fill="#8b949e" text-anchor="middle">Configuration</text>
    <text x="198" y="162" class="f" font-size="9" fill="#8b949e" text-anchor="middle">files</text>
  </g>
  <!-- Node /bin (orange) -->
  <g class="n3">
    <rect x="272" y="112" width="96" height="52" rx="6" fill="#1a0f08" stroke="#f0883e" stroke-width="1"/>
    <text x="320" y="134" class="f" font-size="11" font-weight="bold" fill="#f0883e" text-anchor="middle">/bin</text>
    <text x="320" y="150" class="f" font-size="9" fill="#8b949e" text-anchor="middle">Programs</text>
    <text x="320" y="162" class="f" font-size="9" fill="#8b949e" text-anchor="middle">ls, cd, ...</text>
  </g>
  <!-- Node /tmp (red) -->
  <g class="n4">
    <rect x="394" y="112" width="96" height="52" rx="6" fill="#180a0a" stroke="#f85149" stroke-width="1"/>
    <text x="442" y="134" class="f" font-size="11" font-weight="bold" fill="#f85149" text-anchor="middle">/tmp</text>
    <text x="442" y="150" class="f" font-size="9" fill="#8b949e" text-anchor="middle">Temporary</text>
    <text x="442" y="162" class="f" font-size="9" fill="#8b949e" text-anchor="middle">files</text>
  </g>
  <!-- Node /dev (purple) -->
  <g class="n5">
    <rect x="516" y="112" width="96" height="52" rx="6" fill="#110d1a" stroke="#bc8cff" stroke-width="1"/>
    <text x="564" y="134" class="f" font-size="11" font-weight="bold" fill="#bc8cff" text-anchor="middle">/dev</text>
    <text x="564" y="150" class="f" font-size="9" fill="#8b949e" text-anchor="middle">Devices</text>
    <text x="564" y="162" class="f" font-size="9" fill="#8b949e" text-anchor="middle">USB, Disk</text>
  </g>
  <!-- Tip box -->
  <g class="ft">
    <rect x="20" y="178" width="600" height="38" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="320" y="198" class="f" font-size="10" fill="#8b949e" text-anchor="middle">~ is a shortcut for your home folder · Try: ls /</text>
  </g>
</svg>
