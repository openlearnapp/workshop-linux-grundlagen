<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210">
  <defs><style>
    .f{font-family:sans-serif;}
    .ti{animation:tia 11s infinite}@keyframes tia{0%,3%{opacity:0}7%,87%{opacity:1}92%,100%{opacity:0}}
    .c1{animation:c1a 11s infinite}@keyframes c1a{0%,12%{opacity:0}18%,87%{opacity:1}92%,100%{opacity:0}}
    .c2{animation:c2a 11s infinite}@keyframes c2a{0%,30%{opacity:0}36%,87%{opacity:1}92%,100%{opacity:0}}
    .c3{animation:c3a 11s infinite}@keyframes c3a{0%,48%{opacity:0}54%,87%{opacity:1}92%,100%{opacity:0}}
    .ft{animation:fta 11s infinite}@keyframes fta{0%,78%{opacity:0}82%,87%{opacity:1}92%,100%{opacity:0}}
  </style></defs>
  <rect width="640" height="210" rx="12" fill="#0d1117"/>
  <rect width="640" height="40" rx="12" fill="#161b22"/>
  <rect y="28" width="640" height="12" fill="#161b22"/>
  <g class="ti">
    <text x="320" y="24" class="f" font-size="13" font-weight="bold" fill="#e6edf3" text-anchor="middle">3 ways to try Linux</text>
  </g>
  <!-- Card 1: Browser (green) with RECOMMENDED badge -->
  <g class="c1">
    <rect x="20" y="46" width="185" height="148" rx="8" fill="#0a1a0d" stroke="#3fb950" stroke-width="1"/>
    <rect x="42" y="54" width="141" height="18" rx="4" fill="#3fb950"/>
    <text x="112" y="67" class="f" font-size="9" font-weight="bold" fill="#0d1117" text-anchor="middle">★ RECOMMENDED</text>
    <text x="112" y="103" class="f" font-size="28" text-anchor="middle">🌐</text>
    <text x="112" y="124" class="f" font-size="12" font-weight="bold" fill="#3fb950" text-anchor="middle">In the Browser</text>
    <text x="112" y="142" class="f" font-size="10" fill="#8b949e" text-anchor="middle">webminal.org</text>
    <text x="112" y="158" class="f" font-size="10" fill="#8b949e" text-anchor="middle">No download! ✓</text>
  </g>
  <!-- Card 2: Windows WSL (blue) -->
  <g class="c2">
    <rect x="227" y="46" width="185" height="148" rx="8" fill="#0d1520" stroke="#58a6ff" stroke-width="1"/>
    <text x="319" y="103" class="f" font-size="28" text-anchor="middle">🪟</text>
    <text x="319" y="124" class="f" font-size="12" font-weight="bold" fill="#58a6ff" text-anchor="middle">Windows → WSL</text>
    <text x="319" y="142" class="f" font-size="10" fill="#8b949e" text-anchor="middle">Open PowerShell</text>
    <text x="319" y="158" class="f" font-size="10" fill="#8b949e" text-anchor="middle">wsl --install</text>
  </g>
  <!-- Card 3: Mac Terminal (orange) -->
  <g class="c3">
    <rect x="434" y="46" width="185" height="148" rx="8" fill="#1a0f08" stroke="#f0883e" stroke-width="1"/>
    <text x="526" y="103" class="f" font-size="28" text-anchor="middle">🍎</text>
    <text x="526" y="124" class="f" font-size="12" font-weight="bold" fill="#f0883e" text-anchor="middle">Mac → Terminal</text>
    <text x="526" y="142" class="f" font-size="10" fill="#8b949e" text-anchor="middle">Finder → Applications</text>
    <text x="526" y="158" class="f" font-size="10" fill="#8b949e" text-anchor="middle">→ Terminal</text>
  </g>
  <g class="ft">
    <text x="320" y="204" class="f" font-size="10" fill="#6e7681" text-anchor="middle">All three methods are free — no risk, nothing can break!</text>
  </g>
</svg>
