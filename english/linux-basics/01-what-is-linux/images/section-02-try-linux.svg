<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="640" height="160" fill="url(#bg)" rx="8"/>
  <!-- Decorative dots -->
  <circle cx="80" cy="60" r="2" fill="#58a6ff" opacity="0.4"/><circle cx="95" cy="45" r="1.5" fill="#58a6ff" opacity="0.35"/><circle cx="70" cy="100" r="1" fill="#58a6ff" opacity="0.35"/>
  <circle cx="560" cy="60" r="2" fill="#58a6ff" opacity="0.4"/><circle cx="545" cy="100" r="1.5" fill="#58a6ff" opacity="0.35"/><circle cx="570" cy="45" r="1" fill="#58a6ff" opacity="0.35"/>

  <!-- Browser window frame -->
  <rect x="190" y="18" width="260" height="124" rx="7" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <!-- Browser top bar -->
  <rect x="190" y="18" width="260" height="22" rx="7" fill="#21262d"/>
  <rect x="190" y="30" width="260" height="10" fill="#21262d"/>
  <!-- macOS dots -->
  <circle cx="207" cy="29" r="4" fill="#f85149" opacity="1"/>
  <circle cx="221" cy="29" r="4" fill="#f0883e" opacity="1"/>
  <circle cx="235" cy="29" r="4" fill="#3fb950" opacity="1"/>
  <!-- URL bar -->
  <rect x="250" y="23" width="160" height="12" rx="4" fill="#0d1117" opacity="0.8"/>
  <text x="255" y="33" font-family="monospace" font-size="7.5" fill="#8b949e">webminal.org</text>

  <!-- Terminal content inside browser -->
  <text x="205" y="60" font-family="monospace" font-size="9.5" fill="#3fb950">user@linux:~$</text>
  <text x="313" y="60" font-family="monospace" font-size="9.5" fill="#e6edf3">uname -s</text>
  <text x="205" y="77" font-family="monospace" font-size="9.5" fill="#58a6ff">Linux</text>
  <text x="205" y="94" font-family="monospace" font-size="9.5" fill="#3fb950">user@linux:~$</text>
  <!-- Blinking cursor -->
  <rect x="313" y="84" width="7" height="12" fill="#e6edf3" opacity="1">
    <animate attributeName="opacity" values="0.9;0.1;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Accent bar -->
  <rect x="180" y="152" width="280" height="4" fill="#58a6ff" opacity="0.8" rx="1.5"/>
</svg>
