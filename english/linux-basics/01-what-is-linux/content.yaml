version: 2
number: 1
title: "What is Linux?"
description: "Learn what Linux is, where it's hiding everywhere, and how you can try it right now"
image: "images/lesson-header.svg"
image_caption: "Tux Penguin with server racks"
sections:
  - title: "Linux — the software that runs everything"
    image: "images/section-01-history.svg"
    explanation: |
      **Linux** is an operating system.

      An operating system (short: OS) is the most important
      software on your computer. It makes sure everything works:
      that you can type, that programs start, that the screen lights up.

      Windows and macOS are operating systems too. Linux is another option —
      and it has one huge advantage:

      Linux is **free** and anyone can use it, modify it, and share it.
      This is called **Open Source** — the blueprint is visible to everyone.

      Linux is everywhere — even when you don't know it:
      - Almost all **websites** run on Linux servers (a server is a computer
        that runs around the clock and provides data)
      - **Android phones** are based on Linux
      - **Smart TVs**, washing machines, cars — often running Linux!
      - **Raspberry Pi** (a mini-computer for about $35) runs on Linux

      Great! Now you already know what Linux is.
    examples:
      - q: "uname -r"
        a: "Shows the Linux kernel version (e.g. 5.15.0-91-generic) — the kernel is the heart of Linux"
        rel:
          - ["en-uname", "Unix Name — display system information", "command"]
          - ["en-uname-r", "Kernel release version", "flag -r = release"]
        labels: ["Basics"]
      - q: "uname -a"
        a: "All system information at once: kernel version, computer name and more"
        rel:
          - ["en-uname-a", "All system info (All)", "flag -a = all"]
        labels: ["Basics"]
      - q: "cat /etc/os-release"
        a: "Shows which Linux version is installed (e.g. Ubuntu 22.04)"
        rel:
          - ["en-os-release", "File containing distribution and version information", "/etc/os-release"]
          - ["en-cat-cmd", "Print file contents in the terminal", "cat command"]
        labels: ["Basics", "Filesystem"]

  - title: "Try Linux right now — no installation needed"
    image: "images/section-02-try-linux.svg"
    explanation: |
      You don't need to install anything to try Linux!

      **Directly in the browser (recommended for beginners):**

      Go to **webminal.org** — it's a real Linux terminal
      that runs right in your browser. Free, no installation, start immediately!

      **On Windows:**

      Open the search (Windows key), type "PowerShell" and enter:
      ```
      wsl --install
      ```
      This installs Ubuntu (a popular Linux version) directly in Windows.
      Then you can start Ubuntu like a normal app!

      **On a Mac:**

      Open Terminal (Finder → Applications → Utilities → Terminal).
      macOS is very similar to Linux — almost all commands from this course work!

      **Recommendation:** Start with **webminal.org**.
      No risk, no download — just get going!
    examples:
      - q: "uname -s"
        a: "Shows the operating system — on Linux it says 'Linux', on macOS it says 'Darwin'"
        rel:
          - ["en-uname-s", "System name — shows if Linux, Darwin (macOS), etc.", "flag -s = system"]
        labels: ["Basics"]
      - q: "wsl --install"
        a: "Installs WSL2 (Windows Subsystem for Linux) and Ubuntu on Windows — brings Linux into Windows!"
        rel:
          - ["en-wsl-install", "Install WSL2 and Ubuntu on Windows 10/11", "Windows PowerShell command"]
          - ["en-wsl2", "Windows Subsystem for Linux — Linux integrated directly into Windows", "WSL2"]
        labels: ["Basics", "Installation"]
      - q: "bash --version"
        a: "Shows the installed Bash version — Bash is the program that understands your commands"
        rel:
          - ["en-bash-version", "Show installed Bash shell version", "command bash --version"]
          - ["en-bash-shell", "Bash — the program that receives and runs commands in the terminal", "Shell"]
        labels: ["Basics"]

  - title: "Linux flavors — something for everyone"
    image: "images/section-02-distros.svg"
    explanation: |
      Linux comes in many flavors. They are called **distributions**
      (pronounced: dis-tri-BYU-shuns), or distros for short.

      Imagine: The Linux kernel (the innermost part that controls the hardware)
      is like an engine. Different teams then build different cars around it.

      Here are the most well-known Linux flavors:

      | Name | Who is it for? |
      |------|----------------|
      | **Ubuntu** | Great for beginners — lots of help online, easy to install |
      | **Debian** | Very stable — popular for servers |
      | **Raspberry Pi OS** | Made especially for the Raspberry Pi mini-computer |
      | **Kali Linux** | For security research (only once you know the basics!) |

      In this course you'll learn commands that work on **all** Linux flavors.
      That's the great thing: learn once, use everywhere!
    examples:
      - q: "lsb_release -a"
        a: "Shows which Linux flavor (distribution) and which version is installed"
        rel:
          - ["en-lsb-release", "Linux Standard Base information", "lsb_release command"]
          - ["en-lsb-a", "All available LSB information", "flag -a"]
        labels: ["Basics"]
      - q: "hostnamectl"
        a: "Shows the computer name, operating system and kernel version in a nice format"
        rel:
          - ["en-hostnamectl", "Manage hostname and display system information", "command"]
        labels: ["Basics"]
      - q: "arch"
        a: "Shows the processor type — e.g. x86_64 means: 64-bit computer (the standard PC/laptop)"
        rel:
          - ["en-arch-cmd", "Display processor architecture", "arch command"]
          - ["en-x86-64", "64-bit Intel/AMD architecture, today's standard for PCs and laptops", "architecture"]
        labels: ["Basics"]

  - title: "The Linux filesystem — everything has its place"
    image: "images/section-03-filesystem.svg"
    explanation: |
      In Linux, all files are organized in one big tree.

      The tree starts at the very top with `/` — this is called **root**.
      From there, all folders branch out.

      Here are the most important folders and what's inside:

      | Folder | What's in it? |
      |--------|---------------|
      | `/home` | Your personal folder — like your room |
      | `/etc` | Settings files for the system (like the control panel) |
      | `/bin` | Programs anyone can use (e.g. ls, cd) |
      | `/tmp` | Temporary files — deleted on restart |
      | `/dev` | Devices like hard drives and USB sticks (as files!) |

      The `~` character (tilde, on your keyboard top-left) is a shortcut
      for your personal folder. If your name is alice,
      `~` stands for `/home/alice`.

      Give it a try! Type `ls /` in the terminal to see the root contents.
    examples:
      - q: "ls /"
        a: "Shows all folders at the very top of the filesystem — the root of the tree"
        rel:
          - ["en-ls-cmd", "List — show directory contents", "ls command"]
          - ["en-root-dir", "The topmost directory of the Linux filesystem", "/ (root)"]
        labels: ["Filesystem"]
      - q: "ls /etc | head -5"
        a: "Shows the first 5 entries in the settings folder /etc"
        rel:
          - ["en-etc-dir", "System configuration files directory", "/etc"]
          - ["en-pipe-head", "Pass output through pipe to head", "| head -5"]
        labels: ["Filesystem", "Config"]
      - q: "echo $HOME"
        a: "Shows the path to your personal folder (e.g. /home/alice)"
        rel:
          - ["en-echo-cmd", "Print text or variable to the terminal", "echo command"]
          - ["en-home-var", "Environment variable with path to home directory", "$HOME"]
        labels: ["Filesystem", "Basics"]

  - title: "Terminal Check"
    image: "images/section-04-check.svg"
    explanation: |
      Test your knowledge now!
    examples:
      - q: "Which command shows the current Linux kernel version?"
        type: input
        a: "uname -r"
        labels: ["Basics"]
      - q: "What does the command 'lsb_release -a' do?"
        type: select
        options:
          - text: "Shows the exact distribution and version"
            correct: true
          - text: "Deletes all log files"
          - text: "Updates the Linux kernel"
          - text: "Restarts the system"
        labels: ["Basics"]
      - q: "Which command shows which Linux version is installed?"
        type: select
        options:
          - text: "cat /etc/os-release"
            correct: true
          - text: "cat /etc/passwd"
          - text: "ls /usr/bin"
          - text: "echo $PATH"
        labels: ["Basics"]
      - q: "Which of these statements about Linux are true?"
        type: multiple-choice
        options:
          - text: "Linux is open source"
            correct: true
          - text: "Linux runs on almost all web servers worldwide"
            correct: true
          - text: "Linux has only one single flavor"
          - text: "Android is based on Linux"
            correct: true
        labels: ["Basics"]
