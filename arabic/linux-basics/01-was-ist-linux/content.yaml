version: 2
number: 1
title: "ما هو لينكس؟"
description: "تعلّم ما هو لينكس، وأين يُستخدم، وكيف يمكنك تجربته الآن"
image: "images/lesson-header.svg"
image_caption: "Tux Penguin mit Server-Racks"
sections:
  - title: "لينكس — البرنامج الذي يُشغّل كل شيء"
    image: "images/section-01-history.svg"
    explanation: |
      **لينكس** هو نظام تشغيل.

      نظام التشغيل (يُختصر بـ OS من الإنجليزية "Operating System") هو أهم
      برنامج في حاسوبك. إنه يجعل كل شيء يعمل:
      أن تتمكن من الكتابة، وأن تبدأ البرامج، وأن يضيء الشاشة.

      ويندوز وماك أو إس هما أيضاً نظاما تشغيل. لينكس هو خيار آخر —
      وله ميزة رائعة:

      لينكس **مجاني** وكل شخص يمكنه استخدامه وتعديله ومشاركته.
      هذا يُسمى **المصدر المفتوح** (Open Source —
      مخطط البناء مرئي للجميع).

      لينكس موجود في كل مكان — حتى لو لم تعرف ذلك:
      - تقريباً كل **مواقع الإنترنت** تعمل على خوادم لينكس (الخادم هو كمبيوتر يعمل على مدار الساعة ويوفر البيانات)
      - هواتف **أندرويد** مبنية على لينكس
      - **التلفزيونات الذكية** وغسالات الملابس والسيارات — غالباً تعمل بلينكس!
      - **راسبيري باي** (كمبيوتر صغير بحوالي 35 يورو) يعمل بلينكس

      رائع! الآن تعرف ما هو لينكس.
    examples:
      - q: "uname -r"
        a: "يعرض إصدار نواة لينكس (مثل 5.15.0-91-generic) — النواة هي القلب النابض للينكس"
        rel:
          - ["uname", "Unix Name — عرض معلومات النظام", "أمر"]
          - ["uname-r", "إظهار إصدار إطلاق النواة", "الخيار -r = release"]
        labels: ["Basics"]
      - q: "uname -a"
        a: "عرض جميع معلومات النظام دفعة واحدة: إصدار النواة واسم الحاسوب والمزيد"
        rel:
          - ["uname-a", "عرض كل معلومات النظام (All)", "الخيار -a = all"]
        labels: ["Basics"]
      - q: "cat /etc/os-release"
        a: "يعرض إصدار لينكس المثبت (مثل Ubuntu 22.04)"
        rel:
          - ["os-release", "ملف يحتوي معلومات التوزيعة والإصدار", "/etc/os-release"]
          - ["cat-cmd", "عرض محتوى الملف في الطرفية", "أمر cat"]
        labels: ["Basics", "Dateisystem"]

  - title: "تجربة لينكس الآن — بدون تثبيت"
    image: "images/section-02-try-linux.svg"
    explanation: |
      لا تحتاج إلى تثبيت أي شيء لتجربة لينكس!

      **مباشرة في المتصفح (مُوصى به للمبتدئين):**

      اذهب إلى **webminal.org** — هذه طرفية لينكس حقيقية
      تعمل مباشرة في المتصفح. مجانية، بلا تثبيت، ابدأ فوراً!

      **على ويندوز:**

      افتح البحث (مفتاح Windows)، اكتب "PowerShell" وأدخل:
      ```
      wsl --install
      ```
      هذا يثبت Ubuntu (إصدار شائع من لينكس) مباشرة في ويندوز.
      بعدها يمكنك تشغيل Ubuntu كأي تطبيق عادي!

      **على ماك:**

      افتح الطرفية (Finder ← البرامج ← الأدوات المساعدة ← Terminal).
      نظام ماك أو إس مشابه جداً للينكس — تقريباً كل الأوامر في هذا الكورس تعمل!

      **التوصية:** ابدأ بـ **webminal.org**.
      لا خطر، لا تحميل — فقط ابدأ!
    examples:
      - q: "uname -s"
        a: "يعرض نظام التشغيل — في لينكس ستظهر 'Linux'، وفي ماك أو إس ستظهر 'Darwin'"
        rel:
          - ["uname-s", "اسم النظام — يعرض ما إذا كان Linux أو Darwin (macOS) وغيره", "الخيار -s = system"]
        labels: ["Basics"]
      - q: "wsl --install"
        a: "يثبت WSL2 (نظام Windows الفرعي للينكس) وUbuntu على ويندوز — لينكس داخل ويندوز!"
        rel:
          - ["wsl-install", "تثبيت WSL2 وUbuntu على Windows 10/11", "أمر Windows PowerShell"]
          - ["wsl2", "نظام Windows الفرعي للينكس — لينكس مدمج مباشرة في ويندوز", "WSL2"]
        labels: ["Basics", "Installation"]
      - q: "bash --version"
        a: "يعرض إصدار Bash المثبت — Bash هو البرنامج الذي يفهم أوامرك"
        rel:
          - ["bash-version", "عرض إصدار Bash Shell", "أمر bash --version"]
          - ["bash-shell", "Bash — البرنامج الذي يستقبل الأوامر في الطرفية وينفذها", "Shell"]
        labels: ["Basics"]

  - title: "توزيعات لينكس — لكل شخص ما يناسبه"
    image: "images/section-02-distros.svg"
    explanation: |
      يتوفر لينكس في أشكال متعددة. تُسمى هذه الأشكال **التوزيعات**
      (Distributions)، اختصاراً: Distros.

      تخيل الأمر هكذا: نواة لينكس (الجزء الأعمق الذي يتحكم في الأجهزة)
      تشبه المحرك. فرق مختلفة تبني سيارات مختلفة حوله.

      هذه أشهر توزيعات لينكس:

      | الاسم | لمن هي؟ |
      |------|----------|
      | **Ubuntu** | رائعة للمبتدئين — مساعدة كثيرة عبر الإنترنت، سهلة التثبيت |
      | **Debian** | مستقرة جداً — تُستخدم كثيراً على الخوادم |
      | **Raspberry Pi OS** | مصممة خصيصاً لكمبيوتر Raspberry Pi الصغير |
      | **Kali Linux** | لأبحاث الأمان (فقط بعد تعلم الأساسيات!) |

      في هذا الكورس ستتعلم أوامر تعمل على **جميع** توزيعات لينكس.
      هذا هو الجميل: تعلّم مرة واحدة، طبّق في كل مكان!
    examples:
      - q: "lsb_release -a"
        a: "يعرض توزيعة لينكس (Distribution) المثبتة وإصدارها"
        rel:
          - ["lsb-release", "عرض معلومات Linux Standard Base", "أمر lsb_release"]
          - ["lsb-a-flag", "عرض جميع معلومات LSB المتاحة", "الخيار -a"]
        labels: ["Basics"]
      - q: "hostnamectl"
        a: "يعرض اسم الحاسوب ونظام التشغيل وإصدار النواة بشكل منظم"
        rel:
          - ["hostnamectl", "إدارة اسم المضيف ومعلومات النظام", "أمر"]
        labels: ["Basics"]
      - q: "arch"
        a: "يعرض نوع المعالج — مثلاً x86_64 تعني: كمبيوتر 64 بت (الكمبيوتر الشخصي أو اللابتوب العادي)"
        rel:
          - ["arch-cmd", "عرض معمارية المعالج", "أمر arch"]
          - ["x86-64", "معمارية Intel/AMD بـ 64 بت، المعيار الحالي للكمبيوترات الشخصية واللابتوبات", "المعمارية"]
        labels: ["Basics"]

  - title: "نظام ملفات لينكس — لكل شيء مكانه"
    image: "images/section-03-filesystem.svg"
    explanation: |
      في لينكس، جميع الملفات منظمة في شجرة كبيرة.

      تبدأ الشجرة من الأعلى بـ `/` — وهذا يُسمى **Root**
      (جذر بالإنجليزية). من هناك تتفرع جميع المجلدات.

      هذه أهم المجلدات وما تحتويه:

      | المجلد | ما الذي يحتويه؟ |
      |--------|---------------|
      | `/home` | مجلدك الشخصي — مثل غرفتك |
      | `/etc` | ملفات إعدادات النظام (مثل لوحة التحكم) |
      | `/bin` | البرامج التي يمكن للجميع استخدامها (مثل ls، cd) |
      | `/tmp` | ملفات مؤقتة — تُحذف عند إعادة التشغيل |
      | `/dev` | الأجهزة مثل الأقراص الصلبة وذاكرة USB (كملفات!) |

      الرمز `~` (التيلدا، على لوحة المفاتيح في الزاوية العلوية اليسرى) هو اختصار
      لمجلدك الشخصي. إذا كان اسمك `alice`،
      فإن `~` تعني `/home/alice`.

      جرّب! اكتب `ls /` في الطرفية لرؤية محتوى الجذر.
    examples:
      - q: "ls /"
        a: "يعرض جميع المجلدات في أعلى نظام الملفات — جذر (Root) الشجرة"
        rel:
          - ["ls-cmd", "List — عرض محتوى المجلد", "أمر ls"]
          - ["root-dir", "المجلد الأعلى في نظام ملفات لينكس", "/ (Root)"]
        labels: ["Dateisystem"]
      - q: "ls /etc | head -5"
        a: "يعرض أول 5 إدخالات في مجلد الإعدادات /etc"
        rel:
          - ["etc-dir", "ملفات إعدادات النظام", "المجلد /etc"]
          - ["pipe-head", "تمرير الإخراج عبر pipe إلى head", "| head -5"]
        labels: ["Dateisystem", "Konfiguration"]
      - q: "echo $HOME"
        a: "يعرض مسار مجلدك الشخصي (مثل /home/alice)"
        rel:
          - ["echo-cmd", "عرض نص أو متغير في الطرفية", "أمر echo"]
          - ["home-var", "متغير البيئة الذي يحتوي مسار المجلد الرئيسي", "$HOME"]
        labels: ["Dateisystem", "Basics"]

  - title: "اختبار الطرفية"
    image: "images/section-04-check.svg"
    explanation: |
      اختبر معلوماتك الآن!
    examples:
      - q: "ما هو الأمر الذي يعرض إصدار نواة لينكس الحالية؟"
        type: input
        a: "uname -r"
        labels: ["Basics"]
      - q: "ماذا يفعل الأمر 'lsb_release -a'؟"
        type: select
        options:
          - text: "يعرض التوزيعة الدقيقة والإصدار"
            correct: true
          - text: "يحذف جميع ملفات السجل"
          - text: "يحدّث نواة لينكس"
          - text: "يعيد تشغيل النظام"
        labels: ["Basics"]
      - q: "ما هو الأمر الذي يعرض إصدار لينكس المثبت؟"
        type: select
        options:
          - text: "cat /etc/os-release"
            correct: true
          - text: "cat /etc/passwd"
          - text: "ls /usr/bin"
          - text: "echo $PATH"
        labels: ["Basics"]
      - q: "أيٌّ من هذه العبارات عن لينكس صحيحة؟"
        type: multiple-choice
        options:
          - text: "لينكس مفتوح المصدر"
            correct: true
          - text: "لينكس يعمل على تقريباً جميع خوادم الإنترنت في العالم"
            correct: true
          - text: "لينكس له نسخة واحدة فقط"
          - text: "أندرويد مبني على لينكس"
            correct: true
        labels: ["Basics"]
