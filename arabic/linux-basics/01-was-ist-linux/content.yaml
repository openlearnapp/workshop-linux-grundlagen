version: 1
number: 1
title: "ما هو لينكس؟"
description: "التاريخ، التوزيعات، ولماذا يُشغّل لينكس ٩٦٪ من خوادم العالم"
sections:
  - title: "طالب غيّر العالم"
    explanation: |
      في عام **١٩٩١** كتب طالب علوم حاسب يبلغ من العمر ٢١ عامًا في جامعة هلسنكي
      رسالة بريد إلكتروني ستُغيّر العالم:

      > *"أعمل على تطوير نظام تشغيل مجاني (مجرد هواية، لن يكون كبيرًا واحترافيًا
      > مثل GNU)"* — لينوس تورفالدز، ٢٥ أغسطس ١٩٩١

      اليوم، بعد أكثر من ٣٠ عامًا، يعمل **لينكس** على:
      - **٩٦٪** من خوادم الويب حول العالم
      - **١٠٠٪** من أسرع الحواسيب الخارقة
      - مليارات هواتف Android الذكية
      - أجهزة التلفزيون الذكية، أجهزة الراوتر، السيارات، محطات الفضاء

      **لماذا هذا مهم؟** من يفهم لينكس يفهم البنية التحتية للإنترنت.
      كل نقرة، كل موقع، كل تطبيق يعمل في مكانٍ ما على خادم لينكس.
    examples:
      - q: "uname -r"
        a: "يعرض إصدار نواة لينكس الحالي (مثلاً 5.15.0-91-generic)"
        rel:
          - ["uname", "Unix Name — عرض معلومات النظام", "أمر"]
          - ["uname-r", "عرض إصدار النواة (release)", "العلم -r = release"]
      - q: "uname -a"
        a: "يعرض جميع معلومات النظام دفعة واحدة: النواة، اسم الجهاز، البنية المعمارية"
        rel:
          - ["uname-a", "جميع معلومات النظام (All)", "العلم -a = all"]
      - q: "cat /etc/os-release"
        a: "يعرض توزيعة لينكس المثبتة وإصدارها"
        rel:
          - ["os-release", "ملف يحتوي على معلومات التوزيعة والإصدار", "/etc/os-release"]
          - ["cat-cmd", "عرض محتوى ملف في الطرفية", "أمر cat"]

  - title: "التوزيعات — لينكس لكل غرض"
    explanation: |
      لينكس ليس نظام تشغيل واحد، بل هو **نواة (Kernel)** بُنيت حولها
      أنظمة كاملة من قِبل شركات ومجتمعات مختلفة.
      تُسمى هذه الأنظمة **توزيعات** (Distributions).

      | التوزيعة | نقطة القوة | الفئة المستهدفة |
      |----------|-----------|----------------|
      | **Ubuntu** | سهولة التثبيت، دعم واسع | المبتدئون، سطح المكتب |
      | **Debian** | الاستقرار، دعم طويل الأمد | الخوادم، مديرو الأنظمة |
      | **Fedora** | أحدث البرمجيات | المطورون |
      | **Arch Linux** | تحكم كامل | المتقدمون |
      | **Kali Linux** | أدوات أمنية مثبتة مسبقًا | مختبرو الاختراق |
      | **Raspberry Pi OS** | محسّن للحواسيب الصغيرة | صنّاع المشاريع، إنترنت الأشياء |

      **الفرق الجوهري عن Windows/macOS:** لينكس **مفتوح المصدر** —
      يمكن لأي شخص قراءة الكود المصدري وتعديله وإعادة توزيعه.
    examples:
      - q: "lsb_release -a"
        a: "يعرض التوزيعة والإصدار بالتفصيل (مثلاً Ubuntu 22.04 LTS)"
        rel:
          - ["lsb-release", "عرض معلومات Linux Standard Base", "أمر lsb_release"]
          - ["lsb-a-flag", "عرض جميع معلومات LSB المتاحة", "العلم -a"]
      - q: "hostnamectl"
        a: "يعرض اسم الجهاز، نظام التشغيل، النواة والبنية المعمارية بشكل منظم"
        rel:
          - ["hostnamectl", "إدارة وعرض اسم الجهاز ومعلومات النظام", "أمر"]
      - q: "arch"
        a: "يعرض بنية المعالج (مثلاً x86_64 لنظام ٦٤ بت)"
        rel:
          - ["arch-cmd", "عرض بنية المعالج", "أمر arch"]
          - ["x86-64", "بنية Intel/AMD ٦٤ بت، المعيار الحالي", "بنية معمارية"]

  - title: "نظام ملفات لينكس — كل شيء ملف"
    explanation: |
      يتبع لينكس فلسفة: **كل شيء ملف** — حتى الأجهزة والعمليات
      واتصالات الشبكة ممثلة كملفات.

      يبدأ نظام الملفات دائمًا من `/` (Root — الجذر):

      | المجلد | المحتوى |
      |--------|---------|
      | `/home` | المجلدات الشخصية للمستخدمين |
      | `/etc` | ملفات إعداد النظام |
      | `/bin`, `/usr/bin` | البرامج التنفيذية (الأوامر) |
      | `/var/log` | ملفات السجلات (بروتوكولات النظام) |
      | `/tmp` | ملفات مؤقتة تُحذف عند إعادة التشغيل |
      | `/dev` | ملفات الأجهزة (الأقراص، USB، إلخ) |

      رمز التيلدا `~` هو اختصار لمجلد المستخدم الشخصي:
      `/home/user` يصبح `~`
    examples:
      - q: "ls /"
        a: "يعرض محتوى المجلد الجذر — المستوى الأعلى في نظام الملفات"
        rel:
          - ["ls-cmd", "List — عرض محتويات المجلد", "أمر ls"]
          - ["root-dir", "المجلد الأعلى في نظام ملفات لينكس", "/ (Root)"]
      - q: "ls /etc | head -5"
        a: "يعرض أول ٥ عناصر في مجلد الإعدادات /etc"
        rel:
          - ["etc-dir", "ملفات إعداد النظام", "المجلد /etc"]
          - ["pipe-head", "تمرير المخرجات عبر pipe إلى head", "| head -5"]
      - q: "echo $HOME"
        a: "يعرض مسار المجلد الشخصي (مثلاً /home/alice)"
        rel:
          - ["echo-cmd", "عرض نص أو متغير في الطرفية", "أمر echo"]
          - ["home-var", "متغير بيئي يحتوي مسار المجلد الشخصي", "$HOME"]

  - title: "🖥️ اختبار الطرفية"
    explanation: |
      اختبر معرفتك الآن — أدخل الأوامر مباشرة!
    examples:
      - q: "أي أمر يعرض إصدار نواة لينكس الحالي؟"
        type: input
        a: "uname -r"
      - q: "ماذا يفعل الأمر 'lsb_release -a'؟"
        type: select
        options:
          - "يعرض التوزيعة والإصدار بالتفصيل"
          - "يحذف جميع ملفات السجلات"
          - "يحدّث نواة لينكس"
          - "يعيد تشغيل النظام"
        a: "يعرض التوزيعة والإصدار بالتفصيل"
      - q: "أي أمر يعرض توزيعة لينكس المثبتة؟"
        type: select
        options:
          - "cat /etc/os-release"
          - "cat /etc/passwd"
          - "ls /usr/bin"
          - "echo $PATH"
        a: "cat /etc/os-release"
      - q: "أي من العبارات التالية عن لينكس صحيحة؟"
        type: multiple-choice
        options:
          - "لينكس مفتوح المصدر"
          - "لينكس يعمل على ٩٦٪ من خوادم الويب"
          - "لينكس لديه توزيعة واحدة فقط"
          - "Android مبني على لينكس"
        a:
          - "لينكس مفتوح المصدر"
          - "لينكس يعمل على ٩٦٪ من خوادم الويب"
          - "Android مبني على لينكس"
