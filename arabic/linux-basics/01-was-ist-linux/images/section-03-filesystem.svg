<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230">
<style>
.f{font-family:sans-serif}
.ti{animation:tia 11s infinite}@keyframes tia{0%,3%{opacity:0}7%,87%{opacity:1}92%,100%{opacity:0}}
.c1{animation:c1a 11s infinite}@keyframes c1a{0%,12%{opacity:0}18%,87%{opacity:1}92%,100%{opacity:0}}
.c2{animation:c2a 11s infinite}@keyframes c2a{0%,30%{opacity:0}36%,87%{opacity:1}92%,100%{opacity:0}}
.c3{animation:c3a 11s infinite}@keyframes c3a{0%,48%{opacity:0}54%,87%{opacity:1}92%,100%{opacity:0}}
.c4{animation:c4a 11s infinite}@keyframes c4a{0%,65%{opacity:0}71%,87%{opacity:1}92%,100%{opacity:0}}
.ft{animation:fta 11s infinite}@keyframes fta{0%,78%{opacity:0}82%,87%{opacity:1}92%,100%{opacity:0}}
</style>
<rect width="640" height="230" rx="12" fill="#0d1117"/>
<rect width="640" height="46" rx="12" fill="#161b22"/>
<rect y="34" width="640" height="12" fill="#161b22"/>
<text class="f ti" x="320" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#e6edf3">نظام ملفات لينوكس — كل شيء له مكانه</text>
<!-- Root node -->
<g class="c1">
<rect x="264" y="54" width="112" height="36" rx="6" fill="#1a0f08"/>
<rect x="264" y="54" width="112" height="3" rx="2" fill="#f0883e"/>
<text class="f" x="320" y="68" text-anchor="middle" font-size="16" font-weight="bold" fill="#f0883e">/</text>
<text class="f" x="320" y="82" text-anchor="middle" font-size="10" fill="#8b949e">جذر الشجرة</text>
</g>
<!-- Lines from root -->
<g class="c2">
<line x1="320" y1="90" x2="80" y2="118" stroke="#30363d" stroke-width="1.5"/>
<line x1="320" y1="90" x2="192" y2="118" stroke="#30363d" stroke-width="1.5"/>
<line x1="320" y1="90" x2="320" y2="118" stroke="#30363d" stroke-width="1.5"/>
<line x1="320" y1="90" x2="448" y2="118" stroke="#30363d" stroke-width="1.5"/>
<line x1="320" y1="90" x2="560" y2="118" stroke="#30363d" stroke-width="1.5"/>
</g>
<!-- /home -->
<g class="c2">
<rect x="32" y="118" width="96" height="44" rx="6" fill="#0d1520"/>
<rect x="32" y="118" width="96" height="3" rx="2" fill="#58a6ff"/>
<text class="f" x="80" y="134" text-anchor="middle" font-size="13" font-weight="bold" fill="#58a6ff">/home</text>
<text class="f" x="80" y="150" text-anchor="middle" font-size="9" fill="#8b949e">مجلدك الشخصي (~)</text>
</g>
<!-- /etc -->
<g class="c3">
<rect x="144" y="118" width="96" height="44" rx="6" fill="#0a1a0d"/>
<rect x="144" y="118" width="96" height="3" rx="2" fill="#3fb950"/>
<text class="f" x="192" y="134" text-anchor="middle" font-size="13" font-weight="bold" fill="#3fb950">/etc</text>
<text class="f" x="192" y="150" text-anchor="middle" font-size="9" fill="#8b949e">ملفات الإعدادات</text>
</g>
<!-- /bin -->
<g class="c3">
<rect x="272" y="118" width="96" height="44" rx="6" fill="#1a0f08"/>
<rect x="272" y="118" width="96" height="3" rx="2" fill="#f0883e"/>
<text class="f" x="320" y="134" text-anchor="middle" font-size="13" font-weight="bold" fill="#f0883e">/bin</text>
<text class="f" x="320" y="150" text-anchor="middle" font-size="9" fill="#8b949e">البرامج ls, cd</text>
</g>
<!-- /tmp -->
<g class="c4">
<rect x="400" y="118" width="96" height="44" rx="6" fill="#180a0a"/>
<rect x="400" y="118" width="96" height="3" rx="2" fill="#f85149"/>
<text class="f" x="448" y="134" text-anchor="middle" font-size="13" font-weight="bold" fill="#f85149">/tmp</text>
<text class="f" x="448" y="150" text-anchor="middle" font-size="9" fill="#8b949e">الملفات المؤقتة</text>
</g>
<!-- /dev -->
<g class="c4">
<rect x="512" y="118" width="96" height="44" rx="6" fill="#110d1a"/>
<rect x="512" y="118" width="96" height="3" rx="2" fill="#bc8cff"/>
<text class="f" x="560" y="134" text-anchor="middle" font-size="13" font-weight="bold" fill="#bc8cff">/dev</text>
<text class="f" x="560" y="150" text-anchor="middle" font-size="9" fill="#8b949e">الأجهزة USB</text>
</g>
<!-- Tip box -->
<g class="ft">
<rect x="24" y="176" width="592" height="40" rx="6" fill="#161b22"/>
<text class="f" x="320" y="194" text-anchor="middle" font-size="11" fill="#58a6ff">~ اختصار لمجلدك الشخصي</text>
<text class="f" x="320" y="210" text-anchor="middle" font-size="11" fill="#8b949e">جرب: ls /</text>
</g>
</svg>
