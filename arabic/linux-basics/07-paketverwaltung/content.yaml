version: 2
number: 7
title: "إدارة الحزم"
description: "apt وsnap وdpkg — تثبيت البرامج وتحديثها وإدارتها على Ubuntu/Debian"
image: "images/lesson-header.svg"
image_caption: "Paket-Boxen mit apt, dnf und snap Labels"
sections:
  - title: "apt — متجر التطبيقات في لينكس"
    image: "images/section-01-apt.svg"
    explanation: |
      تخيل: لديك هاتف جديد.
      تذهب إلى متجر التطبيقات، تبحث عن تطبيق وتضغط "تثبيت".
      انتهى الأمر!

      لينكس لديه نفس الشيء بالضبط — لكن عبر الطرفية.
      البرنامج يُسمى **apt**.

      قبل أن تثبت أي شيء، تقول للينكس:
      "انظر ما هو الجديد!"
      ```
      sudo apt update
      ```

      ثم تثبت برنامجاً — مثلاً المتصفح Firefox:
      ```
      sudo apt install firefox
      ```

      هذا يعني خطوةً خطوة:
      - `sudo` — "أنا المسؤول هنا، أنا مسموح لي"
      - `apt install` — "ثبّت من فضلك..."
      - `firefox` — "...هذا البرنامج"

      وإذا أردت تحديث جميع البرامج إلى أحدث إصدار:
      ```
      sudo apt upgrade
      ```

      تذكر: `apt update` يجلب فقط **القائمة** بالإصدارات الجديدة.
      `apt upgrade` يثبّت الجديد فعلاً.
    examples:
      - q: "sudo apt update"
        a: "يجلب القائمة الحالية لجميع البرامج المتاحة — مثل النظر في متجر التطبيقات"
        rel:
          - ["apt-cmd", "Advanced Package Tool — إدارة الحزم لـ Debian/Ubuntu", "أمر apt"]
          - ["apt-update", "تحديث قوائم الحزم من الخوادم (ليس الحزم نفسها)", "apt update"]
        labels: ["Konfiguration"]
      - q: "sudo apt upgrade"
        a: "يُحدّث جميع البرامج المثبتة إلى أحدث إصدار"
        rel:
          - ["apt-upgrade", "تحديث جميع الحزم المثبتة إلى أحدث إصدار", "apt upgrade"]
        labels: ["Konfiguration"]
      - q: "sudo apt install git curl wget"
        a: "يثبّت ثلاثة برامج دفعة واحدة — فقط اكتب جميع الأسماء متتاليةً"
        rel:
          - ["apt-install", "تثبيت حزمة أو حزم", "apt install"]
        labels: ["Konfiguration"]
      - q: "sudo apt update && sudo apt upgrade -y"
        a: "تحديث وترقية في خطوة واحدة — -y يقول نعم تلقائياً لجميع الأسئلة"
        rel:
          - ["apt-y-flag", "Yes — تأكيد جميع الأسئلة تلقائياً", "الخيار -y"]
        labels: ["Konfiguration"]

  - title: "البحث والحذف والتنظيف"
    image: "images/section-02-search-remove.svg"
    explanation: |
      لا تعرف بالضبط اسم البرنامج؟
      لا مشكلة — يمكنك البحث:
      ```
      apt search "text editor"
      ```

      هذا مثل وظيفة البحث في متجر التطبيقات.
      لينكس يعرض لك جميع البرامج التي تتناسب مع بحثك.

      إذا لم تعد تحتاج برنامجاً، يمكنك إزالته:
      ```
      sudo apt remove firefox
      ```

      أو حذفه بالكامل (بما في ذلك جميع الإعدادات):
      ```
      sudo apt purge firefox
      ```

      وبعد التنظيف تحذف البقايا القديمة غير الضرورية:
      ```
      sudo apt autoremove
      ```

      هذا مثل "تنظيف التخزين" على الهاتف —
      البرامج التي لا يحتاجها أحد تُحذف.
    examples:
      - q: "apt search \"text editor\""
        a: "يبحث عن برامج تحتوي 'text editor' في اسمها — مثل البحث في متجر التطبيقات"
        rel:
          - ["apt-search", "البحث في قاعدة بيانات الحزم", "apt search"]
        labels: ["Konfiguration"]
      - q: "apt show nodejs"
        a: "يعرض تفاصيل nodejs: الإصدار والحجم والوصف — قبل تثبيته"
        rel:
          - ["apt-show", "عرض معلومات تفصيلية عن حزمة", "apt show"]
        labels: ["Konfiguration"]
      - q: "sudo apt remove --purge apache2"
        a: "يُزيل Apache2 بالكامل — حتى جميع الإعدادات تُحذف"
        rel:
          - ["apt-purge", "حذف الحزمة وجميع ملفات إعداداتها بالكامل", "apt purge / --purge"]
        labels: ["Konfiguration"]
      - q: "sudo apt autoremove && sudo apt clean"
        a: "إزالة الحمل القديم وتحرير مساحة التخزين — مثل ربيع التنظيف للينكس"
        rel:
          - ["apt-autoremove", "إزالة الحزم المثبتة تلقائياً والتي لم تعد مطلوبة", "apt autoremove"]
          - ["apt-clean", "حذف ملفات الحزم المُحمَّلة من الكاش", "apt clean"]
        labels: ["Konfiguration"]

  - title: "dpkg و snap — طرق أخرى للتثبيت"
    image: "images/section-03-dpkg-snap.svg"
    explanation: |
      أحياناً لا يكون برنامج في متجر لينكس العادي.
      عندها هناك طرق أخرى:

      **الطريقة 1: تثبيت ملف .deb مباشرةً**
      ملف `.deb` مثل ملف تثبيت للينكس.
      الأداة لذلك تُسمى **dpkg**.
      ```
      sudo dpkg -i google-chrome.deb
      ```
      الـ `-i` تعني "install" (تثبيت).

      **الطريقة 2: snap**
      **Snap** نظام أحدث — البرامج تعمل بأمان إضافي،
      معزولة عن بقية النظام، مثل صندوق صغير.
      ```
      snap install vlc
      ```

      **الطريقة 3: سكريبت تثبيت**
      كثير من البرامج الاحترافية لديها مساعد تثبيت خاص:
      ```
      curl -fsSL https://get.docker.com | sudo sh
      ```
      هذا يُحمّل المساعد ويشغله فوراً.
    examples:
      - q: "sudo dpkg -i vscode.deb"
        a: "يثبّت ملف .deb مُحمَّلاً مباشرةً — مثل فتح ملف تثبيت"
        rel:
          - ["dpkg-cmd", "Debian Package — إدارة ملفات .deb مباشرةً", "أمر dpkg"]
          - ["dpkg-i", "Install — تثبيت ملف .deb", "الخيار -i"]
        labels: ["Konfiguration"]
      - q: "dpkg -l | grep \"^ii\""
        a: "يعرض جميع البرامج المثبتة بشكل صحيح — ii تعني 'مثبت بشكل صحيح'"
        rel:
          - ["dpkg-l", "List — جميع الحزم المعروفة وحالتها", "dpkg -l"]
        labels: ["Konfiguration"]
      - q: "snap install code --classic"
        a: "تثبيت Visual Studio Code عبر snap — --classic يعطي البرنامج صلاحيات أكثر"
        rel:
          - ["snap-cmd", "نظام حزم Snap — تطبيقات معزولة تُحدَّث تلقائياً", "أمر snap"]
          - ["snap-classic", "Classic confinement — وصول كامل للنظام لبرامج مثل IDEs", "الخيار --classic"]
        labels: ["Konfiguration"]
      - q: "snap list"
        a: "يعرض جميع البرامج التي ثُبِّتت عبر snap"
        rel:
          - ["snap-list", "سرد جميع حزم snap المثبتة", "snap list"]
        labels: ["Konfiguration"]

  - title: "اختبار الطرفية"
    image: "images/section-04-check.svg"
    explanation: |
      اختبر معلوماتك الآن — أدخل الأوامر مباشرةً!
    examples:
      - q: "ما هو الأمر الذي يُحدّث قائمة البرامج على Ubuntu؟"
        type: input
        a: "sudo apt update"
        labels: ["Konfiguration"]
      - q: "ما الفرق بين 'apt update' و'apt upgrade'؟"
        type: select
        options:
          - text: "update يجلب قوائم البرامج الجديدة، upgrade يثبّت التحديثات فعلاً"
            correct: true
          - text: "update يثبّت البرامج، upgrade يُزيل القديمة"
          - text: "update وupgrade يفعلان نفس الشيء"
          - text: "upgrade يجلب قوائم البرامج الجديدة، update يثبّت التحديثات"
        labels: ["Konfiguration"]
      - q: "ما هو الأمر الذي يُزيل برنامجاً مع جميع إعداداته؟"
        type: select
        options:
          - text: "sudo apt purge nginx"
            correct: true
          - text: "sudo apt remove nginx"
          - text: "sudo apt delete nginx"
          - text: "sudo apt uninstall nginx"
        labels: ["Konfiguration"]
      - q: "أيٌّ من هذه العبارات عن apt صحيحة؟"
        type: multiple-choice
        options:
          - text: "apt يمكنه تثبيت عدة برامج دفعة واحدة"
            correct: true
          - text: "apt autoremove يُزيل البرامج التي لم تعد مطلوبة"
            correct: true
          - text: "apt search يبحث في قاعدة بيانات البرامج"
            correct: true
          - text: "apt لا يحتاج صلاحيات مسؤول"
        labels: ["Konfiguration"]
