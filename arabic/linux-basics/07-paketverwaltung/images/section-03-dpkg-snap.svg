<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210">
<style>
.f{font-family:sans-serif}
.ti{animation:tia 11s infinite}@keyframes tia{0%,3%{opacity:0}7%,87%{opacity:1}92%,100%{opacity:0}}
.c1{animation:c1a 11s infinite}@keyframes c1a{0%,12%{opacity:0}18%,87%{opacity:1}92%,100%{opacity:0}}
.c2{animation:c2a 11s infinite}@keyframes c2a{0%,30%{opacity:0}36%,87%{opacity:1}92%,100%{opacity:0}}
.c3{animation:c3a 11s infinite}@keyframes c3a{0%,48%{opacity:0}54%,87%{opacity:1}92%,100%{opacity:0}}
.c4{animation:c4a 11s infinite}@keyframes c4a{0%,65%{opacity:0}71%,87%{opacity:1}92%,100%{opacity:0}}
.ft{animation:fta 11s infinite}@keyframes fta{0%,78%{opacity:0}82%,87%{opacity:1}92%,100%{opacity:0}}
</style>
<rect width="640" height="210" rx="12" fill="#0d1117"/>
<rect width="640" height="44" rx="12" fill="#161b22"/>
<rect x="0" y="32" width="640" height="12" fill="#161b22"/>
<text class="f ti" x="320" y="28" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">dpkg و snap — طرق تثبيت أخرى</text>
<!-- Card 1: blue -->
<g class="c1">
<rect x="24" y="54" width="183" height="110" rx="9" fill="#0d1520"/>
<rect x="24" y="54" width="183" height="4" rx="2" fill="#58a6ff"/>
<text class="f" x="115" y="84" text-anchor="middle" font-size="22">📥</text>
<text class="f" x="115" y="107" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">dpkg -i</text>
<text class="f" x="115" y="122" text-anchor="middle" fill="#8b949e" font-size="11">تثبيت ملف .deb / مباشرةً</text>
</g>
<!-- Card 2: purple -->
<g class="c2">
<rect x="228" y="54" width="184" height="110" rx="9" fill="#110d1a"/>
<rect x="228" y="54" width="184" height="4" rx="2" fill="#bc8cff"/>
<text class="f" x="320" y="84" text-anchor="middle" font-size="22">🔵</text>
<text class="f" x="320" y="107" text-anchor="middle" fill="#bc8cff" font-size="13" font-weight="bold">snap install</text>
<text class="f" x="320" y="122" text-anchor="middle" fill="#8b949e" font-size="11">حزم / عالمية</text>
</g>
<!-- Card 3: green -->
<g class="c3">
<rect x="433" y="54" width="183" height="110" rx="9" fill="#0a1a0d"/>
<rect x="433" y="54" width="183" height="4" rx="2" fill="#3fb950"/>
<text class="f" x="524" y="84" text-anchor="middle" font-size="22">🔍</text>
<text class="f" x="524" y="107" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="bold">dpkg -l</text>
<text class="f" x="524" y="122" text-anchor="middle" fill="#8b949e" font-size="11">قائمة جميع / الحزم المثبتة</text>
</g>
<!-- Footer -->
<g class="ft">
<rect x="24" y="176" width="592" height="22" rx="8" fill="#161b22"/>
<text class="f" x="320" y="192" text-anchor="middle" fill="#8b949e" font-size="11">dpkg -i file.deb · snap install code · dpkg -l | grep python</text>
</g>
</svg>
