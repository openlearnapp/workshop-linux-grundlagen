<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="640" height="160" fill="url(#bg)" rx="8"/>
  <!-- Decorative elements -->
  <circle cx="80" cy="60" r="2" fill="#bc8cff" opacity="0.4"/><circle cx="95" cy="45" r="1.5" fill="#bc8cff" opacity="0.35"/><circle cx="70" cy="100" r="1" fill="#bc8cff" opacity="0.35"/>
  <circle cx="560" cy="60" r="2" fill="#bc8cff" opacity="0.4"/><circle cx="545" cy="100" r="1.5" fill="#bc8cff" opacity="0.35"/><circle cx="570" cy="45" r="1" fill="#bc8cff" opacity="0.35"/>
  <!-- Icon -->
  
  <!-- Process circle -->
  <circle cx="320" cy="70" r="28" fill="none" stroke="#f85149" stroke-width="2" opacity="0.8"/>
  <circle cx="320" cy="70" r="22" fill="#f85149" opacity="0.2"/>
  <!-- X mark -->
  <line x1="306" y1="56" x2="334" y2="84" stroke="#f85149" stroke-width="3" stroke-linecap="round" opacity="0.95"/>
  <line x1="334" y1="56" x2="306" y2="84" stroke="#f85149" stroke-width="3" stroke-linecap="round" opacity="0.95"/>
  <!-- Signal label -->
  <text x="290" y="120" font-family="monospace" font-size="9" fill="#f85149" opacity="0.5">SIGTERM / SIGKILL</text>
  <!-- Accent bar -->
  <rect x="180" y="152" width="280" height="4" fill="#bc8cff" opacity="0.8" rx="1.5"/>
</svg>
