<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 270">
<style>
.f{font-family:sans-serif}
.ti{animation:tia 11s infinite}@keyframes tia{0%,3%{opacity:0}7%,87%{opacity:1}92%,100%{opacity:0}}
.c1{animation:c1a 11s infinite}@keyframes c1a{0%,12%{opacity:0}18%,87%{opacity:1}92%,100%{opacity:0}}
.c2{animation:c2a 11s infinite}@keyframes c2a{0%,30%{opacity:0}36%,87%{opacity:1}92%,100%{opacity:0}}
.c3{animation:c3a 11s infinite}@keyframes c3a{0%,48%{opacity:0}54%,87%{opacity:1}92%,100%{opacity:0}}
.ft{animation:fta 11s infinite}@keyframes fta{0%,78%{opacity:0}82%,87%{opacity:1}92%,100%{opacity:0}}
</style>
<rect width="640" height="270" rx="12" fill="#0d1117"/>
<rect width="640" height="56" rx="12" fill="#161b22"/>
<rect y="44" width="640" height="12" fill="#161b22"/>
<text class="f ti" x="320" y="28" text-anchor="middle" font-size="22">⚙️</text>
<text class="f ti" x="320" y="46" text-anchor="middle" font-size="17" font-weight="bold" fill="#e6edf3">العمليات</text>
<text class="f ti" x="320" y="62" text-anchor="middle" font-size="11" fill="#8b949e">ps · top · kill · المهام الخلفية</text>
<g class="c1">
<rect x="24" y="76" width="184" height="130" rx="8" fill="#0d1520"/>
<rect x="24" y="76" width="184" height="4" rx="2" fill="#58a6ff"/>
<text class="f" x="116" y="108" text-anchor="middle" font-size="26">👁️</text>
<text class="f" x="116" y="133" text-anchor="middle" font-size="14" font-weight="bold" fill="#58a6ff">ps &amp; top</text>
<text class="f" x="116" y="153" text-anchor="middle" font-size="11" fill="#8b949e">ماذا يعمل الآن؟</text>
</g>
<g class="c2">
<rect x="228" y="76" width="184" height="130" rx="8" fill="#180a0a"/>
<rect x="228" y="76" width="184" height="4" rx="2" fill="#f85149"/>
<text class="f" x="320" y="108" text-anchor="middle" font-size="26">❌</text>
<text class="f" x="320" y="133" text-anchor="middle" font-size="14" font-weight="bold" fill="#f85149">kill</text>
<text class="f" x="320" y="153" text-anchor="middle" font-size="11" fill="#8b949e">إيقاف البرامج</text>
</g>
<g class="c3">
<rect x="432" y="76" width="184" height="130" rx="8" fill="#1a0f08"/>
<rect x="432" y="76" width="184" height="4" rx="2" fill="#f0883e"/>
<text class="f" x="524" y="108" text-anchor="middle" font-size="26">🔄</text>
<text class="f" x="524" y="133" text-anchor="middle" font-size="14" font-weight="bold" fill="#f0883e">&amp;</text>
<text class="f" x="524" y="153" text-anchor="middle" font-size="11" fill="#8b949e">المهام الخلفية</text>
</g>
<g class="ft">
<rect x="24" y="220" width="592" height="32" rx="6" fill="#161b22"/>
<text class="f" x="320" y="241" text-anchor="middle" font-size="12" fill="#8b949e">كل برنامج يعمل هو عملية ذات معرّف فريد</text>
</g>
</svg>
