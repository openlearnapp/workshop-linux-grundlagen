<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>

  <!-- Root process -->
  <rect x="250" y="25" width="140" height="44" rx="8" fill="#21262d" stroke="#58a6ff" stroke-width="2"/>
  <text x="320" y="43" font-family="monospace" font-size="11" fill="#58a6ff" text-anchor="middle">systemd</text>
  <text x="320" y="60" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">PID 1</text>

  <!-- Lines from root -->
  <line x1="320" y1="69" x2="320" y2="85" stroke="#30363d" stroke-width="2"/>
  <line x1="120" y1="85" x2="520" y2="85" stroke="#30363d" stroke-width="2"/>
  <line x1="120" y1="85" x2="120" y2="100" stroke="#30363d" stroke-width="2"/>
  <line x1="320" y1="85" x2="320" y2="100" stroke="#30363d" stroke-width="2"/>
  <line x1="520" y1="85" x2="520" y2="100" stroke="#30363d" stroke-width="2"/>

  <!-- sshd process -->
  <rect x="50" y="100" width="140" height="44" rx="8" fill="#21262d" stroke="#3fb950" stroke-width="2"/>
  <text x="120" y="118" font-family="monospace" font-size="11" fill="#3fb950" text-anchor="middle">sshd</text>
  <text x="120" y="135" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">PID 892</text>

  <!-- nginx process -->
  <rect x="250" y="100" width="140" height="44" rx="8" fill="#21262d" stroke="#f0883e" stroke-width="2"/>
  <text x="320" y="118" font-family="monospace" font-size="11" fill="#f0883e" text-anchor="middle">nginx</text>
  <text x="320" y="135" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">PID 1024</text>

  <!-- cron process -->
  <rect x="450" y="100" width="140" height="44" rx="8" fill="#21262d" stroke="#bc8cff" stroke-width="2"/>
  <text x="520" y="118" font-family="monospace" font-size="11" fill="#bc8cff" text-anchor="middle">cron</text>
  <text x="520" y="135" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">PID 1100</text>

  <!-- Lines from sshd -->
  <line x1="120" y1="144" x2="120" y2="160" stroke="#30363d" stroke-width="2"/>
  <line x1="60" y1="160" x2="180" y2="160" stroke="#30363d" stroke-width="2"/>
  <line x1="60" y1="160" x2="60" y2="175" stroke="#30363d" stroke-width="2"/>
  <line x1="180" y1="160" x2="180" y2="175" stroke="#30363d" stroke-width="2"/>

  <!-- bash -->
  <rect x="10" y="175" width="100" height="40" rx="6" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="60" y="192" font-family="monospace" font-size="10" fill="#3fb950" text-anchor="middle">bash</text>
  <text x="60" y="207" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">PID 2001</text>

  <!-- bash 2 -->
  <rect x="130" y="175" width="100" height="40" rx="6" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="180" y="192" font-family="monospace" font-size="10" fill="#3fb950" text-anchor="middle">bash</text>
  <text x="180" y="207" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">PID 2045</text>

  <!-- Lines from nginx -->
  <line x1="320" y1="144" x2="320" y2="160" stroke="#30363d" stroke-width="2"/>
  <line x1="270" y1="160" x2="370" y2="160" stroke="#30363d" stroke-width="2"/>
  <line x1="270" y1="160" x2="270" y2="175" stroke="#30363d" stroke-width="2"/>
  <line x1="370" y1="160" x2="370" y2="175" stroke="#30363d" stroke-width="2"/>

  <!-- nginx workers -->
  <rect x="225" y="175" width="90" height="40" rx="6" fill="#21262d" stroke="#f0883e" stroke-width="1.5"/>
  <text x="270" y="192" font-family="monospace" font-size="10" fill="#f0883e" text-anchor="middle">worker</text>
  <text x="270" y="207" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">PID 1025</text>

  <rect x="325" y="175" width="90" height="40" rx="6" fill="#21262d" stroke="#f0883e" stroke-width="1.5"/>
  <text x="370" y="192" font-family="monospace" font-size="10" fill="#f0883e" text-anchor="middle">worker</text>
  <text x="370" y="207" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">PID 1026</text>

  <!-- Lines from bash (PID 2001) -->
  <line x1="60" y1="215" x2="60" y2="235" stroke="#30363d" stroke-width="1.5"/>

  <!-- vim process -->
  <rect x="15" y="235" width="90" height="36" rx="6" fill="#21262d" stroke="#e6edf3" stroke-width="1.5"/>
  <text x="60" y="250" font-family="monospace" font-size="10" fill="#e6edf3" text-anchor="middle">vim</text>
  <text x="60" y="264" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">PID 2100</text>

  <!-- CPU/MEM indicators bottom -->
  <rect x="140" y="290" width="360" height="45" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="160" y="308" font-family="monospace" font-size="10" fill="#8b949e">CPU</text>
  <rect x="190" y="299" width="120" height="8" rx="4" fill="#30363d"/>
  <rect x="190" y="299" width="45" height="8" rx="4" fill="#3fb950"/>
  <text x="320" y="308" font-family="monospace" font-size="10" fill="#8b949e">37%</text>

  <text x="160" y="326" font-family="monospace" font-size="10" fill="#8b949e">MEM</text>
  <rect x="190" y="317" width="120" height="8" rx="4" fill="#30363d"/>
  <rect x="190" y="317" width="72" height="8" rx="4" fill="#58a6ff"/>
  <text x="320" y="326" font-family="monospace" font-size="10" fill="#8b949e">60%</text>

  <text x="370" y="308" font-family="monospace" font-size="10" fill="#8b949e">Tasks:</text>
  <text x="420" y="308" font-family="monospace" font-size="10" fill="#e6edf3">142</text>
  <text x="370" y="326" font-family="monospace" font-size="10" fill="#8b949e">Load:</text>
  <text x="415" y="326" font-family="monospace" font-size="10" fill="#f0883e">1.24</text>
</svg>