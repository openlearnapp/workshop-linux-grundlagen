version: 2
number: 6
title: "العمليات"
description: "ps و top و kill والمهام الخلفية — فهم البرامج قيد التشغيل والتحكم بها"
image: "images/lesson-header.svg"
sections:
  - title: "ps و top — ماذا يعمل الآن؟"
    image: "images/section-01-ps-top.svg"
    explanation: |
      **لماذا هذا مهم؟** الخادم بطيء، تطبيق لا يستجيب،
      الذاكرة ممتلئة — في هذه المواقف يجب أن تعرف أي العمليات
      تعمل وكم الموارد التي تستهلكها.

      كل عملية قيد التشغيل تحصل على **PID** (معرّف العملية) فريد.

      | الأمر | لأي غرض؟ |
      |-------|----------|
      | `ps` | عملياتك في الصدفة الحالية |
      | `ps aux` | جميع عمليات جميع المستخدمين مع التفاصيل |
      | `top` | نظرة عامة مباشرة تفاعلية (مثل مدير المهام) |
      | `htop` | top محسّن بالألوان (يجب تثبيته) |
      | `pgrep nginx` | البحث عن PID عملية باسمها |

      في `top` يمكنك الخروج بـ `q`، وقتل عملية بـ `k` + PID، والترتيب
      حسب الذاكرة بـ `M`، وحسب المعالج بـ `P`.
    examples:
      - q: "ps aux"
        a: "جميع العمليات الجارية لكل المستخدمين مع PID والمعالج والذاكرة وسطر الأمر"
        rel:
          - ["ps-cmd", "Process Status — عرض العمليات الجارية", "أمر ps"]
          - ["ps-aux", "a=كل المستخدمين، u=صيغة المستخدم، x=بدون طرفية أيضًا", "الأعلام aux"]
        labels: ["العمليات"]
      - q: "ps aux | grep nginx"
        a: "يعرض عمليات Nginx فقط من قائمة العمليات — دمج مع grep"
        rel:
          - ["ps-grep", "تصفية قائمة العمليات باسم عملية معينة", "ps aux | grep"]
        labels: ["العمليات"]
      - q: "top"
        a: "نظرة عامة تفاعلية في الوقت الحقيقي: المعالج، الذاكرة، جميع العمليات — q للخروج"
        rel:
          - ["top-cmd", "مراقب عمليات تفاعلي في الوقت الحقيقي", "أمر top"]
        labels: ["العمليات"]
      - q: "pgrep -l python"
        a: "عرض جميع عمليات Python مع معرفاتها (PID)"
        rel:
          - ["pgrep-cmd", "البحث عن عمليات باسمها وعرض معرفاتها", "أمر pgrep"]
          - ["pgrep-l", "List — عرض أسماء العمليات بالإضافة إلى PID", "العلم -l"]
        labels: ["العمليات"]

  - title: "kill — إنهاء العمليات"
    image: "images/section-02-kill.svg"
    explanation: |
      تُدار العمليات عبر **الإشارات** (Signals). `kill` يرسل إشارات إلى العمليات.

      | الإشارة | الرقم | الأثر |
      |---------|-------|-------|
      | SIGTERM | 15 | إنهاء لطيف (افتراضي) — العملية يمكنها الترتيب |
      | SIGKILL | 9 | إنهاء فوري — لا ترتيب ممكن |
      | SIGHUP | 1 | إعادة تحميل الإعدادات (مثلاً Nginx) |

      **القاعدة:** جرّب أولاً `kill PID` (SIGTERM). فقط إذا لم ينجح،
      استخدم `kill -9 PID` (SIGKILL).

      `killall` ينهي جميع العمليات باسم معين:
      ```bash
      killall firefox
      ```
    examples:
      - q: "kill 1234"
        a: "يرسل SIGTERM (إنهاء لطيف) إلى العملية ذات PID 1234"
        rel:
          - ["kill-cmd", "إرسال إشارة إلى عملية (الافتراضي: SIGTERM = إنهاء لطيف)", "أمر kill"]
        labels: ["العمليات"]
      - q: "kill -9 1234"
        a: "يرسل SIGKILL — العملية تنتهي فورًا، لا حفظ ممكن"
        rel:
          - ["kill-9", "SIGKILL — إنهاء فوري، لا يمكن اعتراضه", "الإشارة -9"]
        labels: ["العمليات"]
      - q: "kill -1 $(pgrep nginx)"
        a: "إرسال SIGHUP لـ Nginx — يُعيد تحميل الإعدادات بدون توقف"
        rel:
          - ["kill-1", "SIGHUP — إعادة تحميل الإعدادات", "الإشارة -1"]
          - ["command-substitution", "$() ينفذ أمرًا ويستخدم مخرجاته", "$(أمر)"]
        labels: ["العمليات", "الإعدادات"]
      - q: "killall -9 firefox"
        a: "إنهاء جميع عمليات Firefox فورًا — مفيد عندما يتجمد المتصفح"
        rel:
          - ["killall-cmd", "إنهاء جميع العمليات باسم معين", "أمر killall"]
        labels: ["العمليات"]

  - title: "المهام الخلفية — تعدد المهام في الطرفية"
    image: "images/section-03-background.svg"
    explanation: |
      لينكس يسمح بتشغيل عدة مهام في آن واحد في طرفية واحدة:

      | الأمر/المفتاح | الأثر |
      |---------------|-------|
      | `befehl &` | تشغيل مباشر في الخلفية |
      | `Ctrl+Z` | إيقاف مهمة جارية مؤقتًا |
      | `bg` | استئناف مهمة متوقفة في الخلفية |
      | `fg` | إحضار مهمة خلفية إلى المقدمة |
      | `jobs` | عرض جميع المهام الخلفية |
      | `nohup befehl &` | المهمة تستمر حتى بعد إغلاق الطرفية |

      **مثال عملي:**
      ```bash
      python3 server.py &   # تشغيل الخادم في الخلفية
      [1] 5892              # رقم المهمة و PID
      ```
      الآن يمكنك متابعة العمل بينما يعمل الخادم.
    examples:
      - q: "sleep 60 &"
        a: "يبدأ عملية انتظار ٦٠ ثانية في الخلفية — الطرفية تبقى حرة"
        rel:
          - ["background-amp", "& في النهاية يُشغّل العملية في الخلفية", "عامل &"]
          - ["sleep-cmd", "الانتظار N ثانية — مفيد في السكريبتات", "أمر sleep"]
        labels: ["العمليات"]
      - q: "jobs -l"
        a: "عرض جميع المهام الخلفية مع رقم المهمة و PID"
        rel:
          - ["jobs-cmd", "قائمة جميع مهام الخلفية في الصدفة الحالية", "أمر jobs"]
          - ["jobs-l", "Long — عرض PIDs المهام إضافيًا", "العلم -l"]
        labels: ["العمليات"]
      - q: "fg %1"
        a: "إحضار المهمة رقم ١ إلى المقدمة"
        rel:
          - ["fg-cmd", "Foreground — إحضار مهمة خلفية إلى المقدمة", "أمر fg"]
        labels: ["العمليات"]
      - q: "nohup python3 webserver.py > server.log 2>&1 &"
        a: "تشغيل خادم يستمر حتى بعد إغلاق الطرفية، والمخرجات في ملف سجل"
        rel:
          - ["nohup-cmd", "No Hangup — العملية تستمر عند إغلاق الطرفية", "أمر nohup"]
          - ["redirect-stderr", "2>&1 يوجه رسائل الخطأ إلى نفس ملف المخرجات العادية", "2>&1"]
        labels: ["العمليات", "البرمجة"]

  - title: "🖥️ اختبار الطرفية"
    image: "images/section-04-check.svg"
    explanation: |
      اختبر معرفتك الآن — أدخل الأوامر مباشرة!
    examples:
      - q: "أي أمر يعرض جميع العمليات الجارية لكل المستخدمين؟"
        type: input
        a: "ps aux"
        labels: ["العمليات"]
      - q: "ماذا يفعل 'kill -9 1234'؟"
        type: select
        options:
          - text: "يرسل SIGKILL — العملية تنتهي فورًا"
            correct: true
          - text: "يرسل SIGTERM — العملية يمكنها الترتيب"
          - text: "يوقف العملية ذات PID 1234 مؤقتًا"
          - text: "يعيد تشغيل العملية"
        labels: ["العمليات"]
      - q: "كيف تُشغّل عملية مباشرة في الخلفية؟"
        type: select
        options:
          - text: "تنفيذ الأمر مع & في النهاية"
            correct: true
          - text: "تنفيذ الأمر مع bg في البداية"
          - text: "تنفيذ الأمر مع nohup في النهاية"
          - text: "الضغط على Ctrl+Z قبل الأمر"
        labels: ["العمليات"]
      - q: "أي من العبارات التالية عن إشارات العمليات صحيحة؟"
        type: multiple-choice
        options:
          - text: "SIGTERM (15) هو الإنهاء اللطيف"
            correct: true
          - text: "SIGKILL (9) لا يمكن اعتراضه"
            correct: true
          - text: "SIGHUP (1) يُعيد تحميل الإعدادات"
            correct: true
          - text: "SIGPAUSE (7) هو الإشارة الافتراضية"
        labels: ["العمليات"]
