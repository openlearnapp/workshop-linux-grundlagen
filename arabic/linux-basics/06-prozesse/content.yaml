version: 2
number: 6
title: "العمليات"
description: "تعلّم كيف ترى البرامج التي تعمل الآن وكيف تتحكم فيها"
image: "images/lesson-header.svg"
image_caption: "Prozessbaum mit PID-Nummern und Ressourcenanzeige"
sections:
  - title: "ps و top — ما الذي يعمل الآن؟"
    image: "images/section-01-ps-top.svg"
    explanation: |
      **العملية** (Process) هي برنامج يعمل الآن.

      عندما تفتح متصفحاً، تبدأ عملية.
      عندما تسمع موسيقى، تعمل عملية.
      يمكن لعدة عمليات العمل في آنٍ واحد — مثل عدة تطبيقات في آنٍ واحد!

      كل عملية تحصل على رقم فريد: **PID** (Process ID — رقم هوية العملية).
      بهذا الرقم يمكنك التحكم في العملية لاحقاً.

      أوامر لرؤية العمليات:

      | الأمر | ما يعرضه |
      |--------|--------------|
      | `ps` | فقط العمليات في نافذة الطرفية الحالية |
      | `ps aux` | جميع عمليات جميع المستخدمين بالتفاصيل (a=الكل، u=صيغة المستخدم، x=بلا طرفية أيضاً) |
      | `top` | نظرة عامة مباشرة مثل مدير المهام — كل شيء في الوقت الفعلي! |
      | `htop` | مثل top لكن أجمل وأسهل (يجب تثبيته أولاً) |
      | `pgrep firefox` | البحث عن PID برنامج معين بالاسم |

      في `top`: اضغط `q` للخروج، `M` للترتيب حسب الذاكرة، `P` للترتيب حسب المعالج.
    examples:
      - q: "ps aux"
        a: "جميع العمليات الجارية لجميع المستخدمين مع PID وأستخدام المعالج والذاكرة والأمر المُشغَّل"
        rel:
          - ["ps-cmd", "Process Status — عرض العمليات الجارية", "أمر ps"]
          - ["ps-aux", "a=جميع المستخدمين، u=صيغة المستخدم، x=بلا طرفية أيضاً", "الخيارات aux"]
        labels: ["Prozesse"]
      - q: "ps aux | grep nginx"
        a: "يعرض فقط العمليات التي تحتوي 'nginx' في اسمها — رائع للبحث!"
        rel:
          - ["ps-grep", "تصفية قائمة العمليات باسم عملية محدد", "ps aux | grep"]
        labels: ["Prozesse"]
      - q: "top"
        a: "يفتح نظرة عامة مباشرة لجميع العمليات مع استخدام المعالج والذاكرة — q للخروج"
        rel:
          - ["top-cmd", "مراقب عمليات تفاعلي في الوقت الفعلي", "أمر top"]
        labels: ["Prozesse"]
      - q: "pgrep -l python"
        a: "يعرض جميع عمليات Python مع رقم PID الخاص بها"
        rel:
          - ["pgrep-cmd", "البحث عن العمليات بالاسم وإظهار PID", "أمر pgrep"]
          - ["pgrep-l", "List — عرض أسماء العمليات بالإضافة إلى PID", "الخيار -l"]
        labels: ["Prozesse"]

  - title: "kill — إنهاء البرامج"
    image: "images/section-02-kill.svg"
    explanation: |
      ماذا تفعل إذا تجمّد برنامج ولم يستجب؟
      تنهيه! في الطرفية تفعل ذلك بـ `kill`.

      `kill` يُرسل **إشارة** (رسالة) إلى عملية.
      الاسم يبدو خطيراً، لكنه ليس كذلك — إنه مجرد أمر.

      أهم إشارتين:

      | الإشارة | الرقم | ماذا يحدث؟ |
      |--------|--------|---------------|
      | SIGTERM | 15 | من فضلك توقف — البرنامج يمكنه الترتيب (الافتراضي) |
      | SIGKILL | 9 | توقف فوراً — لا ترتيب، بغض النظر عن أي شيء |

      **إليك كيفية المتابعة:**

      أولاً ابحث عن PID البرنامج:
      ```
      ps aux | grep firefox
      ```
      ثم أنهه بلطف:
      ```
      kill 1234
      ```
      إذا لم ينجح ذلك، أجبره:
      ```
      kill -9 1234
      ```

      بـ `killall` يمكنك إنهاء جميع العمليات باسم واحد دفعة واحدة:
      ```
      killall firefox
      ```
    examples:
      - q: "kill 1234"
        a: "يُرسل SIGTERM (طلب إنهاء لطيف) إلى العملية ذات رقم PID 1234"
        rel:
          - ["kill-cmd", "إرسال إشارة إلى عملية (الافتراضي: SIGTERM = إنهاء لطيف)", "أمر kill"]
        labels: ["Prozesse"]
      - q: "kill -9 1234"
        a: "ينهي العملية فوراً — SIGKILL لا يمكن للبرنامج تجاهله"
        rel:
          - ["kill-9", "SIGKILL — إنهاء فوري، لا يمكن اعتراضه", "الإشارة -9"]
        labels: ["Prozesse"]
      - q: "kill -1 $(pgrep nginx)"
        a: "يُرسل لـ nginx طلب إعادة تحميل إعداداته — بدون توقف الخادم"
        rel:
          - ["kill-1", "SIGHUP — إعادة تحميل الإعدادات", "الإشارة -1"]
          - ["command-substitution", "$() ينفذ أمراً ويستخدم إخراجه", "$(أمر)"]
        labels: ["Prozesse", "Konfiguration"]
      - q: "killall -9 firefox"
        a: "ينهي جميع عمليات Firefox فوراً — مفيد عندما يتعطل المتصفح"
        rel:
          - ["killall-cmd", "إنهاء جميع العمليات بالاسم المحدد", "أمر killall"]
        labels: ["Prozesse"]

  - title: "المهام الخلفية — عدة أشياء في آنٍ واحد"
    image: "images/section-03-background.svg"
    explanation: |
      عادةً تنتظر الطرفية حتى ينتهي الأمر.
      لكن ماذا لو أردت فعل شيء آخر في نفس الوقت؟

      ترسل العملية إلى **الخلفية** (Background)!
      لذلك تُضيف فقط `&` إلى نهاية الأمر:
      ```
      python3 server.py &
      [1] 5892
      ```
      الـ `[1]` هو رقم المهمة، و `5892` هو PID. الطرفية حرة فوراً!

      | الأمر/المفتاح | ماذا يحدث؟ |
      |-------------|---------------|
      | `أمر &` | تشغيل مباشر في الخلفية |
      | `Ctrl+Z` | إيقاف مؤقت للعملية الجارية |
      | `bg` | تشغيل العملية المتوقفة في الخلفية |
      | `fg` | إعادة عملية الخلفية إلى الأمام |
      | `jobs` | عرض جميع عمليات الخلفية |
      | `nohup أمر &` | عملية خلفية تستمر حتى لو أغلقت الطرفية |

      تخيل: تشغل عملية تنزيل بـ `&` في الخلفية،
      ويمكنك الاستمرار في الكتابة — تماماً مثل عدة تطبيقات في آنٍ واحد!
    examples:
      - q: "sleep 60 &"
        a: "يشغل عملية انتظار لمدة 60 ثانية في الخلفية — الطرفية تبقى حرة فوراً"
        rel:
          - ["background-amp", "& في النهاية يشغل العملية في الخلفية", "عملية & "]
          - ["sleep-cmd", "الانتظار N ثانية — يُستخدم كثيراً في السكريبتات", "أمر sleep"]
        labels: ["Prozesse"]
      - q: "jobs -l"
        a: "يعرض جميع عمليات الخلفية مع رقم المهمة وPID"
        rel:
          - ["jobs-cmd", "قائمة جميع عمليات الخلفية للطرفية الحالية", "أمر jobs"]
          - ["jobs-l", "Long — عرض PID للمهام أيضاً", "الخيار -l"]
        labels: ["Prozesse"]
      - q: "fg %1"
        a: "يعيد عملية الخلفية رقم 1 إلى الأمام"
        rel:
          - ["fg-cmd", "Foreground — نقل عملية الخلفية إلى الأمام", "أمر fg"]
        labels: ["Prozesse"]
      - q: "nohup python3 webserver.py > server.log 2>&1 &"
        a: "يشغل خادم ويب يستمر حتى بعد إغلاق الطرفية — الإخراج يُحفظ في server.log"
        rel:
          - ["nohup-cmd", "No Hangup — العملية تستمر عند إغلاق الطرفية", "أمر nohup"]
          - ["redirect-stderr", "2>&1 يُحوّل رسائل الخطأ إلى نفس الملف كالإخراج العادي", "2>&1"]
        labels: ["Prozesse", "Scripting"]

  - title: "اختبار الطرفية"
    image: "images/section-04-check.svg"
    explanation: |
      اختبر معلوماتك الآن!
    examples:
      - q: "ما هو الأمر الذي يعرض جميع العمليات الجارية لجميع المستخدمين؟"
        type: input
        a: "ps aux"
        labels: ["Prozesse"]
      - q: "ماذا يفعل 'kill -9 1234'؟"
        type: select
        options:
          - text: "ينهي العملية فوراً بالإجبار (SIGKILL)"
            correct: true
          - text: "يطلب من العملية بلطف التوقف (SIGTERM)"
          - text: "يوقف العملية مؤقتاً ذات PID 1234"
          - text: "يعيد تشغيل العملية"
        labels: ["Prozesse"]
      - q: "كيف تشغّل عملية مباشرةً في الخلفية؟"
        type: select
        options:
          - text: "تشغيل الأمر مع & في النهاية"
            correct: true
          - text: "تشغيل الأمر مع bg في البداية"
          - text: "تشغيل الأمر مع nohup في النهاية"
          - text: "الضغط على Ctrl+Z قبل الأمر"
        labels: ["Prozesse"]
      - q: "أيٌّ من هذه العبارات عن إشارات العمليات صحيحة؟"
        type: multiple-choice
        options:
          - text: "SIGTERM (15) هو الإنهاء اللطيف"
            correct: true
          - text: "SIGKILL (9) لا يمكن اعتراضه"
            correct: true
          - text: "SIGHUP (1) يُعيد تحميل الإعدادات"
            correct: true
          - text: "SIGPAUSE (7) هو الإشارة الافتراضية"
        labels: ["Prozesse"]
