version: 2
number: 2
title: "الطرفية — الخطوات الأولى"
description: "تعرّف على الطرفية وأتقن أوامرك الثلاثة الأولى: pwd وls وcd"
image: "images/lesson-header.svg"
image_caption: "Terminal-Fenster mit Prompt und Befehlen"
sections:
  - title: "الطرفية — صوتك نحو الحاسوب"
    image: "images/section-01-open-terminal.svg"
    explanation: |
      **الطرفية** (وتُسمى أيضاً: وحدة التحكم، سطر الأوامر، أو Shell) تشبه
      صوتك نحو الحاسوب. بدلاً من النقر بالفأرة، تكتب
      أوامر — والحاسوب يرد عليك بنص.

      قد يبدو هذا معقداً، لكنه في الواقع بسيط جداً!
      تتعلم بعض الكلمات (الأوامر) — والحاسوب يفعل بالضبط ذلك.

      عندما تفتح الطرفية، ترى **المحث**
      (الحاسوب ينتظر إدخالك):
      ```
      alice@ubuntu:~$
      ```
      وهذا يعني:
      - `alice` = اسم مستخدمك (يعني ما اسمك)
      - `ubuntu` = اسم حاسوبك
      - `~` = أنت الآن في مجلدك الشخصي
      - `$` = أنت مستخدم عادي (ليس مسؤولاً)

      **أول أمر مهم:** `pwd`
      يعرض لك في أي مجلد أنت الآن.
      PWD تعني "Print Working Directory" — أي "أرني مجلد عملي".
    examples:
      - q: "pwd"
        a: "يعرض المسار إلى المجلد الحالي — مثل /home/alice. ستعرف دائماً أين أنت!"
        rel:
          - ["pwd", "Print Working Directory — عرض المجلد الحالي", "أمر"]
        labels: ["Basics"]
      - q: "whoami"
        a: "يعرض اسم المستخدم الخاص بك — بالإنجليزية تعني 'من أنا؟'"
        rel:
          - ["whoami", "إظهار اسم المستخدم الحالي", "أمر"]
        labels: ["Basics"]
      - q: "date"
        a: "يعرض التاريخ والوقت الحاليين"
        rel:
          - ["date-cmd", "عرض التاريخ والوقت الحاليين", "أمر date"]
        labels: ["Basics"]

  - title: "ls — شاهد ما يوجد في المجلد"
    image: "images/section-02-ls.svg"
    explanation: |
      `ls` يعرض لك ما في المجلد.
      LS اختصار لـ "list" (أي "قائمة").

      مثل مفتاح الإضاءة، يمكنك إضافة خيارات تجعله أقوى.
      تُسمى **Flags** (خيارات صغيرة تُضيفها بعد `-`):

      | الأمر | ما يعرضه |
      |--------|-------------|
      | `ls` | أسماء الملفات والمجلدات فقط |
      | `ls -l` | التفاصيل: من يملك ماذا، الحجم، تاريخ التعديل |
      | `ls -a` | الملفات المخفية أيضاً (التي تبدأ بنقطة، مثل `.bashrc`) |
      | `ls -la` | التفاصيل والملفات المخفية معاً |
      | `ls -lh` | أحجام الملفات بصيغة مقروءة (KB، MB، GB بدلاً من أرقام طويلة) |

      نصيحة: يمكنك دمج `-l` و `-a` كـ `-la` —
      هذا اختصار!

      هكذا تبدو سطر التفاصيل:
      ```
      -rw-r--r-- 1 alice alice 4096 Mar 20 10:23 notizen.txt
      ```
      هذه: الصلاحيات — المالك — الحجم — التاريخ — اسم الملف.
      ستتعلم الصلاحيات بالتفصيل في الدرس 5!
    examples:
      - q: "ls -la"
        a: "جميع الملفات بما فيها المخفية مع التفاصيل (الصلاحيات، الحجم، التاريخ) — مفيد جداً!"
        rel:
          - ["ls-l", "Long format — عرض تفصيلي", "الخيار -l"]
          - ["ls-a", "All — الملفات المخفية أيضاً (.dotfiles)", "الخيار -a"]
        labels: ["Basics", "Dateisystem"]
      - q: "ls -lh /var/log"
        a: "يعرض الملفات في مجلد السجلات بأحجام مقروءة (KB، MB)"
        rel:
          - ["ls-h", "Human-readable — أحجام ملفات مقروءة (KB/MB/GB)", "الخيار -h"]
          - ["var-log", "مجلد سجلات النظام — هنا يحفظ لينكس البروتوكولات", "/var/log"]
        labels: ["Dateisystem"]
      - q: "ls -lt ~/.ssh"
        a: "يعرض الملفات في مجلد SSH مرتبةً بحيث الأحدث أولاً"
        rel:
          - ["ls-t", "Time — الترتيب حسب وقت التعديل، الأحدث أولاً", "الخيار -t"]
          - ["ssh-dir", "مجلد مفاتيح وإعدادات SSH", "~/.ssh"]
        labels: ["Dateisystem", "Sicherheit"]
      - q: "ls -la /etc/nginx/"
        a: "عرض جميع ملفات مجلد nginx مع التفاصيل (nginx برنامج خادم ويب)"
        rel:
          - ["nginx-dir", "مجلد إعدادات خادم Nginx", "/etc/nginx/"]
        labels: ["Dateisystem", "Konfiguration"]

  - title: "cd — من مجلد إلى مجلد"
    image: "images/section-03-cd.svg"
    explanation: |
      بـ `cd` تنتقل بين المجلدات.
      CD اختصار لـ "Change Directory" — أي "غيّر المجلد".

      تخيل نظام الملفات كمنزل: كل غرفة هي مجلد.
      بـ `cd` تنتقل من غرفة إلى غرفة.

      | الأمر | ماذا يحدث؟ |
      |--------|---------------|
      | `cd /` | للأعلى تماماً — إلى جذر نظام الملفات |
      | `cd ~` | للعودة إلى مجلدك الشخصي (أو: فقط `cd`) |
      | `cd ..` | الصعود مجلداً واحداً للأعلى (مثل Backspace) |
      | `cd ../..` | صعود مجلدين للأعلى |
      | `cd -` | العودة إلى المجلد الأخير (مثل زر الرجوع في المتصفح!) |
      | `cd /etc` | القفز مباشرة إلى مجلد محدد |

      **حيلة سرية — مفتاح Tab:**
      اكتب `cd /etc/ngi` ثم اضغط `Tab` (المفتاح على يسار Caps Lock).
      الطرفية تُكمل تلقائياً إلى `cd /etc/nginx/` — يوفّر الكثير من الكتابة!
    examples:
      - q: "cd /var/log"
        a: "ينتقل مباشرة إلى مجلد السجلات — هذا يُسمى مساراً مطلقاً (يبدأ دائماً بـ /)"
        rel:
          - ["cd-cmd", "Change Directory — تغيير المجلد", "أمر cd"]
          - ["absolute-path", "مسار يبدأ دائماً بـ / بصرف النظر عن الموقع", "مسار مطلق"]
        labels: ["Dateisystem"]
      - q: "cd .."
        a: "الصعود مجلداً واحداً — من /home/alice يصبح /home"
        rel:
          - ["dotdot", "النقطتان = المجلد الأعلى (المجلد فوقه)", ".."]
        labels: ["Dateisystem"]
      - q: "cd ~"
        a: "العودة دائماً إلى مجلدك الشخصي — بغض النظر عن موقعك الحالي"
        rel:
          - ["tilde", "اختصار للمجلد الشخصي", "~"]
        labels: ["Dateisystem"]
      - q: "cd -"
        a: "القفز إلى المجلد الأخير الذي زرته — عملي جداً!"
        rel:
          - ["cd-minus", "العودة إلى المجلد السابق", "cd -"]
        labels: ["Dateisystem"]
      - q: "cd /home/alice/projekte && pwd"
        a: "الانتقال إلى مجلد المشاريع ثم عرض المسار فوراً"
        rel:
          - ["double-ampersand", "تنفيذ أمرين متتاليين — الثاني يعمل فقط إذا نجح الأول", "&&"]
        labels: ["Dateisystem"]

  - title: "اختبار الطرفية"
    image: "images/section-04-check.svg"
    explanation: |
      اختبر معلوماتك الآن!
    examples:
      - q: "ما هو الأمر الذي يعرض مجلدك الحالي؟"
        type: input
        a: "pwd"
        labels: ["Basics"]
      - q: "ماذا يفعل الأمر 'ls -la'؟"
        type: select
        options:
          - text: "عرض جميع الملفات بما فيها المخفية مع التفاصيل"
            correct: true
          - text: "حذف جميع الملفات"
          - text: "التراجع عن الإجراء الأخير"
          - text: "عرض ملفات السجلات"
        labels: ["Basics", "Dateisystem"]
      - q: "ما هو الأمر الذي ينتقل إلى المجلد الأخير الذي زرته؟"
        type: select
        options:
          - text: "cd -"
            correct: true
          - text: "cd .."
          - text: "cd ~"
          - text: "cd /"
        labels: ["Dateisystem"]
      - q: "أيٌّ من هذه الخيارات تنتمي إلى الأمر 'ls'؟"
        type: multiple-choice
        options:
          - text: "-l"
            correct: true
          - text: "-a"
            correct: true
          - text: "-x"
          - text: "-h"
            correct: true
          - text: "-t"
            correct: true
        labels: ["Basics"]
