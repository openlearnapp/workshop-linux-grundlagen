version: 1
number: 2
title: "الطرفية — الخطوات الأولى"
description: "إتقان pwd و ls و cd — الأوامر الثلاثة الأساسية للتنقل في نظام الملفات"
sections:
  - title: "فتح الطرفية — أين أنا؟"
    explanation: |
      **الطرفية** (Terminal، وتُسمى أيضًا: Shell، وحدة التحكم، سطر الأوامر) هي اتصالك المباشر
      بنظام التشغيل. لا نقرات بالفأرة، لا بحث في القوائم — أنت والحاسوب فقط.

      عند فتح الطرفية، سترى **المحث** (Prompt):
      ```
      alice@ubuntu:~$
      ```
      وهذا يعني:
      - `alice` = اسم المستخدم
      - `ubuntu` = اسم الجهاز (Hostname)
      - `~` = أنت في المجلد الشخصي
      - `$` = مستخدم عادي (عند ظهور `#` تكون المستخدم الجذر/المسؤول)

      **أهم أمر أول لك:** `pwd` — *Print Working Directory*.
      يخبرك دائمًا أين أنت الآن.
    examples:
      - q: "pwd"
        a: "يعرض المسار الحالي، مثلاً /home/alice — تعرف دائمًا أين أنت"
        rel:
          - ["pwd", "Print Working Directory — عرض المجلد الحالي", "أمر"]
      - q: "whoami"
        a: "يعرض اسم المستخدم الحالي — مفيد عند العمل بعدة حسابات"
        rel:
          - ["whoami", "عرض اسم المستخدم الحالي", "أمر"]
      - q: "date"
        a: "يعرض التاريخ والوقت الحاليين"
        rel:
          - ["date-cmd", "عرض التاريخ والوقت الحاليين", "أمر date"]

  - title: "ls — ماذا يوجد هنا؟"
    explanation: |
      `ls` يعرض محتويات المجلد الحالي.
      مع الأعلام (flags) يصبح `ls` أكثر قوة:

      | الأمر | ما يعرضه |
      |-------|----------|
      | `ls` | أسماء الملفات فقط |
      | `ls -l` | تفاصيل: الصلاحيات، الحجم، التاريخ |
      | `ls -a` | الملفات المخفية أيضًا (تبدأ بـ `.`) |
      | `ls -la` | تفاصيل + ملفات مخفية (تجميع!) |
      | `ls -lh` | أحجام الملفات بصيغة مقروءة (KB, MB, GB) |
      | `ls -lt` | مرتبة حسب تاريخ التعديل (الأحدث أولاً) |

      في مخرجات `-l` تعني الأعمدة:
      ```
      -rw-r--r-- 1 alice alice 4096 Mar 20 10:23 document.txt
      ↑الصلاحيات ↑روابط ↑المالك  ↑الحجم ↑التاريخ ↑الاسم
      ```
    examples:
      - q: "ls -la"
        a: "جميع الملفات بما فيها المخفية مع التفاصيل (الصلاحيات، الحجم، التاريخ)"
        rel:
          - ["ls-l", "Long format — عرض مفصل", "العلم -l"]
          - ["ls-a", "All — الملفات المخفية أيضًا (.dotfiles)", "العلم -a"]
      - q: "ls -lh /var/log"
        a: "عرض ملفات السجلات بأحجام مقروءة (KB, MB)"
        rel:
          - ["ls-h", "Human-readable — أحجام مقروءة (KB/MB/GB)", "العلم -h"]
          - ["var-log", "مجلد سجلات النظام", "/var/log"]
      - q: "ls -lt ~/.ssh"
        a: "عرض ملفات إعداد SSH مرتبة حسب آخر تعديل"
        rel:
          - ["ls-t", "Time — الترتيب حسب وقت التعديل، الأحدث أولاً", "العلم -t"]
          - ["ssh-dir", "مجلد مفاتيح وإعدادات SSH", "~/.ssh"]
      - q: "ls -la /etc/nginx/"
        a: "عرض جميع ملفات إعداد Nginx بالتفاصيل"
        rel:
          - ["nginx-dir", "مجلد إعدادات خادم Nginx", "/etc/nginx/"]

  - title: "cd — إلى أين تريد الذهاب؟"
    explanation: |
      `cd` (Change Directory) هو أداة التنقل في نظام الملفات.

      **أنماط التنقل المهمة:**

      | الأمر | إلى أين؟ |
      |-------|----------|
      | `cd /` | إلى المجلد الجذر |
      | `cd ~` | إلى المجلد الشخصي (أيضًا: `cd` فقط) |
      | `cd ..` | مجلد واحد للأعلى |
      | `cd ../..` | مستويان للأعلى |
      | `cd -` | إلى آخر مجلد تمت زيارته (رجوع!) |
      | `cd /etc/nginx` | مسار مطلق (يبدأ بـ /) |
      | `cd projekte/webseite` | مسار نسبي (من هنا) |

      **إكمال Tab التلقائي** — أفضل صديق لك:
      اكتب `cd /etc/ngi` واضغط `Tab` ← الطرفية تُكمل تلقائيًا إلى `/etc/nginx/`
    examples:
      - q: "cd /var/log"
        a: "ينتقل مباشرة إلى مجلد السجلات (مسار مطلق — يبدأ بـ /)"
        rel:
          - ["cd-cmd", "Change Directory — تغيير المجلد", "أمر cd"]
          - ["absolute-path", "مسار يبدأ دائمًا بـ /، مستقل عن الموقع", "مسار مطلق"]
      - q: "cd .."
        a: "الانتقال مستوى واحد للأعلى — من /home/alice يصبح /home"
        rel:
          - ["dotdot", "النقطتان = المجلد الأب", ".."]
      - q: "cd ~"
        a: "الانتقال إلى المجلد الشخصي — بغض النظر عن موقعك الحالي"
        rel:
          - ["tilde", "اختصار للمجلد الشخصي", "~"]
      - q: "cd -"
        a: "الانتقال إلى آخر مجلد تمت زيارته — عملي للتبديل بين مجلدين"
        rel:
          - ["cd-minus", "الرجوع إلى المجلد السابق", "cd -"]
      - q: "cd /home/alice/projekte && pwd"
        a: "الانتقال إلى مجلد المشاريع وتأكيد المسار فورًا"
        rel:
          - ["double-ampersand", "ربط أمرين — الثاني يُنفذ فقط إذا نجح الأول", "&&"]

  - title: "🖥️ اختبار الطرفية"
    explanation: |
      اختبر معرفتك الآن — أدخل الأوامر مباشرة!
    examples:
      - q: "أي أمر يعرض المجلد الحالي؟"
        type: input
        a: "pwd"
      - q: "ماذا يفعل الأمر 'ls -la'؟"
        type: select
        options:
          - text: "عرض جميع الملفات بما فيها المخفية مع التفاصيل"
            correct: true
          - text: "حذف جميع الملفات"
          - text: "التراجع عن آخر عملية"
          - text: "عرض ملفات السجلات"
      - q: "أي أمر ينتقل إلى آخر مجلد تمت زيارته؟"
        type: select
        options:
          - text: "cd -"
            correct: true
          - text: "cd .."
          - text: "cd ~"
          - text: "cd /"
      - q: "أي من هذه الأعلام تنتمي إلى الأمر 'ls'؟"
        type: multiple-choice
        options:
          - text: "-l"
            correct: true
          - text: "-a"
            correct: true
          - text: "-x"
          - text: "-h"
            correct: true
          - text: "-t"
            correct: true
