<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230">
<style>
.f{font-family:sans-serif}
.ti{animation:tia 11s infinite}@keyframes tia{0%,3%{opacity:0}7%,87%{opacity:1}92%,100%{opacity:0}}
.c1{animation:c1a 11s infinite}@keyframes c1a{0%,12%{opacity:0}18%,87%{opacity:1}92%,100%{opacity:0}}
.c2{animation:c2a 11s infinite}@keyframes c2a{0%,30%{opacity:0}36%,87%{opacity:1}92%,100%{opacity:0}}
.c3{animation:c3a 11s infinite}@keyframes c3a{0%,48%{opacity:0}54%,87%{opacity:1}92%,100%{opacity:0}}
.c4{animation:c4a 11s infinite}@keyframes c4a{0%,65%{opacity:0}71%,87%{opacity:1}92%,100%{opacity:0}}
.ft{animation:fta 11s infinite}@keyframes fta{0%,78%{opacity:0}82%,87%{opacity:1}92%,100%{opacity:0}}
</style>
<rect width="640" height="230" rx="12" fill="#0d1117"/>
<rect width="640" height="44" rx="12" fill="#161b22"/>
<rect x="0" y="32" width="640" height="12" fill="#161b22"/>
<text class="f ti" x="320" y="28" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">أول سكريبت — Shebang والمتغيرات</text>
<!-- Card 1: orange -->
<g class="c1">
<rect x="14" y="54" width="144" height="118" rx="9" fill="#1a0f08"/>
<rect x="14" y="54" width="144" height="4" rx="2" fill="#f0883e"/>
<text class="f" x="86" y="86" text-anchor="middle" font-size="22">📜</text>
<text class="f" x="86" y="109" text-anchor="middle" fill="#f0883e" font-size="13" font-weight="bold">Shebang</text>
<text class="f" x="86" y="124" text-anchor="middle" fill="#8b949e" font-size="11">#!/bin/bash</text>
<text class="f" x="86" y="139" text-anchor="middle" fill="#8b949e" font-size="11">يحدد الشل المستخدم</text>
</g>
<!-- Card 2: blue -->
<g class="c2">
<rect x="168" y="54" width="144" height="118" rx="9" fill="#0d1520"/>
<rect x="168" y="54" width="144" height="4" rx="2" fill="#58a6ff"/>
<text class="f" x="240" y="86" text-anchor="middle" font-size="22">📝</text>
<text class="f" x="240" y="109" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">المتغيرات</text>
<text class="f" x="240" y="124" text-anchor="middle" fill="#8b949e" font-size="11">name=Alice</text>
<text class="f" x="240" y="139" text-anchor="middle" fill="#8b949e" font-size="11">echo $name</text>
</g>
<!-- Card 3: green -->
<g class="c3">
<rect x="322" y="54" width="144" height="118" rx="9" fill="#0a1a0d"/>
<rect x="322" y="54" width="144" height="4" rx="2" fill="#3fb950"/>
<text class="f" x="394" y="86" text-anchor="middle" font-size="22">▶️</text>
<text class="f" x="394" y="109" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="bold">التشغيل</text>
<text class="f" x="394" y="124" text-anchor="middle" fill="#8b949e" font-size="11">chmod +x script.sh</text>
<text class="f" x="394" y="139" text-anchor="middle" fill="#8b949e" font-size="11">ثم ./script.sh</text>
</g>
<!-- Card 4: purple -->
<g class="c4">
<rect x="476" y="54" width="150" height="118" rx="9" fill="#110d1a"/>
<rect x="476" y="54" width="150" height="4" rx="2" fill="#bc8cff"/>
<text class="f" x="551" y="86" text-anchor="middle" font-size="22">💬</text>
<text class="f" x="551" y="109" text-anchor="middle" fill="#bc8cff" font-size="13" font-weight="bold">echo</text>
<text class="f" x="551" y="124" text-anchor="middle" fill="#8b949e" font-size="11">طباعة نص</text>
<text class="f" x="551" y="139" text-anchor="middle" fill="#8b949e" font-size="11">على الشاشة</text>
</g>
<!-- Footer -->
<g class="ft">
<rect x="14" y="186" width="612" height="32" rx="8" fill="#161b22"/>
<text class="f" x="320" y="207" text-anchor="middle" fill="#8b949e" font-size="12">#!/bin/bash — دائماً السطر الأول في سكريبت bash</text>
</g>
</svg>
