version: 2
number: 9
title: "أساسيات كتابة سكريبتات الصدفة"
description: "المتغيرات وشروط if والحلقات — كتابة سكريبتات خاصة وأتمتة المهام"
image: "images/lesson-header.svg"
image_caption: "Code-Editor mit Bash-Skript und Syntax-Highlighting"
sections:
  - title: "أول سكريبت لك — Shebang والمتغيرات"
    image: "images/section-01-shebang.svg"
    explanation: |
      تخيل أن لديك نفس المهمة كل صباح:
      ترتيب المجلدات، حذف الملفات القديمة، عرض رسالة.
      سيكون مملاً لو اضطررت لكتابة ذلك يدوياً كل يوم.

      **سكريبت الصدفة** مثل قائمة تسوق للحاسوب.
      تكتب مرة واحدة ما يجب أن يفعله —
      ثم يفعله مراراً وتكراراً بضغطة زر.

      هكذا يبدو سكريبت بسيط:
      ```
      #!/bin/bash
      # هذا تعليق — الحاسوب يتجاهله

      NAME="Alice"
      DATUM=$(date +%Y-%m-%d)

      echo "مرحباً، $NAME!"
      echo "اليوم هو: $DATUM"
      ```

      السطر الأول `#!/bin/bash` يُسمى **Shebang**.
      يقول للينكس: "نفّذ هذا السكريبت بـ bash."
      بدون هذا السطر لا يعرف لينكس كيف يقرأ السكريبت.

      **المتغيرات** (مواضع تخزين القيم):
      - للتخزين: `NAME="Alice"` — لا مسافة حول `=`!
      - للاستخدام: `echo $NAME` — الـ `$` يُشير: "هنا قيمة مخزنة"
      - حفظ نتيجة أمر: `DATUM=$(date)` — ما يُخرجه `date` يُخزن في `DATUM`
    examples:
      - q: "#!/bin/bash"
        a: "Shebang — يجب أن يكون السطر الأول في كل سكريبت Bash حتى يستطيع لينكس تنفيذه"
        rel:
          - ["shebang", "السطر الأول من السكريبت الذي يحدد المفسر", "#!/bin/bash"]
        labels: ["Scripting"]
      - q: "NAME=\"Alice\" && echo \"مرحباً، $NAME\""
        a: "تعيين متغير واستخدامه فوراً — لا مسافة حول علامة يساوي!"
        rel:
          - ["bash-variable", "متغير في Bash: NAME=قيمة (بدون $)، $NAME (عند الاستخدام)", "متغير"]
        labels: ["Scripting"]
      - q: "HEUTE=$(date +%d.%m.%Y)"
        a: "يحفظ تاريخ اليوم في متغير — $(date) يُعيد التاريخ الحالي"
        rel:
          - ["command-sub", "استبدال الأمر: $(أمر) يحفظ الإخراج في متغير", "$()"]
          - ["date-format", "تنسيق التاريخ: %d=يوم، %m=شهر، %Y=سنة", "date +تنسيق"]
        labels: ["Scripting"]
      - q: "echo \"المسار: $HOME, المستخدم: $USER\""
        a: "لينكس يوفر تلقائياً متغيرات مفيدة — HOME وUSER دائماً موجودان"
        rel:
          - ["env-var-user", "متغير بيئي يحتوي اسم المستخدم الحالي", "$USER"]
          - ["env-var-home", "متغير بيئي يحتوي مسار المجلد الشخصي", "$HOME"]
        labels: ["Scripting"]

  - title: "شروط if — السكريبت يفكر"
    image: "images/section-02-if.svg"
    explanation: |
      أحياناً تريد من سكريبتك التصرف بشكل مختلف حسب الموقف.
      "إذا كان الملف موجوداً — افعل هذا. وإلا افعل شيئاً آخر."

      هذا يُسمى **شرط if** (إذا):
      ```
      #!/bin/bash

      if [ -f "/etc/nginx/nginx.conf" ]; then
          echo "Nginx مثبت!"
      elif [ -d "/etc/apache2" ]; then
          echo "Apache مثبت."
      else
          echo "لم يُعثر على خادم ويب."
      fi
      ```

      الـ `fi` في النهاية — هو كلمة "if" مكتوبةً بالعكس.
      هكذا يعرف bash أن الشرط انتهى.

      رموز الاختبار المهمة:
      - `-f ملف` — هل هذا ملف؟
      - `-d مسار` — هل هذا مجلد؟
      - `-z "$var"` — هل المتغير فارغ؟
      - `"$a" = "$b"` — هل النصان متساويان؟
      - `$a -gt $b` — هل الرقم a أكبر من b؟ (gt = greater than)
    examples:
      - q: "if [ -f \"~/.ssh/id_ed25519\" ]; then echo \"مفتاح SSH موجود\"; fi"
        a: "يفحص ما إذا كان مفتاح SSH موجوداً — -f يفحص ما إذا كان الملف موجوداً"
        rel:
          - ["if-bash", "if [ شرط ]; then أوامر; fi — البنية الأساسية", "if-then-fi"]
          - ["test-f", "-f يختبر ما إذا كان الملف موجوداً (file)", "عامل الاختبار -f"]
        labels: ["Scripting", "Sicherheit"]
      - q: "[ -d /var/www ] && echo \"مجلد الويب موجود\""
        a: "كتابة مختصرة: && تعني 'وإذا صح ذلك، ثم...' — سطر واحد فقط"
        rel:
          - ["test-d", "-d يختبر ما إذا كان المجلد موجوداً (directory)", "عامل الاختبار -d"]
        labels: ["Scripting"]
      - q: "if [ \"$USER\" = \"root\" ]; then echo \"أنت المسؤول!\"; fi"
        a: "يفحص ما إذا كان السكريبت يعمل كمسؤول — مفيد قبل تغييرات النظام"
        rel:
          - ["string-compare", "مقارنة النصوص في Bash بـ =", "مقارنة النصوص"]
        labels: ["Scripting", "Sicherheit"]

  - title: "الحلقات — تكرار شيء عدة مرات"
    image: "images/section-03-loops.svg"
    explanation: |
      تخيل أنك تحتاج إعادة تسمية 100 ملف.
      يدوياً سيستغرق ذلك وقتاً طويلاً جداً.
      **حلقة** تفعل ذلك في ثوانٍ.

      **حلقة for** تمر بقائمة، نقطةً نقطة:
      ```
      for DATEI in *.log; do
          echo "أعالج: $DATEI"
          gzip "$DATEI"
      done
      ```
      `do` تعني "ثم افعل هذا:"، `done` تعني "انتهيت".

      **حلقة while** تعمل طالما شرط صحيح:
      ```
      ZAEHLER=1
      while [ $ZAEHLER -le 5 ]; do
          echo "الدورة $ZAEHLER"
          ZAEHLER=$((ZAEHLER + 1))
      done
      ```
      `-le` تعني "less or equal" (أصغر من أو يساوي).

      مثال حقيقي — نسخة احتياطية لثلاثة مجلدات دفعة واحدة:
      ```
      #!/bin/bash
      DATUM=$(date +%Y%m%d)
      for ORDNER in ~/dokumente ~/bilder ~/projekte; do
          tar -czf "/backup/${DATUM}_$(basename $ORDNER).tar.gz" "$ORDNER"
          echo "تمت النسخ الاحتياطي: $ORDNER"
      done
      ```
    examples:
      - q: "for i in 1 2 3 4 5; do echo \"الرقم: $i\"; done"
        a: "حلقة على الأرقام من 1 إلى 5 — تطبع كل رقم مرة واحدة"
        rel:
          - ["for-loop", "حلقة for: for VAR in قائمة; do ... done", "for-do-done"]
        labels: ["Scripting"]
      - q: "for USER in alice bob charlie; do useradd \"$USER\"; done"
        a: "ينشئ ثلاثة مستخدمين دفعة واحدة — بدلاً من كتابة نفس الأمر ثلاث مرات"
        rel:
          - ["for-list", "حلقة for على قائمة من القيم", "for VAR in قيمة1 قيمة2"]
        labels: ["Scripting", "Sicherheit"]
      - q: "for f in /var/log/*.log; do echo \"$(wc -l < $f) أسطر: $f\"; done"
        a: "يعدّ أسطر كل ملف سجل ويعرض النتيجة"
        rel:
          - ["for-glob", "حلقة for مع نمط glob على الملفات", "for f in *.امتداد"]
          - ["wc-l", "Word Count -l — عدّ أسطر ملف", "wc -l"]
        labels: ["Scripting", "Dateisystem"]
      - q: "while true; do df -h / | grep '/'; sleep 60; done"
        a: "يفحص مساحة القرص كل دقيقة — يعمل حتى تضغط Ctrl+C"
        rel:
          - ["while-loop", "حلقة while: while شرط; do ... done", "while-do-done"]
          - ["while-true", "while true — حلقة لا نهائية، تُنهى فقط بـ Ctrl+C", "while true"]
        labels: ["Scripting"]

  - title: "اختبار الطرفية"
    image: "images/section-04-check.svg"
    explanation: |
      اختبر معلوماتك الآن — أدخل الأوامر مباشرةً!
    examples:
      - q: "ما هو السطر الأول في كل سكريبت Bash (Shebang)؟"
        type: input
        a: "#!/bin/bash"
        labels: ["Scripting"]
      - q: "ما الذي يجب مراعاته عند تعيين متغير Bash؟"
        type: select
        options:
          - text: "لا مسافة حول علامة يساوي: NAME=\"Alice\""
            correct: true
          - text: "دائماً $ قبل اسم المتغير: $NAME=\"Alice\""
          - text: "المتغيرات يجب أن تكون بأحرف كبيرة"
          - text: "المتغيرات يجب الإعلان عنها بـ export"
        labels: ["Scripting"]
      - q: "بأي كلمة تنتهي شروط if في Bash؟"
        type: select
        options:
          - text: "fi"
            correct: true
          - text: "end"
          - text: "endif"
          - text: "done"
        labels: ["Scripting"]
      - q: "أيٌّ من هذه العبارات عن كتابة السكريبتات صحيحة؟"
        type: multiple-choice
        options:
          - text: "$() يحفظ نتيجة أمر في متغير"
            correct: true
          - text: "حلقات for تنتهي بـ 'done'"
            correct: true
          - text: "-f يفحص ما إذا كان ملف موجوداً"
            correct: true
          - text: "المسافات حول = إلزامية في المتغيرات"
        labels: ["Scripting"]
