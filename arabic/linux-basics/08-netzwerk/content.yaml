version: 2
number: 8
title: "الشبكات"
description: "ping وcurl وwget وssh وip — اختبار اتصالات الشبكة ونقل البيانات والعمل عن بُعد"
image: "images/lesson-header.svg"
image_caption: "Netzwerktopologie mit Router, Server und Clients"
sections:
  - title: "فحص الشبكة — ping وip وss"
    image: "images/section-01-network.svg"
    explanation: |
      تخيل أنك ترسل خطاباً لصديق.
      تريد أن تعرف: "هل وصل الخطاب أصلاً؟"

      على الإنترنت يقوم بذلك الأمر **ping**.
      يرسل حزماً صغيرة تجريبية إلى عنوان ويقيس
      ما إذا كانت تصل وبأي سرعة:
      ```
      ping -c 4 google.com
      ```
      الـ `-c 4` يعني: "أرسل 4 حزم تجريبية بالضبط."

      بـ **ip addr** ترى عنوان حاسوبك على الشبكة —
      مثل رقم منزلك:
      ```
      ip addr show
      ```

      وبـ **ss** ترى أي "أبواب" (منافذ) مفتوحة على حاسوبك:
      ```
      ss -tulpn
      ```
      يبدو هذا معقداً، لكنه بسيط:
      - `t` = اتصالات TCP (النوع الأكثر شيوعاً)
      - `u` = اتصالات UDP (للبيانات السريعة مثل الفيديو)
      - `l` = عرض الأبواب المفتوحة فقط
      - `p` = أي برنامج فتح الباب؟
      - `n` = عرض أرقام بدلاً من أسماء
    examples:
      - q: "ping -c 4 google.com"
        a: "يرسل 4 حزم تجريبية إلى Google — يفحص ما إذا كان الإنترنت يعمل"
        rel:
          - ["ping-cmd", "اختبار إمكانية الوصول للشبكة والتأخير", "أمر ping"]
          - ["ping-c", "Count — تحديد عدد الحزم المرسلة", "الخيار -c"]
        labels: ["Netzwerk"]
      - q: "ip addr show"
        a: "يعرض عنوان شبكة حاسوبك — مثل رقم منزلك على الإنترنت"
        rel:
          - ["ip-cmd", "أداة إدارة الشبكة الحديثة (تستبدل ifconfig)", "أمر ip"]
          - ["ip-addr", "عرض عناوين IP لجميع واجهات الشبكة", "ip addr"]
        labels: ["Netzwerk"]
      - q: "ss -tulpn"
        a: "يعرض جميع المنافذ المفتوحة والبرامج التي تستخدمها"
        rel:
          - ["ss-cmd", "Socket Statistics — اتصالات الشبكة والمنافذ المفتوحة", "أمر ss"]
          - ["ss-tulpn", "t=TCP، u=UDP، l=listening، p=عملية، n=رقمي", "الخيارات -tulpn"]
        labels: ["Netzwerk"]

  - title: "curl و wget — جلب البيانات من الإنترنت"
    image: "images/section-02-curl-wget.svg"
    explanation: |
      متصفحك يُحمّل مواقع الإنترنت — هذا ترى.
      لكن ماذا لو أردت جلب بيانات إلى الطرفية
      بدون فتح متصفح؟

      لذلك يوجد **curl** و **wget**.

      **curl** مثل متصفح غير مرئي:
      ```
      curl https://example.com
      ```
      يعرض لك محتوى موقع مباشرةً في الطرفية.

      بـ curl يمكنك أيضاً معرفة عنوان الإنترنت الخاص بك:
      ```
      curl -s https://ipinfo.io/ip
      ```
      الـ `-s` تعني "silent" (هادئ) —
      يعرض النتيجة فقط، بدون شريط تقدم.

      **wget** أفضل لتحميل الملفات الكبيرة:
      ```
      wget https://example.com/grossedatei.zip
      ```
      wget يحفظ الملف مباشرةً على حاسوبك.
      curl يعرضه فقط — هذا الفرق الأهم.
    examples:
      - q: "curl -I https://example.com"
        a: "يعرض فقط رأس الموقع (Header) — مثل النظر في غلاف الرسالة"
        rel:
          - ["curl-cmd", "Client URL — إرسال طلبات HTTP ونقل البيانات", "أمر curl"]
          - ["curl-I", "Head — عرض رأس استجابة HTTP فقط", "الخيار -I"]
        labels: ["Netzwerk"]
      - q: "curl -s https://ipinfo.io/ip"
        a: "يعرض عنوان الإنترنت الخاص بك — -s يجعل الإخراج نظيفاً"
        rel:
          - ["curl-s", "Silent — إخفاء شريط التقدم ورسائل الخطأ", "الخيار -s"]
        labels: ["Netzwerk"]
      - q: "wget -O nodejs.tar.gz https://nodejs.org/dist/v20.0.0/node-v20.0.0.tar.gz"
        a: "يُحمّل ملفاً ويحفظه باسم مختلف"
        rel:
          - ["wget-cmd", "Web Get — تحميل الملفات من الإنترنت", "أمر wget"]
          - ["wget-O", "Output — حفظ الملف باسم آخر", "الخيار -O"]
        labels: ["Netzwerk"]
      - q: "curl -fsSL https://get.docker.com | sudo sh"
        a: "يُحمّل سكريبت تثبيت وينفذه فوراً"
        rel:
          - ["curl-fssl", "f=فشل هادئ، s=هادئ، S=أخطاء، L=متابعة التحويلات", "الخيارات -fsSL"]
        labels: ["Netzwerk", "Konfiguration"]

  - title: "SSH — الاتصال بحاسوب آخر بأمان"
    image: "images/section-03-ssh.svg"
    explanation: |
      تخيل أنك تجلس في منزلك، لكن تعمل على حاسوب
      يبعد 1000 كيلومتر في مركز بيانات.

      هذا بالضبط ما يفعله **SSH** (Secure Shell — "قشرة آمنة").
      كل ما تكتبه يُنقل مشفراً.
      لا أحد يمكنه التنصت.

      هكذا تتصل:
      ```
      ssh alice@192.168.1.100
      ```
      هذا يعني: "اتصل كمستخدم 'alice' بالحاسوب 192.168.1.100"

      أكثر أماناً من كلمة المرور هي **مفاتيح SSH**.
      هذه مثل بطاقة هوية سحرية — لا تحتاج كتابة كلمة مرور بعد الآن:
      ```
      ssh-keygen -t ed25519 -C "mein-laptop"
      ```
      هذا ينشئ مفتاحاً.
      بـ `-t ed25519` تختار نوعاً حديثاً وآمناً.

      ثم ترسل بطاقة هويتك إلى الحاسوب الآخر:
      ```
      ssh-copy-id alice@server.example.com
      ```
      من الآن يمكنك الدخول — بدون كلمة مرور!

      نقل الملفات يتم بـ **scp** (Secure Copy — "نسخ آمن"):
      ```
      scp meine-datei.txt alice@server:/home/alice/
      ```
    examples:
      - q: "ssh alice@192.168.1.100"
        a: "يتصل بالحاسوب 192.168.1.100 كـ 'alice' — كل شيء مشفر"
        rel:
          - ["ssh-cmd", "Secure Shell — اتصال عن بُعد مشفر", "أمر ssh"]
        labels: ["Netzwerk", "Sicherheit"]
      - q: "ssh-keygen -t ed25519 -C \"alice@meinlaptop\""
        a: "ينشئ مفتاح SSH حديثاً — مثل بطاقة هوية رقمية"
        rel:
          - ["ssh-keygen", "توليد زوج مفاتيح SSH", "أمر ssh-keygen"]
          - ["ed25519", "خوارزمية حديثة لمفاتيح SSH، مُوصى بها منذ 2022", "نوع المفتاح Ed25519"]
        labels: ["Netzwerk", "Sicherheit"]
      - q: "ssh-copy-id -i ~/.ssh/id_ed25519.pub alice@server.example.com"
        a: "يرسل مفتاحك إلى الخادم — بعدها لا كلمة مرور مطلوبة"
        rel:
          - ["ssh-copy-id", "تثبيت مفتاح SSH العام على خادم بعيد", "أمر ssh-copy-id"]
        labels: ["Netzwerk", "Sicherheit"]
      - q: "scp -r ~/projekte/webseite/ alice@server:/var/www/html/"
        a: "ينسخ مجلداً كاملاً بأمان إلى حاسوب آخر"
        rel:
          - ["scp-cmd", "Secure Copy — نقل الملفات المشفر عبر SSH", "أمر scp"]
          - ["scp-r", "Recursive — نقل المجلدات", "الخيار -r"]
        labels: ["Netzwerk"]

  - title: "اختبار الطرفية"
    image: "images/section-04-check.svg"
    explanation: |
      اختبر معلوماتك الآن — أدخل الأوامر مباشرةً!
    examples:
      - q: "ما هو الأمر الذي يختبر إمكانية الوصول لـ google.com بـ 4 حزم؟"
        type: input
        a: "ping -c 4 google.com"
        labels: ["Netzwerk"]
      - q: "ماذا يفعل 'curl -s https://ipinfo.io/ip'؟"
        type: select
        options:
          - text: "يعرض عنوان الإنترنت الخاص بك"
            correct: true
          - text: "يختبر سرعة الاتصال بالإنترنت"
          - text: "يُحمّل قاعدة بيانات IP"
          - text: "يعرض جميع بطاقات الشبكة"
        labels: ["Netzwerk"]
      - q: "ما هو الأمر الذي يعرض جميع المنافذ المفتوحة والبرامج المرتبطة بها؟"
        type: select
        options:
          - text: "ss -tulpn"
            correct: true
          - text: "ip addr show"
          - text: "ping -a localhost"
          - text: "netstat --list"
        labels: ["Netzwerk"]
      - q: "أيٌّ من هذه العبارات عن SSH صحيحة؟"
        type: multiple-choice
        options:
          - text: "SSH يُشفّر الاتصال"
            correct: true
          - text: "مفاتيح SSH أكثر أماناً من كلمات المرور"
            correct: true
          - text: "ssh-keygen ينشئ زوج مفاتيح"
            correct: true
          - text: "SSH يُرسل كلمات المرور بنص واضح"
        labels: ["Netzwerk", "Sicherheit"]
