version: 2
number: 4
title: "محتوى الملفات"
description: "cat و less و head و tail و grep — قراءة الملفات والبحث فيها وتصفيتها"
image: "images/lesson-header.svg"
sections:
  - title: "cat و less و more — قراءة الملفات"
    image: "images/section-01-read.svg"
    explanation: |
      **لماذا هذا مهم؟** كمستخدم لينكس ستقرأ الملفات باستمرار:
      الإعدادات، ملفات السجلات، السكريبتات، تفريغات قواعد البيانات. الأدوات المناسبة
      تحدد ما إذا كنت ستحتاج ١٠ ثوانٍ أو ١٠ دقائق.

      | الأمر | لأي غرض؟ |
      |-------|----------|
      | `cat` | عرض الملفات القصيرة بالكامل |
      | `less` | تصفح الملفات الطويلة بشكل تفاعلي |
      | `more` | مشابه لـ less لكن أبسط |
      | `head` | أول N سطر فقط |
      | `tail` | آخر N سطر فقط |

      في `less` تتنقل بـ:
      - `j`/`k` أو مفاتيح الأسهم: سطر للأعلى/للأسفل
      - `Space`/`b`: صفحة للأمام/للخلف
      - `/كلمة_بحث`: البحث
      - `q`: الخروج
    examples:
      - q: "cat /etc/hostname"
        a: "يعرض اسم الجهاز — ملف قصير، مثالي لأمر cat"
        rel:
          - ["cat-content", "عرض محتوى الملف بالكامل", "أمر cat"]
          - ["etc-hostname", "ملف يحتوي على اسم الجهاز", "/etc/hostname"]
        labels: ["نظام الملفات", "الإعدادات"]
      - q: "cat /etc/passwd"
        a: "يعرض جميع حسابات المستخدمين في النظام (الاسم، المعرف، المجلد الشخصي، الصدفة)"
        rel:
          - ["etc-passwd", "قاعدة بيانات مستخدمي النظام", "/etc/passwd"]
        labels: ["نظام الملفات", "الأمان"]
      - q: "less /var/log/syslog"
        a: "تصفح سجل النظام بشكل تفاعلي — استخدم / للبحث و q للخروج"
        rel:
          - ["less-cmd", "قراءة الملفات الطويلة بشكل تفاعلي مع إمكانية التمرير", "أمر less"]
          - ["syslog", "سجل النظام المركزي بجميع الأحداث المهمة", "/var/log/syslog"]
        labels: ["نظام الملفات"]

  - title: "head و tail — البداية والنهاية"
    image: "images/section-02-head-tail.svg"
    explanation: |
      `head` و `tail` يعرضان أول أو آخر أسطر من ملف.
      الافتراضي: ١٠ أسطر. يمكنك تعديل العدد بـ `-n`.

      **أقوى ميزة في tail:** `tail -f` يتتبع ملفًا في الوقت الحقيقي:
      ```bash
      tail -f /var/log/nginx/access.log
      ```
      مثالي لسجلات الخادم أثناء ورود الطلبات — ترى كل وصول فورًا.
      اضغط `Ctrl+C` لإنهاء التتبع المباشر.
    examples:
      - q: "head -20 /etc/ssh/sshd_config"
        a: "يعرض أول ٢٠ سطرًا من إعدادات خادم SSH"
        rel:
          - ["head-cmd", "عرض بداية الملف (الافتراضي: ١٠ أسطر)", "أمر head"]
          - ["head-n", "تحديد عدد الأسطر المعروضة", "العلم -n"]
          - ["sshd-config", "ملف إعداد خادم SSH", "/etc/ssh/sshd_config"]
        labels: ["نظام الملفات", "الإعدادات"]
      - q: "tail -50 /var/log/auth.log"
        a: "آخر ٥٠ سطرًا من سجل المصادقة — يعرض محاولات تسجيل الدخول والمصادقات"
        rel:
          - ["tail-cmd", "عرض نهاية الملف (الافتراضي: ١٠ أسطر)", "أمر tail"]
          - ["auth-log", "سجل المصادقات واستخدام sudo", "/var/log/auth.log"]
        labels: ["نظام الملفات", "الأمان"]
      - q: "tail -f /var/log/nginx/access.log"
        a: "تتبع وصول Nginx في الوقت الحقيقي — مثالي لتصحيح الأخطاء المباشر"
        rel:
          - ["tail-f", "Follow — تتبع الملف مباشرة، عرض الأسطر الجديدة فورًا", "العلم -f"]
        labels: ["نظام الملفات", "الشبكة"]

  - title: "grep — إيجاد الإبرة في كومة القش"
    image: "images/section-03-grep.svg"
    explanation: |
      `grep` (Global Regular Expression Print) يبحث في الملفات عن أنماط.
      وهو من أكثر أدوات لينكس استخدامًا.

      | الأمر | الأثر |
      |-------|-------|
      | `grep "fehler" datei.txt` | جميع الأسطر التي تحتوي "fehler" |
      | `grep -i "Fehler" datei.txt` | تجاهل حالة الأحرف |
      | `grep -n "ERROR" log.txt` | مع أرقام الأسطر |
      | `grep -r "TODO" ~/projekte/` | بحث متكرر في جميع المجلدات الفرعية |
      | `grep -v "DEBUG" app.log` | جميع الأسطر بدون "DEBUG" |
      | `grep -c "ERROR" app.log` | عدّ النتائج فقط |

      **الدمج مع أوامر أخرى** يجعل grep أكثر قوة:
      ```bash
      cat /var/log/auth.log | grep "Failed"
      ```
    examples:
      - q: "grep -i \"error\" /var/log/syslog"
        a: "البحث عن جميع رسائل الخطأ في سجل النظام، بغض النظر عن حالة الأحرف"
        rel:
          - ["grep-cmd", "البحث في أسطر الملفات عن نمط معين", "أمر grep"]
          - ["grep-i", "Case-insensitive — تجاهل حالة الأحرف الكبيرة والصغيرة", "العلم -i"]
        labels: ["نظام الملفات"]
      - q: "grep -n \"TODO\" ~/projekte/app.py"
        a: "إيجاد جميع تعليقات TODO في سكريبت Python مع أرقام الأسطر"
        rel:
          - ["grep-n", "Number — عرض أرقام أسطر النتائج", "العلم -n"]
        labels: ["نظام الملفات"]
      - q: "grep -r \"database_url\" ~/projekte/"
        a: "البحث في جميع الملفات تحت ~/projekte/ عن database_url — يجد حتى الإعدادات المنسية"
        rel:
          - ["grep-r", "Recursive — البحث في المجلدات والمجلدات الفرعية", "العلم -r"]
        labels: ["نظام الملفات"]
      - q: "grep -v \"^#\" /etc/ssh/sshd_config"
        a: "عرض إعدادات SSH مع إخفاء جميع أسطر التعليقات (التي تبدأ بـ #)"
        rel:
          - ["grep-v", "Invert match — عرض الأسطر التي لا تحتوي النمط", "العلم -v"]
          - ["regex-caret", "^ في التعبيرات النمطية = بداية السطر", "Regex ^"]
        labels: ["نظام الملفات", "الإعدادات"]

  - title: "🖥️ اختبار الطرفية"
    image: "images/section-04-check.svg"
    explanation: |
      اختبر معرفتك الآن — أدخل الأوامر مباشرة!
    examples:
      - q: "أي أمر يقرأ ملفًا بشكل تفاعلي مع إمكانية التمرير؟"
        type: input
        a: "less"
        labels: ["نظام الملفات"]
      - q: "ماذا يفعل 'tail -f /var/log/nginx/access.log'؟"
        type: select
        options:
          - text: "يتتبع الملف في الوقت الحقيقي ويعرض الأسطر الجديدة فورًا"
            correct: true
          - text: "يعرض آخر ١٠ أسطر وينتهي"
          - text: "يحذف الأسطر الأخيرة من الملف"
          - text: "يبحث عن كلمة 'nginx'"
        labels: ["نظام الملفات"]
      - q: "أي أمر يبحث بدون تمييز حالة الأحرف عن 'error' في ملف؟"
        type: select
        options:
          - text: "grep -i \"error\" datei.txt"
            correct: true
          - text: "grep -n \"error\" datei.txt"
          - text: "grep -r \"error\" datei.txt"
          - text: "grep -v \"error\" datei.txt"
        labels: ["نظام الملفات"]
      - q: "أي من أعلام grep التالية صحيحة في معناها؟"
        type: multiple-choice
        options:
          - text: "-i يتجاهل حالة الأحرف"
            correct: true
          - text: "-n يعرض أرقام الأسطر"
            correct: true
          - text: "-r يبحث في المجلدات بشكل متكرر"
            correct: true
          - text: "-v يعرض النتائج فقط بدون سياق"
        labels: ["نظام الملفات"]
