version: 2
number: 4
title: "محتوى الملفات"
description: "تعلّم كيف تقرأ الملفات وتتصفحها وتبحث عن كلمات محددة فيها"
image: "images/lesson-header.svg"
image_caption: "Terminal mit cat, head und grep Ausgaben"
sections:
  - title: "cat وless وmore — قراءة الملفات"
    image: "images/section-01-read.svg"
    explanation: |
      كيف تقرأ الملفات في الطرفية؟ لذلك هناك أوامر مختلفة —
      حسب حجم الملف يكون بعضها أفضل من الآخر.

      | الأمر | لماذا؟ |
      |--------|----------|
      | `cat` | عرض الملفات الصغيرة بالكامل (cat = "concatenate" أي "ربط") |
      | `less` | تصفح الملفات الطويلة صفحةً صفحة — مثل كتاب! |
      | `head` | رؤية الأسطر الأولى من ملف فقط |
      | `tail` | رؤية الأسطر الأخيرة من ملف فقط |

      **`cat`** يُخرج الملف بالكامل دفعة واحدة:
      ```
      cat meine-datei.txt
      ```

      **`less`** مثل قارئ الكتب للنصوص الطويلة.
      يمكنك التصفح فيه:
      - مفاتيح الأسهم أو `j`/`k`: سطر للأعلى/للأسفل
      - مسطرة الفراغ: صفحة للأمام
      - `q`: الإنهاء (Q كـ "Quit" = إيقاف)
      - `/كلمة`: البحث عن كلمة

      جرّب: `less /etc/hostname`
    examples:
      - q: "cat /etc/hostname"
        a: "يعرض اسم الحاسوب — ملف قصير، مثالي لـ cat"
        rel:
          - ["cat-content", "إظهار محتوى الملف بالكامل", "أمر cat"]
          - ["etc-hostname", "ملف يحتوي اسم الحاسوب", "/etc/hostname"]
        labels: ["Dateisystem", "Konfiguration"]
      - q: "cat /etc/passwd"
        a: "يعرض جميع حسابات المستخدمين — الاسم والرقم والمجلد والـ Shell الذي يستخدمون"
        rel:
          - ["etc-passwd", "قاعدة بيانات مستخدمي النظام", "/etc/passwd"]
        labels: ["Dateisystem", "Sicherheit"]
      - q: "less /var/log/syslog"
        a: "يفتح سجل النظام للتصفح — ابحث بـ / واخرج بـ q"
        rel:
          - ["less-cmd", "قراءة الملفات الطويلة بشكل تفاعلي مع التمرير", "أمر less"]
          - ["syslog", "سجل النظام المركزي — لينكس يسجل هنا الأحداث المهمة", "/var/log/syslog"]
        labels: ["Dateisystem"]

  - title: "head و tail — البداية والنهاية"
    image: "images/section-02-head-tail.svg"
    explanation: |
      أحياناً لا تريد رؤية الملف بالكامل — فقط البداية أو النهاية.
      لذلك `head` و `tail` موجودان.

      `head` يعرض الأسطر **الأولى** (الافتراضي: أول 10 أسطر).
      `tail` يعرض الأسطر **الأخيرة** (الافتراضي: آخر 10 أسطر).

      بـ `-n` يمكنك تحديد كم سطراً تريد رؤيته:
      ```
      head -5 datei.txt    # أول 5 أسطر
      tail -20 datei.txt   # آخر 20 سطراً
      ```

      **أروع ميزة في `tail`:** مع `-f` ترى الملف مباشرةً —
      تظهر الأسطر الجديدة فوراً بينما تُكتب.
      هذا مثل التلفزيون المباشر للملفات!
      ```
      tail -f /var/log/syslog
      ```
      بـ `Ctrl+C` (اضغط Ctrl واضغط C) تنهي العرض المباشر.
    examples:
      - q: "head -20 /etc/ssh/sshd_config"
        a: "يعرض أول 20 سطراً من ملف إعدادات خادم SSH (SSH طريقة للتحكم في الحاسوب عن بُعد)"
        rel:
          - ["head-cmd", "عرض بداية الملف (الافتراضي: 10 أسطر)", "أمر head"]
          - ["head-n", "تحديد عدد الأسطر التي ستُعرض", "الخيار -n"]
          - ["sshd-config", "ملف إعداد خادم SSH", "/etc/ssh/sshd_config"]
        labels: ["Dateisystem", "Konfiguration"]
      - q: "tail -50 /var/log/auth.log"
        a: "يعرض آخر 50 سطراً من سجل تسجيل الدخول — هنا يُسجَّل من سجّل دخوله"
        rel:
          - ["tail-cmd", "عرض نهاية الملف (الافتراضي: 10 أسطر)", "أمر tail"]
          - ["auth-log", "ملف بروتوكول تسجيلات الدخول إلى النظام", "/var/log/auth.log"]
        labels: ["Dateisystem", "Sicherheit"]
      - q: "tail -f /var/log/nginx/access.log"
        a: "يعرض مباشرةً جميع الوصولات إلى خادم الويب — الإدخالات الجديدة تظهر فوراً!"
        rel:
          - ["tail-f", "Follow — متابعة الملف في الوقت الفعلي، عرض الأسطر الجديدة فوراً", "الخيار -f"]
        labels: ["Dateisystem", "Netzwerk"]

  - title: "grep — ابحث كمحقق"
    image: "images/section-03-grep.svg"
    explanation: |
      `grep` هو أداة المحقق لديك.
      يبحث في الملفات عن كلمة أو جملة محددة — ويعرض لك فقط
      الأسطر التي تحتوي تلك الكلمة.

      تخيل أن لديك قائمة ضخمة بـ 1000 إدخال
      وتبحث عن كلمة "خطأ". بدون grep يجب أن تقرأ كل شيء.
      مع grep يجدها في ثوانٍ!

      | الأمر | ما يبحث عنه |
      |--------|--------------|
      | `grep "hallo" datei.txt` | جميع الأسطر التي تحتوي "hallo" |
      | `grep -i "Hallo" datei.txt` | بصرف النظر عن حالة الأحرف (`-i` = ignore case) |
      | `grep -n "Fehler" log.txt` | مع رقم السطر — أين بالضبط هي؟ |
      | `grep -r "TODO" ~/projekte/` | البحث في جميع الملفات في مجلد |
      | `grep -v "OK" ergebnis.txt` | جميع الأسطر بدون "OK" — أي المشاكل! |

      يمكنك دمج grep مع أوامر أخرى:
      ```
      cat /etc/passwd | grep alice
      ```
      الـ `|` (pipe) يُمرر إخراج `cat` مباشرةً إلى `grep`.
    examples:
      - q: "grep -i \"error\" /var/log/syslog"
        a: "يبحث عن 'error' في سجل النظام — بصرف النظر عن حالة الأحرف"
        rel:
          - ["grep-cmd", "البحث في أسطر الملفات عن نمط", "أمر grep"]
          - ["grep-i", "Case-insensitive — تجاهل الفرق بين الأحرف الكبيرة والصغيرة", "الخيار -i"]
        labels: ["Dateisystem"]
      - q: "grep -n \"TODO\" ~/projekte/app.py"
        a: "يجد جميع تعليقات TODO في كود البرنامج ويعرض أرقام الأسطر"
        rel:
          - ["grep-n", "Number — عرض أرقام أسطر النتائج", "الخيار -n"]
        labels: ["Dateisystem"]
      - q: "grep -r \"database_url\" ~/projekte/"
        a: "يبحث في جميع الملفات في مجلد المشاريع عن 'database_url' — يجد حتى الإعدادات المنسية"
        rel:
          - ["grep-r", "Recursive — البحث في المجلدات والمجلدات الفرعية", "الخيار -r"]
        labels: ["Dateisystem"]
      - q: "grep -v \"^#\" /etc/ssh/sshd_config"
        a: "يعرض إعدادات SSH بدون أسطر التعليقات (التعليقات تبدأ بـ # وهي للشرح فقط)"
        rel:
          - ["grep-v", "Invert match — عرض الأسطر التي لا تحتوي النمط", "الخيار -v"]
          - ["regex-caret", "^ في نمط البحث يعني: بداية السطر", "Regex ^"]
        labels: ["Dateisystem", "Konfiguration"]

  - title: "اختبار الطرفية"
    image: "images/section-04-check.svg"
    explanation: |
      اختبر معلوماتك الآن!
    examples:
      - q: "ما هو الأمر الذي يتيح لك تصفح ملف صفحةً صفحة؟"
        type: input
        a: "less"
        labels: ["Dateisystem"]
      - q: "ماذا يفعل 'tail -f /var/log/syslog'؟"
        type: select
        options:
          - text: "يعرض الأسطر الجديدة في الملف مباشرةً وفورياً"
            correct: true
          - text: "يعرض آخر 10 أسطر ثم يتوقف"
          - text: "يحذف الأسطر الأخيرة من الملف"
          - text: "يبحث عن كلمة 'syslog'"
        labels: ["Dateisystem"]
      - q: "ما هو الأمر الذي يبحث بصرف النظر عن حالة الأحرف عن 'error'؟"
        type: select
        options:
          - text: "grep -i \"error\" datei.txt"
            correct: true
          - text: "grep -n \"error\" datei.txt"
          - text: "grep -r \"error\" datei.txt"
          - text: "grep -v \"error\" datei.txt"
        labels: ["Dateisystem"]
      - q: "أيٌّ من هذه الخيارات لـ grep لها المعنى الصحيح؟"
        type: multiple-choice
        options:
          - text: "-i يتجاهل حالة الأحرف"
            correct: true
          - text: "-n يعرض أرقام الأسطر"
            correct: true
          - text: "-r يبحث في المجلدات بشكل متكرر"
            correct: true
          - text: "-v يعرض النتائج فقط بدون سياق"
        labels: ["Dateisystem"]
