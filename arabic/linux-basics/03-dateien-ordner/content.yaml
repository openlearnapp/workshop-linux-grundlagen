version: 2
number: 3
title: "الملفات والمجلدات"
description: "تعلّم كيف تُنشئ الملفات والمجلدات وتنسخها وتعيد تسميتها وتحذفها"
image: "images/lesson-header.svg"
image_caption: "Verzeichnisbaum mit Dateien und Ordnern"
sections:
  - title: "الإنشاء — touch و mkdir"
    image: "images/section-01-create.svg"
    explanation: |
      قبل أن تتمكن من تعديل الملفات، يجب أن تنشئها.
      لذلك هناك أمران بسيطان:

      **`touch`** ينشئ ملفاً فارغاً:
      ```
      touch notizen.txt
      ```
      هذا مثل أخذ ورقة بيضاء فارغة.
      يمكنك أيضاً إنشاء عدة ملفات دفعة واحدة:
      ```
      touch seite.html stil.css
      ```

      **`mkdir`** ينشئ مجلداً جديداً.
      MKDIR اختصار لـ "Make Directory" — أي "أنشئ مجلداً":
      ```
      mkdir fotos
      ```

      الخيار `-p` في `mkdir` مفيد بشكل خاص:
      ينشئ عدة مجلدات دفعة واحدة، حتى لو كانت المجلدات الوسيطة مفقودة:
      ```
      mkdir -p projekte/meine-webseite/bilder
      ```
      هذا ينشئ `projekte`، بداخله `meine-webseite`، وبداخله `bilder` —
      كل ذلك في خطوة واحدة!
    examples:
      - q: "touch README.md"
        a: "ينشئ ملفاً فارغاً باسم README.md في المجلد الحالي"
        rel:
          - ["touch-cmd", "إنشاء ملف فارغ أو تحديث الطابع الزمني", "أمر touch"]
        labels: ["Dateisystem"]
      - q: "touch index.html style.css app.js"
        a: "ينشئ ثلاثة ملفات دفعة واحدة — يمكن لـ touch استقبال أي عدد من الأسماء"
        rel:
          - ["touch-multiple", "إنشاء عدة ملفات في آن واحد باستخدام touch", "touch ملف1 ملف2"]
        labels: ["Dateisystem"]
      - q: "mkdir -p ~/projekte/meine-webseite/assets/img"
        a: "ينشئ شجرة المجلدات بالكامل دفعة واحدة — جميع المجلدات الوسيطة المفقودة تُنشأ أيضاً"
        rel:
          - ["mkdir-cmd", "Make Directory — إنشاء مجلد", "أمر mkdir"]
          - ["mkdir-p", "Parents — إنشاء جميع المجلدات الوسيطة تلقائياً", "الخيار -p"]
        labels: ["Dateisystem"]

  - title: "النسخ والنقل — cp و mv"
    image: "images/section-02-copy-move.svg"
    explanation: |
      تخيل أنك تعمل مع أوراق على مكتبك:

      **`cp`** مثل آلة النسخ — الأصل يبقى، وتحصل على نسخة.
      CP اختصار لـ "Copy" (نسخ):
      ```
      cp notizen.txt notizen-backup.txt
      ```
      لنسخ مجلدات كاملة تحتاج `-r` (recursive أي "بكل ما فيه"):
      ```
      cp -r fotos/ fotos-backup/
      ```

      **`mv`** مثل الانتقال — الأصل يختفي من مكانه القديم.
      MV اختصار لـ "Move" (نقل):
      ```
      mv entwurf.txt fertig.txt
      ```
      إذا لم تُحدد مجلداً آخر، فإن `mv` يُعيد تسمية الملف فقط!

      | الأمر | ماذا يحدث؟ |
      |--------|---------------|
      | `cp datei.txt kopie.txt` | نسخة باسم جديد |
      | `cp datei.txt /tmp/` | نسخ إلى مجلد آخر |
      | `cp -r ordner/ backup/` | نسخ مجلد كامل |
      | `mv alt.txt neu.txt` | إعادة تسمية |
      | `mv datei.txt ~/dokumente/` | نقل |
    examples:
      - q: "cp ~/.bashrc ~/.bashrc.backup"
        a: "ينشئ نسخة احتياطية من ملف إعدادات Bash — جيد قبل إجراء تغييرات!"
        rel:
          - ["cp-cmd", "Copy — نسخ الملفات والمجلدات", "أمر cp"]
          - ["bashrc", "ملف إعداد Bash للاختصارات والإعدادات", "~/.bashrc"]
        labels: ["Dateisystem"]
      - q: "cp -r /etc/nginx/ ~/nginx-backup/"
        a: "ينسخ مجلد إعدادات nginx بالكامل كنسخة احتياطية إلى مجلدك الشخصي"
        rel:
          - ["cp-r", "Recursive — نسخ المجلدات بما فيها محتوياتها", "الخيار -r"]
        labels: ["Dateisystem", "Konfiguration"]
      - q: "mv entwurf.txt final.txt"
        a: "يُعيد تسمية الملف — من 'entwurf.txt' يصبح 'final.txt'، لا يبقى الأصل"
        rel:
          - ["mv-cmd", "Move — نقل الملفات أو إعادة تسميتها", "أمر mv"]
        labels: ["Dateisystem"]
      - q: "mv ~/Downloads/*.pdf ~/Dokumente/PDFs/"
        a: "نقل جميع ملفات PDF من مجلد التنزيلات إلى مجلد PDFs"
        rel:
          - ["glob-star", "النجمة * رمز بديل — تطابق أي حروف", "Wildcard *"]
          - ["mv-multiple", "نقل عدة ملفات باستخدام رموز البدل", "mv *.pdf الوجهة/"]
        labels: ["Dateisystem"]

  - title: "الحذف — rm و rmdir"
    image: "images/section-03-delete.svg"
    explanation: |
      الآن ملاحظة مهمة — من فضلك اقرأها جيداً!

      **لينكس لا يملك سلة محذوفات.**
      ما يُحذف بـ `rm` يختفي **فوراً وللأبد**.
      لا يوجد تراجع!

      | الأمر | ماذا يحدث؟ |
      |--------|---------------|
      | `rm datei.txt` | حذف ملف (بلا رجعة!) |
      | `rm -i datei.txt` | حذف لكن مع السؤال أولاً (`-i` = interactive = "اسألني") |
      | `rm *.tmp` | حذف جميع الملفات التي تنتهي بـ .tmp |
      | `rmdir leerer-ordner/` | حذف مجلد فارغ |
      | `rm -r ordner/` | حذف مجلد بكل ما فيه |

      **القاعدة الذهبية:** قبل حذف أي شيء، شاهد ما سيُحذف:
      ```
      ls *.tmp
      ```
      فقط عندما تكون متأكداً، ثم:
      ```
      rm *.tmp
      ```

      تذكر: `rm -i` هو صديقك في البداية — يسأل دائماً!
    examples:
      - q: "rm -i wichtige-datei.txt"
        a: "يحذف الملف لكن يسأل أولاً — مُنصح به جداً للمبتدئين!"
        rel:
          - ["rm-cmd", "Remove — حذف الملفات (بلا سلة محذوفات!)", "أمر rm"]
          - ["rm-i", "Interactive — السؤال قبل الحذف", "الخيار -i"]
        labels: ["Dateisystem"]
      - q: "rm -r ~/projekte/altes-projekt/"
        a: "يحذف مجلد 'altes-projekt' وكل ما فيه — احذر، لا سلة محذوفات!"
        rel:
          - ["rm-r", "Recursive — حذف المجلدات ومحتوياتها", "الخيار -r"]
        labels: ["Dateisystem"]
      - q: "rmdir leerer-ordner/"
        a: "يحذف مجلداً فارغاً فقط — يُعطي رسالة خطأ إذا كان يحتوي على ملفات"
        rel:
          - ["rmdir-cmd", "Remove Directory — حذف المجلدات الفارغة فقط", "أمر rmdir"]
        labels: ["Dateisystem"]
      - q: "ls *.log && rm *.log"
        a: "أولاً عرض جميع ملفات .log ثم حذفها — الطريقة الآمنة!"
        rel:
          - ["safe-delete", "أولاً ls ثم rm — حذف آمن مع معاينة", "ممارسة جيدة"]
        labels: ["Dateisystem"]

  - title: "اختبار الطرفية"
    image: "images/section-04-check.svg"
    explanation: |
      اختبر معلوماتك الآن!
    examples:
      - q: "ما هو الأمر الذي ينشئ ملفاً فارغاً باسم 'notizen.txt'؟"
        type: input
        a: "touch notizen.txt"
        labels: ["Dateisystem"]
      - q: "ماذا يفعل الخيار '-p' في 'mkdir -p projekte/web/assets'؟"
        type: select
        options:
          - text: "ينشئ جميع المجلدات الوسيطة المفقودة تلقائياً"
            correct: true
          - text: "يسأل قبل الإنشاء"
          - text: "يعرض المجلد الذي تم إنشاؤه"
          - text: "يحمي المجلد من الحذف"
        labels: ["Dateisystem"]
      - q: "ما هو الأمر الذي يُعيد تسمية ملف من 'entwurf.txt' إلى 'final.txt'؟"
        type: select
        options:
          - text: "mv entwurf.txt final.txt"
            correct: true
          - text: "cp entwurf.txt final.txt"
          - text: "rename entwurf.txt final.txt"
          - text: "touch final.txt entwurf.txt"
        labels: ["Dateisystem"]
      - q: "أيٌّ من هذه العبارات عن 'rm' صحيحة؟"
        type: multiple-choice
        options:
          - text: "rm يحذف الملفات بلا سلة محذوفات"
            correct: true
          - text: "rm -r يحذف المجلدات بكل ما فيها"
            correct: true
          - text: "rm -i يسأل قبل الحذف"
            correct: true
          - text: "rm يمكنه التراجع عن الحذف"
        labels: ["Dateisystem"]
