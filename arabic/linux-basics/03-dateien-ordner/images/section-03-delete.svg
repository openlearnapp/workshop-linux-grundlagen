<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210">
<style>
.f{font-family:sans-serif}
.ti{animation:tia 11s infinite}@keyframes tia{0%,3%{opacity:0}7%,87%{opacity:1}92%,100%{opacity:0}}
.c1{animation:c1a 11s infinite}@keyframes c1a{0%,12%{opacity:0}18%,87%{opacity:1}92%,100%{opacity:0}}
.c2{animation:c2a 11s infinite}@keyframes c2a{0%,30%{opacity:0}36%,87%{opacity:1}92%,100%{opacity:0}}
.c3{animation:c3a 11s infinite}@keyframes c3a{0%,48%{opacity:0}54%,87%{opacity:1}92%,100%{opacity:0}}
.ft{animation:fta 11s infinite}@keyframes fta{0%,78%{opacity:0}82%,87%{opacity:1}92%,100%{opacity:0}}
</style>
<rect width="640" height="210" rx="12" fill="#0d1117"/>
<rect width="640" height="46" rx="12" fill="#161b22"/>
<rect y="34" width="640" height="12" fill="#161b22"/>
<text class="f ti" x="320" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#e6edf3">الحذف — rm و rmdir</text>
<g class="c1">
<rect x="24" y="56" width="184" height="114" rx="8" fill="#180a0a"/>
<rect x="24" y="56" width="184" height="4" rx="2" fill="#f85149"/>
<text class="f" x="116" y="84" text-anchor="middle" font-size="24">🗑️</text>
<text class="f" x="116" y="106" text-anchor="middle" font-size="16" font-weight="bold" fill="#f85149">rm file.txt</text>
<text class="f" x="116" y="126" text-anchor="middle" font-size="11" fill="#8b949e">حذف ملف</text>
<text class="f" x="116" y="142" text-anchor="middle" font-size="11" fill="#f85149">بشكل نهائي!</text>
</g>
<g class="c2">
<rect x="228" y="56" width="184" height="114" rx="8" fill="#1a0f08"/>
<rect x="228" y="56" width="184" height="4" rx="2" fill="#f0883e"/>
<text class="f" x="320" y="84" text-anchor="middle" font-size="24">📂</text>
<text class="f" x="320" y="106" text-anchor="middle" font-size="16" font-weight="bold" fill="#f0883e">rmdir folder</text>
<text class="f" x="320" y="126" text-anchor="middle" font-size="11" fill="#8b949e">حذف مجلد</text>
<text class="f" x="320" y="142" text-anchor="middle" font-size="11" fill="#8b949e">فارغ</text>
</g>
<g class="c3">
<rect x="432" y="56" width="184" height="114" rx="8" fill="#0a1a0d"/>
<rect x="432" y="56" width="184" height="4" rx="2" fill="#3fb950"/>
<text class="f" x="524" y="84" text-anchor="middle" font-size="24">⚠️</text>
<text class="f" x="524" y="106" text-anchor="middle" font-size="16" font-weight="bold" fill="#3fb950">rm -ri</text>
<text class="f" x="524" y="126" text-anchor="middle" font-size="11" fill="#8b949e">الحذف مع</text>
<text class="f" x="524" y="142" text-anchor="middle" font-size="11" fill="#3fb950">التأكيد — أكثر أماناً!</text>
</g>
<g class="ft">
<rect x="24" y="182" width="592" height="22" rx="6" fill="#161b22"/>
<text class="f" x="320" y="197" text-anchor="middle" font-size="11" fill="#f85149">⚠ rm -rf يحذف كل شيء بدون سؤال — استخدمه بحذر شديد!</text>
</g>
</svg>
