<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>

  <!-- Terminal node (left) -->
  <rect x="40" y="110" width="130" height="80" rx="10" fill="#21262d" stroke="#3fb950" stroke-width="2"/>
  <text x="105" y="138" font-family="monospace" font-size="10" fill="#3fb950" text-anchor="middle">&gt;_</text>
  <rect x="55" y="148" width="100" height="10" rx="2" fill="#161b22"/>
  <rect x="55" y="148" width="60" height="10" rx="2" fill="#3fb950" opacity="0.3"/>
  <rect x="55" y="162" width="100" height="10" rx="2" fill="#161b22"/>
  <rect x="55" y="162" width="80" height="10" rx="2" fill="#3fb950" opacity="0.2"/>

  <!-- Pipe symbol between terminal and git -->
  <line x1="170" y1="150" x2="225" y2="150" stroke="#30363d" stroke-width="2"/>
  <polygon points="220,144 232,150 220,156" fill="#30363d"/>

  <!-- Git node (center) -->
  <rect x="235" y="110" width="130" height="80" rx="10" fill="#21262d" stroke="#f0883e" stroke-width="2"/>
  <!-- Git branch icon -->
  <circle cx="275" cy="135" r="6" fill="none" stroke="#f0883e" stroke-width="2"/>
  <circle cx="295" cy="155" r="6" fill="none" stroke="#f0883e" stroke-width="2"/>
  <circle cx="315" cy="135" r="6" fill="none" stroke="#f0883e" stroke-width="2"/>
  <line x1="275" y1="141" x2="275" y2="148" stroke="#f0883e" stroke-width="2"/>
  <path d="M275 148 Q275 155 289 155" fill="none" stroke="#f0883e" stroke-width="2"/>
  <line x1="315" y1="141" x2="315" y2="165" stroke="#f0883e" stroke-width="2"/>
  <text x="300" y="180" font-family="monospace" font-size="10" fill="#f0883e" text-anchor="middle">git</text>

  <!-- Arrow from git to SSH -->
  <line x1="365" y1="150" x2="425" y2="150" stroke="#30363d" stroke-width="2"/>
  <polygon points="420,144 432,150 420,156" fill="#30363d"/>

  <!-- SSH node (right) -->
  <rect x="435" y="110" width="130" height="80" rx="10" fill="#21262d" stroke="#58a6ff" stroke-width="2"/>
  <!-- Key icon -->
  <circle cx="480" cy="140" r="10" fill="none" stroke="#58a6ff" stroke-width="2"/>
  <line x1="490" y1="140" x2="520" y2="140" stroke="#58a6ff" stroke-width="2"/>
  <line x1="510" y1="140" x2="510" y2="150" stroke="#58a6ff" stroke-width="2"/>
  <line x1="520" y1="140" x2="520" y2="148" stroke="#58a6ff" stroke-width="2"/>
  <text x="500" y="170" font-family="monospace" font-size="10" fill="#58a6ff" text-anchor="middle">ssh</text>

  <!-- Workflow arrows connecting to bottom row -->
  <!-- Pipe from terminal down -->
  <line x1="105" y1="190" x2="105" y2="230" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4"/>
  <!-- From git down -->
  <line x1="300" y1="190" x2="300" y2="230" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4"/>
  <!-- From ssh down -->
  <line x1="500" y1="190" x2="500" y2="230" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Bottom: workflow steps -->
  <!-- Step 1: Code -->
  <rect x="55" y="235" width="100" height="50" rx="8" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="105" y="255" font-family="monospace" font-size="10" fill="#3fb950" text-anchor="middle">vim</text>
  <text x="105" y="270" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">code</text>
  <!-- Arrow -->
  <line x1="155" y1="260" x2="195" y2="260" stroke="#3fb950" stroke-width="1.5"/>
  <polygon points="190,255 200,260 190,265" fill="#3fb950"/>

  <!-- Step 2: Test -->
  <rect x="200" y="235" width="100" height="50" rx="8" fill="#21262d" stroke="#f0883e" stroke-width="1.5"/>
  <text x="250" y="255" font-family="monospace" font-size="10" fill="#f0883e" text-anchor="middle">bash test.sh</text>
  <text x="250" y="270" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">test</text>
  <!-- Arrow -->
  <line x1="300" y1="260" x2="340" y2="260" stroke="#f0883e" stroke-width="1.5"/>
  <polygon points="335,255 345,260 335,265" fill="#f0883e"/>

  <!-- Step 3: Commit -->
  <rect x="345" y="235" width="100" height="50" rx="8" fill="#21262d" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="395" y="255" font-family="monospace" font-size="10" fill="#bc8cff" text-anchor="middle">git commit</text>
  <text x="395" y="270" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">save</text>
  <!-- Arrow -->
  <line x1="445" y1="260" x2="485" y2="260" stroke="#bc8cff" stroke-width="1.5"/>
  <polygon points="480,255 490,260 480,265" fill="#bc8cff"/>

  <!-- Step 4: Deploy -->
  <rect x="490" y="235" width="100" height="50" rx="8" fill="#21262d" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="540" y="255" font-family="monospace" font-size="10" fill="#58a6ff" text-anchor="middle">git push</text>
  <text x="540" y="270" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">deploy</text>

  <!-- Top label -->
  <text x="320" y="50" font-family="monospace" font-size="11" fill="#484f58" text-anchor="middle">|  &gt;  &gt;&gt;  2&gt;&amp;1  xargs  alias</text>

  <!-- Pipe visualization at top -->
  <line x1="100" y1="70" x2="540" y2="70" stroke="#30363d" stroke-width="1"/>
  <!-- Pipe nodes -->
  <circle cx="140" cy="70" r="5" fill="#3fb950" opacity="0.5"/>
  <circle cx="220" cy="70" r="5" fill="#f0883e" opacity="0.5"/>
  <circle cx="300" cy="70" r="5" fill="#58a6ff" opacity="0.5"/>
  <circle cx="380" cy="70" r="5" fill="#bc8cff" opacity="0.5"/>
  <circle cx="460" cy="70" r="5" fill="#f85149" opacity="0.5"/>

  <!-- Bottom status line -->
  <rect x="40" y="310" width="560" height="30" rx="6" fill="#21262d"/>
  <text x="60" y="330" font-family="monospace" font-size="10" fill="#3fb950">$</text>
  <text x="75" y="330" font-family="monospace" font-size="10" fill="#8b949e">cat data.csv | sort | uniq -c | sort -rn | head -5</text>
</svg>