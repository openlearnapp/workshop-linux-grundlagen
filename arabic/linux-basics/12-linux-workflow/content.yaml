version: 2
number: 12
title: "سير عمل لينكس الاحترافي"
description: "Pipes و Redirects و Aliases و xargs — استخدام سطر الأوامر كالمحترفين"
image: "images/lesson-header.svg"
sections:
  - title: "Pipes — ربط الأوامر"
    image: "images/section-01-pipes.svg"
    explanation: |
      **لماذا هذا مهم؟** القوة الحقيقية للينكس ليست في الأوامر الفردية،
      بل في تجميعها معًا. رمز Pipe `|` يُمرر مخرجات أمر
      مباشرة كمدخلات للأمر التالي.

      ```
      أمر1 | أمر2 | أمر3
      ```

      **مثال:** من يستهلك أكبر مساحة تخزين؟
      ```bash
      du -sh /home/* | sort -rh | head -5
      ```
      1. `du -sh /home/*` ← حجم كل مجلد شخصي
      2. `sort -rh` ← الترتيب حسب الحجم
      3. `head -5` ← أعلى ٥ فقط

      **فلسفة يونكس:** أداة واحدة، مهمة واحدة — تُدمج عبر Pipes.
    examples:
      - q: "ps aux | grep python | grep -v grep"
        a: "عرض جميع عمليات Python — grep الثاني يُزيل سطر grep نفسه"
        rel:
          - ["pipe-operator", "| يُمرر مخرجات أمر كمدخلات للأمر التالي", "Pipe |"]
          - ["grep-v-grep", "grep -v grep يُزيل سطر grep من قائمة العمليات", "grep -v grep"]
        labels: ["البرمجة", "العمليات"]
      - q: "cat /var/log/nginx/access.log | awk '{print $1}' | sort | uniq -c | sort -rn | head -10"
        a: "استخراج أكثر ١٠ عناوين IP وصولاً من سجل Nginx"
        rel:
          - ["awk-ip", "awk '{print $1}' يطبع الحقل الأول (IP) من كل سطر", "awk print"]
          - ["uniq-c", "uniq -c يعدّ الأسطر المتتالية المتماثلة", "uniq -c"]
        labels: ["البرمجة", "الشبكة"]
      - q: "find /var/log -name \"*.log\" -mtime +30 | xargs ls -lh"
        a: "إيجاد ملفات السجلات الأقدم من ٣٠ يومًا وعرض أحجامها"
        rel:
          - ["find-cmd", "البحث عن ملفات بمعايير مختلفة", "أمر find"]
          - ["find-mtime", "-mtime +30 = آخر تعديل منذ أكثر من ٣٠ يومًا", "find -mtime"]
          - ["xargs-cmd", "تمرير المخرجات كمعاملات للأمر التالي", "أمر xargs"]
        labels: ["البرمجة", "نظام الملفات"]

  - title: "Redirects — إعادة توجيه المدخلات والمخرجات"
    image: "images/section-02-redirects.svg"
    explanation: |
      Redirects توجّه المخرجات إلى ملفات أو تستخدم ملفات كمدخلات:

      | الرمز | الأثر |
      |-------|-------|
      | `>` | كتابة المخرجات في ملف (يُستبدل!) |
      | `>>` | إلحاق المخرجات بملف |
      | `<` | استخدام ملف كمدخلات |
      | `2>` | كتابة رسائل الخطأ في ملف |
      | `2>&1` | توجيه الأخطاء إلى نفس ملف المخرجات |
      | `/dev/null` | تجاهل المخرجات (الثقب الأسود) |

      **سكريبت تسجيل نموذجي:**
      ```bash
      #!/bin/bash
      DATUM=$(date +%Y%m%d_%H%M%S)
      ./backup.sh >> /var/log/backup.log 2>&1
      echo "[$DATUM] اكتمل النسخ الاحتياطي" >> /var/log/backup.log
      ```
    examples:
      - q: "ls -la > verzeichnis.txt"
        a: "حفظ محتوى المجلد في ملف — يستبدل الملف الموجود"
        rel:
          - ["redirect-out", "> يوجّه المخرجات العادية إلى ملف (مع الاستبدال)", "Redirect >"]
        labels: ["البرمجة", "نظام الملفات"]
      - q: "echo \"[$(date)] Server gestartet\" >> /var/log/myapp.log"
        a: "إلحاق سطر بملف السجل بدون استبداله"
        rel:
          - ["redirect-append", ">> يُلحق المخرجات بالملف (بدون استبدال)", "Redirect >>"]
        labels: ["البرمجة"]
      - q: "find / -name \"*.conf\" 2>/dev/null"
        a: "البحث عن ملفات الإعداد — تجاهل رسائل الخطأ (رفض الوصول)"
        rel:
          - ["dev-null", "/dev/null يتجاهل جميع المخرجات — الثقب الأسود", "/dev/null"]
          - ["redirect-stderr", "2> يوجّه الخطأ المعياري (stderr)", "Redirect 2>"]
        labels: ["البرمجة", "نظام الملفات"]
      - q: "wc -l < /etc/passwd"
        a: "عدّ أسطر /etc/passwd — استخدام الملف كمدخلات"
        rel:
          - ["redirect-input", "< يستخدم محتوى الملف كمدخلات للأمر", "Redirect <"]
        labels: ["البرمجة"]

  - title: "Aliases و .bashrc — تخصيص سير العمل"
    image: "images/section-03-bashrc.svg"
    explanation: |
      **الاختصارات (Aliases)** هي أسماء مختصرة للأوامر المستخدمة بكثرة.
      تُحفظ في `~/.bashrc` (أو `~/.zshrc` لـ Zsh).

      ```bash
      # أضف في ~/.bashrc:
      alias ll='ls -la'
      alias update='sudo apt update && sudo apt upgrade -y'
      alias myip='curl -s https://ipinfo.io/ip'
      alias grep='grep --color=auto'
      alias ..='cd ..'
      alias ...='cd ../..'
      alias gs='git status'
      alias gc='git commit -m'
      ```

      بعد تحرير `.bashrc`:
      ```bash
      source ~/.bashrc   # تطبيق التغييرات فورًا
      ```

      **متغيرات البيئة** في `.bashrc`:
      ```bash
      export EDITOR=vim
      export PATH="$PATH:/home/alice/.local/bin"
      ```
    examples:
      - q: "alias ll='ls -la --color=auto'"
        a: "إنشاء الاختصار 'll' لعرض مفصل وملوّن للمجلد"
        rel:
          - ["alias-cmd", "إنشاء أسماء مختصرة للأوامر المتكررة أو الطويلة", "أمر alias"]
        labels: ["الإعدادات"]
      - q: "alias update='sudo apt update && sudo apt upgrade -y'"
        a: "جعل تحديث النظام قابلاً للتنفيذ بكلمة واحدة 'update'"
        rel:
          - ["alias-complex", "اختصار لسلسلة أوامر معقدة — كلمة واحدة بدلاً من سلسلة طويلة", "مثال Alias"]
        labels: ["الإعدادات"]
      - q: "source ~/.bashrc"
        a: "إعادة تحميل إعدادات Bash — الاختصارات الجديدة متاحة فورًا بدون إعادة فتح الطرفية"
        rel:
          - ["source-cmd", "تحميل ملف إعداد في الصدفة الحالية", "source / ."]
          - ["bashrc-reload", "إعادة تحميل ~/.bashrc بعد التعديلات", "source ~/.bashrc"]
        labels: ["الإعدادات"]
      - q: "alias | grep git"
        a: "عرض جميع الاختصارات المتعلقة بـ git — alias بدون معاملات يعرض الكل"
        rel:
          - ["alias-list", "alias بدون معاملات يعرض جميع الاختصارات المُعرّفة", "alias بدون معاملات"]
        labels: ["الإعدادات"]
      - q: "unalias ll"
        a: "إزالة الاختصار 'll' — يسري فقط في الجلسة الحالية"
        rel:
          - ["unalias-cmd", "إزالة اختصار مُعرّف", "أمر unalias"]
        labels: ["الإعدادات"]

  - title: "🖥️ اختبار الطرفية"
