version: 2
number: 12
title: "سير عمل لينكس الاحترافي"
description: "Pipes والتحويلات والاختصارات وxargs — استخدام سطر الأوامر كمحترف"
image: "images/lesson-header.svg"
image_caption: "Workflow-Diagramm mit Terminal, Git und SSH"
sections:
  - title: "Pipes — تجميع الأوامر"
    image: "images/section-01-pipes.svg"
    explanation: |
      تخيل أنك تبني مصنعاً بخط تجميع.
      كل محطة تقوم بشيء واحد بالضبط —
      والنتيجة تنتقل إلى المحطة التالية.

      هكذا بالضبط تعمل **Pipes** (الأنابيب) في لينكس.
      الرمز هو الشرطة العمودية: `|`

      مثال: تريد معرفة أي مجلد يأكل أكثر مساحة.
      ```
      du -sh /home/* | sort -rh | head -5
      ```

      خط التجميع:
      1. `du -sh /home/*` → يقيس حجم كل مجلد
      2. `| sort -rh` → يرتب من الكبير إلى الصغير
      3. `| head -5` → يعرض أفضل 5 فقط

      هذه قوة لينكس:
      أدوات صغيرة، كل منها لشيء واحد — معاً قوية جداً.
      هذا يُسمى **فلسفة Unix** (الفكرة وراء لينكس وUnix).
    examples:
      - q: "ps aux | grep python | grep -v grep"
        a: "يعرض جميع برامج Python الجارية — grep الثاني يُزيل نفسه من القائمة"
        rel:
          - ["pipe-operator", "| يُحوّل إخراج أمر كمدخل للتالي", "Pipe |"]
          - ["grep-v-grep", "grep -v grep يُزيل سطر grep من قائمة العمليات", "grep -v grep"]
        labels: ["Scripting", "Prozesse"]
      - q: "cat /var/log/nginx/access.log | awk '{print $1}' | sort | uniq -c | sort -rn | head -10"
        a: "يجد أكثر 10 عناوين IP وصولاً إلى الموقع"
        rel:
          - ["awk-ip", "awk '{print $1}' يُخرج الحقل الأول (IP) من كل سطر", "awk print"]
          - ["uniq-c", "uniq -c يعدّ الأسطر المتشابهة المتتالية", "uniq -c"]
        labels: ["Scripting", "Netzwerk"]
      - q: "find /var/log -name \"*.log\" -mtime +30 | xargs ls -lh"
        a: "يجد ملفات السجلات الأقدم من 30 يوماً ويعرض حجمها"
        rel:
          - ["find-cmd", "البحث عن الملفات بمعايير مختلفة", "أمر find"]
          - ["find-mtime", "-mtime +30 = آخر تعديل منذ أكثر من 30 يوماً", "find -mtime"]
          - ["xargs-cmd", "تمرير الإخراج كوسائط للأمر التالي", "أمر xargs"]
        labels: ["Scripting", "Dateisystem"]

  - title: "التحويلات — إرسال الإخراج إلى مكان آخر"
    image: "images/section-02-redirects.svg"
    explanation: |
      عادةً يظهر كل ما يُخرجه أمر مباشرةً في الطرفية.
      بـ **التحويلات** (Redirects) يمكنك تغيير ذلك —
      وكتابة الإخراج في ملف.

      الرمز هو السهم `>`:
      ```
      ls -la > verzeichnis.txt
      ```
      الآن القائمة ليست في الطرفية، بل في الملف!

      تنبيه: `>` يُكتب دائماً فوق الملف.
      بـ `>>` تُضيف إلى النهاية بدلاً من ذلك:
      ```
      echo "اليوم كان كل شيء جيداً" >> tagebuch.txt
      ```

      وأحياناً هناك رسائل خطأ تريد التخلص منها.
      "الثقب الأسود" للينكس يُسمى `/dev/null` —
      كل ما يصل إليه يختفي بلا أثر:
      ```
      find / -name "*.conf" 2>/dev/null
      ```
      الـ `2>` يُحوّل رسائل الخطأ —
      ترى فقط النتائج الحقيقية، ليس الأخطاء.
    examples:
      - q: "ls -la > verzeichnis.txt"
        a: "يحفظ قائمة المجلد في ملف — يُكتب فوق الملف إذا كان موجوداً"
        rel:
          - ["redirect-out", "> يُحوّل الإخراج القياسي إلى ملف (يُكتب فوقه)", "Redirect >"]
        labels: ["Scripting", "Dateisystem"]
      - q: "echo \"[$(date)] تم تشغيل الخادم\" >> /var/log/myapp.log"
        a: "يُضيف سطراً إلى نهاية ملف السجل — لا شيء يُكتب فوقه"
        rel:
          - ["redirect-append", ">> يُضيف الإخراج إلى الملف (بلا كتابة فوق)", "Redirect >>"]
        labels: ["Scripting"]
      - q: "find / -name \"*.conf\" 2>/dev/null"
        a: "يبحث عن ملفات الإعدادات — رسائل الخطأ تُرسل إلى الثقب الأسود"
        rel:
          - ["dev-null", "/dev/null يتجاهل جميع الإخراجات — الثقب الأسود", "/dev/null"]
          - ["redirect-stderr", "2> يُحوّل الخطأ القياسي (stderr)", "Redirect 2>"]
        labels: ["Scripting", "Dateisystem"]
      - q: "wc -l < /etc/passwd"
        a: "يعدّ الأسطر في /etc/passwd — الملف يُستخدم كمدخل"
        rel:
          - ["redirect-input", "< يستخدم محتوى الملف كمدخل للأمر", "Redirect <"]
        labels: ["Scripting"]

  - title: "الاختصارات و.bashrc — إعداد لينكس كبيتك"
    image: "images/section-03-bashrc.svg"
    explanation: |
      تخيل أنك تكتب نفس الأوامر الطويلة كل يوم.
      هذا مثل قول الاسم الكامل دائماً بدلاً من لقب.

      **الاختصارات** (Aliases) تحل ذلك.
      يمكنك حفظ الأوامر الطويلة تحت اسم قصير:
      ```
      alias ll='ls -la'
      ```
      من الآن `ll` يكفي بدلاً من `ls -la`!

      تحفظ هذه الاختصارات في ملف `~/.bashrc`.
      هذا إعداداتك الشخصية للينكس —
      يُحمَّل في كل مرة تفتح فيها طرفية.

      بعض الاختصارات المفيدة لـ .bashrc:
      ```
      alias ll='ls -la'
      alias update='sudo apt update && sudo apt upgrade -y'
      alias myip='curl -s https://ipinfo.io/ip'
      alias ..='cd ..'
      alias ...='cd ../..'
      alias gs='git status'
      ```

      بعد تعديل .bashrc يجب إعادة تحميلها:
      ```
      source ~/.bashrc
      ```
      `source` تعني: "اقرأ هذا الملف وطبّق كل شيء."
      بعدها اختصاراتك الجديدة متاحة فوراً.
    examples:
      - q: "alias ll='ls -la --color=auto'"
        a: "ينشئ الاختصار 'll' — من الآن ll يكفي بدلاً من ls -la --color=auto"
        rel:
          - ["alias-cmd", "إنشاء اختصارات للأوامر الشائعة أو الطويلة", "أمر alias"]
        labels: ["Konfiguration"]
      - q: "alias update='sudo apt update && sudo apt upgrade -y'"
        a: "يجعل التحديث الكامل للنظام قابلاً للاستدعاء بكلمة واحدة"
        rel:
          - ["alias-complex", "اختصار لسلسلة أوامر معقدة — اقتراح بكلمة بدلاً من سلسلة طويلة", "مثال Alias"]
        labels: ["Konfiguration"]
      - q: "source ~/.bashrc"
        a: "يُعيد تحميل إعدادات Bash — الاختصارات الجديدة متاحة فوراً بدون إعادة تشغيل الطرفية"
        rel:
          - ["source-cmd", "تحميل ملف الإعدادات في الـ Shell الحالي", "source / ."]
          - ["bashrc-reload", "إعادة تحميل ~/.bashrc بعد التغييرات", "source ~/.bashrc"]
        labels: ["Konfiguration"]
      - q: "alias | grep git"
        a: "يعرض جميع الاختصارات التي تحتوي كلمة 'git' — alias بدون وسيطة يعرض الكل"
        rel:
          - ["alias-list", "alias بدون وسيطة يُدرج جميع الاختصارات المعرّفة", "alias بدون وسائط"]
        labels: ["Konfiguration"]
      - q: "unalias ll"
        a: "يُزيل الاختصار 'll' — ينطبق فقط على جلسة الطرفية الحالية"
        rel:
          - ["unalias-cmd", "إزالة اختصار معرَّف", "أمر unalias"]
        labels: ["Konfiguration"]

  - title: "اختبار الطرفية"
    image: "images/section-04-check.svg"
    explanation: |
      اختبر معلوماتك الآن — أدخل الأوامر مباشرةً!
    examples:
      - q: "ما هو الرمز الذي يربط أمرين بـ Pipe؟"
        type: input
        a: "|"
        labels: ["Scripting"]
      - q: "ما الفرق بين '>>' و'>'؟"
        type: select
        options:
          - text: ">> يُضيف الإخراج إلى الملف، > يُكتب فوقه"
            correct: true
          - text: ">> يُكتب فوق الملف، > يُضيف"
          - text: ">> يُحوّل الأخطاء، > يُحوّل الإخراج"
          - text: ">> و> يفعلان نفس الشيء"
        labels: ["Scripting"]
      - q: "كيف تصبح التغييرات في ~/.bashrc فعّالة فوراً؟"
        type: select
        options:
          - text: "source ~/.bashrc"
            correct: true
          - text: "reload ~/.bashrc"
          - text: "bash --refresh"
          - text: "apply ~/.bashrc"
        labels: ["Konfiguration"]
      - q: "أيٌّ من هذه العبارات عن الاختصارات والـ Pipes صحيحة؟"
        type: multiple-choice
        options:
          - text: "alias ينشئ اختصارات للأوامر الشائعة"
            correct: true
          - text: "| يُحوّل الإخراج كمدخل للأمر التالي"
            correct: true
          - text: "/dev/null يتجاهل جميع الإخراجات"
            correct: true
          - text: "source يحفظ الأوامر بشكل دائم في الطرفية"
        labels: ["Scripting", "Konfiguration"]
