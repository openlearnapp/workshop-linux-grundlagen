version: 2
number: 11
title: "معلومات النظام"
description: "df و du و free و uname و history — مراقبة حالة النظام"
image: "images/lesson-header.svg"
sections:
  - title: "مساحة التخزين — df و du"
    explanation: |
      **لماذا هذا مهم؟** امتلاء القرص الصلب هو أحد أكثر الأسباب شيوعًا
      لانهيار الخوادم أو توقف الخدمات. `df` و `du` يساعدانك في
      اكتشاف مشاكل التخزين مبكرًا وإيجاد المسببين.

      | الأمر | الغرض |
      |-------|-------|
      | `df -h` | استخدام القرص لجميع الأقسام |
      | `du -sh ordner/` | حجم مجلد |
      | `du -sh * | sort -rh` | حجم جميع الملفات/المجلدات مرتبة |
      | `du -h --max-depth=1` | عرض مستوى واحد فقط |

      **حد التنبيه:** عندما يُظهر `df -h` أكثر من ٨٠٪ عند `/`، يجب التصرف.
      مستهلكو التخزين النموذجيون: `/var/log`، `/var/cache`، صور Docker القديمة.
    examples:
      - q: "df -h"
        a: "يعرض جميع الأقسام مع المساحة المستخدمة/الحرة بـ GB/MB — h = مقروءة بشريًا"
        rel:
          - ["df-cmd", "Disk Free — عرض استخدام القرص", "أمر df"]
          - ["df-h", "Human-readable — الأحجام بـ KB/MB/GB بدلاً من البايتات", "العلم -h"]
        labels: ["نظام الملفات"]
      - q: "df -h /"
        a: "عرض استخدام قسم الجذر فقط — أهم قسم"
        rel:
          - ["df-root", "التحقق من استخدام قسم الجذر /", "df -h /"]
        labels: ["نظام الملفات"]
      - q: "du -sh ~/Downloads/*"
        a: "عرض حجم كل عنصر في مجلد التنزيلات"
        rel:
          - ["du-cmd", "Disk Usage — استخدام التخزين للملفات/المجلدات", "أمر du"]
          - ["du-sh", "s=ملخص (الحجم الكلي)، h=مقروءة بشريًا", "الأعلام -sh"]
        labels: ["نظام الملفات"]
      - q: "du -h --max-depth=1 /var | sort -rh | head -10"
        a: "أكبر ١٠ مجلدات فرعية في /var مرتبة حسب الحجم — لإيجاد مستهلكي التخزين"
        rel:
          - ["du-max-depth", "عرض حتى عمق مجلد معين فقط", "--max-depth=1"]
          - ["sort-rh", "r=عكسي (تنازلي)، h=ترتيب أحجام مقروءة بشريًا", "sort -rh"]
        labels: ["نظام الملفات"]

  - title: "الذاكرة والمعالج — free و uptime"
    explanation: |
      `free` يعرض استخدام الذاكرة العشوائية (RAM):
      ```
      $ free -h
                    total   used   free  shared  cache  available
      Mem:           15Gi   4.2Gi  8.1Gi  512Mi  3.1Gi    10.4Gi
      Swap:          2.0Gi  0B     2.0Gi
      ```

      **الأعمدة المهمة:**
      - `total`: إجمالي الذاكرة
      - `used`: الذاكرة المستخدمة
      - **`available`**: الذاكرة المتاحة فعلاً (أهم من `free`!)
      - `Swap`: ذاكرة التبادل على القرص — عندما تمتلئ Swap يصبح النظام بطيئًا

      `uptime` يعرض مدة تشغيل النظام و **Load Average**:
      ```
      15:42:01 up 7 days, 3:25,  2 users,  load average: 0.52, 0.48, 0.45
      ```
      Load Average ١/٥/١٥ دقيقة — عند نواة واحدة 1.0 = ١٠٠٪ حمل.
    examples:
      - q: "free -h"
        a: "استخدام الذاكرة بـ MB/GB — عمود available يُظهر الذاكرة المتاحة فعلاً"
        rel:
          - ["free-cmd", "عرض استخدام الذاكرة العشوائية و Swap", "أمر free"]
          - ["free-h", "Human-readable — الذاكرة بـ MB/GB بدلاً من البايتات", "free -h"]
        labels: ["أساسيات"]
      - q: "uptime"
        a: "مدة تشغيل النظام، المستخدمون النشطون و CPU Load Average لآخر ١/٥/١٥ دقيقة"
        rel:
          - ["uptime-cmd", "مدة تشغيل النظام وحمل الدقائق الأخيرة", "أمر uptime"]
          - ["load-average", "متوسط حمل المعالج: 1=١٠٠٪ عند نواة واحدة", "Load Average"]
        labels: ["أساسيات"]
      - q: "vmstat 2 5"
        a: "إحصائيات النظام كل ٢ ثانية، ٥ مرات — المعالج، الذاكرة، I/O، العمليات"
        rel:
          - ["vmstat-cmd", "Virtual Memory Statistics — بيانات أداء النظام المفصلة", "أمر vmstat"]
        labels: ["أساسيات"]

  - title: "history وسجل الأوامر"
    explanation: |
      `history` يعرض جميع الأوامر المُدخلة مؤخرًا — مع أرقام.
      الطرفية تحفظ افتراضيًا ١٠٠٠-٢٠٠٠ أمر.

      **حيل الإنتاجية:**
      | الاختصار | الأثر |
      |----------|-------|
      | `history` | عرض جميع الأوامر |
      | `history 20` | آخر ٢٠ أمرًا |
      | `!!` | تكرار آخر أمر |
      | `!50` | تنفيذ الأمر رقم ٥٠ |
      | `!apt` | آخر أمر بدأ بـ 'apt' |
      | `Ctrl+R` | البحث العكسي في history (عملي جدًا!) |
      | `history | grep ssh` | البحث في history عن أوامر ssh |

      `Ctrl+R` هو أحد أقيم الاختصارات: اكتب كلمة بحث وbash يبحث
      تلقائيًا عن آخر أمر مطابق.
    examples:
      - q: "history | tail -20"
        a: "عرض آخر ٢٠ أمرًا تم إدخاله"
        rel:
          - ["history-cmd", "عرض سجل الأوامر المُدخلة", "أمر history"]
        labels: ["أساسيات"]
      - q: "history | grep \"apt install\""
        a: "البحث عن جميع أوامر apt install من السجل — ماذا ثبّتتُ ومتى؟"
        rel:
          - ["history-grep", "دمج history مع grep — البحث عن أوامر محددة من السجل", "history | grep"]
        labels: ["أساسيات"]
      - q: "!!"
        a: "تكرار آخر أمر فورًا — مفيد بشكل خاص مع: sudo !!"
        rel:
          - ["bang-bang", "!! يُعيد تنفيذ آخر أمر تم إدخاله", "!!"]
          - ["sudo-bang-bang", "sudo !! — تكرار آخر أمر بصلاحيات المسؤول", "sudo !!"]
        labels: ["أساسيات"]
      - q: "cat /proc/cpuinfo | grep \"model name\" | head -1"
        a: "قراءة طراز ونوع المعالج من معلومات عمليات النواة"
        rel:
          - ["proc-cpuinfo", "ملف النواة بمعلومات المعالج المفصلة", "/proc/cpuinfo"]
          - ["proc-filesystem", "/proc ليس نظام ملفات حقيقي — يحتوي معلومات النواة كملفات", "/proc"]
        labels: ["أساسيات"]

  - title: "🖥️ اختبار الطرفية"
    explanation: |
      اختبر معرفتك الآن — أدخل الأوامر مباشرة!
    examples:
      - q: "أي أمر يعرض استخدام القرص لجميع الأقسام؟"
        type: input
        a: "df -h"
        labels: ["نظام الملفات"]
      - q: "ماذا يُظهر عمود 'available' في 'free -h'؟"
        type: select
        options:
          - text: "الذاكرة العشوائية المتاحة فعلاً"
            correct: true
          - text: "مساحة القرص الحرة"
          - text: "ذاكرة Swap المستخدمة"
          - text: "حمل المعالج بالنسبة المئوية"
        labels: ["أساسيات"]
      - q: "أي أمر يبحث في سجل الأوامر عن 'apt install'؟"
        type: select
        options:
          - text: "history | grep \"apt install\""
            correct: true
          - text: "history search \"apt install\""
          - text: "grep history \"apt install\""
          - text: "find history -name \"apt install\""
        labels: ["أساسيات"]
      - q: "أي من هذه الأوامر تعرض معلومات النظام؟"
        type: multiple-choice
        options:
          - text: "df -h"
            correct: true
          - text: "free -h"
            correct: true
          - text: "uptime"
            correct: true
          - text: "chmod 755"
        labels: ["أساسيات"]
