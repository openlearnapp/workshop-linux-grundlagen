version: 2
number: 11
title: "معلومات النظام"
description: "df وdu وfree وuname وhistory — مراقبة حالة النظام"
image: "images/lesson-header.svg"
image_caption: "Dashboard mit CPU-, RAM- und Disk-Auslastungsanzeigen"
sections:
  - title: "مساحة التخزين — df و du"
    image: "images/section-01-disk.svg"
    explanation: |
      تخيل أن حاسوبك مثل غرفة.
      عندما تمتلئ الغرفة، لا يتسع شيء آخر —
      ويبدأ الحاسوب في الاختناق.

      بـ **df** (Disk Free — "مساحة حرة على القرص")
      ترى مدى امتلاء قرصك الصلب:
      ```
      df -h
      ```
      الـ `-h` تعني "human-readable" (مقروء للإنسان) —
      يعرض GB وMB بدلاً من أرقام ضخمة.

      بـ **du** (Disk Usage — "استخدام التخزين") تنظر
      أي مجلد يأكل أكثر مساحة:
      ```
      du -sh ~/Downloads/*
      ```
      - `s` = summary (الحجم الإجمالي فقط، ليس كل ملف على حدة)
      - `h` = human-readable (GB/MB بدلاً من بايت)

      نصيحة: إذا أردت إيجاد أكبر المجلدات، ادمج du مع sort:
      ```
      du -h --max-depth=1 /var | sort -rh | head -10
      ```
      يعرض أكبر 10 مجلدات في `/var` — مرتبةً من الكبير إلى الصغير.
    examples:
      - q: "df -h"
        a: "يعرض جميع مناطق القرص الصلب مع المساحة الحرة والمشغولة بـ GB/MB"
        rel:
          - ["df-cmd", "Disk Free — عرض استخدام القرص الصلب", "أمر df"]
          - ["df-h", "Human-readable — الأحجام بـ KB/MB/GB بدلاً من بايت", "الخيار -h"]
        labels: ["Dateisystem"]
      - q: "df -h /"
        a: "يعرض فقط المنطقة الرئيسية للحاسوب (/) — أهم مساحة"
        rel:
          - ["df-root", "فحص استخدام قسم Root /", "df -h /"]
        labels: ["Dateisystem"]
      - q: "du -sh ~/Downloads/*"
        a: "يعرض حجم كل ملف ومجلد في مجلد التنزيلات"
        rel:
          - ["du-cmd", "Disk Usage — استخدام التخزين للملفات والمجلدات", "أمر du"]
          - ["du-sh", "s=ملخص (الحجم الإجمالي)، h=مقروء للإنسان", "الخيارات -sh"]
        labels: ["Dateisystem"]
      - q: "du -h --max-depth=1 /var | sort -rh | head -10"
        a: "يجد أكبر 10 مجلدات في /var — عملي لاكتشاف آكلات المساحة"
        rel:
          - ["du-max-depth", "العرض حتى عمق مجلدات معين فقط", "--max-depth=1"]
          - ["sort-rh", "r=عكسي (تنازلي)، h=ترتيب أحجام مقروءة للإنسان", "sort -rh"]
        labels: ["Dateisystem"]

  - title: "الذاكرة العشوائية والمعالج — free و uptime"
    image: "images/section-02-memory.svg"
    explanation: |
      حاسوبك لديه نوعان من التخزين:
      - **القرص الصلب** — مثل رف الكتب: مساحة كبيرة، لكن بطيء
      - **الذاكرة العشوائية (RAM)** — مثل مكتبك: سريع، لكن محدود

      بـ **free** ترى مدى امتلاء مكتبك الآن:
      ```
      free -h
      ```

      الإخراج يبدو تقريباً هكذا:
      ```
                    total   used   free  shared  cache  available
      Mem:           15Gi   4.2Gi  8.1Gi  512Mi  3.1Gi    10.4Gi
      Swap:          2.0Gi  0B     2.0Gi
      ```

      مهم: انظر إلى عمود **available** — هذه المساحة الحرة فعلاً.
      عمود `free` وحده لا يقول الكثير، لأن لينكس يستخدم الذاكرة غالباً للكاش.

      **Swap** مثل توسعة طارئة للمكتب —
      لينكس يضع الأشياء نادرة الاستخدام مؤقتاً على القرص الصلب.
      إذا امتأت Swap، يصبح الحاسوب بطيئاً.

      بـ **uptime** ترى كم من الوقت يعمل حاسوبك:
      ```
      uptime
      ```
      يعرض أيضاً **Load Average** (متوسط الحمل) —
      أرقام صغيرة تعني: كل شيء مرتاح.
    examples:
      - q: "free -h"
        a: "يعرض استخدام الذاكرة العشوائية بـ GB/MB — عمود available هو الأهم"
        rel:
          - ["free-cmd", "عرض استخدام RAM واستخدام Swap", "أمر free"]
          - ["free-h", "Human-readable — الذاكرة بـ MB/GB بدلاً من بايت", "free -h"]
        labels: ["Basics"]
      - q: "uptime"
        a: "يعرض كم من الوقت يعمل الحاسوب وعدد المستخدمين ومدى الاستخدام"
        rel:
          - ["uptime-cmd", "وقت تشغيل النظام ومتوسط الحمل في الدقائق الأخيرة", "أمر uptime"]
          - ["load-average", "متوسط استخدام المعالج: 1=100% على نواة واحدة", "Load Average"]
        labels: ["Basics"]
      - q: "vmstat 2 5"
        a: "يعرض إحصاءات النظام كل ثانيتين، 5 مرات إجمالاً — للمحترفين"
        rel:
          - ["vmstat-cmd", "Virtual Memory Statistics — بيانات أداء النظام التفصيلية", "أمر vmstat"]
        labels: ["Basics"]

  - title: "history — ماذا فعلت مؤخراً؟"
    image: "images/section-03-history.svg"
    explanation: |
      هل أدخلت أمراً تحتاجه مجدداً —
      لكن لا تتذكر كيف كان بالضبط؟

      لينكس يتذكر نيابةً عنك!
      **history** يعرض جميع الأوامر التي أدخلتها مؤخراً:
      ```
      history
      ```

      خدع مفيدة مع history:
      - `history 20` — فقط آخر 20 أمراً
      - `!!` — تكرار آخر أمر فوراً
      - `!50` — تنفيذ الأمر رقم 50 من القائمة
      - `history | grep ssh` — البحث عن أوامر SSH فقط في القائمة

      والنصيحة السرية للمحترفين: **Ctrl+R**
      اضغط Ctrl+R واكتب كلمة —
      لينكس يبحث تلقائياً للخلف في history ويعرض آخر أمر مطابق.
      هذا يوفر قدراً هائلاً من الكتابة!

      ونظرة إلى داخل الحاسوب —
      لينكس يحفظ معلومات كثيرة في "ملفات" خاصة تحت `/proc`:
      ```
      cat /proc/cpuinfo | grep "model name" | head -1
      ```
      هذا يعرض لك أي معالج في حاسوبك.
    examples:
      - q: "history | tail -20"
        a: "يعرض آخر 20 أمراً تم إدخاله — عملي للمراجعة"
        rel:
          - ["history-cmd", "عرض سجل الأوامر المُدخلة", "أمر history"]
        labels: ["Basics"]
      - q: "history | grep \"apt install\""
        a: "يبحث في history عن جميع الأوامر التي تحتوي apt install"
        rel:
          - ["history-grep", "دمج history مع grep — البحث عن أوامر محددة في السجل", "history | grep"]
        labels: ["Basics"]
      - q: "!!"
        a: "يكرر آخر أمر فوراً — مفيد بشكل خاص كـ: sudo !!"
        rel:
          - ["bang-bang", "!! ينفذ الأمر المُدخل مؤخراً مجدداً", "!!"]
          - ["sudo-bang-bang", "sudo !! — تكرار آخر أمر بصلاحيات مسؤول", "sudo !!"]
        labels: ["Basics"]
      - q: "cat /proc/cpuinfo | grep \"model name\" | head -1"
        a: "يعرض موديل معالج حاسوبك — /proc نافذة إلى النواة"
        rel:
          - ["proc-cpuinfo", "ملف النواة بمعلومات المعالج التفصيلية", "/proc/cpuinfo"]
          - ["proc-filesystem", "/proc ليس نظام ملفات حقيقياً — يحتوي معلومات النواة كملفات", "/proc"]
        labels: ["Basics"]

  - title: "اختبار الطرفية"
    image: "images/section-04-check.svg"
    explanation: |
      اختبر معلوماتك الآن — أدخل الأوامر مباشرةً!
    examples:
      - q: "ما هو الأمر الذي يعرض استخدام القرص الصلب لجميع المناطق؟"
        type: input
        a: "df -h"
        labels: ["Dateisystem"]
      - q: "ماذا يعرض عمود 'available' في 'free -h'؟"
        type: select
        options:
          - text: "الذاكرة العشوائية المتاحة فعلاً"
            correct: true
          - text: "مساحة القرص الصلب الحرة"
          - text: "مساحة Swap المشغولة"
          - text: "استخدام المعالج بالنسبة المئوية"
        labels: ["Basics"]
      - q: "ما هو الأمر الذي يبحث في سجل الأوامر عن 'apt install'؟"
        type: select
        options:
          - text: "history | grep \"apt install\""
            correct: true
          - text: "history search \"apt install\""
          - text: "grep history \"apt install\""
          - text: "find history -name \"apt install\""
        labels: ["Basics"]
      - q: "أيٌّ من هذه الأوامر تعرض معلومات النظام؟"
        type: multiple-choice
        options:
          - text: "df -h"
            correct: true
          - text: "free -h"
            correct: true
          - text: "uptime"
            correct: true
          - text: "chmod 755"
        labels: ["Basics"]
