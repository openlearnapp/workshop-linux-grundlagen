<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>

  <!-- Dashboard panel -->
  <rect x="40" y="20" width="560" height="320" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>

  <!-- CPU Gauge -->
  <g transform="translate(140, 100)">
    <!-- Gauge background -->
    <path d="M-50,0 A50,50 0 1,1 50,0" fill="none" stroke="#30363d" stroke-width="10" stroke-linecap="round"/>
    <!-- Gauge fill (73%) -->
    <path d="M-50,0 A50,50 0 1,1 36,-35" fill="none" stroke="#f0883e" stroke-width="10" stroke-linecap="round"/>
    <!-- Center text -->
    <text x="0" y="-5" font-family="monospace" font-size="22" fill="#f0883e" text-anchor="middle" font-weight="bold">73%</text>
    <text x="0" y="15" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">CPU</text>
    <!-- Needle -->
    <line x1="0" y1="0" x2="25" y2="-35" stroke="#e6edf3" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#e6edf3"/>
  </g>

  <!-- RAM Gauge -->
  <g transform="translate(320, 100)">
    <path d="M-50,0 A50,50 0 1,1 50,0" fill="none" stroke="#30363d" stroke-width="10" stroke-linecap="round"/>
    <!-- Gauge fill (45%) -->
    <path d="M-50,0 A50,50 0 1,1 -5,-50" fill="none" stroke="#3fb950" stroke-width="10" stroke-linecap="round"/>
    <text x="0" y="-5" font-family="monospace" font-size="22" fill="#3fb950" text-anchor="middle" font-weight="bold">45%</text>
    <text x="0" y="15" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">RAM</text>
    <line x1="0" y1="0" x2="-15" y2="-42" stroke="#e6edf3" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#e6edf3"/>
  </g>

  <!-- Disk Gauge -->
  <g transform="translate(500, 100)">
    <path d="M-50,0 A50,50 0 1,1 50,0" fill="none" stroke="#30363d" stroke-width="10" stroke-linecap="round"/>
    <!-- Gauge fill (88%) - critical -->
    <path d="M-50,0 A50,50 0 1,1 47,15" fill="none" stroke="#f85149" stroke-width="10" stroke-linecap="round"/>
    <text x="0" y="-5" font-family="monospace" font-size="22" fill="#f85149" text-anchor="middle" font-weight="bold">88%</text>
    <text x="0" y="15" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">DISK</text>
    <line x1="0" y1="0" x2="42" y2="-15" stroke="#e6edf3" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#e6edf3"/>
  </g>

  <!-- System info cards -->
  <!-- Uptime -->
  <rect x="70" y="155" width="150" height="45" rx="6" fill="#21262d"/>
  <text x="85" y="174" font-family="monospace" font-size="10" fill="#8b949e">uptime</text>
  <text x="85" y="192" font-family="monospace" font-size="13" fill="#58a6ff">42 days, 7:23</text>

  <!-- Load -->
  <rect x="245" y="155" width="150" height="45" rx="6" fill="#21262d"/>
  <text x="260" y="174" font-family="monospace" font-size="10" fill="#8b949e">load avg</text>
  <text x="260" y="192" font-family="monospace" font-size="13" fill="#f0883e">1.24 0.98 0.87</text>

  <!-- Kernel -->
  <rect x="420" y="155" width="150" height="45" rx="6" fill="#21262d"/>
  <text x="435" y="174" font-family="monospace" font-size="10" fill="#8b949e">kernel</text>
  <text x="435" y="192" font-family="monospace" font-size="13" fill="#e6edf3">6.5.0-generic</text>

  <!-- Bar charts at bottom -->
  <!-- /dev/sda1 -->
  <text x="70" y="228" font-family="monospace" font-size="10" fill="#8b949e">/dev/sda1</text>
  <rect x="160" y="218" width="300" height="14" rx="3" fill="#30363d"/>
  <rect x="160" y="218" width="264" height="14" rx="3" fill="#f85149" opacity="0.7"/>
  <text x="475" y="229" font-family="monospace" font-size="10" fill="#f85149">88%</text>

  <!-- /dev/sda2 -->
  <text x="70" y="252" font-family="monospace" font-size="10" fill="#8b949e">/dev/sda2</text>
  <rect x="160" y="242" width="300" height="14" rx="3" fill="#30363d"/>
  <rect x="160" y="242" width="120" height="14" rx="3" fill="#3fb950" opacity="0.7"/>
  <text x="475" y="253" font-family="monospace" font-size="10" fill="#3fb950">40%</text>

  <!-- /dev/sdb1 -->
  <text x="70" y="276" font-family="monospace" font-size="10" fill="#8b949e">/dev/sdb1</text>
  <rect x="160" y="266" width="300" height="14" rx="3" fill="#30363d"/>
  <rect x="160" y="266" width="69" height="14" rx="3" fill="#3fb950" opacity="0.7"/>
  <text x="475" y="277" font-family="monospace" font-size="10" fill="#3fb950">23%</text>

  <!-- Process count -->
  <rect x="70" y="295" width="220" height="30" rx="6" fill="#21262d"/>
  <text x="85" y="315" font-family="monospace" font-size="11" fill="#8b949e">Tasks:</text>
  <text x="140" y="315" font-family="monospace" font-size="11" fill="#e6edf3">247 total, 2 running</text>

  <!-- Memory detail -->
  <rect x="310" y="295" width="260" height="30" rx="6" fill="#21262d"/>
  <text x="325" y="315" font-family="monospace" font-size="11" fill="#8b949e">Mem:</text>
  <text x="365" y="315" font-family="monospace" font-size="11" fill="#e6edf3">7.2G / 16.0G (45%)</text>
</svg>