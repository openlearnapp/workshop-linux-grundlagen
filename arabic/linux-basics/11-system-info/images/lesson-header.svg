<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 270">
<style>
.f{font-family:sans-serif}
.ti{animation:tia 11s infinite}@keyframes tia{0%,3%{opacity:0}7%,87%{opacity:1}92%,100%{opacity:0}}
.c1{animation:c1a 11s infinite}@keyframes c1a{0%,12%{opacity:0}18%,87%{opacity:1}92%,100%{opacity:0}}
.c2{animation:c2a 11s infinite}@keyframes c2a{0%,30%{opacity:0}36%,87%{opacity:1}92%,100%{opacity:0}}
.c3{animation:c3a 11s infinite}@keyframes c3a{0%,48%{opacity:0}54%,87%{opacity:1}92%,100%{opacity:0}}
.c4{animation:c4a 11s infinite}@keyframes c4a{0%,65%{opacity:0}71%,87%{opacity:1}92%,100%{opacity:0}}
.ft{animation:fta 11s infinite}@keyframes fta{0%,78%{opacity:0}82%,87%{opacity:1}92%,100%{opacity:0}}
</style>
<rect width="640" height="270" rx="12" fill="#0d1117"/>
<rect width="640" height="56" rx="12" fill="#161b22"/>
<rect x="0" y="44" width="640" height="12" fill="#161b22"/>
<text class="f ti" x="320" y="36" text-anchor="middle" fill="#e6edf3" font-size="22" font-weight="bold">📊 معلومات النظام</text>
<text class="f ti" x="320" y="62" text-anchor="middle" fill="#8b949e" font-size="13">df · du · free · uptime · history</text>
<!-- Card 1: blue -->
<g class="c1">
<rect x="24" y="80" width="184" height="120" rx="10" fill="#0d1520"/>
<rect x="24" y="80" width="184" height="4" rx="2" fill="#58a6ff"/>
<text class="f" x="116" y="116" text-anchor="middle" font-size="26">💾</text>
<text class="f" x="116" y="143" text-anchor="middle" fill="#58a6ff" font-size="16" font-weight="bold">مساحة التخزين</text>
<text class="f" x="116" y="163" text-anchor="middle" fill="#8b949e" font-size="12">df &amp; du</text>
</g>
<!-- Card 2: green -->
<g class="c2">
<rect x="228" y="80" width="184" height="120" rx="10" fill="#0a1a0d"/>
<rect x="228" y="80" width="184" height="4" rx="2" fill="#3fb950"/>
<text class="f" x="320" y="116" text-anchor="middle" font-size="26">🧠</text>
<text class="f" x="320" y="143" text-anchor="middle" fill="#3fb950" font-size="16" font-weight="bold">RAM والمعالج</text>
<text class="f" x="320" y="163" text-anchor="middle" fill="#8b949e" font-size="12">free &amp; uptime</text>
</g>
<!-- Card 3: orange -->
<g class="c3">
<rect x="432" y="80" width="184" height="120" rx="10" fill="#1a0f08"/>
<rect x="432" y="80" width="184" height="4" rx="2" fill="#f0883e"/>
<text class="f" x="524" y="116" text-anchor="middle" font-size="26">📜</text>
<text class="f" x="524" y="143" text-anchor="middle" fill="#f0883e" font-size="16" font-weight="bold">history</text>
<text class="f" x="524" y="163" text-anchor="middle" fill="#8b949e" font-size="12">سجل الأوامر</text>
</g>
<!-- Footer -->
<g class="ft">
<rect x="24" y="218" width="592" height="34" rx="8" fill="#161b22"/>
<text class="f" x="320" y="240" text-anchor="middle" fill="#8b949e" font-size="12">اعرف نظامك — تحقق من الموارد قبل نفادها</text>
</g>
</svg>
