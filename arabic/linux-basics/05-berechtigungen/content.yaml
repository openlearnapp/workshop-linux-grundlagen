version: 2
number: 5
title: "الصلاحيات"
description: "chmod و chown و sudo — فهم نظام صلاحيات لينكس وتطبيقه"
image: "images/lesson-header.svg"
sections:
  - title: "rwx — فك شفرة نظام الصلاحيات"
    image: "images/section-01-rwx.svg"
    explanation: |
      **لماذا هذا مهم؟** الأمان هو جوهر لينكس. الصلاحيات الخاطئة
      قد تؤدي إلى عدم تنفيذ السكريبتات، أو عدم تشغيل خادم الويب، أو
      في أسوأ الأحوال وصول مستخدمين آخرين إلى بياناتك.

      كل ملف لديه ثلاث مستويات وصول:
      ```
      -rwxr-xr--
      ↑↑↑↑↑↑↑↑↑↑
      │└┬┘└┬┘└┬┘
      │ │  │  └─ Other (جميع الآخرين)
      │ │  └──── Group (أعضاء المجموعة)
      │ └──────── Owner (المالك)
      └────────── نوع الملف (- = ملف، d = مجلد)
      ```

      **معاني الأحرف:**
      | الحرف | المعنى | للملفات | للمجلدات |
      |-------|--------|---------|----------|
      | `r` | read (قراءة) | قراءة الملف | عرض المحتويات (ls) |
      | `w` | write (كتابة) | تعديل الملف | إنشاء/حذف ملفات بداخله |
      | `x` | execute (تنفيذ) | تشغيل الملف | الدخول إلى المجلد (cd) |
      | `-` | لا صلاحيات | — | — |
    examples:
      - q: "ls -la ~/.ssh/id_rsa"
        a: "يعرض صلاحيات مفتاح SSH الخاص — يجب أن تكون -rw------- (المالك فقط!)"
        rel:
          - ["ssh-key-perms", "مفتاح SSH الخاص يحتاج صلاحيات 600 — وإلا يرفض SSH استخدامه", "أمان"]
          - ["rw-owner-only", "-rw------- تعني: المالك يقرأ/يكتب، وجميع الآخرين لا شيء", "نمط صلاحيات"]
        labels: ["الأمان"]
      - q: "ls -l /usr/bin/sudo"
        a: "يعرض صلاحيات SUID الخاصة لـ sudo — حرف s في سلسلة الصلاحيات مميز"
        rel:
          - ["suid-bit", "Set User ID — البرنامج يعمل بصلاحيات مالكه", "SUID"]
          - ["sudo-bin", "برنامج sudo بصلاحيات نظام مرتفعة", "/usr/bin/sudo"]
        labels: ["الأمان"]

  - title: "chmod — تغيير الصلاحيات"
    image: "images/section-02-chmod.svg"
    explanation: |
      `chmod` (Change Mode) يُغيّر صلاحيات الملفات. هناك ترميزان:

      **الترميز الرمزي** (أسهل للحفظ):
      ```bash
      chmod u+x skript.sh      # المالك: إضافة التنفيذ
      chmod g-w datei.txt      # المجموعة: إزالة الكتابة
      chmod o=r config.txt     # الآخرون: قراءة فقط
      chmod a+x deploy.sh      # الجميع: إضافة التنفيذ
      ```

      **الترميز الرقمي** (أسرع في الكتابة):
      | الرقم | الصلاحيات | المعنى |
      |-------|-----------|--------|
      | 7 | rwx | جميع الصلاحيات |
      | 6 | rw- | قراءة + كتابة |
      | 5 | r-x | قراءة + تنفيذ |
      | 4 | r-- | قراءة فقط |
      | 0 | --- | لا صلاحيات |

      مثال: `chmod 755` = `rwxr-xr-x` (المالك الكل، المجموعة/الآخرون قراءة+تنفيذ)
    examples:
      - q: "chmod +x deploy.sh"
        a: "يمنح الجميع (المالك، المجموعة، الآخرون) صلاحية التنفيذ — يجعل السكريبت قابلاً للتشغيل"
        rel:
          - ["chmod-cmd", "Change Mode — تغيير صلاحيات الملف", "أمر chmod"]
          - ["chmod-x", "+x يضيف صلاحيات التنفيذ", "chmod +x"]
        labels: ["الأمان"]
      - q: "chmod 755 /usr/local/bin/meinprogramm"
        a: "755 = rwxr-xr-x: المالك يملك كل الصلاحيات، البقية يقرأون وينفذون فقط"
        rel:
          - ["chmod-755", "rwxr-xr-x — المعيار للبرامج التنفيذية", "القيمة الثمانية 755"]
        labels: ["الأمان"]
      - q: "chmod 600 ~/.ssh/id_rsa"
        a: "600 = rw------- : المالك فقط يقرأ/يكتب — إلزامي لمفاتيح SSH"
        rel:
          - ["chmod-600", "rw------- المالك يقرأ/يكتب فقط، معيار مفاتيح SSH", "القيمة الثمانية 600"]
        labels: ["الأمان"]
      - q: "chmod -R 755 ~/webseite/"
        a: "يُطبّق صلاحيات 755 بشكل متكرر على جميع الملفات والمجلدات الفرعية"
        rel:
          - ["chmod-R", "Recursive — تطبيق الصلاحيات على جميع المجلدات الفرعية", "العلم -R"]
        labels: ["الأمان"]

  - title: "sudo و chown — صلاحيات المسؤول وتغيير الملكية"
    image: "images/section-03-sudo.svg"
    explanation: |
      **sudo** (Super User Do) يسمح للمستخدمين العاديين بتنفيذ أوامر فردية كمسؤول
      (root). وهذا أكثر أمانًا من العمل الدائم كـ root.

      ⚠️ **القاعدة الذهبية:** استخدم `sudo` فقط عند الحاجة. كمستخدم root لا يوجد
      شبكة أمان — أمر `rm -rf` خاطئ واحد يمكن أن يُدمّر النظام.

      **chown** (Change Owner) يُغيّر مالك الملف:
      ```bash
      chown alice datei.txt           # تغيير المالك
      chown alice:www-data datei.txt  # تغيير المالك والمجموعة
      chown -R www-data /var/www/     # بشكل متكرر لملفات خادم الويب
      ```
    examples:
      - q: "sudo apt update"
        a: "تحديث قائمة الحزم — يتطلب صلاحيات المسؤول لذلك نستخدم sudo"
        rel:
          - ["sudo-cmd", "Super User Do — تنفيذ أمر كمسؤول", "أمر sudo"]
        labels: ["الأمان"]
      - q: "sudo chown -R www-data:www-data /var/www/html/"
        a: "تعيين جميع ملفات خادم الويب للمستخدم www-data — Nginx/Apache يحتاج ذلك"
        rel:
          - ["chown-cmd", "Change Owner — تغيير مالك الملف", "أمر chown"]
          - ["chown-R", "Recursive — تغيير الملكية بشكل متكرر", "chown -R"]
          - ["www-data", "المستخدم الافتراضي لخادم الويب (Apache, Nginx)", "www-data"]
        labels: ["الأمان"]
      - q: "sudo -l"
        a: "يعرض أوامر sudo المسموح بها لك — مفيد على أنظمة غريبة"
        rel:
          - ["sudo-l", "List — عرض أوامر sudo المسموح بها للمستخدم الحالي", "العلم -l"]
        labels: ["الأمان"]
      - q: "sudo su -"
        a: "التبديل إلى مستخدم root — مع الشرطة يتم تحميل بيئة root أيضًا"
        rel:
          - ["sudo-su", "التبديل إلى صدفة root — استخدم بحذر", "sudo su -"]
        labels: ["الأمان"]

  - title: "🖥️ اختبار الطرفية"
    image: "images/section-04-check.svg"
    explanation: |
      اختبر معرفتك الآن — أدخل الأوامر مباشرة!
    examples:
      - q: "أي أمر يجعل الملف 'deploy.sh' قابلاً للتنفيذ؟"
        type: input
        a: "chmod +x deploy.sh"
        labels: ["الأمان"]
      - q: "ماذا تعني الصلاحية '755' في الترميز الثماني؟"
        type: select
        options:
          - text: "rwxr-xr-x — المالك الكل، المجموعة والآخرون قراءة+تنفيذ"
            correct: true
          - text: "rw-rw-rw- — الجميع يقرأ ويكتب"
          - text: "rwx------ — المالك فقط لديه كل الصلاحيات"
          - text: "r--r--r-- — الجميع يقرأ فقط"
        labels: ["الأمان"]
      - q: "ما القيمة الثمانية التي يجب أن يملكها مفتاح SSH الخاص؟"
        type: select
        options:
          - text: "600"
            correct: true
          - text: "755"
          - text: "777"
          - text: "644"
        labels: ["الأمان"]
      - q: "أي من العبارات التالية عن نظام صلاحيات لينكس صحيحة؟"
        type: multiple-choice
        options:
          - text: "r تعني read (قراءة)"
            correct: true
          - text: "x تعني execute (تنفيذ)"
            correct: true
          - text: "w تعني write (كتابة)"
            correct: true
          - text: "s تعني system (نظام)"
        labels: ["الأمان"]
