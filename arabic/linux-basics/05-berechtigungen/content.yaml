version: 2
number: 5
title: "الصلاحيات"
description: "تعلّم كيف يُنظّم لينكس من يمكنه القراءة والكتابة والتشغيل"
image: "images/lesson-header.svg"
image_caption: "Schloss-Symbol mit rwx-Berechtigungsraster"
sections:
  - title: "rwx — من يُسمح له بماذا؟"
    image: "images/section-01-rwx.svg"
    explanation: |
      لينكس يسأل عن كل ملف: **من يُسمح له؟**

      هذا مثل المنزل: غرفتك تعود لك.
      الآخرون ربما يدخلون، لكن لا يمكنهم لمس أغراضك.

      كل ملف في لينكس له ثلاثة مستويات صلاحيات:
      - **المالك** (Owner): الشخص الذي يملك الملف
      - **المجموعة** (Group): مجموعة من المستخدمين، مثل جميع معلمي مدرسة
      - **الآخرون** (Other): كل من هو على الحاسوب غير ذلك

      ولكل مستوى ثلاثة صلاحيات ممكنة:
      | الحرف | المعنى | ما يعنيه |
      |-----------|-----------|---------------|
      | `r` | read (قراءة) | قراءة الملف أو عرض محتوى المجلد |
      | `w` | write (كتابة) | تعديل الملف أو إنشاء ملفات في مجلد |
      | `x` | execute (تنفيذ) | تشغيل برنامج أو الدخول إلى مجلد |
      | `-` | لا صلاحية | هذا غير مسموح |

      عندما تُدخل `ls -l`، ترى مثلاً:
      ```
      -rw-r--r-- 1 alice alice 4096 Mar 20 notizen.txt
      ```
      هذا يعني: المالكة alice يمكنها القراءة والكتابة (`rw-`)،
      الآخرون يمكنهم القراءة فقط (`r--`).
    examples:
      - q: "ls -la ~/.ssh/id_rsa"
        a: "يعرض صلاحيات مفتاح SSH الخاص — يجب أن تكون -rw------- (المالك فقط!)"
        rel:
          - ["ssh-key-perms", "مفتاح SSH الخاص يحتاج صلاحيات 600 — وإلا SSH يرفض استخدامه", "أمان"]
          - ["rw-owner-only", "-rw------- تعني: المالك يقرأ/يكتب، الآخرون لا شيء", "نمط الصلاحيات"]
        labels: ["Sicherheit"]
      - q: "ls -l /usr/bin/sudo"
        a: "يعرض الصلاحيات الخاصة لـ sudo — الـ s في سلسلة الصلاحيات مميز"
        rel:
          - ["suid-bit", "Set User ID — البرنامج يعمل بصلاحيات مالكه", "SUID"]
          - ["sudo-bin", "برنامج sudo مع صلاحيات نظام مرتفعة", "/usr/bin/sudo"]
        labels: ["Sicherheit"]

  - title: "chmod — تغيير الصلاحيات"
    image: "images/section-02-chmod.svg"
    explanation: |
      بـ `chmod` (Change Mode — "غيّر الوضع") يمكنك تغيير
      صلاحيات ملف.

      هناك طريقتان للكتابة:

      **طريقة الأحرف** (أسهل للفهم):
      ```
      chmod u+x mein-skript.sh    # u = user (المالك), + = إضافة, x = تنفيذ
      chmod g-w datei.txt         # g = group (المجموعة), - = إزالة, w = كتابة
      chmod o=r geheim.txt        # o = other (الآخرون), = = تحديد بالضبط, r = قراءة فقط
      chmod a+x alle-dürfen.sh    # a = all (الكل), + = إضافة, x = تنفيذ
      ```

      **طريقة الأرقام** (أسرع حين تتقنها):

      كل صلاحية لها قيمة رقمية: r=4، w=2، x=1. تجمعها:
      | الرقم | الصلاحيات | المعنى |
      |------|--------|-----------|
      | 7 | rwx | كل شيء مسموح |
      | 6 | rw- | قراءة وكتابة |
      | 5 | r-x | قراءة وتنفيذ |
      | 4 | r-- | قراءة فقط |
      | 0 | --- | لا شيء مسموح |

      `chmod 755 programm.sh` يعني:
      المالك كل شيء (7 = rwx)، المجموعة قراءة+تنفيذ (5 = r-x)، الآخرون قراءة+تنفيذ (5 = r-x).
    examples:
      - q: "chmod +x deploy.sh"
        a: "يعطي الجميع (المالك، المجموعة، الآخرون) صلاحية التنفيذ — يجعل السكريبت قابلاً للتشغيل"
        rel:
          - ["chmod-cmd", "Change Mode — تغيير صلاحيات الملف", "أمر chmod"]
          - ["chmod-x", "+x يُضيف صلاحية التنفيذ", "chmod +x"]
        labels: ["Sicherheit"]
      - q: "chmod 755 /usr/local/bin/meinprogramm"
        a: "755 = rwxr-xr-x: المالك يملك كل شيء، الآخرون يمكنهم القراءة والتشغيل"
        rel:
          - ["chmod-755", "rwxr-xr-x — المعيار للبرامج القابلة للتنفيذ", "القيمة الثمانية 755"]
        labels: ["Sicherheit"]
      - q: "chmod 600 ~/.ssh/id_rsa"
        a: "600 = rw------- : المالك فقط يمكنه القراءة/الكتابة — إلزامي لمفاتيح SSH!"
        rel:
          - ["chmod-600", "rw------- المالك فقط يقرأ/يكتب، معيار مفاتيح SSH", "القيمة الثمانية 600"]
        labels: ["Sicherheit"]
      - q: "chmod -R 755 ~/webseite/"
        a: "يضبط صلاحيات 755 لجميع الملفات والمجلدات الفرعية في ~/webseite/ دفعة واحدة"
        rel:
          - ["chmod-R", "Recursive — تطبيق الصلاحيات على جميع المجلدات الفرعية", "الخيار -R"]
        labels: ["Sicherheit"]

  - title: "sudo و chown — صلاحيات المسؤول والملكية"
    image: "images/section-03-sudo.svg"
    explanation: |
      في لينكس يوجد مستخدم خارق: **root** (جذر بالإنجليزية).
      root يُسمح له بكل شيء — حذف ملفات، تثبيت برامج، تعديل النظام.

      لكن: العمل دائماً كـ root خطير.
      خطأ مطبعي واحد يمكنه تدمير النظام!

      لذلك يوجد **`sudo`** (Super User Do — "افعلها كمسؤول"):
      تبقى مستخدماً عادياً، لكن يمكنك تنفيذ أوامر فردية بـ
      صلاحيات المسؤول:
      ```
      sudo apt update    # تحديث قائمة البرامج (يحتاج صلاحيات مسؤول)
      ```
      لينكس يطلب كلمة مرورك.

      **`chown`** (Change Owner — "غيّر المالك") يغيّر من يملك الملف:
      ```
      chown alice notizen.txt          # alice تصبح المالكة
      chown alice:freunde notizen.txt  # alice مالكة، مجموعة "freunde"
      chown -R alice ~/dokumente/      # كل ما في ~/dokumente يعود لـ alice
      ```

      القاعدة: استخدم `sudo` فقط عند الضرورة القصوى!
    examples:
      - q: "sudo apt update"
        a: "يُحدّث قائمة البرامج المتاحة — يحتاج صلاحيات مسؤول، لذلك sudo"
        rel:
          - ["sudo-cmd", "Super User Do — تنفيذ الأمر كمسؤول", "أمر sudo"]
        labels: ["Sicherheit"]
      - q: "sudo chown -R www-data:www-data /var/www/html/"
        a: "تسليم جميع ملفات الموقع لمستخدم خادم الويب (خادم الويب يُسمى www-data)"
        rel:
          - ["chown-cmd", "Change Owner — تغيير مالك الملف", "أمر chown"]
          - ["chown-R", "Recursive — تغيير الملكية بشكل متكرر", "chown -R"]
          - ["www-data", "المستخدم الافتراضي لبرامج خادم الويب (Apache، Nginx)", "www-data"]
        labels: ["Sicherheit"]
      - q: "sudo -l"
        a: "يعرض أوامر sudo المسموح لك باستخدامها — مفيد على حواسيب جديدة"
        rel:
          - ["sudo-l", "List — عرض أوامر sudo المسموحة للمستخدم الحالي", "الخيار -l"]
        labels: ["Sicherheit"]
      - q: "sudo su -"
        a: "ينتقل إلى shell الـ root (بيئة مسؤول كاملة) — استخدم بحذر!"
        rel:
          - ["sudo-su", "الانتقال إلى shell الـ root — يستخدم بحذر", "sudo su -"]
        labels: ["Sicherheit"]

  - title: "اختبار الطرفية"
    image: "images/section-04-check.svg"
    explanation: |
      اختبر معلوماتك الآن!
    examples:
      - q: "ما هو الأمر الذي يجعل ملف 'deploy.sh' قابلاً للتنفيذ؟"
        type: input
        a: "chmod +x deploy.sh"
        labels: ["Sicherheit"]
      - q: "ماذا تعني الصلاحية '755'؟"
        type: select
        options:
          - text: "rwxr-xr-x — المالك كل شيء، المجموعة والآخرون قراءة+تنفيذ"
            correct: true
          - text: "rw-rw-rw- — الجميع يمكنهم القراءة والكتابة"
          - text: "rwx------ — المالك فقط لديه كل الصلاحيات"
          - text: "r--r--r-- — الجميع يمكنهم القراءة فقط"
        labels: ["Sicherheit"]
      - q: "ما هي القيمة الرقمية التي يجب أن يملكها مفتاح SSH الخاص؟"
        type: select
        options:
          - text: "600"
            correct: true
          - text: "755"
          - text: "777"
          - text: "644"
        labels: ["Sicherheit"]
      - q: "أيٌّ من هذه العبارات عن نظام صلاحيات لينكس صحيحة؟"
        type: multiple-choice
        options:
          - text: "r تعني read (قراءة)"
            correct: true
          - text: "x تعني execute (تنفيذ)"
            correct: true
          - text: "w تعني write (كتابة)"
            correct: true
          - text: "s تعني system (نظام)"
        labels: ["Sicherheit"]
