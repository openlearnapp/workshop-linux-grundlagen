version: 1
number: 10
title: "Vim ومحررات النصوص"
description: "nano للمبتدئين، vim للمحترفين — تحرير الملفات مباشرة في الطرفية"
sections:
  - title: "nano — البداية السهلة"
    explanation: |
      **لماذا هذا مهم؟** على الخوادم لا توجد واجهة رسومية.
      يجب عليك تحرير ملفات الإعداد مباشرة في الطرفية — `nano` هو
      الطريقة الأسهل، و `vim` هو الأقوى.

      **nano** يعرض في الأسفل جميع اختصارات لوحة المفاتيح المهمة:
      - `Ctrl+O` ثم `Enter`: حفظ (Write **O**ut)
      - `Ctrl+X`: خروج (e**X**it)
      - `Ctrl+W`: بحث (**W**here is)
      - `Ctrl+K`: قص سطر (**K**ut)
      - `Ctrl+U`: لصق (**U**ncut)
      - `Ctrl+G`: مساعدة (**G**et help)

      فتح nano وتحرير ملف فورًا:
      ```bash
      nano /etc/hosts
      sudo nano /etc/nginx/sites-available/default
      ```
    examples:
      - q: "nano ~/.bashrc"
        a: "تحرير إعدادات Bash بـ nano — Ctrl+O للحفظ، Ctrl+X للخروج"
        rel:
          - ["nano-cmd", "محرر نصوص سهل الاستخدام في الطرفية مع تلميحات لوحة المفاتيح", "أمر nano"]
          - ["nano-save", "Ctrl+O ثم Enter — حفظ الملف في nano", "nano Ctrl+O"]
      - q: "nano -l /etc/hosts"
        a: "تحرير ملف hosts مع أرقام الأسطر — مفيد للملفات الطويلة"
        rel:
          - ["nano-l", "Line numbers — عرض أرقام الأسطر في nano", "علم nano -l"]
      - q: "nano +50 app.conf"
        a: "يفتح nano مباشرة عند السطر ٥٠ — يوفر التمرير في الإعدادات الطويلة"
        rel:
          - ["nano-jump-line", "+N يفتح الملف مباشرة عند السطر N", "nano +رقم_السطر"]

  - title: "vim — محرر المحترفين"
    explanation: |
      **vim** (Vi Improved) قوي لكنه محير في البداية، لأنه يعتمد على **الأوضاع**:

      | الوضع | التفعيل | لأي غرض؟ |
      |-------|---------|----------|
      | **Normal** | `Esc` | التنقل، الأوامر |
      | **Insert** | `i`، `a`، `o` | إدخال النص |
      | **Visual** | `v`، `V` | تحديد النص |
      | **Command** | `:` | حفظ، خروج، بحث |

      **الأساسيات للبدء:**
      1. vim يفتح في وضع Normal
      2. اضغط `i` ← وضع Insert ← اكتب النص
      3. `Esc` ← العودة إلى وضع Normal
      4. `:w` ← حفظ
      5. `:q` ← خروج
      6. `:wq` ← حفظ وخروج
      7. `:q!` ← خروج بدون حفظ (إجبار)

      **لماذا تتعلم vim؟** لأنه مثبت مسبقًا على *كل* نظام لينكس. عندما تكون على
      خادم مثبت حديثًا، vim متاح دائمًا.
    examples:
      - q: "vim /etc/nginx/nginx.conf"
        a: "فتح إعدادات Nginx بـ vim — متاح دائمًا حتى على الخوادم البسيطة"
        rel:
          - ["vim-cmd", "Vi Improved — محرر نصوص قوي يعتمد على الأوضاع في الطرفية", "أمر vim"]
      - q: ":wq"
        a: "في vim: حفظ الملف (write) والخروج (quit) — يُدخل في وضع Command"
        rel:
          - ["vim-wq", "Write Quit — حفظ والخروج في vim", ":wq"]
          - ["vim-command-mode", "النقطتان : تُفعّل وضع Command في vim", "vim :"]
      - q: ":q!"
        a: "الخروج من vim بدون حفظ — ! يفرض العملية"
        rel:
          - ["vim-q-bang", "خروج بدون حفظ بالإجبار — تجاهل جميع التغييرات", ":q!"]
      - q: "i"
        a: "تفعيل وضع Insert — الآن يمكن إدخال النص"
        rel:
          - ["vim-insert", "i — الدخول إلى وضع Insert (قبل المؤشر)، a = بعد المؤشر", "vim i"]

  - title: "التنقل والبحث في vim"
    explanation: |
      في **وضع Normal** تتنقل بدون مفاتيح الأسهم (أكثر كفاءة!):

      | المفتاح | العملية |
      |---------|---------|
      | `h`، `j`، `k`، `l` | يسار، أسفل، أعلى، يمين |
      | `w` | الكلمة التالية للأمام |
      | `b` | الكلمة السابقة للخلف |
      | `0` | بداية السطر |
      | `$` | نهاية السطر |
      | `gg` | بداية الملف |
      | `G` | نهاية الملف |
      | `50G` | الانتقال إلى السطر ٥٠ |

      **البحث والاستبدال في vim:**
      ```
      /كلمة_بحث      ← بحث للأمام، n = النتيجة التالية
      ?كلمة_بحث      ← بحث للخلف
      :%s/قديم/جديد/g     ← استبدال جميع الحالات
      :%s/قديم/جديد/gc    ← استبدال مع تأكيد
      ```
    examples:
      - q: ":%s/localhost/example.com/g"
        a: "في vim: استبدال جميع حالات 'localhost' بـ 'example.com'"
        rel:
          - ["vim-substitute", ":%s/قديم/جديد/g — بحث واستبدال في الملف بالكامل", "vim :%s"]
          - ["vim-g-flag", "g = global — استبدال جميع الحالات في السطر", "علم Vim /g"]
      - q: "/ERROR"
        a: "في vim: البحث عن ERROR — n للنتيجة التالية، N للسابقة"
        rel:
          - ["vim-search", "/كلمة بحث للأمام في vim", "vim /"]
      - q: "dd"
        a: "في vim (وضع Normal): حذف السطر الحالي — p للصقه"
        rel:
          - ["vim-dd", "Delete — حذف سطر كامل في vim (وحفظه في المخزن المؤقت)", "vim dd"]
      - q: "yy"
        a: "في vim: نسخ السطر الحالي (yank) — p للصقه في المكان التالي"
        rel:
          - ["vim-yy", "Yank — نسخ سطر في vim", "vim yy"]
          - ["vim-p", "Put/Paste — لصق المحتوى المنسوخ/المحذوف", "vim p"]

  - title: "🖥️ اختبار الطرفية"
    explanation: |
      اختبر معرفتك الآن — أدخل الأوامر مباشرة!
    examples:
      - q: "أي أمر vim يحفظ ويخرج من المحرر؟"
        type: input
        a: ":wq"
      - q: "كيف تنتقل إلى وضع Insert في vim؟"
        type: select
        options:
          - text: "الضغط على مفتاح 'i'"
            correct: true
          - text: "الضغط على مفتاح 'Esc'"
          - text: "إدخال ':i'"
          - text: "الضغط على مفتاح 'v'"
      - q: "ماذا يفعل ':q!' في vim؟"
        type: select
        options:
          - text: "يخرج من vim بدون حفظ"
            correct: true
          - text: "يحفظ ويخرج من vim"
          - text: "يبحث عن الحرف !"
          - text: "يفتح ملفًا جديدًا"
      - q: "أي من أوضاع vim التالية موجودة فعلاً؟"
        type: multiple-choice
        options:
          - text: "وضع Normal"
            correct: true
          - text: "وضع Insert"
            correct: true
          - text: "وضع Visual"
            correct: true
          - text: "وضع Debug"
