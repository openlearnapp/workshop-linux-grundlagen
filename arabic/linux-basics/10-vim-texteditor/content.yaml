version: 2
number: 10
title: "Vim ومحررات النصوص"
description: "nano للمبتدئين، vim للمحترفين — تعديل الملفات مباشرةً في الطرفية"
image: "images/lesson-header.svg"
image_caption: "Vim-Interface mit Modus-Anzeigen (Normal, Insert, Visual, Command)"
sections:
  - title: "nano — محرر النصوص الودود"
    image: "images/section-01-nano.svg"
    explanation: |
      تخيل أنك على خادم بلا فأرة، بلا نوافذ —
      فقط الطرفية. وتحتاج تعديل ملف.

      لذلك يوجد **محررات نصوص للطرفية**.
      الأبسط يُسمى **nano**.
      تم تصميمه بحيث يستطيع المبتدئون العمل به فوراً.

      هكذا تفتح ملفاً بـ nano:
      ```
      nano meine-datei.txt
      ```

      في الحافة السفلية يعرض لك nano أهم اختصارات المفاتيح.
      الـ `^` تعني دائماً مفتاح `Ctrl`:
      - `Ctrl+O` ثم `Enter` — حفظ (O تعني "Output")
      - `Ctrl+X` — الخروج (X كـ "Exit")
      - `Ctrl+W` — البحث (W كـ "Where is this text?")
      - `Ctrl+K` — قص السطر (K كـ "Kill the line")
      - `Ctrl+U` — لصق المقصوص (U كـ "Uncut")
      - `Ctrl+G` — عرض المساعدة (G كـ "Get help")

      جرّبه ببساطة — nano متسامح جداً!
    examples:
      - q: "nano ~/.bashrc"
        a: "يفتح ملف إعدادات Bash — Ctrl+O للحفظ، Ctrl+X للخروج"
        rel:
          - ["nano-cmd", "محرر نصوص طرفية سهل الاستخدام مع تلميحات المفاتيح", "أمر nano"]
          - ["nano-save", "Ctrl+O ثم Enter — حفظ ملف في nano", "nano Ctrl+O"]
        labels: ["Editor", "Konfiguration"]
      - q: "nano -l /etc/hosts"
        a: "يفتح الملف ويعرض أرقام الأسطر — عملي للملفات الطويلة"
        rel:
          - ["nano-l", "Line numbers — عرض أرقام الأسطر في nano", "خيار nano -l"]
        labels: ["Editor"]
      - q: "nano +50 app.conf"
        a: "يفتح الملف مباشرةً عند السطر 50 — لا تحتاج التمرير كثيراً"
        rel:
          - ["nano-jump-line", "+N يفتح الملف مباشرةً عند السطر N", "nano +رقم السطر"]
        labels: ["Editor"]

  - title: "vim — محرر المحترفين"
    image: "images/section-02-vim.svg"
    explanation: |
      **vim** (Vi Improved — "vi مُحسَّن") محرر نصوص
      يبدو غريباً في البداية، لكنه سريع جداً.

      المميز: vim لديه **أوضاع** (حالات).
      هذا مثل لعبة فيديو —
      أحياناً تجري، أحياناً تقاتل، أحياناً تتحدث.

      أهم الأوضاع:
      - **الوضع العادي** — للتنقل وإعطاء الأوامر (الافتراضي عند البدء)
      - **وضع الإدخال** — لكتابة النصوص
      - **وضع الأوامر** — لأوامر مثل الحفظ والبحث

      أول خطواتك في vim، خطوةً خطوة:
      1. فتح vim: `vim meine-datei.txt`
      2. vim يبدأ في الوضع العادي — لا تستطيع كتابة نص بعد
      3. اضغط `i` — الآن أنت في وضع الإدخال، في الأسفل يظهر `-- INSERT --`
      4. اكتب نصك
      5. اضغط `Esc` — للعودة إلى الوضع العادي
      6. اكتب `:wq` — هذا يحفظ (w = write) وينهي (q = quit)

      أوامر طارئة مهمة في vim:
      - `:wq` — حفظ والإنهاء
      - `:q!` — الإنهاء بدون حفظ (! = إجبار)
      - `:w` — الحفظ فقط، بدون إنهاء

      لماذا تتعلم vim؟
      إنه مثبت مسبقاً على تقريباً كل نظام لينكس.
      عندما تكون على خادم جديد، vim دائماً موجود.
    examples:
      - q: "vim /etc/nginx/nginx.conf"
        a: "يفتح ملف إعدادات بـ vim — يعمل على كل نظام لينكس"
        rel:
          - ["vim-cmd", "Vi Improved — محرر نصوص طرفية نمطي قوي", "أمر vim"]
        labels: ["Editor", "Konfiguration"]
      - q: ":wq"
        a: "في vim: حفظ الملف وإنهاء المحرر — في وضع الأوامر ابدأ بـ :"
        rel:
          - ["vim-wq", "Write Quit — الحفظ والإنهاء في vim", ":wq"]
          - ["vim-command-mode", "النقطتان : تُفعّل وضع الأوامر في vim", "vim :"]
        labels: ["Editor"]
      - q: ":q!"
        a: "إنهاء vim بدون حفظ — الـ ! تعني 'أجبره، بغض النظر'"
        rel:
          - ["vim-q-bang", "Quit بدون حفظ بالإجبار — تجاهل جميع التغييرات", ":q!"]
        labels: ["Editor"]
      - q: "i"
        a: "ينتقل إلى وضع الإدخال — الآن يمكنك كتابة النص"
        rel:
          - ["vim-insert", "i — الانتقال إلى وضع الإدخال (قبل المؤشر)، a = بعد المؤشر", "vim i"]
        labels: ["Editor"]

  - title: "vim — التنقل والبحث"
    image: "images/section-03-vim-nav.svg"
    explanation: |
      في الوضع العادي يمكنك التنقل عبر الملف —
      حتى بدون مفاتيح الأسهم!

      مفاتيح **hjkl** هي للتنقل:
      - `h` — يساراً
      - `j` — للأسفل
      - `k` — للأعلى
      - `l` — يميناً

      يبدو هذا غريباً، لكن المحترفين يستخدمون هذه المفاتيح
      لأن الأصابع لا تحتاج مغادرة الصف الرئيسي.

      قفزات مفيدة أخرى:
      - `w` — القفز كلمة للأمام
      - `b` — القفز كلمة للخلف
      - `gg` — الانتقال إلى بداية الملف
      - `G` — الانتقال إلى نهاية الملف
      - `50G` — الانتقال إلى السطر 50

      **البحث في vim:**
      ```
      /fehler
      ```
      اكتب `/` ثم الكلمة — vim يقفز إلى أول نتيجة.
      بـ `n` تنتقل إلى النتيجة التالية.

      **الاستبدال في الملف بالكامل:**
      ```
      :%s/alt/neu/g
      ```
      هذا يعني: "استبدل في الملف بالكامل `:` كل `%s` تكرار لـ 'alt' بـ 'neu'، في كل مكان `g`."
    examples:
      - q: ":%s/localhost/example.com/g"
        a: "يستبدل في vim جميع تكرارات 'localhost' بـ 'example.com'"
        rel:
          - ["vim-substitute", ":%s/قديم/جديد/g — بحث واستبدال في الملف بالكامل", "vim :%s"]
          - ["vim-g-flag", "g = global — استبدال جميع التكرارات في سطر", "خيار Vim /g"]
        labels: ["Editor"]
      - q: "/ERROR"
        a: "يبحث في vim عن 'ERROR' — n للنتيجة التالية، N للسابقة"
        rel:
          - ["vim-search", "/مصطلح للبحث للأمام في vim", "vim /"]
        labels: ["Editor"]
      - q: "dd"
        a: "يحذف السطر الحالي في vim — يُخزَّن في الحافظة، p يُعيد إدراجه"
        rel:
          - ["vim-dd", "Delete — حذف سطر كامل في vim (وتخزينه في المخزن المؤقت)", "vim dd"]
        labels: ["Editor"]
      - q: "yy"
        a: "ينسخ السطر الحالي في vim (yank = نسخ) — p يلصقه بعدها"
        rel:
          - ["vim-yy", "Yank — نسخ سطر في vim", "vim yy"]
          - ["vim-p", "Put/Paste — لصق المحتوى المنسوخ/المحذوف", "vim p"]
        labels: ["Editor"]

  - title: "اختبار الطرفية"
    image: "images/section-04-check.svg"
    explanation: |
      اختبر معلوماتك الآن — أدخل الأوامر مباشرةً!
    examples:
      - q: "ما هو أمر vim الذي يحفظ الملف ويُنهي المحرر؟"
        type: input
        a: ":wq"
        labels: ["Editor"]
      - q: "كيف تنتقل إلى وضع الإدخال في vim؟"
        type: select
        options:
          - text: "اضغط المفتاح 'i'"
            correct: true
          - text: "اضغط المفتاح 'Esc'"
          - text: "أدخل ':i'"
          - text: "اضغط المفتاح 'v'"
        labels: ["Editor"]
      - q: "ماذا يفعل ':q!' في vim؟"
        type: select
        options:
          - text: "ينهي vim بدون حفظ"
            correct: true
          - text: "يحفظ وينهي vim"
          - text: "يبحث عن الرمز !"
          - text: "يفتح ملفاً جديداً"
        labels: ["Editor"]
      - q: "أيٌّ من هذه الأوضاع موجودة في vim؟"
        type: multiple-choice
        options:
          - text: "الوضع العادي"
            correct: true
          - text: "وضع الإدخال"
            correct: true
          - text: "الوضع المرئي"
            correct: true
          - text: "وضع التصحيح"
        labels: ["Editor"]
