version: 2
number: 12
title: "گردش کار حرفه‌ای لینوکس"
description: "Pipe‌ها، Redirect‌ها، Alias‌ها و xargs — خط فرمان را مثل یک حرفه‌ای استفاده کن"
image: "images/lesson-header.svg"
image_caption: "نمودار گردش کار با ترمینال، Git و SSH"
sections:
  - title: "Pipe‌ها — دستورات را به هم وصل کن"
    image: "images/section-01-pipes.svg"
    explanation: |
      تصور کن یک کارخانه با خط مونتاژ می‌سازی.
      هر ایستگاه دقیقاً یک کار انجام می‌دهد —
      و نتیجه به ایستگاه بعدی می‌رود.

      دقیقاً همین‌طور **Pipe‌ها** (لوله‌ها) در لینوکس کار می‌کنند.
      علامتش یک خط عمودی است: `|`

      مثال: می‌خواهی بدانی کدام پوشه بیشترین جا را می‌خورد.
      ```
      du -sh /home/* | sort -rh | head -5
      ```

      خط مونتاژ:
      1. `du -sh /home/*` → حجم هر پوشه را می‌سنجد
      2. `| sort -rh` → از بزرگ به کوچک مرتب می‌کند
      3. `| head -5` → فقط ۵ تای بالا را نشان می‌دهد

      این قدرت لینوکس است:
      ابزارهای کوچک، هر کدام برای یک کار — با هم خیلی قدرتمند.
      به این می‌گویند **Unix Philosophy** (فلسفه Unix — ایده پشت لینوکس و Unix).
    examples:
      - q: "ps aux | grep python | grep -v grep"
        a: "همه برنامه‌های Python در حال اجرا را نشان می‌دهد — grep دوم خودش را از لیست حذف می‌کند"
        rel:
          - ["pipe-operator", "| خروجی یک دستور را به عنوان ورودی به بعدی هدایت می‌کند", "Pipe |"]
          - ["grep-v-grep", "grep -v grep خط grep را از لیست پروسس‌ها حذف می‌کند", "grep -v grep"]
        labels: ["اسکریپت", "فرآیندها"]
      - q: "cat /var/log/nginx/access.log | awk '{print $1}' | sort | uniq -c | sort -rn | head -10"
        a: "۱۰ آدرس IP‌ای که بیشترین دفعه به وب‌سایت دسترسی داشتند را پیدا می‌کند"
        rel:
          - ["awk-ip", "awk '{print $1}' اولین فیلد (IP) هر خط را نشان می‌دهد", "awk print"]
          - ["uniq-c", "uniq -c خطوط یکسان پشت سرهم را می‌شمارد", "uniq -c"]
        labels: ["اسکریپت", "شبکه"]
      - q: "find /var/log -name \"*.log\" -mtime +30 | xargs ls -lh"
        a: "فایل‌های لاگ قدیمی‌تر از ۳۰ روز را پیدا می‌کند و حجمشان را نشان می‌دهد"
        rel:
          - ["find-cmd", "جستجوی فایل‌ها بر اساس معیارهای مختلف", "دستور find"]
          - ["find-mtime", "-mtime +30 = آخرین تغییر بیش از ۳۰ روز پیش", "find -mtime"]
          - ["xargs-cmd", "خروجی را به عنوان آرگومان به دستور بعدی می‌فرستد", "دستور xargs"]
        labels: ["اسکریپت", "فایل‌سیستم"]

  - title: "Redirect‌ها — خروجی را جای دیگر بفرست"
    image: "images/section-02-redirects.svg"
    explanation: |
      معمولاً هر چیزی که یک دستور خروجی می‌دهد، مستقیم در ترمینال نشان داده می‌شود.
      با **Redirect‌ها** (انحراف‌ها) می‌توانی این را تغییر دهی —
      و خروجی را در یک فایل بنویسی.

      علامتش فلش `>` است:
      ```
      ls -la > verzeichnis.txt
      ```
      حالا لیست نه در ترمینال، بلکه در فایل نوشته شده!

      مواظب باش: `>` همیشه فایل را بازنویسی می‌کند.
      با `>>` به جایش به انتها اضافه می‌کنی:
      ```
      echo "امروز همه چیز خوب بود" >> tagebuch.txt
      ```

      گاهی پیام‌های خطایی داری که می‌خواهی از دستت برود.
      "سیاهچاله" لینوکس `/dev/null` نام دارد —
      همه چیزی که آنجا برود، ناپدید می‌شود:
      ```
      find / -name "*.conf" 2>/dev/null
      ```
      `2>` پیام‌های خطا را منحرف می‌کند —
      فقط نتیجه‌های واقعی را می‌بینی، نه خطاها.
    examples:
      - q: "ls -la > verzeichnis.txt"
        a: "لیست پوشه را در یک فایل ذخیره می‌کند — اگر فایل وجود داشته باشد بازنویسی می‌کند"
        rel:
          - ["redirect-out", "> خروجی استاندارد را به فایل هدایت می‌کند (بازنویسی)", "Redirect >"]
        labels: ["اسکریپت", "فایل‌سیستم"]
      - q: "echo \"[$(date)] Server gestartet\" >> /var/log/myapp.log"
        a: "یک خط به انتهای فایل لاگ اضافه می‌کند — چیزی بازنویسی نمی‌شود"
        rel:
          - ["redirect-append", ">> خروجی را به فایل اضافه می‌کند (بدون بازنویسی)", "Redirect >>"]
        labels: ["اسکریپت"]
      - q: "find / -name \"*.conf\" 2>/dev/null"
        a: "دنبال فایل‌های پیکربندی می‌گردد — پیام‌های خطا به سیاهچاله فرستاده می‌شوند"
        rel:
          - ["dev-null", "/dev/null همه خروجی‌ها را دور می‌ریزد — سیاهچاله", "/dev/null"]
          - ["redirect-stderr", "2> خطای استاندارد (stderr) را منحرف می‌کند", "Redirect 2>"]
        labels: ["اسکریپت", "فایل‌سیستم"]
      - q: "wc -l < /etc/passwd"
        a: "خطوط /etc/passwd را می‌شمارد — فایل به عنوان ورودی استفاده می‌شود"
        rel:
          - ["redirect-input", "< محتوای فایل را به عنوان ورودی دستور استفاده می‌کند", "Redirect <"]
        labels: ["اسکریپت"]

  - title: "Alias‌ها و .bashrc — لینوکس را خانه کن"
    image: "images/section-03-bashrc.svg"
    explanation: |
      تصور کن هر روز یک‌سری دستورات طولانی یکسان تایپ می‌کنی.
      مثل این است که همیشه اسم کامل کسی را به جای لقبش بگویی.

      **Alias‌ها** (نام‌های کوتاه دستور) این مشکل را حل می‌کنند.
      می‌توانی دستورات طولانی را با یک نام کوتاه ذخیره کنی:
      ```
      alias ll='ls -la'
      ```
      از این به بعد `ll` به جای `ls -la` کافی است!

      این Alias‌ها را در فایل `~/.bashrc` ذخیره می‌کنی.
      این پیکربندی شخصی لینوکس توست —
      هر دفعه که ترمینال باز می‌شود بارگذاری می‌شود.

      چند Alias مفید برای .bashrc:
      ```
      alias ll='ls -la'
      alias update='sudo apt update && sudo apt upgrade -y'
      alias myip='curl -s https://ipinfo.io/ip'
      alias ..='cd ..'
      alias ...='cd ../..'
      alias gs='git status'
      ```

      بعد از ویرایش .bashrc باید دوباره بارگذاری شود:
      ```
      source ~/.bashrc
      ```
      `source` یعنی: "این فایل را بخوان و همه چیز را اعمال کن."
      بعد از آن Alias‌های جدیدت فوری در دسترس هستند.
    examples:
      - q: "alias ll='ls -la --color=auto'"
        a: "میانبر 'll' را می‌سازد — از این به بعد ll به جای ls -la --color=auto کافی است"
        rel:
          - ["alias-cmd", "ساخت میانبر برای دستورات پرکاربرد یا طولانی", "دستور alias"]
        labels: ["پیکربندی"]
      - q: "alias update='sudo apt update && sudo apt upgrade -y'"
        a: "به‌روزرسانی کامل سیستم را با یک کلمه قابل دسترسی می‌کند"
        rel:
          - ["alias-complex", "Alias برای زنجیره دستورات پیچیده — یک کلمه به جای دستور طولانی", "مثال Alias"]
        labels: ["پیکربندی"]
      - q: "source ~/.bashrc"
        a: "پیکربندی Bash را دوباره بارگذاری می‌کند — Alias‌های جدید فوری بدون راه‌اندازی مجدد ترمینال فعال می‌شوند"
        rel:
          - ["source-cmd", "بارگذاری فایل پیکربندی در Shell فعلی", "source / ."]
          - ["bashrc-reload", "بارگذاری مجدد ~/.bashrc بعد از تغییرات", "source ~/.bashrc"]
        labels: ["پیکربندی"]
      - q: "alias | grep git"
        a: "همه Alias‌هایی که کلمه 'git' دارند را نشان می‌دهد — alias بدون آرگومان همه را نشان می‌دهد"
        rel:
          - ["alias-list", "alias بدون آرگومان همه Alias‌های تعریف‌شده را لیست می‌کند", "alias بدون آرگومان"]
        labels: ["پیکربندی"]
      - q: "unalias ll"
        a: "Alias 'll' را حذف می‌کند — فقط برای جلسه ترمینال فعلی معتبر است"
        rel:
          - ["unalias-cmd", "حذف Alias تعریف‌شده", "دستور unalias"]
        labels: ["پیکربندی"]

  - title: "آزمون ترمینال"
    image: "images/section-04-check.svg"
    explanation: |
      حالا دانشت را امتحان کن — دستورات را مستقیماً وارد کن!
    examples:
      - q: "کدام علامت دو دستور را با Pipe به هم وصل می‌کند؟"
        type: input
        a: "|"
        labels: ["اسکریپت"]
      - q: "تفاوت '>>' با '>' چیست؟"
        type: select
        options:
          - text: ">> خروجی را به فایل اضافه می‌کند، > آن را بازنویسی می‌کند"
            correct: true
          - text: ">> فایل را بازنویسی می‌کند، > اضافه می‌کند"
          - text: ">> خطاها را منحرف می‌کند، > خروجی را منحرف می‌کند"
          - text: ">> و > یک کار می‌کنند"
        labels: ["اسکریپت"]
      - q: "چطور تغییرات در ~/.bashrc فوری اعمال می‌شوند؟"
        type: select
        options:
          - text: "source ~/.bashrc"
            correct: true
          - text: "reload ~/.bashrc"
          - text: "bash --refresh"
          - text: "apply ~/.bashrc"
        labels: ["پیکربندی"]
      - q: "کدام‌یک از این جملات درباره Alias‌ها و Pipe‌ها درست هستند؟"
        type: multiple-choice
        options:
          - text: "alias میانبر برای دستورات پرکاربرد می‌سازد"
            correct: true
          - text: "| خروجی را به عنوان ورودی به دستور بعدی هدایت می‌کند"
            correct: true
          - text: "/dev/null همه خروجی‌ها را دور می‌ریزد"
            correct: true
          - text: "source دستورات را برای همیشه در ترمینال ذخیره می‌کند"
        labels: ["اسکریپت", "پیکربندی"]
