<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210">
<defs><style>
.f{font-family:sans-serif}
.ti{animation:tia 11s infinite}@keyframes tia{0%,3%{opacity:0}7%,87%{opacity:1}92%,100%{opacity:0}}
.c1{animation:c1a 11s infinite}@keyframes c1a{0%,12%{opacity:0}18%,87%{opacity:1}92%,100%{opacity:0}}
.c2{animation:c2a 11s infinite}@keyframes c2a{0%,30%{opacity:0}36%,87%{opacity:1}92%,100%{opacity:0}}
.c3{animation:c3a 11s infinite}@keyframes c3a{0%,48%{opacity:0}54%,87%{opacity:1}92%,100%{opacity:0}}
.ft{animation:fta 11s infinite}@keyframes fta{0%,78%{opacity:0}82%,87%{opacity:1}92%,100%{opacity:0}}
</style></defs>
<rect width="640" height="210" rx="12" fill="#0d1117"/>
<rect width="640" height="48" rx="12" fill="#161b22"/>
<rect y="36" width="640" height="12" fill="#161b22"/>
<g class="ti">
  <text x="320" y="30" text-anchor="middle" class="f" font-size="13" font-weight="bold" fill="#e6edf3">Redirects — خروجی را به جای دیگری بفرست</text>
</g>
<g class="c1">
  <rect x="15" y="58" width="190" height="108" rx="8" fill="#1a0f08" stroke="#f0883e" stroke-width="1.5"/>
  <text x="110" y="85" text-anchor="middle" class="f" font-size="22">➡️</text>
  <text x="110" y="105" text-anchor="middle" class="f" font-size="11" font-weight="bold" fill="#f0883e">&gt;</text>
  <text x="110" y="121" text-anchor="middle" class="f" font-size="9" fill="#8b949e">در فایل بنویس</text>
  <text x="110" y="137" text-anchor="middle" class="f" font-size="8" fill="#f0883e" opacity="0.7">(بازنویسی می‌کند!)</text>
</g>
<g class="c2">
  <rect x="225" y="58" width="190" height="108" rx="8" fill="#0a1a0d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="320" y="85" text-anchor="middle" class="f" font-size="22">➡️</text>
  <text x="320" y="105" text-anchor="middle" class="f" font-size="11" font-weight="bold" fill="#3fb950">&gt;&gt;</text>
  <text x="320" y="121" text-anchor="middle" class="f" font-size="9" fill="#8b949e">به فایل اضافه کن</text>
  <text x="320" y="137" text-anchor="middle" class="f" font-size="8" fill="#3fb950" opacity="0.7">(به انتها اضافه می‌شود)</text>
</g>
<g class="c3">
  <rect x="435" y="58" width="190" height="108" rx="8" fill="#180a0a" stroke="#f85149" stroke-width="1.5"/>
  <text x="530" y="85" text-anchor="middle" class="f" font-size="22">❌</text>
  <text x="530" y="105" text-anchor="middle" class="f" font-size="11" font-weight="bold" fill="#f85149">2&gt;</text>
  <text x="530" y="121" text-anchor="middle" class="f" font-size="9" fill="#8b949e">پیام‌های خطا</text>
  <text x="530" y="137" text-anchor="middle" class="f" font-size="8" fill="#f85149" opacity="0.7">را هدایت کن</text>
</g>
<g class="ft">
  <rect x="20" y="178" width="600" height="24" rx="6" fill="#161b22"/>
  <text x="320" y="194" text-anchor="middle" class="f" font-size="10" fill="#8b949e">echo 'سلام' &gt; file.txt · echo 'بیشتر' &gt;&gt; file.txt</text>
</g>
</svg>
