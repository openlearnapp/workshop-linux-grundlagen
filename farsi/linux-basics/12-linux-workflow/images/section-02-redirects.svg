  <text x="288" y="67" font-family="monospace" font-size="9" fill="#e6edf3" opacity="0.95">cmd</text>
  <!-- Output redirect > -->
  <line x1="340" y1="55" x2="380" y2="45" stroke="#3fb950" stroke-width="1.5" opacity="0.8"/>
  <polyline points="374,42 382,44 378,52" fill="none" stroke="#3fb950" stroke-width="1.5" opacity="0.8"/>
  <rect x="385" y="35" width="40" height="18" rx="3" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="392" y="48" font-family="monospace" font-size="7" fill="#3fb950">file.txt</text>
  <!-- Error redirect 2> -->
