<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230">
<defs>
<style>
.f{font-family:sans-serif;}
.ti{animation:tia 11s infinite}@keyframes tia{0%,3%{opacity:0}7%,87%{opacity:1}92%,100%{opacity:0}}
.c1{animation:c1a 11s infinite}@keyframes c1a{0%,12%{opacity:0}18%,87%{opacity:1}92%,100%{opacity:0}}
.c2{animation:c2a 11s infinite}@keyframes c2a{0%,30%{opacity:0}36%,87%{opacity:1}92%,100%{opacity:0}}
.c3{animation:c3a 11s infinite}@keyframes c3a{0%,48%{opacity:0}54%,87%{opacity:1}92%,100%{opacity:0}}
.c4{animation:c4a 11s infinite}@keyframes c4a{0%,65%{opacity:0}71%,87%{opacity:1}92%,100%{opacity:0}}
.ft{animation:fta 11s infinite}@keyframes fta{0%,78%{opacity:0}82%,87%{opacity:1}92%,100%{opacity:0}}
</style>
</defs>
<rect width="640" height="230" rx="12" fill="#0d1117"/>
<rect width="640" height="60" rx="12" fill="#161b22"/>
<rect y="48" width="640" height="12" fill="#161b22"/>
<g class="ti">
  <text x="320" y="26" text-anchor="middle" class="f" font-size="13" font-weight="bold" fill="#e6edf3">توزیع‌های لینوکس (Distros)</text>
  <text x="320" y="44" text-anchor="middle" class="f" font-size="10" fill="#8b949e">همه هسته یکسانی دارند — مثل ماشین‌های مختلف با یک موتور</text>
</g>
<g class="c1">
  <rect x="10" y="70" width="143" height="118" rx="8" fill="#1a0f08" stroke="#f0883e" stroke-width="1.5"/>
  <text x="81" y="96" text-anchor="middle" class="f" font-size="22">🟠</text>
  <text x="81" y="116" text-anchor="middle" class="f" font-size="13" font-weight="bold" fill="#f0883e">Ubuntu</text>
  <text x="81" y="132" text-anchor="middle" class="f" font-size="10" fill="#8b949e">برای مبتدیان</text>
  <text x="81" y="147" text-anchor="middle" class="f" font-size="10" fill="#f0883e">★★★★★</text>
  <text x="81" y="163" text-anchor="middle" class="f" font-size="9" fill="#8b949e" opacity="0.7">پیشنهاد اول!</text>
</g>
<g class="c2">
  <rect x="162" y="70" width="143" height="118" rx="8" fill="#0d1520" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="233" y="96" text-anchor="middle" class="f" font-size="22">🔵</text>
  <text x="233" y="116" text-anchor="middle" class="f" font-size="13" font-weight="bold" fill="#58a6ff">Debian</text>
  <text x="233" y="132" text-anchor="middle" class="f" font-size="10" fill="#8b949e">برای سرورها</text>
  <text x="233" y="147" text-anchor="middle" class="f" font-size="10" fill="#8b949e">بسیار پایدار</text>
</g>
<g class="c3">
  <rect x="314" y="70" width="143" height="118" rx="8" fill="#180a0a" stroke="#f85149" stroke-width="1.5"/>
  <text x="385" y="96" text-anchor="middle" class="f" font-size="22">🍓</text>
  <text x="385" y="116" text-anchor="middle" class="f" font-size="12" font-weight="bold" fill="#f85149">Raspberry Pi OS</text>
  <text x="385" y="132" text-anchor="middle" class="f" font-size="10" fill="#8b949e">برای مینی‌کامپیوتر</text>
  <text x="385" y="147" text-anchor="middle" class="f" font-size="10" fill="#8b949e">سازندگان و IoT</text>
</g>
<g class="c4">
  <rect x="466" y="70" width="163" height="118" rx="8" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
  <text x="547" y="96" text-anchor="middle" class="f" font-size="22">🔐</text>
  <text x="547" y="116" text-anchor="middle" class="f" font-size="13" font-weight="bold" fill="#6e7681">Kali Linux</text>
  <text x="547" y="132" text-anchor="middle" class="f" font-size="10" fill="#8b949e">برای متخصصان امنیت</text>
  <text x="547" y="147" text-anchor="middle" class="f" font-size="10" fill="#6e7681">⚠ ابتدا اصول را بیاموز!</text>
</g>
<g class="ft">
  <rect x="10" y="198" width="620" height="22" rx="4" fill="#161b22"/>
  <text x="320" y="213" text-anchor="middle" class="f" font-size="10" fill="#8b949e">در این دوره دستوراتی می‌آموزی که روی همه توزیع‌های لینوکس کار می‌کنند!</text>
</g>
</svg>
