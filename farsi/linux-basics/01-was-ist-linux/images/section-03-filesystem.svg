<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230">
<defs>
<style>
.f{font-family:sans-serif;}
.ti{animation:tia 11s infinite}@keyframes tia{0%,3%{opacity:0}7%,87%{opacity:1}92%,100%{opacity:0}}
.c1{animation:c1a 11s infinite}@keyframes c1a{0%,12%{opacity:0}18%,87%{opacity:1}92%,100%{opacity:0}}
.c2{animation:c2a 11s infinite}@keyframes c2a{0%,30%{opacity:0}36%,87%{opacity:1}92%,100%{opacity:0}}
.c3{animation:c3a 11s infinite}@keyframes c3a{0%,48%{opacity:0}54%,87%{opacity:1}92%,100%{opacity:0}}
.c4{animation:c4a 11s infinite}@keyframes c4a{0%,65%{opacity:0}71%,87%{opacity:1}92%,100%{opacity:0}}
.ft{animation:fta 11s infinite}@keyframes fta{0%,78%{opacity:0}82%,87%{opacity:1}92%,100%{opacity:0}}
</style>
</defs>
<rect width="640" height="230" rx="12" fill="#0d1117"/>
<rect width="640" height="52" rx="12" fill="#161b22"/>
<rect y="40" width="640" height="12" fill="#161b22"/>
<g class="ti">
  <text x="320" y="32" text-anchor="middle" class="f" font-size="13" font-weight="bold" fill="#e6edf3">سیستم فایل لینوکس — همه چیز جای خود دارد</text>
</g>
<!-- Root node -->
<g class="c1">
  <rect x="270" y="60" width="100" height="36" rx="6" fill="#1a0f08" stroke="#f0883e" stroke-width="2"/>
  <text x="320" y="74" text-anchor="middle" class="f" font-size="15" font-weight="bold" fill="#f0883e">/</text>
  <text x="320" y="88" text-anchor="middle" class="f" font-size="9" fill="#8b949e">ریشه درخت</text>
</g>
<!-- Tree lines -->
<g class="c2">
  <line x1="320" y1="96" x2="320" y2="108" stroke="#30363d" stroke-width="1.5"/>
  <line x1="70" y1="108" x2="570" y2="108" stroke="#30363d" stroke-width="1.5"/>
  <line x1="70" y1="108" x2="70" y2="120" stroke="#30363d" stroke-width="1.5"/>
  <line x1="195" y1="108" x2="195" y2="120" stroke="#30363d" stroke-width="1.5"/>
  <line x1="320" y1="108" x2="320" y2="120" stroke="#30363d" stroke-width="1.5"/>
  <line x1="445" y1="108" x2="445" y2="120" stroke="#30363d" stroke-width="1.5"/>
  <line x1="570" y1="108" x2="570" y2="120" stroke="#30363d" stroke-width="1.5"/>
  <!-- /home node -->
  <rect x="22" y="120" width="95" height="46" rx="6" fill="#0d1520" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="70" y="137" text-anchor="middle" class="f" font-size="11" font-weight="bold" fill="#58a6ff">/home</text>
  <text x="70" y="150" text-anchor="middle" class="f" font-size="9" fill="#8b949e">پوشه شخصی تو</text>
  <text x="70" y="161" text-anchor="middle" class="f" font-size="9" fill="#58a6ff">(~)</text>
</g>
<g class="c3">
  <!-- /etc node -->
  <rect x="147" y="120" width="95" height="46" rx="6" fill="#0a1a0d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="195" y="137" text-anchor="middle" class="f" font-size="11" font-weight="bold" fill="#3fb950">/etc</text>
  <text x="195" y="150" text-anchor="middle" class="f" font-size="9" fill="#8b949e">فایل‌های تنظیمات</text>
  <text x="195" y="161" text-anchor="middle" class="f" font-size="9" fill="#3fb950">تنظیمات سیستم</text>
  <!-- /bin node -->
  <rect x="272" y="120" width="95" height="46" rx="6" fill="#1a0f08" stroke="#f0883e" stroke-width="1.5"/>
  <text x="320" y="137" text-anchor="middle" class="f" font-size="11" font-weight="bold" fill="#f0883e">/bin</text>
  <text x="320" y="150" text-anchor="middle" class="f" font-size="9" fill="#8b949e">برنامه‌ها</text>
  <text x="320" y="161" text-anchor="middle" class="f" font-size="9" fill="#f0883e">ls, cd, ...</text>
</g>
<g class="c4">
  <!-- /tmp node -->
  <rect x="397" y="120" width="95" height="46" rx="6" fill="#180a0a" stroke="#f85149" stroke-width="1.5"/>
  <text x="445" y="137" text-anchor="middle" class="f" font-size="11" font-weight="bold" fill="#f85149">/tmp</text>
  <text x="445" y="150" text-anchor="middle" class="f" font-size="9" fill="#8b949e">فایل‌های موقت</text>
  <text x="445" y="161" text-anchor="middle" class="f" font-size="9" fill="#f85149">پاک می‌شوند</text>
  <!-- /dev node -->
  <rect x="522" y="120" width="95" height="46" rx="6" fill="#110d1a" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="570" y="137" text-anchor="middle" class="f" font-size="11" font-weight="bold" fill="#bc8cff">/dev</text>
  <text x="570" y="150" text-anchor="middle" class="f" font-size="9" fill="#8b949e">دستگاه‌ها</text>
  <text x="570" y="161" text-anchor="middle" class="f" font-size="9" fill="#bc8cff">USB, ...</text>
</g>
<g class="ft">
  <rect x="10" y="178" width="620" height="40" rx="6" fill="#161b22"/>
  <text x="320" y="196" text-anchor="middle" class="f" font-size="10" fill="#8b949e">~ میانبری برای پوشه خانگی تو است</text>
  <text x="320" y="211" text-anchor="middle" class="f" font-size="10" fill="#58a6ff">امتحان کن: ls /</text>
</g>
</svg>
