<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210">
<defs>
<style>
.f{font-family:sans-serif;}
.ti{animation:tia 11s infinite}@keyframes tia{0%,3%{opacity:0}7%,87%{opacity:1}92%,100%{opacity:0}}
.c1{animation:c1a 11s infinite}@keyframes c1a{0%,12%{opacity:0}18%,87%{opacity:1}92%,100%{opacity:0}}
.c2{animation:c2a 11s infinite}@keyframes c2a{0%,30%{opacity:0}36%,87%{opacity:1}92%,100%{opacity:0}}
.c3{animation:c3a 11s infinite}@keyframes c3a{0%,48%{opacity:0}54%,87%{opacity:1}92%,100%{opacity:0}}
.ft{animation:fta 11s infinite}@keyframes fta{0%,78%{opacity:0}82%,87%{opacity:1}92%,100%{opacity:0}}
</style>
</defs>
<rect width="640" height="210" rx="12" fill="#0d1117"/>
<rect width="640" height="52" rx="12" fill="#161b22"/>
<rect y="40" width="640" height="12" fill="#161b22"/>
<g class="ti">
  <text x="320" y="32" text-anchor="middle" class="f" font-size="13" font-weight="bold" fill="#e6edf3">لینوکس — نرم‌افزاری که همه چیز را کنترل می‌کند</text>
</g>
<g class="c1">
  <rect x="20" y="62" width="185" height="108" rx="8" fill="#0d1520" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="112" y="90" text-anchor="middle" class="f" font-size="24">💻</text>
  <text x="112" y="112" text-anchor="middle" class="f" font-size="13" font-weight="bold" fill="#58a6ff">سیستم‌عامل</text>
  <text x="112" y="128" text-anchor="middle" class="f" font-size="10" fill="#8b949e">مثل ویندوز</text>
  <text x="112" y="143" text-anchor="middle" class="f" font-size="10" fill="#8b949e">رایگان و متن‌باز</text>
</g>
<g class="c2">
  <rect x="228" y="62" width="185" height="108" rx="8" fill="#0a1a0d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="320" y="90" text-anchor="middle" class="f" font-size="24">🔓</text>
  <text x="320" y="112" text-anchor="middle" class="f" font-size="13" font-weight="bold" fill="#3fb950">متن‌باز</text>
  <text x="320" y="128" text-anchor="middle" class="f" font-size="10" fill="#8b949e">همه می‌توانند</text>
  <text x="320" y="143" text-anchor="middle" class="f" font-size="10" fill="#8b949e">استفاده کنند و تغییر دهند</text>
</g>
<g class="c3">
  <rect x="435" y="62" width="185" height="108" rx="8" fill="#1a0f08" stroke="#f0883e" stroke-width="1.5"/>
  <text x="527" y="90" text-anchor="middle" class="f" font-size="24">🌍</text>
  <text x="527" y="112" text-anchor="middle" class="f" font-size="13" font-weight="bold" fill="#f0883e">همه‌جا هست</text>
  <text x="527" y="128" text-anchor="middle" class="f" font-size="10" fill="#8b949e">۹۶٪ سرورها</text>
  <text x="527" y="143" text-anchor="middle" class="f" font-size="10" fill="#8b949e">اندروید · اینترنت اشیا</text>
</g>
<g class="ft">
  <rect x="20" y="182" width="600" height="18" rx="4" fill="#161b22"/>
  <text x="320" y="195" text-anchor="middle" class="f" font-size="10" fill="#8b949e">لینوکس روی بیشتر دستگاه‌ها از هر سیستم‌عامل دیگری اجرا می‌شود</text>
</g>
</svg>
