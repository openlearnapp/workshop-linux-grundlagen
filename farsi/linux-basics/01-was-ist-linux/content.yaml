version: 2
number: 1
title: "لینوکس چیست؟"
description: "تاریخچه، توزیع‌ها و دلیل اینکه لینوکس ۹۶٪ سرورهای جهان را اجرا می‌کند"
image: "images/lesson-header.svg"
sections:
  - title: "یک دانشجو که دنیا را تغییر داد"
    image: "images/section-01-history.svg"
    explanation: |
      در سال **۱۹۹۱** یک دانشجوی ۲۱ ساله رشته کامپیوتر در دانشگاه هلسینکی
      یک ایمیل نوشت که دنیا را تغییر داد:

      > *"من دارم یک سیستم‌عامل آزاد می‌سازم (فقط یک سرگرمی، قرار نیست بزرگ و حرفه‌ای مثل
      > GNU بشود)"* — لینوس توروالدز، ۲۵ آگوست ۱۹۹۱

      امروز، بیش از ۳۰ سال بعد، **لینوکس** روی این‌ها اجرا می‌شود:
      - **۹۶٪** از تمام وب‌سرورهای جهان
      - **۱۰۰٪** از سریع‌ترین ابررایانه‌ها
      - میلیاردها گوشی اندرویدی
      - تلویزیون‌های هوشمند، روترها، خودروها، ایستگاه‌های فضایی

      **چرا این مهم است؟** کسی که لینوکس را بفهمد، زیرساخت اینترنت را می‌فهمد.
      هر کلیک، هر وبسایت، هر اپلیکیشن در نهایت روی یک سرور لینوکسی اجرا می‌شود.
    examples:
      - q: "uname -r"
        a: "نسخه فعلی Kernel لینوکس را نشان می‌دهد (مثلاً 5.15.0-91-generic)"
        rel:
          - ["uname", "Unix Name — نمایش اطلاعات سیستم", "دستور"]
          - ["uname-r", "نمایش نسخه انتشار Kernel", "فلگ -r = release"]
        labels: ["مبانی"]
      - q: "uname -a"
        a: "تمام اطلاعات سیستم را یکجا نشان می‌دهد: Kernel، نام میزبان، معماری"
        rel:
          - ["uname-a", "نمایش تمام اطلاعات سیستم (All)", "فلگ -a = all"]
        labels: ["مبانی"]
      - q: "cat /etc/os-release"
        a: "نشان می‌دهد کدام توزیع لینوکس و چه نسخه‌ای نصب شده است"
        rel:
          - ["os-release", "فایل حاوی اطلاعات توزیع و نسخه", "/etc/os-release"]
          - ["cat-cmd", "نمایش محتوای فایل در ترمینال", "دستور cat"]
        labels: ["مبانی", "فایل‌سیستم"]

  - title: "توزیع‌ها — لینوکس برای هر کاری"
    image: "images/section-02-distros.svg"
    explanation: |
      لینوکس یک سیستم‌عامل واحد نیست، بلکه یک **هسته (Kernel)** است که
      شرکت‌ها و جوامع مختلف سیستم‌های کامل را بر اساس آن ساخته‌اند.
      به اینها **توزیع** (Distribution یا Distro) می‌گویند.

      | توزیع | نقطه قوت | مخاطب هدف |
      |-------------|--------|------------|
      | **Ubuntu** | نصب آسان، پشتیبانی زیاد | مبتدیان، دسکتاپ |
      | **Debian** | پایداری، پشتیبانی طولانی‌مدت | سرور، مدیران سیستم |
      | **Fedora** | جدیدترین نرم‌افزارها | توسعه‌دهندگان |
      | **Arch Linux** | حداکثر کنترل | کاربران حرفه‌ای |
      | **Kali Linux** | ابزارهای امنیتی از پیش نصب‌شده | تست نفوذ |
      | **Raspberry Pi OS** | بهینه‌شده برای مینی‌کامپیوتر | سازندگان، IoT |

      **تفاوت اصلی با Windows/macOS:** لینوکس **متن‌باز (Open Source)** است —
      هر کسی می‌تواند کد منبع را بخواند، تغییر دهد و توزیع کند.
    examples:
      - q: "lsb_release -a"
        a: "توزیع و نسخه دقیق را نشان می‌دهد (مثلاً Ubuntu 22.04 LTS)"
        rel:
          - ["lsb-release", "نمایش اطلاعات Linux Standard Base", "دستور lsb_release"]
          - ["lsb-a-flag", "نمایش تمام اطلاعات LSB موجود", "فلگ -a"]
        labels: ["مبانی"]
      - q: "hostnamectl"
        a: "نام میزبان، سیستم‌عامل، Kernel و معماری را به شکل مرتب نشان می‌دهد"
        rel:
          - ["hostnamectl", "مدیریت نام میزبان و اطلاعات سیستم", "دستور"]
        labels: ["مبانی"]
      - q: "arch"
        a: "معماری پردازنده را نمایش می‌دهد (مثلاً x86_64 برای سیستم ۶۴ بیتی)"
        rel:
          - ["arch-cmd", "نمایش معماری پردازنده", "دستور arch"]
          - ["x86-64", "معماری ۶۴ بیتی Intel/AMD، امروزه استاندارد", "معماری"]
        labels: ["مبانی"]

  - title: "سیستم فایل لینوکس — همه چیز یک فایل است"
    image: "images/section-03-filesystem.svg"
    explanation: |
      لینوکس از یک فلسفه پیروی می‌کند: **همه چیز یک فایل است** — حتی دستگاه‌ها، پروسس‌ها و
      اتصالات شبکه به صورت فایل نمایش داده می‌شوند.

      سیستم فایل همیشه از `/` (Root — ریشه) شروع می‌شود:

      | پوشه | محتوا |
      |--------|--------|
      | `/home` | پوشه‌های شخصی کاربران |
      | `/etc` | فایل‌های پیکربندی سیستم |
      | `/bin`, `/usr/bin` | برنامه‌های اجرایی (دستورات) |
      | `/var/log` | فایل‌های لاگ (گزارش‌های سیستم) |
      | `/tmp` | فایل‌های موقت، با راه‌اندازی مجدد پاک می‌شوند |
      | `/dev` | فایل‌های دستگاه (هارددیسک، USB و غیره) |

      علامت تیلدا `~` میانبری برای پوشه خانگی شماست:
      `/home/user` می‌شود `~`
    examples:
      - q: "ls /"
        a: "محتوای پوشه Root را نشان می‌دهد — بالاترین سطح سیستم فایل"
        rel:
          - ["ls-cmd", "List — نمایش محتوای پوشه", "دستور ls"]
          - ["root-dir", "بالاترین پوشه سیستم فایل لینوکس", "/ (Root)"]
        labels: ["فایل‌سیستم"]
      - q: "ls /etc | head -5"
        a: "۵ مورد اول پوشه پیکربندی /etc را لیست می‌کند"
        rel:
          - ["etc-dir", "فایل‌های پیکربندی سیستم", "پوشه /etc"]
          - ["pipe-head", "ارسال خروجی از طریق pipe به head", "| head -5"]
        labels: ["فایل‌سیستم", "پیکربندی"]
      - q: "echo $HOME"
        a: "مسیر پوشه خانگی شما را نمایش می‌دهد (مثلاً /home/alice)"
        rel:
          - ["echo-cmd", "نمایش متن یا متغیر در ترمینال", "دستور echo"]
          - ["home-var", "متغیر محیطی حاوی مسیر پوشه خانگی", "$HOME"]
        labels: ["فایل‌سیستم", "مبانی"]

  - title: "🖥️ آزمون ترمینال"
    image: "images/section-04-check.svg"
    explanation: |
      حالا دانش خود را تست کنید — دستورات را مستقیماً وارد کنید!
    examples:
      - q: "کدام دستور نسخه فعلی Kernel لینوکس را نشان می‌دهد؟"
        type: input
        a: "uname -r"
        labels: ["مبانی"]
      - q: "دستور 'lsb_release -a' چه کاری انجام می‌دهد؟"
        type: select
        options:
          - text: "توزیع و نسخه دقیق را نشان می‌دهد"
            correct: true
          - text: "تمام فایل‌های لاگ را پاک می‌کند"
          - text: "Kernel لینوکس را به‌روزرسانی می‌کند"
          - text: "سیستم را راه‌اندازی مجدد می‌کند"
        labels: ["مبانی"]
      - q: "کدام دستور نشان می‌دهد که چه توزیع لینوکسی نصب شده است؟"
        type: select
        options:
          - text: "cat /etc/os-release"
            correct: true
          - text: "cat /etc/passwd"
          - text: "ls /usr/bin"
          - text: "echo $PATH"
        labels: ["مبانی"]
      - q: "کدام‌یک از این جملات درباره لینوکس درست هستند؟"
        type: multiple-choice
        options:
          - text: "لینوکس متن‌باز (Open Source) است"
            correct: true
          - text: "لینوکس روی ۹۶٪ از وب‌سرورها اجرا می‌شود"
            correct: true
          - text: "لینوکس فقط یک توزیع دارد"
          - text: "اندروید بر پایه لینوکس ساخته شده است"
            correct: true
        labels: ["مبانی"]
