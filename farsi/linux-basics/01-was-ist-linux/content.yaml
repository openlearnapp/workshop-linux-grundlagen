version: 2
number: 1
title: "لینوکس چیست؟"
description: "یاد بگیر لینوکس چیست، کجاها استفاده می‌شود و چطور همین الان می‌توانی آن را امتحان کنی"
image: "images/lesson-header.svg"
image_caption: "پنگوئن Tux با رک‌های سرور"
sections:
  - title: "لینوکس — نرم‌افزاری که همه چیز را کنترل می‌کند"
    image: "images/section-01-history.svg"
    explanation: |
      **لینوکس** یک سیستم‌عامل است.

      سیستم‌عامل (به انگلیسی: OS یا Operating System) مهم‌ترین
      نرم‌افزار روی کامپیوتر توست. این نرم‌افزار مطمئن می‌شود که همه چیز کار می‌کند:
      که بتوانی تایپ کنی، برنامه‌ها اجرا شوند و صفحه‌نمایش روشن باشد.

      ویندوز و macOS هم سیستم‌عامل هستند. لینوکس یه گزینه دیگه‌ست —
      با یه مزیت بزرگ:

      لینوکس **رایگان** است و همه می‌توانند از آن استفاده کنند، تغییرش دهند و به دیگران بدهند.
      به این می‌گویند **متن‌باز (Open Source)** — یعنی نقشه ساختارش برای همه قابل مشاهده است.

      لینوکس همه جا هست — حتی اگر ندانی:
      - تقریباً همه **وب‌سایت‌ها** روی سرورهای لینوکسی اجرا می‌شوند (سرور یعنی کامپیوتری که ۲۴ ساعته روشن است و داده می‌دهد)
      - **گوشی‌های اندرویدی** بر پایه لینوکس هستند
      - **تلویزیون‌های هوشمند**، ماشین‌های لباسشویی، ماشین‌ها — اغلب لینوکس دارند!
      - **Raspberry Pi** (یک مینی‌کامپیوتر حدود ۳۵ دلاری) با لینوکس اجرا می‌شود

      عالیه! حالا می‌دانی لینوکس چیست.
    examples:
      - q: "uname -r"
        a: "نسخه Kernel لینوکس را نشان می‌دهد (مثلاً 5.15.0-91-generic) — Kernel قلب تپنده لینوکس است"
        rel:
          - ["uname", "Unix Name — نمایش اطلاعات سیستم", "دستور"]
          - ["uname-r", "نمایش نسخه انتشار Kernel", "فلگ -r = release"]
        labels: ["مبانی"]
      - q: "uname -a"
        a: "همه اطلاعات سیستم را یک‌جا نشان می‌دهد: نسخه Kernel، نام کامپیوتر و بیشتر"
        rel:
          - ["uname-a", "نمایش تمام اطلاعات سیستم (All)", "فلگ -a = all"]
        labels: ["مبانی"]
      - q: "cat /etc/os-release"
        a: "نشان می‌دهد کدام نسخه لینوکس نصب شده است (مثلاً Ubuntu 22.04)"
        rel:
          - ["os-release", "فایل حاوی اطلاعات توزیع و نسخه", "/etc/os-release"]
          - ["cat-cmd", "نمایش محتوای فایل در ترمینال", "دستور cat"]
        labels: ["مبانی", "فایل‌سیستم"]

  - title: "لینوکس را همین الان امتحان کن — بدون نصب"
    image: "images/section-02-try-linux.svg"
    explanation: |
      لازم نیست چیزی نصب کنی تا لینوکس را امتحان کنی!

      **مستقیم در مرورگر (توصیه‌شده برای مبتدیان):**

      برو به **webminal.org** — این یک ترمینال واقعی لینوکس است
      که مستقیم در مرورگر اجرا می‌شود. رایگان، بدون نصب، همین الان شروع کن!

      **در ویندوز:**

      جستجو را باز کن (کلید ویندوز)، بنویس "PowerShell" و وارد کن:
      ```
      wsl --install
      ```
      این Ubuntu (یک توزیع محبوب لینوکس) را مستقیماً در ویندوز نصب می‌کند.
      بعد از آن می‌توانی Ubuntu را مثل یک برنامه عادی باز کنی!

      **در Mac:**

      ترمینال را باز کن (Finder ← برنامه‌ها ← ابزارها ← Terminal).
      macOS خیلی شبیه لینوکس است — تقریباً همه دستورات این دوره کار می‌کنند!

      **پیشنهاد:** با **webminal.org** شروع کن.
      بدون ریسک، بدون دانلود — فقط شروع کن!
    examples:
      - q: "uname -s"
        a: "سیستم‌عامل را نشان می‌دهد — در لینوکس: 'Linux'، در macOS: 'Darwin'"
        rel:
          - ["uname-s", "نام سیستم — نشان می‌دهد لینوکس، Darwin (macOS) و غیره", "فلگ -s = system"]
        labels: ["مبانی"]
      - q: "wsl --install"
        a: "WSL2 (Windows Subsystem for Linux) و Ubuntu را روی ویندوز نصب می‌کند — لینوکس در ویندوز!"
        rel:
          - ["wsl-install", "نصب WSL2 و Ubuntu روی ویندوز ۱۰/۱۱", "دستور Windows PowerShell"]
          - ["wsl2", "زیرسیستم ویندوز برای لینوکس — لینوکس مستقیم در ویندوز", "WSL2"]
        labels: ["مبانی", "نصب"]
      - q: "bash --version"
        a: "نسخه Bash نصب‌شده را نشان می‌دهد — Bash برنامه‌ای است که دستوراتت را می‌فهمد"
        rel:
          - ["bash-version", "نمایش نسخه Shell نصب‌شده Bash", "دستور bash --version"]
          - ["bash-shell", "Bash — برنامه‌ای که دستورات را در ترمینال دریافت و اجرا می‌کند", "Shell"]
        labels: ["مبانی"]

  - title: "توزیع‌های لینوکس — برای هر کسی چیزی"
    image: "images/section-02-distros.svg"
    explanation: |
      لینوکس در نسخه‌های زیادی وجود دارد. به آن‌ها **توزیع‌ها**
      (Distribution) یا به اختصار Distro می‌گویند.

      تصور کن: Kernel لینوکس (بخش داخلی که سخت‌افزار را کنترل می‌کند)
      مثل یک موتور است. تیم‌های مختلف ماشین‌های متفاوتی دور آن می‌سازند.

      مشهورترین توزیع‌های لینوکس:

      | نام | برای چه کسی؟ |
      |------|----------|
      | **Ubuntu** | عالی برای مبتدیان — کمک زیاد آنلاین، نصب آسان |
      | **Debian** | خیلی پایدار — معمولاً روی سرورها استفاده می‌شود |
      | **Raspberry Pi OS** | مخصوص مینی‌کامپیوتر Raspberry Pi |
      | **Kali Linux** | برای تحقیقات امنیتی (ابتدا اصول را یاد بگیر!) |

      در این دوره دستوراتی یاد می‌گیری که روی **همه** توزیع‌های لینوکس کار می‌کنند.
      این جالب‌ترین بخشش است: یک بار یاد بگیر، همه جا استفاده کن!
    examples:
      - q: "lsb_release -a"
        a: "نشان می‌دهد کدام توزیع لینوکس و کدام نسخه نصب شده است"
        rel:
          - ["lsb-release", "نمایش اطلاعات Linux Standard Base", "دستور lsb_release"]
          - ["lsb-a-flag", "نمایش تمام اطلاعات LSB موجود", "فلگ -a"]
        labels: ["مبانی"]
      - q: "hostnamectl"
        a: "نام کامپیوتر، سیستم‌عامل و نسخه Kernel را به شکل مرتب نشان می‌دهد"
        rel:
          - ["hostnamectl", "مدیریت نام میزبان و اطلاعات سیستم", "دستور"]
        labels: ["مبانی"]
      - q: "arch"
        a: "نوع پردازنده را نشان می‌دهد — مثلاً x86_64 یعنی: کامپیوتر ۶۴ بیتی (PC/لپتاپ معمولی)"
        rel:
          - ["arch-cmd", "نمایش معماری پردازنده", "دستور arch"]
          - ["x86-64", "معماری ۶۴ بیتی Intel/AMD، امروزه استاندارد در PC و لپتاپ", "معماری"]
        labels: ["مبانی"]

  - title: "سیستم فایل لینوکس — همه چیز جای خودش را دارد"
    image: "images/section-03-filesystem.svg"
    explanation: |
      در لینوکس همه فایل‌ها در یک درخت بزرگ سازماندهی شده‌اند.

      درخت از بالا با `/` شروع می‌شود — به آن **Root**
      (ریشه) می‌گویند. از آنجا همه پوشه‌ها منشعب می‌شوند.

      مهم‌ترین پوشه‌ها و محتوایشان:

      | پوشه | چه چیزی داخلش است؟ |
      |--------|---------------|
      | `/home` | پوشه شخصی تو — مثل اتاق خودت |
      | `/etc` | فایل‌های تنظیمات سیستم (مثل کنترل پنل) |
      | `/bin` | برنامه‌هایی که همه می‌توانند استفاده کنند (مثل ls، cd) |
      | `/tmp` | فایل‌های موقت — با راه‌اندازی مجدد پاک می‌شوند |
      | `/dev` | دستگاه‌هایی مثل هارددیسک و USB (به صورت فایل!) |

      علامت `~` (تیلدا) یک میانبر برای پوشه شخصی توست. اگر اسمت `alice` است،
      `~` یعنی `/home/alice`.

      امتحان کن! `ls /` را در ترمینال تایپ کن تا محتوای ریشه را ببینی.
    examples:
      - q: "ls /"
        a: "همه پوشه‌های بالای سیستم فایل را نشان می‌دهد — ریشه (Root) درخت"
        rel:
          - ["ls-cmd", "List — نمایش محتوای پوشه", "دستور ls"]
          - ["root-dir", "بالاترین پوشه سیستم فایل لینوکس", "/ (Root)"]
        labels: ["فایل‌سیستم"]
      - q: "ls /etc | head -5"
        a: "پنج مورد اول پوشه تنظیمات /etc را نشان می‌دهد"
        rel:
          - ["etc-dir", "فایل‌های پیکربندی سیستم", "پوشه /etc"]
          - ["pipe-head", "ارسال خروجی از طریق pipe به head", "| head -5"]
        labels: ["فایل‌سیستم", "پیکربندی"]
      - q: "echo $HOME"
        a: "مسیر پوشه شخصی‌ات را نشان می‌دهد (مثلاً /home/alice)"
        rel:
          - ["echo-cmd", "نمایش متن یا متغیر در ترمینال", "دستور echo"]
          - ["home-var", "متغیر محیطی حاوی مسیر پوشه خانگی", "$HOME"]
        labels: ["فایل‌سیستم", "مبانی"]

  - title: "آزمون ترمینال"
    image: "images/section-04-check.svg"
    explanation: |
      حالا دانشت را امتحان کن!
    examples:
      - q: "کدام دستور نسخه Kernel فعلی لینوکس را نشان می‌دهد؟"
        type: input
        a: "uname -r"
        labels: ["مبانی"]
      - q: "دستور 'lsb_release -a' چه کاری می‌کند؟"
        type: select
        options:
          - text: "توزیع و نسخه دقیق را نشان می‌دهد"
            correct: true
          - text: "همه فایل‌های لاگ را پاک می‌کند"
          - text: "Kernel لینوکس را به‌روزرسانی می‌کند"
          - text: "سیستم را راه‌اندازی مجدد می‌کند"
        labels: ["مبانی"]
      - q: "کدام دستور نشان می‌دهد کدام نسخه لینوکس نصب شده است؟"
        type: select
        options:
          - text: "cat /etc/os-release"
            correct: true
          - text: "cat /etc/passwd"
          - text: "ls /usr/bin"
          - text: "echo $PATH"
        labels: ["مبانی"]
      - q: "کدام‌یک از این جملات درباره لینوکس درست هستند؟"
        type: multiple-choice
        options:
          - text: "لینوکس متن‌باز (Open Source) است"
            correct: true
          - text: "لینوکس روی تقریباً همه سرورهای وب جهان اجرا می‌شود"
            correct: true
          - text: "لینوکس فقط یک توزیع دارد"
          - text: "اندروید بر پایه لینوکس ساخته شده است"
            correct: true
        labels: ["مبانی"]
