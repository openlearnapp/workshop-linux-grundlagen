version: 2
number: 6
title: "پروسس‌ها"
description: "یاد بگیر ببینی کدام برنامه‌ها در حال اجرا هستند و چطور آن‌ها را کنترل کنی"
image: "images/lesson-header.svg"
image_caption: "درخت پروسس با شماره‌های PID و نمایش منابع"
sections:
  - title: "ps و top — الان چه چیزی اجرا می‌شود؟"
    image: "images/section-01-ps-top.svg"
    explanation: |
      یک **پروسس (Process)** یک برنامه‌ای است که الان دارد اجرا می‌شود.

      وقتی مرورگر باز می‌کنی، یک پروسس شروع می‌شود.
      وقتی موسیقی گوش می‌دهی، یک پروسس دارد اجرا می‌شود.
      چند پروسس می‌توانند همزمان اجرا شوند — مثل چند اپ همزمان!

      هر پروسس یک شماره منحصربه‌فرد می‌گیرد: **PID** (Process ID — شناسه پروسس).
      با این شماره می‌توانی بعداً پروسس را کنترل کنی.

      دستورات برای دیدن پروسس‌ها:

      | دستور | چه نشان می‌دهد |
      |--------|--------------|
      | `ps` | فقط پروسس‌های پنجره ترمینال فعلی تو |
      | `ps aux` | همه پروسس‌های همه کاربران با جزئیات (a=همه، u=فرمت کاربر، x=بدون ترمینال هم) |
      | `top` | نمای زنده مثل Task Manager — همه چیز در لحظه! |
      | `htop` | مثل top، ولی رنگی‌تر و راحت‌تر (باید اول نصب شود) |
      | `pgrep firefox` | شماره PID یک برنامه خاص را با نام پیدا می‌کند |

      در `top`: با `q` خارج شو، با `M` بر اساس حافظه مرتب کن، با `P` بر اساس CPU مرتب کن.
    examples:
      - q: "ps aux"
        a: "همه پروسس‌های در حال اجرا همه کاربران با PID، مصرف CPU، مصرف RAM و دستور اجراشده"
        rel:
          - ["ps-cmd", "Process Status — نمایش پروسس‌های در حال اجرا", "دستور ps"]
          - ["ps-aux", "a=همه کاربران، u=فرمت کاربر، x=بدون ترمینال هم", "فلگ‌های aux"]
        labels: ["فرآیندها"]
      - q: "ps aux | grep nginx"
        a: "فقط پروسس‌هایی که 'nginx' در نامشان هست نشان می‌دهد — عالی برای جستجو!"
        rel:
          - ["ps-grep", "فیلتر کردن لیست پروسس‌ها بر اساس نام خاص", "ps aux | grep"]
        labels: ["فرآیندها"]
      - q: "top"
        a: "یک نمای زنده از همه پروسس‌ها با مصرف CPU و RAM باز می‌کند — با q خارج شو"
        rel:
          - ["top-cmd", "مانیتور تعاملی پروسس‌ها در لحظه", "دستور top"]
        labels: ["فرآیندها"]
      - q: "pgrep -l python"
        a: "همه پروسس‌های Python را با شماره PIDشان نشان می‌دهد"
        rel:
          - ["pgrep-cmd", "جستجوی پروسس‌ها بر اساس نام و نمایش PID", "دستور pgrep"]
          - ["pgrep-l", "List — نام پروسس را هم کنار PID نشان می‌دهد", "فلگ -l"]
        labels: ["فرآیندها"]

  - title: "kill — خاتمه دادن به برنامه‌ها"
    image: "images/section-02-kill.svg"
    explanation: |
      اگر یک برنامه هنگ کرد و دیگر جواب نمی‌دهد چه می‌کنی؟
      ختمش می‌کنی! در ترمینال این کار را با `kill` انجام می‌دهی.

      `kill` یک **سیگنال** (پیامی) به یک پروسس می‌فرستد.
      اسمش ترسناک به نظر می‌رسد، ولی نیست — فقط یک دستور است.

      دو سیگنال مهم:

      | سیگنال | شماره | چه اتفاقی می‌افتد؟ |
      |--------|--------|---------------|
      | SIGTERM | 15 | لطفاً بس کن — برنامه می‌تواند مرتب‌سازی کند (پیش‌فرض) |
      | SIGKILL | 9 | فوری بس کن — بدون مرتب‌سازی، هر طور شده |

      **روش کار:**

      اول PID برنامه را پیدا کن:
      ```
      ps aux | grep firefox
      ```
      بعد آروم ختمش کن:
      ```
      kill 1234
      ```
      اگر جواب نداد، اجبارش کن:
      ```
      kill -9 1234
      ```

      با `killall` می‌توانی همه پروسس‌هایی با یک نام را یک‌جا ختم کنی:
      ```
      killall firefox
      ```
    examples:
      - q: "kill 1234"
        a: "SIGTERM (درخواست آرام خاتمه) را به پروسس با شماره PID 1234 می‌فرستد"
        rel:
          - ["kill-cmd", "ارسال سیگنال به پروسس (پیش‌فرض: SIGTERM = خاتمه آرام)", "دستور kill"]
        labels: ["فرآیندها"]
      - q: "kill -9 1234"
        a: "پروسس را فوری ختم می‌کند — SIGKILL را برنامه نمی‌تواند نادیده بگیرد"
        rel:
          - ["kill-9", "SIGKILL — خاتمه فوری، قابل رهگیری نیست", "سیگنال -9"]
        labels: ["فرآیندها"]
      - q: "kill -1 $(pgrep nginx)"
        a: "به nginx درخواست می‌فرستد که تنظیماتش را دوباره بارگذاری کند — بدون اینکه سرور متوقف شود"
        rel:
          - ["kill-1", "SIGHUP — بارگذاری مجدد تنظیمات", "سیگنال -1"]
          - ["command-substitution", "$() یک دستور را اجرا می‌کند و از خروجی‌اش استفاده می‌کند", "$(دستور)"]
        labels: ["فرآیندها", "پیکربندی"]
      - q: "killall -9 firefox"
        a: "همه پروسس‌های Firefox را فوری ختم می‌کند — وقتی مرورگر هنگ کرده مفید است"
        rel:
          - ["killall-cmd", "خاتمه دادن به همه پروسس‌ها با نام مشخص", "دستور killall"]
        labels: ["فرآیندها"]

  - title: "کارهای پس‌زمینه — چند کار همزمان"
    image: "images/section-03-background.svg"
    explanation: |
      معمولاً ترمینال منتظر می‌ماند تا یک دستور تمام شود.
      ولی اگر بخواهی همزمان کار دیگری هم انجام دهی چه؟

      آن وقت پروسس را به **پس‌زمینه (Background)** می‌فرستی!
      برای این کار فقط `&` را به انتهای دستور اضافه کن:
      ```
      python3 server.py &
      [1] 5892
      ```
      `[1]` شماره کار است، `5892` شماره PID است. ترمینال فوری آزاد می‌شود!

      | دستور/کلید | چه اتفاقی می‌افتد؟ |
      |-------------|---------------|
      | `befehl &` | مستقیم در پس‌زمینه شروع می‌شود |
      | `Ctrl+Z` | پروسس در حال اجرا را موقتاً متوقف می‌کند |
      | `bg` | پروسس متوقف‌شده را در پس‌زمینه ادامه می‌دهد |
      | `fg` | پروسس پس‌زمینه را به پیش‌زمینه می‌آورد |
      | `jobs` | همه پروسس‌های پس‌زمینه را نشان می‌دهد |
      | `nohup befehl &` | پروسس پس‌زمینه که حتی بعد از بستن ترمینال ادامه می‌دهد |

      تصور کن: یک پروسس دانلود با `&` در پس‌زمینه شروع می‌کنی،
      و همزمان می‌توانی تایپ کنی — درست مثل چند اپ همزمان!
    examples:
      - q: "sleep 60 &"
        a: "یک پروسس انتظار ۶۰ ثانیه‌ای در پس‌زمینه شروع می‌کند — ترمینال فوری آزاد می‌ماند"
        rel:
          - ["background-amp", "& در انتها پروسس را در پس‌زمینه شروع می‌کند", "عملگر &"]
          - ["sleep-cmd", "N ثانیه انتظار — معمولاً در اسکریپت‌ها استفاده می‌شود", "دستور sleep"]
        labels: ["فرآیندها"]
      - q: "jobs -l"
        a: "همه پروسس‌های پس‌زمینه را با شماره کار و PID نشان می‌دهد"
        rel:
          - ["jobs-cmd", "لیست همه پروسس‌های پس‌زمینه ترمینال فعلی", "دستور jobs"]
          - ["jobs-l", "Long — PID کارها را هم نشان می‌دهد", "فلگ -l"]
        labels: ["فرآیندها"]
      - q: "fg %1"
        a: "پروسس پس‌زمینه شماره ۱ را به پیش‌زمینه می‌آورد"
        rel:
          - ["fg-cmd", "Foreground — آوردن پروسس پس‌زمینه به پیش‌زمینه", "دستور fg"]
        labels: ["فرآیندها"]
      - q: "nohup python3 webserver.py > server.log 2>&1 &"
        a: "یک وب‌سرور شروع می‌کند که حتی بعد از بستن ترمینال ادامه می‌دهد — خروجی در server.log ذخیره می‌شود"
        rel:
          - ["nohup-cmd", "No Hangup — پروسس بعد از بستن ترمینال ادامه می‌دهد", "دستور nohup"]
          - ["redirect-stderr", "2>&1 پیام‌های خطا را به همان فایل خروجی هدایت می‌کند", "2>&1"]
        labels: ["فرآیندها", "اسکریپت"]

  - title: "آزمون ترمینال"
