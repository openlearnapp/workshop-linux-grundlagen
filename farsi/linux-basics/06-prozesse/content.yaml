version: 2
number: 6
title: "پروسس‌ها"
description: "ps، top، kill و کارهای پس‌زمینه — درک و مدیریت برنامه‌های در حال اجرا"
image: "images/lesson-header.svg"
sections:
  - title: "ps و top — الان چه چیزی اجرا می‌شود؟"
    explanation: |
      **چرا این مهم است؟** سرور کند شده، یک برنامه پاسخ نمی‌دهد،
      حافظه پر شده — در این شرایط باید بدانید کدام پروسس‌ها
      اجرا می‌شوند و چقدر منابع مصرف می‌کنند.

      هر پروسس در حال اجرا یک **PID** (Process ID) منحصربه‌فرد دارد.

      | دستور | برای چه؟ |
      |--------|--------|
      | `ps` | پروسس‌های خودتان در Shell فعلی |
      | `ps aux` | تمام پروسس‌های همه کاربران با جزئیات |
      | `top` | نمای زنده تعاملی (مثل Task Manager) |
      | `htop` | نسخه بهبودیافته top با رنگ (باید نصب شود) |
      | `pgrep nginx` | جستجوی PID پروسس بر اساس نام |

      در `top` با `q` خارج شوید، `k` + PID یک پروسس را می‌کشد، `M` بر اساس
      حافظه مرتب می‌کند، `P` بر اساس CPU مرتب می‌کند.
    examples:
      - q: "ps aux"
        a: "تمام پروسس‌های در حال اجرا همه کاربران با PID، CPU، RAM و خط فرمان"
        rel:
          - ["ps-cmd", "Process Status — نمایش پروسس‌های در حال اجرا", "دستور ps"]
          - ["ps-aux", "a=همه کاربران، u=فرمت کاربر، x=بدون ترمینال هم", "فلگ‌های aux"]
        labels: ["فرآیندها"]
      - q: "ps aux | grep nginx"
        a: "فقط پروسس‌های Nginx از لیست پروسس‌ها — ترکیب با grep"
        rel:
          - ["ps-grep", "فیلتر کردن لیست پروسس‌ها بر اساس نام خاص", "ps aux | grep"]
        labels: ["فرآیندها"]
      - q: "top"
        a: "نمای تعاملی زنده: CPU، RAM، تمام پروسس‌ها — q برای خروج"
        rel:
          - ["top-cmd", "مانیتور تعاملی پروسس‌ها به صورت زنده", "دستور top"]
        labels: ["فرآیندها"]
      - q: "pgrep -l python"
        a: "تمام پروسس‌های Python با PID آنها"
        rel:
          - ["pgrep-cmd", "جستجوی پروسس‌ها بر اساس نام و نمایش PID", "دستور pgrep"]
          - ["pgrep-l", "List — نمایش نام پروسس علاوه بر PID", "فلگ -l"]
        labels: ["فرآیندها"]

  - title: "kill — خاتمه دادن به پروسس‌ها"
    explanation: |
      پروسس‌ها از طریق **سیگنال‌ها** کنترل می‌شوند. `kill` سیگنال به پروسس‌ها می‌فرستد.

      | سیگنال | شماره | عملکرد |
      |--------|--------|---------|
      | SIGTERM | 15 | خاتمه ملایم (پیش‌فرض) — پروسس می‌تواند تمیزکاری کند |
      | SIGKILL | 9 | خاتمه فوری — بدون امکان تمیزکاری |
      | SIGHUP | 1 | بارگذاری مجدد پیکربندی (مثلاً Nginx) |

      **قانون کلی:** اول `kill PID` (SIGTERM) را امتحان کنید. فقط اگر جواب نداد،
      از `kill -9 PID` (SIGKILL) استفاده کنید.

      `killall` تمام پروسس‌ها با یک نام مشخص را خاتمه می‌دهد:
      ```bash
      killall firefox
      ```
    examples:
      - q: "kill 1234"
        a: "ارسال SIGTERM (خاتمه ملایم) به پروسس با PID 1234"
        rel:
          - ["kill-cmd", "ارسال سیگنال به پروسس (پیش‌فرض: SIGTERM = خاتمه ملایم)", "دستور kill"]
        labels: ["فرآیندها"]
      - q: "kill -9 1234"
        a: "ارسال SIGKILL — پروسس فوراً خاتمه می‌یابد، ذخیره‌سازی ممکن نیست"
        rel:
          - ["kill-9", "SIGKILL — خاتمه فوری، قابل رهگیری نیست", "سیگنال -9"]
        labels: ["فرآیندها"]
      - q: "kill -1 $(pgrep nginx)"
        a: "ارسال SIGHUP به Nginx — پیکربندی بدون قطعی بارگذاری مجدد می‌شود"
        rel:
          - ["kill-1", "SIGHUP — بارگذاری مجدد پیکربندی", "سیگنال -1"]
          - ["command-substitution", "$() دستور را اجرا می‌کند و خروجی را استفاده می‌کند", "$(دستور)"]
        labels: ["فرآیندها", "پیکربندی"]
      - q: "killall -9 firefox"
        a: "خاتمه فوری تمام پروسس‌های Firefox — مفید وقتی مرورگر هنگ کرده"
        rel:
          - ["killall-cmd", "خاتمه دادن به تمام پروسس‌ها با نام مشخص", "دستور killall"]
        labels: ["فرآیندها"]

  - title: "کارهای پس‌زمینه — چندوظیفگی در ترمینال"
    explanation: |
      لینوکس اجازه می‌دهد چند کار همزمان در یک ترمینال اجرا شوند:

      | دستور/کلید | عملکرد |
      |-------------|---------|
      | `befehl &` | مستقیماً در پس‌زمینه اجرا شود |
      | `Ctrl+Z` | کار در حال اجرا را متوقف (pause) کنید |
      | `bg` | کار متوقف‌شده را در پس‌زمینه ادامه دهید |
      | `fg` | کار پس‌زمینه را به پیش‌زمینه بیاورید |
      | `jobs` | نمایش تمام کارهای پس‌زمینه |
      | `nohup befehl &` | کار حتی بعد از بستن ترمینال ادامه می‌یابد |

      **مثال عملی:**
      ```bash
      python3 server.py &   # سرور در پس‌زمینه شروع می‌شود
      [1] 5892              # شماره کار و PID
      ```
      حالا می‌توانید به کار خود ادامه دهید در حالی که سرور اجرا می‌شود.
    examples:
      - q: "sleep 60 &"
        a: "یک پروسس ۶۰ ثانیه‌ای در پس‌زمینه شروع می‌کند — ترمینال آزاد می‌ماند"
        rel:
          - ["background-amp", "& در انتها پروسس را در پس‌زمینه شروع می‌کند", "عملگر &"]
          - ["sleep-cmd", "N ثانیه صبر کردن — مفید در اسکریپت‌ها", "دستور sleep"]
        labels: ["فرآیندها"]
      - q: "jobs -l"
        a: "تمام کارهای پس‌زمینه با شماره کار و PID"
        rel:
          - ["jobs-cmd", "لیست تمام کارهای پس‌زمینه Shell فعلی", "دستور jobs"]
          - ["jobs-l", "Long — نمایش PID کارها هم", "فلگ -l"]
        labels: ["فرآیندها"]
      - q: "fg %1"
        a: "آوردن کار شماره ۱ به پیش‌زمینه"
        rel:
          - ["fg-cmd", "Foreground — آوردن کار پس‌زمینه به پیش‌زمینه", "دستور fg"]
        labels: ["فرآیندها"]
      - q: "nohup python3 webserver.py > server.log 2>&1 &"
        a: "سرور شروع می‌شود و حتی بعد از بستن ترمینال ادامه می‌دهد، خروجی در فایل لاگ"
        rel:
          - ["nohup-cmd", "No Hangup — پروسس بعد از بستن ترمینال ادامه می‌دهد", "دستور nohup"]
          - ["redirect-stderr", "2>&1 پیام‌های خطا را به همان فایل خروجی استاندارد هدایت می‌کند", "2>&1"]
        labels: ["فرآیندها", "اسکریپت"]

  - title: "🖥️ آزمون ترمینال"
    explanation: |
      حالا دانش خود را تست کنید — دستورات را مستقیماً وارد کنید!
    examples:
      - q: "کدام دستور تمام پروسس‌های در حال اجرا همه کاربران را نشان می‌دهد؟"
        type: input
        a: "ps aux"
        labels: ["فرآیندها"]
      - q: "دستور 'kill -9 1234' چه کار می‌کند؟"
        type: select
        options:
          - text: "SIGKILL ارسال می‌کند — پروسس فوراً خاتمه می‌یابد"
            correct: true
          - text: "SIGTERM ارسال می‌کند — پروسس می‌تواند تمیزکاری کند"
          - text: "پروسس با PID 1234 را متوقف (pause) می‌کند"
          - text: "پروسس را مجدداً راه‌اندازی می‌کند"
        labels: ["فرآیندها"]
      - q: "چگونه یک پروسس مستقیماً در پس‌زمینه شروع می‌شود؟"
        type: select
        options:
          - text: "اجرای دستور با & در انتها"
            correct: true
          - text: "اجرای دستور با bg در ابتدا"
          - text: "اجرای دستور با nohup در انتها"
          - text: "فشردن Ctrl+Z قبل از دستور"
        labels: ["فرآیندها"]
      - q: "کدام‌یک از این جملات درباره سیگنال‌های پروسس درست هستند؟"
        type: multiple-choice
        options:
          - text: "SIGTERM (15) خاتمه ملایم است"
            correct: true
          - text: "SIGKILL (9) قابل رهگیری نیست"
            correct: true
          - text: "SIGHUP (1) پیکربندی را مجدداً بارگذاری می‌کند"
            correct: true
          - text: "SIGPAUSE (7) سیگنال پیش‌فرض است"
        labels: ["فرآیندها"]
