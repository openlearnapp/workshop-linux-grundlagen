          - text: "با احترام از پروسس می‌خواهد بس کند (SIGTERM)"
          - text: "پروسس با PID 1234 را موقتاً متوقف می‌کند"
          - text: "پروسس را دوباره راه‌اندازی می‌کند"
        labels: ["فرآیندها"]
      - q: "چطور یک پروسس را مستقیم در پس‌زمینه شروع می‌کنیم؟"
        type: select
        options:
          - text: "اجرای دستور با & در انتها"
            correct: true
          - text: "اجرای دستور با bg در ابتدا"
          - text: "اجرای دستور با nohup در انتها"
          - text: "فشار دادن Ctrl+Z قبل از دستور"
        labels: ["فرآیندها"]
      - q: "کدام‌یک از این جملات درباره سیگنال‌های پروسس درست هستند؟"
        type: multiple-choice
        options:
          - text: "SIGTERM (15) خاتمه آرام است"
            correct: true
          - text: "SIGKILL (9) قابل رهگیری نیست"
            correct: true
          - text: "SIGHUP (1) تنظیمات را دوباره بارگذاری می‌کند"
            correct: true
          - text: "SIGPAUSE (7) سیگنال پیش‌فرض است"
        labels: ["فرآیندها"]
