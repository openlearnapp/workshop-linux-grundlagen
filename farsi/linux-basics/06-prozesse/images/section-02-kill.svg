<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210">
<defs>
<style>
.f{font-family:sans-serif;}
.ti{animation:tia 11s infinite}@keyframes tia{0%,3%{opacity:0}7%,87%{opacity:1}92%,100%{opacity:0}}
.c1{animation:c1a 11s infinite}@keyframes c1a{0%,12%{opacity:0}18%,87%{opacity:1}92%,100%{opacity:0}}
.c2{animation:c2a 11s infinite}@keyframes c2a{0%,30%{opacity:0}36%,87%{opacity:1}92%,100%{opacity:0}}
.c3{animation:c3a 11s infinite}@keyframes c3a{0%,48%{opacity:0}54%,87%{opacity:1}92%,100%{opacity:0}}
.ft{animation:fta 11s infinite}@keyframes fta{0%,78%{opacity:0}82%,87%{opacity:1}92%,100%{opacity:0}}
</style>
</defs>
<rect width="640" height="210" rx="12" fill="#0d1117"/>
<rect width="640" height="52" rx="12" fill="#161b22"/>
<rect y="40" width="640" height="12" fill="#161b22"/>
<g class="ti">
  <text x="320" y="32" text-anchor="middle" class="f" font-size="13" font-weight="bold" fill="#e6edf3">kill — توقف برنامه‌ها</text>
</g>
<g class="c1">
  <rect x="20" y="62" width="185" height="110" rx="8" fill="#180a0a" stroke="#f85149" stroke-width="1.5"/>
  <text x="112" y="88" text-anchor="middle" class="f" font-size="22">❌</text>
  <text x="112" y="108" text-anchor="middle" class="f" font-size="13" font-weight="bold" fill="#f85149">kill PID</text>
  <text x="112" y="124" text-anchor="middle" class="f" font-size="10" fill="#8b949e">پردازش را با</text>
  <text x="112" y="139" text-anchor="middle" class="f" font-size="10" fill="#8b949e">شماره متوقف کن</text>
</g>
<g class="c2">
  <rect x="228" y="62" width="185" height="110" rx="8" fill="#1a0f08" stroke="#f0883e" stroke-width="1.5"/>
  <text x="320" y="88" text-anchor="middle" class="f" font-size="22">🛑</text>
  <text x="320" y="108" text-anchor="middle" class="f" font-size="13" font-weight="bold" fill="#f0883e">kill -9 PID</text>
  <text x="320" y="124" text-anchor="middle" class="f" font-size="10" fill="#8b949e">توقف اجباری</text>
  <text x="320" y="139" text-anchor="middle" class="f" font-size="10" fill="#f0883e">فوری (اضطراری!)</text>
</g>
<g class="c3">
  <rect x="435" y="62" width="185" height="110" rx="8" fill="#0d1520" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="527" y="88" text-anchor="middle" class="f" font-size="22">🔍</text>
  <text x="527" y="108" text-anchor="middle" class="f" font-size="13" font-weight="bold" fill="#58a6ff">pkill name</text>
  <text x="527" y="124" text-anchor="middle" class="f" font-size="10" fill="#8b949e">پردازش را با</text>
  <text x="527" y="139" text-anchor="middle" class="f" font-size="10" fill="#8b949e">نام پیدا و متوقف کن</text>
</g>
<g class="ft">
  <rect x="20" y="184" width="600" height="18" rx="4" fill="#161b22"/>
  <text x="320" y="197" text-anchor="middle" class="f" font-size="10" fill="#8b949e">kill -9 = SIGKILL — توقف فوری بدون پاک‌سازی</text>
</g>
</svg>
