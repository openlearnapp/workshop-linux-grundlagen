version: 2
number: 5
title: "دسترسی‌ها"
description: "یاد بگیر لینوکس چطور تنظیم می‌کند چه کسی می‌تواند بخواند، بنویسد و اجرا کند"
image: "images/lesson-header.svg"
image_caption: "نماد قفل با جدول دسترسی‌های rwx"
sections:
  - title: "rwx — چه کسی چه اجازه‌ای دارد؟"
    image: "images/section-01-rwx.svg"
    explanation: |
      لینوکس برای هر فایل می‌پرسد: **چه کسی این کار را می‌تواند انجام دهد؟**

      مثل یک خانه است: اتاقت متعلق به توست.
      دیگران شاید بتوانند بیایند تو، ولی نمی‌توانند وسایلت را دست بزنند.

      هر فایل در لینوکس سه سطح دسترسی دارد:
      - **مالک (Owner)**: کسی که فایل متعلق به اوست
      - **گروه (Group)**: گروهی از کاربران، مثلاً همه معلم‌های یک مدرسه
      - **همه دیگران (Other)**: هر کسی که در کامپیوتر است

      و برای هر سطح سه نوع اجازه وجود دارد:
      | حرف | معنی | چه یعنی |
      |-----------|-----------|---------------|
      | `r` | read (خواندن) | خواندن فایل یا دیدن محتوای پوشه |
      | `w` | write (نوشتن) | تغییر فایل یا ساخت فایل داخل پوشه |
      | `x` | execute (اجرا) | اجرای برنامه یا ورود به پوشه |
      | `-` | بدون اجازه | این کار مجاز نیست |

      وقتی `ls -l` می‌نویسی، مثلاً می‌بینی:
      ```
      -rw-r--r-- 1 alice alice 4096 Mar 20 notizen.txt
      ```
      یعنی: مالک Alice می‌تواند بخواند و بنویسد (`rw-`)،
      همه بقیه فقط می‌توانند بخوانند (`r--`).
    examples:
      - q: "ls -la ~/.ssh/id_rsa"
        a: "دسترسی‌های کلید خصوصی SSH را نشان می‌دهد — باید -rw------- باشد (فقط مالک!)"
        rel:
          - ["ssh-key-perms", "کلید خصوصی SSH به دسترسی ۶۰۰ نیاز دارد — وگرنه SSH از استفاده جلوگیری می‌کند", "امنیت"]
          - ["rw-owner-only", "-rw------- یعنی: مالک خواندن/نوشتن، همه دیگران هیچ", "الگوی دسترسی"]
        labels: ["امنیت"]
      - q: "ls -l /usr/bin/sudo"
        a: "دسترسی‌های ویژه sudo را نشان می‌دهد — حرف s در رشته دسترسی خاص است"
        rel:
          - ["suid-bit", "Set User ID — برنامه با دسترسی‌های مالک اجرا می‌شود", "SUID"]
          - ["sudo-bin", "برنامه sudo با دسترسی‌های بالای سیستم", "/usr/bin/sudo"]
        labels: ["امنیت"]

  - title: "chmod — تغییر دسترسی‌ها"
    image: "images/section-02-chmod.svg"
    explanation: |
      با `chmod` (Change Mode — "حالت را تغییر بده") می‌توانی
      دسترسی‌های یک فایل را تغییر دهی.

      دو روش نوشتار وجود دارد:

      **روش حرفی** (فهمیدنش راحت‌تر است):
      ```
      chmod u+x mein-skript.sh    # u = user (مالک)، + = اضافه کن، x = اجرا
      chmod g-w datei.txt         # g = group (گروه)، - = بردار، w = نوشتن
      chmod o=r geheim.txt        # o = other (بقیه)، = = دقیقاً بذار، r = فقط خواندن
      chmod a+x alle-dürfen.sh    # a = all (همه)، + = اضافه کن، x = اجرا
      ```

      **روش عددی** (وقتی بلد باشی سریع‌تر است):

      هر اجازه یک عدد دارد: r=4، w=2، x=1. اینها را با هم جمع می‌کنی:
      | عدد | اجازه‌ها | معنی |
      |------|--------|-----------|
      | 7 | rwx | همه چیز مجاز |
      | 6 | rw- | خواندن و نوشتن |
      | 5 | r-x | خواندن و اجرا |
      | 4 | r-- | فقط خواندن |
      | 0 | --- | هیچ‌چیز مجاز نیست |

      `chmod 755 programm.sh` یعنی:
      مالک همه چیز (7 = rwx)، گروه خواندن+اجرا (5 = r-x)، دیگران خواندن+اجرا (5 = r-x).
    examples:
      - q: "chmod +x deploy.sh"
        a: "به همه (مالک، گروه، دیگران) اجازه اجرا می‌دهد — اسکریپت را قابل اجرا می‌کند"
        rel:
          - ["chmod-cmd", "Change Mode — تغییر دسترسی‌های فایل", "دستور chmod"]
          - ["chmod-x", "+x اجازه اجرا اضافه می‌کند", "chmod +x"]
        labels: ["امنیت"]
      - q: "chmod 755 /usr/local/bin/meinprogramm"
        a: "755 = rwxr-xr-x: مالک همه چیز، همه دیگران می‌توانند بخوانند و اجرا کنند"
        rel:
          - ["chmod-755", "rwxr-xr-x — استاندارد برای برنامه‌های قابل اجرا", "مقدار هشتگانی 755"]
        labels: ["امنیت"]
      - q: "chmod 600 ~/.ssh/id_rsa"
        a: "600 = rw------- : فقط مالک می‌تواند بخواند/بنویسد — برای کلیدهای SSH اجباری!"
        rel:
          - ["chmod-600", "rw------- فقط مالک خواندن/نوشتن، استاندارد کلید SSH", "مقدار هشتگانی 600"]
        labels: ["امنیت"]
      - q: "chmod -R 755 ~/webseite/"
        a: "دسترسی ۷۵۵ را روی همه فایل‌ها و زیرپوشه‌های ~/webseite/ یک‌جا تنظیم می‌کند"
        rel:
          - ["chmod-R", "Recursive — اعمال دسترسی‌ها روی همه زیرپوشه‌ها", "فلگ -R"]
        labels: ["امنیت"]

  - title: "sudo و chown — دسترسی‌های ویژه و مالکیت"
    image: "images/section-03-sudo.svg"
    explanation: |
      در لینوکس یک کاربر ویژه وجود دارد: **root** (ریشه).
      root همه کار می‌تواند بکند — فایل پاک کند، برنامه نصب کند، سیستم را تغییر دهد.

      ولی: همیشه به عنوان root کار کردن خطرناک است.
      یک اشتباه تایپی می‌تواند سیستم را خراب کند!

      به همین دلیل **`sudo`** وجود دارد (Super User Do — "به عنوان Superuser انجام بده"):
      کاربر عادی باقی می‌مانی، ولی می‌توانی دستوراتی را با
      دسترسی مدیر اجرا کنی:
      ```
      sudo apt update    # به‌روزرسانی لیست برنامه‌ها (نیاز به دسترسی مدیر دارد)
      ```
      لینوکس بعد از آن رمز عبورت را می‌خواهد.

      **`chown`** (Change Owner — "مالک را تغییر بده") تغییر می‌دهد فایل به چه کسی تعلق دارد:
      ```
      chown alice notizen.txt          # Alice مالک می‌شود
      chown alice:freunde notizen.txt  # Alice مالک، گروه "freunde"
      chown -R alice ~/dokumente/      # همه چیز در ~/dokumente متعلق به Alice
      ```

      قانون: فقط وقتی واقعاً لازم است از `sudo` استفاده کن!
    examples:
      - q: "sudo apt update"
        a: "لیست برنامه‌های موجود را به‌روز می‌کند — نیاز به دسترسی مدیر دارد، پس sudo"
        rel:
          - ["sudo-cmd", "Super User Do — اجرای دستور به عنوان مدیر", "دستور sudo"]
        labels: ["امنیت"]
      - q: "sudo chown -R www-data:www-data /var/www/html/"
        a: "همه فایل‌های وب‌سایت را به کاربر وب‌سرور می‌دهد (نام کاربر وب‌سرور www-data است)"
        rel:
          - ["chown-cmd", "Change Owner — تغییر مالک فایل", "دستور chown"]
          - ["chown-R", "Recursive — تغییر مالکیت به صورت بازگشتی", "chown -R"]
          - ["www-data", "کاربر پیش‌فرض برای برنامه‌های وب‌سرور (Apache، Nginx)", "www-data"]
        labels: ["امنیت"]
      - q: "sudo -l"
        a: "نشان می‌دهد کدام دستورات sudo برای تو مجاز هستند — مفید روی کامپیوترهای ناشناس"
        rel:
          - ["sudo-l", "List — نمایش دستورات sudo مجاز برای کاربر فعلی", "فلگ -l"]
        labels: ["امنیت"]
      - q: "sudo su -"
        a: "به Shell root تغییر می‌دهد (محیط کامل مدیر) — با احتیاط استفاده کن!"
        rel:
          - ["sudo-su", "تغییر به Shell root — با احتیاط استفاده کن", "sudo su -"]
        labels: ["امنیت"]

  - title: "آزمون ترمینال"
    image: "images/section-04-check.svg"
    explanation: |
      حالا دانشت را امتحان کن!
    examples:
      - q: "کدام دستور فایل 'deploy.sh' را قابل اجرا می‌کند؟"
        type: input
        a: "chmod +x deploy.sh"
        labels: ["امنیت"]
      - q: "دسترسی '755' چه معنایی دارد؟"
        type: select
        options:
          - text: "rwxr-xr-x — مالک همه چیز، گروه و دیگران خواندن+اجرا"
            correct: true
          - text: "rw-rw-rw- — همه می‌توانند بخوانند و بنویسند"
          - text: "rwx------ — فقط مالک همه دسترسی‌ها را دارد"
          - text: "r--r--r-- — همه فقط می‌توانند بخوانند"
        labels: ["امنیت"]
      - q: "کلید خصوصی SSH باید چه مقدار عددی داشته باشد؟"
        type: select
        options:
          - text: "600"
            correct: true
          - text: "755"
          - text: "777"
          - text: "644"
        labels: ["امنیت"]
      - q: "کدام‌یک از این جملات درباره سیستم دسترسی لینوکس درست هستند؟"
        type: multiple-choice
        options:
          - text: "r مخفف read (خواندن) است"
            correct: true
          - text: "x مخفف execute (اجرا) است"
            correct: true
          - text: "w مخفف write (نوشتن) است"
            correct: true
          - text: "s مخفف system (سیستم) است"
        labels: ["امنیت"]
