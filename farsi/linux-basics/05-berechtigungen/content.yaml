version: 2
number: 5
title: "مجوزها"
description: "chmod، chown و sudo — درک و استفاده از سیستم مجوزهای لینوکس"
image: "images/lesson-header.svg"
sections:
  - title: "rwx — رمزگشایی سیستم مجوزها"
    explanation: |
      **چرا این مهم است؟** امنیت هسته اصلی لینوکس است. مجوزهای اشتباه
      می‌توانند باعث شوند اسکریپت‌ها اجرا نشوند، وب‌سرور راه‌اندازی نشود یا
      در بدترین حالت کاربران دیگر به داده‌های شما دسترسی پیدا کنند.

      هر فایل سه سطح دسترسی دارد:
      ```
      -rwxr-xr--
      ↑↑↑↑↑↑↑↑↑↑
      │└┬┘└┬┘└┬┘
      │ │  │  └─ Other (همه بقیه)
      │ │  └──── Group (اعضای گروه)
      │ └──────── Owner (مالک)
      └────────── نوع فایل (- = فایل، d = پوشه)
      ```

      **معنی حروف:**
      | حرف | معنی | برای فایل‌ها | برای پوشه‌ها |
      |-----------|-----------|-------------|-------------------|
      | `r` | read (خواندن) | خواندن فایل | لیست محتوا (ls) |
      | `w` | write (نوشتن) | نوشتن در فایل | ساخت/حذف فایل‌ها در آن |
      | `x` | execute (اجرا) | اجرای فایل | ورود به پوشه (cd) |
      | `-` | بدون مجوز | — | — |
    examples:
      - q: "ls -la ~/.ssh/id_rsa"
        a: "مجوزهای کلید خصوصی SSH را نشان می‌دهد — باید -rw------- باشد (فقط مالک!)"
        rel:
          - ["ssh-key-perms", "کلید خصوصی SSH باید مجوز 600 داشته باشد — در غیر این صورت SSH رد می‌کند", "امنیت"]
          - ["rw-owner-only", "-rw------- یعنی: فقط مالک خواندن/نوشتن، بقیه هیچ", "الگوی مجوز"]
        labels: ["امنیت"]
      - q: "ls -l /usr/bin/sudo"
        a: "مجوزهای خاص SUID برنامه sudo را نشان می‌دهد — حرف s در رشته مجوزها خاص است"
        rel:
          - ["suid-bit", "Set User ID — برنامه با مجوزهای مالک اجرا می‌شود", "SUID"]
          - ["sudo-bin", "برنامه sudo با مجوزهای بالای سیستم", "/usr/bin/sudo"]
        labels: ["امنیت"]

  - title: "chmod — تغییر مجوزها"
    explanation: |
      `chmod` (Change Mode) مجوزهای فایل را تغییر می‌دهد. دو نوع نوشتار وجود دارد:

      **نوشتار نمادین** (آسان‌تر برای حفظ کردن):
      ```bash
      chmod u+x skript.sh      # مالک: اضافه کردن مجوز اجرا
      chmod g-w datei.txt      # گروه: حذف مجوز نوشتن
      chmod o=r config.txt     # بقیه: فقط خواندن
      chmod a+x deploy.sh      # همه: اضافه کردن مجوز اجرا
      ```

      **نوشتار عددی** (سریع‌تر برای تایپ):
      | عدد | مجوزها | معنی |
      |------|--------|-----------|
      | 7 | rwx | تمام مجوزها |
      | 6 | rw- | خواندن + نوشتن |
      | 5 | r-x | خواندن + اجرا |
      | 4 | r-- | فقط خواندن |
      | 0 | --- | بدون مجوز |

      مثال: `chmod 755` = `rwxr-xr-x` (مالک همه مجوزها، گروه/بقیه خواندن+اجرا)
    examples:
      - q: "chmod +x deploy.sh"
        a: "به همه (مالک، گروه، بقیه) مجوز اجرا می‌دهد — اسکریپت قابل اجرا می‌شود"
        rel:
          - ["chmod-cmd", "Change Mode — تغییر مجوزهای فایل", "دستور chmod"]
          - ["chmod-x", "+x مجوز اجرا اضافه می‌کند", "chmod +x"]
        labels: ["امنیت"]
      - q: "chmod 755 /usr/local/bin/meinprogramm"
        a: "755 = rwxr-xr-x: مالک همه مجوزها، بقیه فقط خواندن و اجرا"
        rel:
          - ["chmod-755", "rwxr-xr-x — استاندارد برای برنامه‌های اجرایی", "مقدار هشتگانی 755"]
        labels: ["امنیت"]
      - q: "chmod 600 ~/.ssh/id_rsa"
        a: "600 = rw------- : فقط مالک خواندن/نوشتن — برای کلیدهای SSH الزامی"
        rel:
          - ["chmod-600", "rw------- فقط مالک خواندن/نوشتن، استاندارد کلید SSH", "مقدار هشتگانی 600"]
        labels: ["امنیت"]
      - q: "chmod -R 755 ~/webseite/"
        a: "مجوز 755 را به صورت بازگشتی روی تمام فایل‌ها و زیرپوشه‌های وبسایت اعمال می‌کند"
        rel:
          - ["chmod-R", "Recursive — اعمال مجوزها روی تمام زیرپوشه‌ها", "فلگ -R"]
        labels: ["امنیت"]

  - title: "sudo و chown — مجوزهای ویژه و مالکیت"
    explanation: |
      **sudo** (Super User Do) به کاربران عادی اجازه می‌دهد دستورات خاصی را
      به عنوان مدیر (root) اجرا کنند. این امن‌تر از کار دائمی با root است.

      ⚠️ **قانون طلایی:** از `sudo` فقط وقتی لازم است استفاده کنید. به عنوان root
      هیچ شبکه ایمنی وجود ندارد — یک دستور اشتباه `rm -rf` می‌تواند سیستم را نابود کند.

      **chown** (Change Owner) مالک یک فایل را تغییر می‌دهد:
      ```bash
      chown alice datei.txt           # تغییر مالک
      chown alice:www-data datei.txt  # تغییر مالک و گروه
      chown -R www-data /var/www/     # بازگشتی برای فایل‌های وب‌سرور
      ```
    examples:
      - q: "sudo apt update"
        a: "به‌روزرسانی لیست بسته‌ها — نیاز به مجوز مدیر دارد، بنابراین sudo"
        rel:
          - ["sudo-cmd", "Super User Do — اجرای دستور به عنوان مدیر", "دستور sudo"]
        labels: ["امنیت"]
      - q: "sudo chown -R www-data:www-data /var/www/html/"
        a: "تمام فایل‌های وب‌سرور را به کاربر www-data اختصاص می‌دهد — Nginx/Apache به این نیاز دارند"
        rel:
          - ["chown-cmd", "Change Owner — تغییر مالک فایل", "دستور chown"]
          - ["chown-R", "Recursive — تغییر مالکیت به صورت بازگشتی", "chown -R"]
          - ["www-data", "کاربر پیش‌فرض برای وب‌سرورها (Apache، Nginx)", "www-data"]
        labels: ["امنیت"]
      - q: "sudo -l"
        a: "نشان می‌دهد کدام دستورات sudo برای شما مجاز هستند — مفید روی سیستم‌های ناآشنا"
        rel:
          - ["sudo-l", "List — نمایش دستورات sudo مجاز برای کاربر فعلی", "فلگ -l"]
        labels: ["امنیت"]
      - q: "sudo su -"
        a: "تغییر به کاربر root — با خط تیره محیط root هم بارگذاری می‌شود"
        rel:
          - ["sudo-su", "تغییر به Shell root — با احتیاط استفاده کنید", "sudo su -"]
        labels: ["امنیت"]

  - title: "🖥️ آزمون ترمینال"
    explanation: |
      حالا دانش خود را تست کنید — دستورات را مستقیماً وارد کنید!
    examples:
      - q: "کدام دستور فایل 'deploy.sh' را قابل اجرا می‌کند؟"
        type: input
        a: "chmod +x deploy.sh"
        labels: ["امنیت"]
      - q: "مجوز '755' در نوشتار هشتگانی چه معنایی دارد؟"
        type: select
        options:
          - text: "rwxr-xr-x — مالک همه مجوزها، گروه و بقیه خواندن+اجرا"
            correct: true
          - text: "rw-rw-rw- — همه خواندن و نوشتن"
          - text: "rwx------ — فقط مالک همه مجوزها را دارد"
          - text: "r--r--r-- — همه فقط خواندن"
        labels: ["امنیت"]
      - q: "کلید خصوصی SSH باید چه مقدار هشتگانی داشته باشد؟"
        type: select
        options:
          - text: "600"
            correct: true
          - text: "755"
          - text: "777"
          - text: "644"
        labels: ["امنیت"]
      - q: "کدام‌یک از این جملات درباره سیستم مجوزهای لینوکس درست هستند؟"
        type: multiple-choice
        options:
          - text: "r مخفف read (خواندن) است"
            correct: true
          - text: "x مخفف execute (اجرا) است"
            correct: true
          - text: "w مخفف write (نوشتن) است"
            correct: true
          - text: "s مخفف system (سیستم) است"
        labels: ["امنیت"]
