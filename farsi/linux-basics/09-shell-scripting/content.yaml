version: 2
number: 9
title: "مبانی Shell Scripting"
description: "متغیرها، شرط‌های if و حلقه‌ها — اسکریپت‌های خودت را بنویس و کارها را خودکار کن"
image: "images/lesson-header.svg"
image_caption: "ویرایشگر کد با اسکریپت Bash و رنگ‌بندی نحوی"
sections:
  - title: "اولین اسکریپت تو — Shebang و متغیرها"
    image: "images/section-01-shebang.svg"
    explanation: |
      تصور کن هر روز صبح یک کار تکراری داری:
      پوشه‌ها مرتب کردن، فایل‌های قدیمی پاک کردن، یک پیام نشان دادن.
      اگر هر روز مجبور بودی اینها را با دست تایپ کنی، خسته‌کننده می‌شد.

      یک **Shell Script** مثل یک لیست خرید برای کامپیوتر است.
      یک بار می‌نویسی چه کار بکند —
      و بعد هر دفعه با یک دکمه انجام می‌دهد.

      یک اسکریپت ساده این‌طور است:
      ```
      #!/bin/bash
      # این یک توضیح است — کامپیوتر آن را نادیده می‌گیرد

      NAME="Alice"
      DATUM=$(date +%Y-%m-%d)

      echo "سلام، $NAME!"
      echo "امروز: $DATUM"
      ```

      خط اول `#!/bin/bash` **Shebang** نام دارد.
      به لینوکس می‌گوید: "این اسکریپت را با bash اجرا کن."
      بدون این خط، لینوکس نمی‌داند چطور اسکریپت را بخواند.

      **متغیرها** (جاهای ذخیره برای مقادیر):
      - برای ذخیره: `NAME="Alice"` — دور `=` فاصله نذار!
      - برای استفاده: `echo $NAME` — `$` نشان می‌دهد: "اینجا یک مقدار ذخیره شده"
      - ذخیره نتیجه دستور: `DATUM=$(date)` — چیزی که `date` خروجی می‌دهد در `DATUM` ذخیره می‌شود
    examples:
      - q: "#!/bin/bash"
        a: "Shebang — باید اولین خط هر اسکریپت Bash باشد تا لینوکس بتواند اجرایش کند"
        rel:
          - ["shebang", "اولین خط اسکریپت که مفسر را تعیین می‌کند", "#!/bin/bash"]
        labels: ["اسکریپت"]
      - q: "NAME=\"Alice\" && echo \"Hallo, $NAME\""
        a: "متغیر تنظیم کن و فوری استفاده کن — دور علامت مساوی فاصله نیست!"
        rel:
          - ["bash-variable", "متغیر در Bash: NAME=مقدار (بدون $)، $NAME (هنگام استفاده)", "متغیر"]
        labels: ["اسکریپت"]
      - q: "HEUTE=$(date +%d.%m.%Y)"
        a: "تاریخ امروز را در یک متغیر ذخیره می‌کند — $(date) تاریخ فعلی را برمی‌گرداند"
        rel:
          - ["command-sub", "جایگزینی دستور: $(دستور) خروجی را در متغیر ذخیره می‌کند", "$()"]
          - ["date-format", "فرمت تاریخ: %d=روز، %m=ماه، %Y=سال", "date +فرمت"]
        labels: ["اسکریپت"]
      - q: "echo \"Pfad: $HOME, User: $USER\""
        a: "لینوکس خودش متغیرهای مفیدی تهیه می‌کند — HOME و USER همیشه هستند"
        rel:
          - ["env-var-user", "متغیر محیطی با نام کاربر فعلی", "$USER"]
          - ["env-var-home", "متغیر محیطی با مسیر پوشه خانگی", "$HOME"]
        labels: ["اسکریپت"]

  - title: "شرط‌های if — اسکریپت فکر می‌کند"
    image: "images/section-02-if.svg"
    explanation: |
      گاهی اسکریپتت باید بسته به موقعیت متفاوت رفتار کند.
      "اگر فایل وجود داشت — این کار را بکن. وگرنه یه کار دیگه."

      به این می‌گویند **شرط if** (به انگلیسی: "اگر"):
      ```
      #!/bin/bash

      if [ -f "/etc/nginx/nginx.conf" ]; then
          echo "Nginx نصب شده!"
      elif [ -d "/etc/apache2" ]; then
          echo "Apache نصب شده."
      else
          echo "هیچ وب‌سروری پیدا نشد."
      fi
      ```

      `fi` در انتها — این فقط "if" برعکس نوشته شده.
      به این شکل bash می‌فهمد که شرط تمام شده.

      نشانه‌های تست مهم:
      - `-f datei` — بررسی می‌کند: آیا این یک فایل است؟
      - `-d pfad` — بررسی می‌کند: آیا این یک پوشه است؟
      - `-z "$var"` — بررسی می‌کند: آیا متغیر خالی است؟
      - `"$a" = "$b"` — بررسی می‌کند: آیا دو متن برابرند؟
      - `$a -gt $b` — بررسی می‌کند: آیا عدد a از b بزرگ‌تر است؟ (gt = greater than)
    examples:
      - q: "if [ -f \"~/.ssh/id_ed25519\" ]; then echo \"SSH-Key vorhanden\"; fi"
        a: "بررسی می‌کند آیا کلید SSH وجود دارد — -f می‌پرسد آیا فایل هست"
        rel:
          - ["if-bash", "if [ شرط ]; then دستورات; fi — ساختار پایه", "if-then-fi"]
          - ["test-f", "-f وجود فایل را تست می‌کند (file)", "عملگر تست -f"]
        labels: ["اسکریپت", "امنیت"]
      - q: "[ -d /var/www ] && echo \"Webverzeichnis existiert\""
        a: "نوشتار کوتاه: && یعنی 'و اگر این درست بود، آنگاه...' — فقط یک خط لازم است"
        rel:
          - ["test-d", "-d وجود پوشه را تست می‌کند (directory)", "عملگر تست -d"]
        labels: ["اسکریپت"]
      - q: "if [ \"$USER\" = \"root\" ]; then echo \"Du bist root!\"; fi"
        a: "بررسی می‌کند آیا اسکریپت به عنوان مدیر اجرا می‌شود — مفید قبل از تغییرات سیستم"
        rel:
          - ["string-compare", "مقایسه رشته‌ها در Bash با =", "مقایسه رشته"]
        labels: ["اسکریپت", "امنیت"]

  - title: "حلقه‌ها — چیزی را چند بار تکرار کن"
    image: "images/section-03-loops.svg"
    explanation: |
      تصور کن باید ۱۰۰ فایل را تغییر نام بدهی.
      با دست این کار خیلی طول می‌کشد.
      یک **حلقه** این کار را در چند ثانیه انجام می‌دهد.

      **حلقه for** یک لیست را نقطه به نقطه می‌گذراند:
      ```
      for DATEI in *.log; do
          echo "در حال پردازش: $DATEI"
          gzip "$DATEI"
      done
      ```
      `do` یعنی "بعد این کار را بکن:"، `done` یعنی "تمام شد".

      **حلقه while** تا زمانی که یک شرط برقرار است اجرا می‌شود:
      ```
      ZAEHLER=1
      while [ $ZAEHLER -le 5 ]; do
          echo "دور $ZAEHLER"
          ZAEHLER=$((ZAEHLER + 1))
      done
      ```
      `-le` یعنی "less or equal" (کوچکتر یا مساوی).

      یک مثال واقعی — پشتیبان‌گیری از سه پوشه با هم:
      ```
      #!/bin/bash
      DATUM=$(date +%Y%m%d)
      for ORDNER in ~/dokumente ~/bilder ~/projekte; do
          tar -czf "/backup/${DATUM}_$(basename $ORDNER).tar.gz" "$ORDNER"
          echo "پشتیبان ساخته شد: $ORDNER"
      done
      ```
    examples:
      - q: "for i in 1 2 3 4 5; do echo \"Zahl: $i\"; done"
        a: "حلقه روی اعداد ۱ تا ۵ — هر عدد را یک بار چاپ می‌کند"
        rel:
          - ["for-loop", "حلقه for: for VAR in لیست; do ... done", "for-do-done"]
        labels: ["اسکریپت"]
      - q: "for USER in alice bob charlie; do useradd \"$USER\"; done"
        a: "سه کاربر را یک‌جا ایجاد می‌کند — به جای سه بار تایپ کردن یک دستور"
        rel:
          - ["for-list", "حلقه for روی لیستی از مقادیر", "for VAR in مقدار۱ مقدار۲"]
        labels: ["اسکریپت", "امنیت"]
      - q: "for f in /var/log/*.log; do echo \"$(wc -l < $f) خط: $f\"; done"
        a: "خطوط هر فایل لاگ را می‌شمارد و نتیجه را نشان می‌دهد"
        rel:
          - ["for-glob", "حلقه for با الگوی Glob روی فایل‌ها", "for f in *.ext"]
          - ["wc-l", "Word Count -l — شمارش خطوط یک فایل", "wc -l"]
        labels: ["اسکریپت", "فایل‌سیستم"]
      - q: "while true; do df -h / | grep '/'; sleep 60; done"
        a: "هر دقیقه فضای هارددیسک را بررسی می‌کند — تا Ctrl+C را فشار دهی اجرا می‌شود"
        rel:
          - ["while-loop", "حلقه while: while شرط; do ... done", "while-do-done"]
          - ["while-true", "while true — حلقه بی‌نهایت، فقط با Ctrl+C متوقف می‌شود", "while true"]
        labels: ["اسکریپت"]

  - title: "آزمون ترمینال"
    image: "images/section-04-check.svg"
    explanation: |
      حالا دانشت را امتحان کن — دستورات را مستقیماً وارد کن!
    examples:
      - q: "اولین خط هر اسکریپت Bash (Shebang) چیست؟"
        type: input
        a: "#!/bin/bash"
        labels: ["اسکریپت"]
      - q: "هنگام مقداردهی یک متغیر Bash چه نکته‌ای باید رعایت شود؟"
        type: select
        options:
          - text: "دور علامت مساوی فاصله نیست: NAME=\"Alice\""
            correct: true
          - text: "همیشه $ قبل از نام متغیر: $NAME=\"Alice\""
          - text: "متغیرها باید با حروف بزرگ باشند"
          - text: "متغیرها باید با export تعریف شوند"
        labels: ["اسکریپت"]
      - q: "یک شرط if در Bash با چه کلمه‌ای تمام می‌شود؟"
        type: select
        options:
          - text: "fi"
            correct: true
          - text: "end"
          - text: "endif"
          - text: "done"
        labels: ["اسکریپت"]
      - q: "کدام‌یک از این جملات درباره Shell Scripting درست هستند؟"
        type: multiple-choice
        options:
          - text: "$() نتیجه یک دستور را در متغیر ذخیره می‌کند"
            correct: true
          - text: "حلقه‌های for با 'done' تمام می‌شوند"
            correct: true
          - text: "-f وجود فایل را بررسی می‌کند"
            correct: true
          - text: "فاصله دور = در متغیرها اجباری است"
        labels: ["اسکریپت"]
