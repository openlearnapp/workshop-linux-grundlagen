<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230">
<defs><style>
.f{font-family:sans-serif}
.ti{animation:tia 11s infinite}@keyframes tia{0%,3%{opacity:0}7%,87%{opacity:1}92%,100%{opacity:0}}
.c1{animation:c1a 11s infinite}@keyframes c1a{0%,12%{opacity:0}18%,87%{opacity:1}92%,100%{opacity:0}}
.c2{animation:c2a 11s infinite}@keyframes c2a{0%,30%{opacity:0}36%,87%{opacity:1}92%,100%{opacity:0}}
.c3{animation:c3a 11s infinite}@keyframes c3a{0%,48%{opacity:0}54%,87%{opacity:1}92%,100%{opacity:0}}
.c4{animation:c4a 11s infinite}@keyframes c4a{0%,65%{opacity:0}71%,87%{opacity:1}92%,100%{opacity:0}}
.ft{animation:fta 11s infinite}@keyframes fta{0%,78%{opacity:0}82%,87%{opacity:1}92%,100%{opacity:0}}
</style></defs>
<rect width="640" height="230" rx="12" fill="#0d1117"/>
<rect width="640" height="48" rx="12" fill="#161b22"/>
<rect y="36" width="640" height="12" fill="#161b22"/>
<g class="ti">
  <text x="320" y="30" text-anchor="middle" class="f" font-size="13" font-weight="bold" fill="#e6edf3">اولین اسکریپت — Shebang و متغیرها</text>
</g>
<g class="c1">
  <rect x="15" y="60" width="140" height="118" rx="8" fill="#1a0f08" stroke="#f0883e" stroke-width="1.5"/>
  <text x="85" y="88" text-anchor="middle" class="f" font-size="22">📜</text>
  <text x="85" y="108" text-anchor="middle" class="f" font-size="11" font-weight="bold" fill="#f0883e">Shebang</text>
  <text x="85" y="126" text-anchor="middle" class="f" font-size="9" fill="#8b949e">#!/bin/bash</text>
  <text x="85" y="142" text-anchor="middle" class="f" font-size="8" fill="#f0883e" opacity="0.7">کدام شل استفاده شود</text>
</g>
<g class="c2">
  <rect x="170" y="60" width="140" height="118" rx="8" fill="#0d1520" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="240" y="88" text-anchor="middle" class="f" font-size="22">📝</text>
  <text x="240" y="108" text-anchor="middle" class="f" font-size="11" font-weight="bold" fill="#58a6ff">متغیرها</text>
  <text x="240" y="126" text-anchor="middle" class="f" font-size="9" fill="#8b949e">name=Alice</text>
  <text x="240" y="142" text-anchor="middle" class="f" font-size="8" fill="#58a6ff" opacity="0.7">echo $name</text>
</g>
<g class="c3">
  <rect x="325" y="60" width="140" height="118" rx="8" fill="#0a1a0d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="395" y="88" text-anchor="middle" class="f" font-size="22">▶️</text>
  <text x="395" y="108" text-anchor="middle" class="f" font-size="11" font-weight="bold" fill="#3fb950">اجرا کردن</text>
  <text x="395" y="126" text-anchor="middle" class="f" font-size="9" fill="#8b949e">chmod +x script.sh</text>
  <text x="395" y="142" text-anchor="middle" class="f" font-size="8" fill="#3fb950" opacity="0.7">سپس ./script.sh</text>
</g>
<g class="c4">
  <rect x="480" y="60" width="140" height="118" rx="8" fill="#110d1a" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="550" y="88" text-anchor="middle" class="f" font-size="22">💬</text>
  <text x="550" y="108" text-anchor="middle" class="f" font-size="11" font-weight="bold" fill="#bc8cff">echo</text>
  <text x="550" y="126" text-anchor="middle" class="f" font-size="9" fill="#8b949e">متن را</text>
  <text x="550" y="142" text-anchor="middle" class="f" font-size="8" fill="#bc8cff" opacity="0.7">روی صفحه چاپ کن</text>
</g>
<g class="ft">
  <rect x="20" y="192" width="600" height="28" rx="6" fill="#161b22"/>
  <text x="320" y="211" text-anchor="middle" class="f" font-size="10" fill="#8b949e">#!/bin/bash — همیشه اولین خط یک اسکریپت bash است</text>
</g>
</svg>
