version: 2
number: 8
title: "شبکه"
description: "ping، curl، wget، ssh و ip — تست اتصالات شبکه، انتقال داده و کار از راه دور"
image: "images/lesson-header.svg"
image_caption: "نقشه شبکه با روتر، سرور و کلاینت‌ها"
sections:
  - title: "بررسی شبکه — ping، ip و ss"
    image: "images/section-01-network.svg"
    explanation: |
      تصور کن برای یک دوستت نامه می‌فرستی.
      می‌خواهی بدانی: "آیا نامه اصلاً می‌رسد؟"

      در اینترنت این کار را دستور **ping** انجام می‌دهد.
      بسته‌های کوچک تست به یک آدرس می‌فرستد و اندازه می‌گیرد
      که آیا و چقدر سریع می‌رسند:
      ```
      ping -c 4 google.com
      ```
      `-c 4` یعنی: "دقیقاً ۴ بسته تست بفرست."

      با **ip addr** آدرس کامپیوترت را در شبکه می‌بینی —
      مثل شماره خانه‌ات:
      ```
      ip addr show
      ```

      و با **ss** می‌بینی کدام "در"ها (پورت‌ها) در کامپیوترت باز هستند:
      ```
      ss -tulpn
      ```
      پیچیده به نظر می‌رسد، ولی ساده است:
      - `t` = اتصالات TCP (رایج‌ترین نوع)
      - `u` = اتصالات UDP (برای داده‌های سریع مثل ویدیو)
      - `l` = فقط در"های باز را نشان بده
      - `p` = کدام برنامه در را باز کرده؟
      - `n` = اعداد را به جای نام نشان بده
    examples:
      - q: "ping -c 4 google.com"
        a: "۴ بسته تست به Google می‌فرستد — بررسی می‌کند آیا اینترنت کار می‌کند"
        rel:
          - ["ping-cmd", "تست دسترس‌پذیری و تأخیر شبکه", "دستور ping"]
          - ["ping-c", "Count — محدود کردن تعداد بسته‌های ارسالی", "فلگ -c"]
        labels: ["شبکه"]
      - q: "ip addr show"
        a: "آدرس شبکه کامپیوترت را نشان می‌دهد — مثل شماره خانه‌ات در اینترنت"
        rel:
          - ["ip-cmd", "ابزار مدرن مدیریت شبکه (جایگزین ifconfig)", "دستور ip"]
          - ["ip-addr", "نمایش آدرس‌های IP همه رابط‌های شبکه", "ip addr"]
        labels: ["شبکه"]
      - q: "ss -tulpn"
        a: "همه پورت‌های باز و برنامه‌هایی که از آنها استفاده می‌کنند را نشان می‌دهد"
        rel:
          - ["ss-cmd", "Socket Statistics — اتصالات شبکه و پورت‌های باز", "دستور ss"]
          - ["ss-tulpn", "t=TCP، u=UDP، l=listening، p=پروسس، n=عددی", "فلگ‌های -tulpn"]
        labels: ["شبکه"]

  - title: "curl و wget — گرفتن داده از اینترنت"
    image: "images/section-02-curl-wget.svg"
    explanation: |
      مرورگرت صفحات وب را دانلود می‌کند — این را می‌بینی.
      ولی اگر بخواهی داده را به ترمینال بیاوری،
      بدون باز کردن مرورگر؟

      برای این کار **curl** و **wget** هستند.

      **curl** مثل یک مرورگر نامرئی است:
      ```
      curl https://example.com
      ```
      محتوای یک وب‌سایت را مستقیم در ترمینال نشان می‌دهد.

      با curl می‌توانی آدرس اینترنتی خودت را هم بفهمی:
      ```
      curl -s https://ipinfo.io/ip
      ```
      `-s` مخفف "silent" (ساکت) است —
      فقط نتیجه را نشان می‌دهد، بدون نوار پیشرفت.

      **wget** برای دانلود فایل‌های بزرگ بهتر است:
      ```
      wget https://example.com/grossedatei.zip
      ```
      wget فایل را مستقیم روی کامپیوترت ذخیره می‌کند.
      curl فقط نشان می‌دهد — این مهم‌ترین تفاوتشان است.
    examples:
      - q: "curl -I https://example.com"
        a: "فقط هدرها (Header) را نشان می‌دهد — مثل نگاه کردن به پاکت نامه"
        rel:
          - ["curl-cmd", "Client URL — ارسال درخواست HTTP و انتقال داده", "دستور curl"]
          - ["curl-I", "Head — فقط نمایش هدرهای HTTP پاسخ", "فلگ -I"]
        labels: ["شبکه"]
      - q: "curl -s https://ipinfo.io/ip"
        a: "آدرس اینترنتی خودت را نشان می‌دهد — -s نمایش را تمیز می‌کند"
        rel:
          - ["curl-s", "Silent — مخفی کردن نوار پیشرفت و پیام‌های خطا", "فلگ -s"]
        labels: ["شبکه"]
      - q: "wget -O nodejs.tar.gz https://nodejs.org/dist/v20.0.0/node-v20.0.0.tar.gz"
        a: "یک فایل را دانلود می‌کند و با نام دلخواه ذخیره می‌کند"
        rel:
          - ["wget-cmd", "Web Get — دانلود فایل از اینترنت", "دستور wget"]
          - ["wget-O", "Output — ذخیره فایل با نام دیگر", "فلگ -O"]
        labels: ["شبکه"]
      - q: "curl -fsSL https://get.docker.com | sudo sh"
        a: "یک اسکریپت نصب را دانلود می‌کند و فوری اجرا می‌کند"
        rel:
          - ["curl-fssl", "f=شکست بی‌صدا، s=ساکت، S=خطاها، L=دنبال ریدایرکت‌ها", "فلگ‌های -fsSL"]
        labels: ["شبکه", "پیکربندی"]

  - title: "SSH — اتصال امن به کامپیوتر دیگر"
    image: "images/section-03-ssh.svg"
    explanation: |
      تصور کن خانه هستی، ولی روی کامپیوتری کار می‌کنی
      که ۱۰۰۰ کیلومتر آن طرف‌تر در یک مرکز داده است.

      دقیقاً این کار را **SSH** انجام می‌دهد (Secure Shell — "پوسته امن").
      همه چیزی که تایپ می‌کنی رمزنگاری‌شده منتقل می‌شود.
      کسی نمی‌تواند نگاه کند.

      برای اتصال:
      ```
      ssh alice@192.168.1.100
      ```
      یعنی: "به عنوان کاربر 'alice' به کامپیوتر 192.168.1.100 وصل شو"

      از رمز عبور امن‌تر، **کلیدهای SSH** هستند.
      مثل یک کارت شناسایی جادویی — دیگر نیازی به تایپ رمز عبور نیست:
      ```
      ssh-keygen -t ed25519 -C "mein-laptop"
      ```
      این یک کلید می‌سازد.
      با `-t ed25519` یک نوع مدرن و امن انتخاب می‌کنی.

      بعد کارتت را به کامپیوتر دیگر می‌فرستی:
      ```
      ssh-copy-id alice@server.example.com
      ```
      از این به بعد وارد می‌شوی — بدون رمز عبور!

      انتقال فایل با **scp** امکان‌پذیر است (Secure Copy — "کپی امن"):
      ```
      scp meine-datei.txt alice@server:/home/alice/
      ```
    examples:
      - q: "ssh alice@192.168.1.100"
        a: "به عنوان 'alice' به کامپیوتر 192.168.1.100 وصل می‌شود — همه چیز رمزنگاری شده"
        rel:
          - ["ssh-cmd", "Secure Shell — اتصال رمزنگاری‌شده از راه دور", "دستور ssh"]
        labels: ["شبکه", "امنیت"]
      - q: "ssh-keygen -t ed25519 -C \"alice@meinlaptop\""
        a: "یک کلید SSH مدرن می‌سازد — مثل یک کارت شناسایی دیجیتال"
        rel:
          - ["ssh-keygen", "ساخت جفت کلید SSH", "دستور ssh-keygen"]
          - ["ed25519", "الگوریتم مدرن برای کلیدهای SSH، توصیه‌شده از ۲۰۲۲", "نوع کلید Ed25519"]
        labels: ["شبکه", "امنیت"]
      - q: "ssh-copy-id -i ~/.ssh/id_ed25519.pub alice@server.example.com"
        a: "کلیدت را به سرور می‌فرستد — بعد از آن دیگر رمز عبور لازم نیست"
        rel:
          - ["ssh-copy-id", "نصب کلید عمومی SSH روی سرور راه دور", "دستور ssh-copy-id"]
        labels: ["شبکه", "امنیت"]
      - q: "scp -r ~/projekte/webseite/ alice@server:/var/www/html/"
        a: "کل یک پوشه را به طور امن به کامپیوتر دیگر کپی می‌کند"
        rel:
          - ["scp-cmd", "Secure Copy — انتقال رمزنگاری‌شده فایل از طریق SSH", "دستور scp"]
          - ["scp-r", "Recursive — انتقال پوشه‌ها", "فلگ -r"]
        labels: ["شبکه"]

  - title: "آزمون ترمینال"
    image: "images/section-04-check.svg"
    explanation: |
      حالا دانشت را امتحان کن — دستورات را مستقیماً وارد کن!
    examples:
      - q: "کدام دستور دسترس‌پذیری google.com را با ۴ بسته تست می‌کند؟"
        type: input
        a: "ping -c 4 google.com"
        labels: ["شبکه"]
      - q: "دستور 'curl -s https://ipinfo.io/ip' چه کار می‌کند؟"
        type: select
        options:
          - text: "آدرس اینترنتی خودت را نشان می‌دهد"
            correct: true
          - text: "سرعت اتصال اینترنت را تست می‌کند"
          - text: "پایگاه داده IP را دانلود می‌کند"
          - text: "همه رابط‌های شبکه را نشان می‌دهد"
        labels: ["شبکه"]
      - q: "کدام دستور همه پورت‌های باز و برنامه‌های مربوطه را نشان می‌دهد؟"
        type: select
        options:
          - text: "ss -tulpn"
            correct: true
          - text: "ip addr show"
          - text: "ping -a localhost"
          - text: "netstat --list"
        labels: ["شبکه"]
      - q: "کدام‌یک از این جملات درباره SSH درست هستند؟"
        type: multiple-choice
        options:
          - text: "SSH اتصال را رمزنگاری می‌کند"
            correct: true
          - text: "کلیدهای SSH امن‌تر از رمز عبور هستند"
            correct: true
          - text: "ssh-keygen یک جفت کلید می‌سازد"
            correct: true
          - text: "SSH رمزهای عبور را به صورت متن ساده ارسال می‌کند"
        labels: ["شبکه", "امنیت"]
