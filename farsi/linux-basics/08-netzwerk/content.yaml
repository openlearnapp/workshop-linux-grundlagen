          - "ssh-keygen یک جفت کلید می‌سازد"
          - "SSH رمزهای عبور را به صورت متن ساده ارسال می‌کند"
        a:
          - "SSH اتصال را رمزنگاری می‌کند"
          - "کلیدهای SSH امن‌تر از رمز عبور هستند"
          - "ssh-keygen یک جفت کلید می‌سازد"
