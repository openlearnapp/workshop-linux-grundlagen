version: 2
number: 7
title: "مدیریت بسته‌ها"
description: "apt، snap و dpkg — نصب، به‌روزرسانی و مدیریت نرم‌افزار در Ubuntu/Debian"
image: "images/lesson-header.svg"
image_caption: "جعبه‌های بسته با برچسب‌های apt، dnf و snap"
sections:
  - title: "apt — فروشگاه برنامه لینوکس"
    image: "images/section-01-apt.svg"
    explanation: |
      تصور کن: یک گوشی جدید داری.
      می‌روی توی App Store، یک اپ را جستجو می‌کنی و روی "نصب" می‌زنی.
      تمام!

      لینوکس هم دقیقاً همین را دارد — فقط از طریق ترمینال.
      برنامه‌اش **apt** نام دارد.

      قبل از نصب چیزی، به لینوکس می‌گویی:
      "ببین چه چیز جدیدی هست!"
      ```
      sudo apt update
      ```

      بعد یک برنامه نصب می‌کنی — مثلاً مرورگر Firefox:
      ```
      sudo apt install firefox
      ```

      این یعنی قدم به قدم:
      - `sudo` — "من اینجا رئیسم، این کار را می‌توانم"
      - `apt install` — "لطفاً نصب کن..."
      - `firefox` — "...این برنامه را"

      و وقتی می‌خواهی همه برنامه‌ها را به‌روز کنی:
      ```
      sudo apt upgrade
      ```

      یادت باشه: `apt update` فقط **لیست** نسخه‌های جدید را می‌گیرد.
      `apt upgrade` بعد واقعاً نسخه‌های جدید را نصب می‌کند.
    examples:
      - q: "sudo apt update"
        a: "لیست فعلی همه برنامه‌های موجود را می‌گیرد — مثل نگاه کردن به App Store"
        rel:
          - ["apt-cmd", "Advanced Package Tool — مدیریت بسته برای Debian/Ubuntu", "دستور apt"]
          - ["apt-update", "به‌روزرسانی لیست بسته‌ها از سرورها (نه خود بسته‌ها)", "apt update"]
        labels: ["پیکربندی"]
      - q: "sudo apt upgrade"
        a: "همه برنامه‌های نصب‌شده را به جدیدترین نسخه به‌روز می‌کند"
        rel:
          - ["apt-upgrade", "ارتقاء همه بسته‌های نصب‌شده به جدیدترین نسخه", "apt upgrade"]
        labels: ["پیکربندی"]
      - q: "sudo apt install git curl wget"
        a: "سه برنامه را یک‌جا نصب می‌کند — فقط همه نام‌ها را پشت هم می‌نویسی"
        rel:
          - ["apt-install", "نصب بسته(ها)", "apt install"]
        labels: ["پیکربندی"]
      - q: "sudo apt update && sudo apt upgrade -y"
        a: "به‌روزرسانی و ارتقاء در یک مرحله — -y به همه سؤال‌ها خودکار بله می‌گوید"
        rel:
          - ["apt-y-flag", "Yes — تأیید خودکار همه سؤالات", "فلگ -y"]
        labels: ["پیکربندی"]

  - title: "جستجو، حذف و تمیزکاری برنامه‌ها"
    image: "images/section-02-search-remove.svg"
    explanation: |
      دقیقاً نمی‌دانی اسم یک برنامه چیست؟
      مشکل نیست — می‌توانی دنبالش بگردی:
      ```
      apt search "text editor"
      ```

      مثل تابع جستجوی App Store است.
      لینوکس همه برنامه‌هایی که با جستجویت تطابق دارند را نشان می‌دهد.

      اگر یک برنامه را دیگر نمی‌خواهی، می‌توانی حذفش کنی:
      ```
      sudo apt remove firefox
      ```

      یا کاملاً پاک کن (تنظیمات هم حذف می‌شوند):
      ```
      sudo apt purge firefox
      ```

      و بعد از تمیزکاری، بقایای قدیمی و غیرضروری را هم حذف کن:
      ```
      sudo apt autoremove
      ```

      مثل "پاکسازی حافظه" روی گوشی است —
      برنامه‌هایی که دیگر کسی نیازشان ندارد حذف می‌شوند.
    examples:
      - q: "apt search \"text editor\""
        a: "برنامه‌هایی با 'text editor' در نامشان را جستجو می‌کند — مثل جستجو در App Store"
        rel:
          - ["apt-search", "جستجو در پایگاه داده بسته‌ها", "apt search"]
        labels: ["پیکربندی"]
      - q: "apt show nodejs"
        a: "جزئیات nodejs را نشان می‌دهد: نسخه، حجم، توضیحات — قبل از نصب"
        rel:
          - ["apt-show", "نمایش اطلاعات دقیق یک بسته", "apt show"]
        labels: ["پیکربندی"]
      - q: "sudo apt remove --purge apache2"
        a: "Apache2 را کاملاً حذف می‌کند — تمام تنظیمات هم پاک می‌شوند"
        rel:
          - ["apt-purge", "حذف کامل بسته و تمام فایل‌های پیکربندی", "apt purge / --purge"]
        labels: ["پیکربندی"]
      - q: "sudo apt autoremove && sudo apt clean"
        a: "بقایای قدیمی را حذف و فضا آزاد می‌کند — مثل بهار-تمیزی لینوکس"
        rel:
          - ["apt-autoremove", "حذف بسته‌های خودکار نصب‌شده که دیگر لازم نیستند", "apt autoremove"]
          - ["apt-clean", "حذف فایل‌های بسته دانلودشده از حافظه نهان", "apt clean"]
        labels: ["پیکربندی"]

  - title: "dpkg و snap — روش‌های دیگر نصب"
    image: "images/section-03-dpkg-snap.svg"
    explanation: |
      گاهی یک برنامه در App Store معمولی لینوکس نیست.
      در آن صورت روش‌های دیگری هم هست:

      **روش ۱: نصب مستقیم فایل .deb**
      یک فایل `.deb` مثل یک فایل نصب‌کننده برای لینوکس است.
      ابزار این کار **dpkg** نام دارد.
      ```
      sudo dpkg -i google-chrome.deb
      ```
      `-i` مخفف "install" (نصب) است.

      **روش ۲: snap**
      **Snap** یک سیستم مدرن‌تر است — برنامه‌ها با آن خیلی امن‌تر اجرا می‌شوند،
      جدا از بقیه سیستم، مثل یک جعبه کوچک.
      ```
      snap install vlc
      ```

      **روش ۳: اسکریپت نصب**
      خیلی از برنامه‌های حرفه‌ای یک نصب‌کننده خودشان دارند:
      ```
      curl -fsSL https://get.docker.com | sudo sh
      ```
      این نصب‌کننده را دانلود می‌کند و فوری اجرا می‌کند.
    examples:
      - q: "sudo dpkg -i vscode.deb"
        a: "یک فایل .deb دانلودشده را مستقیم نصب می‌کند — مثل باز کردن یک فایل نصب‌کننده"
        rel:
          - ["dpkg-cmd", "Debian Package — مدیریت مستقیم فایل‌های .deb", "دستور dpkg"]
          - ["dpkg-i", "Install — نصب فایل .deb", "فلگ -i"]
        labels: ["پیکربندی"]
      - q: "dpkg -l | grep \"^ii\""
        a: "همه برنامه‌های صحیح نصب‌شده را نشان می‌دهد — ii یعنی 'درست نصب شده'"
        rel:
          - ["dpkg-l", "List — همه بسته‌های شناخته‌شده و وضعیتشان", "dpkg -l"]
        labels: ["پیکربندی"]
      - q: "snap install code --classic"
        a: "Visual Studio Code از طریق snap نصب می‌کند — --classic دسترسی بیشتری به برنامه می‌دهد"
        rel:
          - ["snap-cmd", "سیستم بسته Snap — اپ‌های ایزوله با به‌روزرسانی خودکار", "دستور snap"]
          - ["snap-classic", "Classic confinement — دسترسی کامل سیستم برای برنامه‌های IDE-مانند", "فلگ --classic"]
        labels: ["پیکربندی"]
      - q: "snap list"
        a: "همه برنامه‌هایی که از طریق snap نصب شده‌اند را نشان می‌دهد"
        rel:
          - ["snap-list", "لیست همه بسته‌های snap نصب‌شده", "snap list"]
        labels: ["پیکربندی"]

  - title: "آزمون ترمینال"
    image: "images/section-04-check.svg"
    explanation: |
      حالا دانشت را امتحان کن — دستورات را مستقیماً وارد کن!
    examples:
      - q: "کدام دستور لیست برنامه‌ها را در Ubuntu به‌روز می‌کند؟"
        type: input
        a: "sudo apt update"
        labels: ["پیکربندی"]
      - q: "تفاوت 'apt update' و 'apt upgrade' چیست؟"
        type: select
        options:
          - text: "update لیست‌های برنامه‌های جدید را می‌گیرد، upgrade به‌روزرسانی‌ها را خودش نصب می‌کند"
            correct: true
          - text: "update برنامه‌ها نصب می‌کند، upgrade قدیمی‌ها را حذف می‌کند"
          - text: "update و upgrade یک کار می‌کنند"
          - text: "upgrade لیست‌های برنامه‌ها را می‌گیرد، update به‌روزرسانی‌ها را نصب می‌کند"
        labels: ["پیکربندی"]
      - q: "کدام دستور یک برنامه را با همه تنظیماتش حذف می‌کند؟"
        type: select
        options:
          - text: "sudo apt purge nginx"
            correct: true
          - text: "sudo apt remove nginx"
          - text: "sudo apt delete nginx"
          - text: "sudo apt uninstall nginx"
        labels: ["پیکربندی"]
      - q: "کدام‌یک از این جملات درباره apt درست هستند؟"
        type: multiple-choice
        options:
          - text: "apt می‌تواند چند برنامه را یک‌جا نصب کند"
            correct: true
          - text: "apt autoremove برنامه‌های غیرضروری را حذف می‌کند"
            correct: true
          - text: "apt search پایگاه داده برنامه‌ها را جستجو می‌کند"
            correct: true
          - text: "apt نیازی به دسترسی مدیر ندارد"
        labels: ["پیکربندی"]
