      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="640" height="160" fill="url(#bg)" rx="8"/>
  <!-- Decorative elements -->
  <circle cx="80" cy="60" r="2" fill="#3fb950" opacity="0.15"/><circle cx="95" cy="45" r="1.5" fill="#3fb950" opacity="0.1"/><circle cx="70" cy="100" r="1" fill="#3fb950" opacity="0.12"/>
  <circle cx="560" cy="60" r="2" fill="#3fb950" opacity="0.15"/><circle cx="545" cy="100" r="1.5" fill="#3fb950" opacity="0.1"/><circle cx="570" cy="45" r="1" fill="#3fb950" opacity="0.12"/>
  <!-- Icon -->
  
  <!-- Package box -->
  <rect x="298" y="45" width="44" height="40" rx="4" fill="#21262d" stroke="#3fb950" stroke-width="2"/>
  <line x1="320" y1="45" x2="320" y2="85" stroke="#3fb950" stroke-width="1" opacity="0.3"/>
  <line x1="298" y1="65" x2="342" y2="65" stroke="#3fb950" stroke-width="1" opacity="0.3"/>
