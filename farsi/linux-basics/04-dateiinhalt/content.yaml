version: 2
number: 4
title: "محتوای فایل"
description: "cat، less، head، tail و grep — خواندن، مرور و فیلتر کردن فایل‌ها"
image: "images/lesson-header.svg"
sections:
  - title: "cat، less و more — خواندن فایل‌ها"
    image: "images/section-01-read.svg"
    explanation: |
      **چرا این مهم است؟** به عنوان کاربر لینوکس، مدام فایل‌ها را می‌خوانید:
      پیکربندی‌ها، فایل‌های لاگ، اسکریپت‌ها، خروجی پایگاه داده. ابزار مناسب
      تعیین می‌کند که ۱۰ ثانیه وقت بگذارید یا ۱۰ دقیقه.

      | دستور | برای چه؟ |
      |--------|----------|
      | `cat` | نمایش کامل فایل‌های کوتاه |
      | `less` | مرور تعاملی فایل‌های بلند |
      | `more` | مشابه less، اما ساده‌تر |
      | `head` | فقط N خط اول |
      | `tail` | فقط N خط آخر |

      در `less` با این کلیدها حرکت می‌کنید:
      - `j`/`k` یا کلیدهای جهتی: یک خط بالا/پایین
      - `Space`/`b`: صفحه جلو/عقب
      - `/عبارت‌جستجو`: جستجو
      - `q`: خروج
    examples:
      - q: "cat /etc/hostname"
        a: "نام میزبان سیستم را نشان می‌دهد — یک فایل کوتاه، ایده‌آل برای cat"
        rel:
          - ["cat-content", "نمایش کامل محتوای فایل", "دستور cat"]
          - ["etc-hostname", "فایل حاوی نام کامپیوتر", "/etc/hostname"]
        labels: ["فایل‌سیستم", "پیکربندی"]
      - q: "cat /etc/passwd"
        a: "تمام حساب‌های کاربری سیستم را نشان می‌دهد (نام، شناسه، پوشه خانگی، Shell)"
        rel:
          - ["etc-passwd", "پایگاه داده کاربران سیستم", "/etc/passwd"]
        labels: ["فایل‌سیستم", "امنیت"]
      - q: "less /var/log/syslog"
        a: "مرور تعاملی لاگ سیستم — با / جستجو کنید، با q خارج شوید"
        rel:
          - ["less-cmd", "خواندن تعاملی و قابل اسکرول فایل‌های بلند", "دستور less"]
          - ["syslog", "گزارش مرکزی سیستم با تمام رویدادهای مهم", "/var/log/syslog"]
        labels: ["فایل‌سیستم"]

  - title: "head و tail — ابتدا و انتها"
    image: "images/section-02-head-tail.svg"
    explanation: |
      `head` و `tail` به ترتیب اولین یا آخرین خطوط یک فایل را نشان می‌دهند.
      پیش‌فرض: ۱۰ خط. با `-n` می‌توانید تعداد را تنظیم کنید.

      **قدرتمندترین قابلیت tail:** با `tail -f` یک فایل را به صورت زنده دنبال می‌کنید:
      ```bash
      tail -f /var/log/nginx/access.log
      ```
      ایده‌آل برای لاگ‌های سرور، در حین دریافت درخواست‌ها — هر دسترسی را فوراً می‌بینید.
      با `Ctrl+C` دنبال‌کردن زنده را متوقف می‌کنید.
    examples:
      - q: "head -20 /etc/ssh/sshd_config"
        a: "۲۰ خط اول پیکربندی سرور SSH را نشان می‌دهد"
        rel:
          - ["head-cmd", "نمایش ابتدای فایل (پیش‌فرض: ۱۰ خط)", "دستور head"]
          - ["head-n", "تعیین تعداد خطوط نمایش‌داده‌شده", "فلگ -n"]
          - ["sshd-config", "فایل پیکربندی سرور SSH", "/etc/ssh/sshd_config"]
        labels: ["فایل‌سیستم", "پیکربندی"]
      - q: "tail -50 /var/log/auth.log"
        a: "۵۰ خط آخر لاگ احراز هویت — تلاش‌های ورود و احراز هویت را نشان می‌دهد"
        rel:
          - ["tail-cmd", "نمایش انتهای فایل (پیش‌فرض: ۱۰ خط)", "دستور tail"]
          - ["auth-log", "گزارش احراز هویت و استفاده از sudo", "/var/log/auth.log"]
        labels: ["فایل‌سیستم", "امنیت"]
      - q: "tail -f /var/log/nginx/access.log"
        a: "دنبال‌کردن زنده دسترسی‌های Nginx — عالی برای دیباگ زنده"
        rel:
          - ["tail-f", "Follow — دنبال‌کردن فایل به صورت زنده، خطوط جدید فوراً نمایش داده می‌شوند", "فلگ -f"]
        labels: ["فایل‌سیستم", "شبکه"]

  - title: "grep — پیدا کردن سوزن در انبار کاه"
    image: "images/section-03-grep.svg"
    explanation: |
      `grep` (Global Regular Expression Print) فایل‌ها را بر اساس الگو جستجو می‌کند.
      یکی از پرکاربردترین ابزارهای لینوکس است.

      | دستور | عملکرد |
      |--------|---------|
      | `grep "fehler" datei.txt` | تمام خطوط حاوی "fehler" |
      | `grep -i "Fehler" datei.txt` | بدون توجه به بزرگی/کوچکی حروف |
      | `grep -n "ERROR" log.txt` | با شماره خط |
      | `grep -r "TODO" ~/projekte/` | بازگشتی در تمام زیرپوشه‌ها |
      | `grep -v "DEBUG" app.log` | تمام خطوط بدون "DEBUG" |
      | `grep -c "ERROR" app.log` | فقط تعداد نتایج |

      **ترکیب با دستورات دیگر** grep را خیلی قدرتمند می‌کند:
      ```bash
      cat /var/log/auth.log | grep "Failed"
      ```
    examples:
      - q: "grep -i \"error\" /var/log/syslog"
        a: "جستجوی تمام پیام‌های خطا در لاگ سیستم، بدون توجه به بزرگی/کوچکی حروف"
        rel:
          - ["grep-cmd", "جستجوی خطوط فایل بر اساس الگو", "دستور grep"]
          - ["grep-i", "Case-insensitive — بدون توجه به بزرگی/کوچکی حروف", "فلگ -i"]
        labels: ["فایل‌سیستم"]
      - q: "grep -n \"TODO\" ~/projekte/app.py"
        a: "پیدا کردن تمام نظرات TODO در اسکریپت پایتون با شماره خط"
        rel:
          - ["grep-n", "Number — نمایش شماره خط نتایج", "فلگ -n"]
        labels: ["فایل‌سیستم"]
      - q: "grep -r \"database_url\" ~/projekte/"
        a: "جستجو در تمام فایل‌های زیر ~/projekte/ برای database_url — پیکربندی‌های فراموش‌شده را هم پیدا می‌کند"
        rel:
          - ["grep-r", "Recursive — جستجو در پوشه‌ها و زیرپوشه‌ها", "فلگ -r"]
        labels: ["فایل‌سیستم"]
      - q: "grep -v \"^#\" /etc/ssh/sshd_config"
        a: "پیکربندی SSH بدون خطوط توضیح (که با # شروع می‌شوند)"
        rel:
          - ["grep-v", "Invert match — نمایش خطوط بدون الگو", "فلگ -v"]
          - ["regex-caret", "^ در Regex = ابتدای خط", "Regex ^"]
        labels: ["فایل‌سیستم", "پیکربندی"]

  - title: "🖥️ آزمون ترمینال"
    image: "images/section-04-check.svg"
    explanation: |
      حالا دانش خود را تست کنید — دستورات را مستقیماً وارد کنید!
    examples:
      - q: "کدام دستور یک فایل را به صورت تعاملی می‌خواند و امکان اسکرول دارد؟"
        type: input
        a: "less"
        labels: ["فایل‌سیستم"]
      - q: "دستور 'tail -f /var/log/nginx/access.log' چه کار می‌کند؟"
        type: select
        options:
          - text: "فایل را به صورت زنده دنبال می‌کند و خطوط جدید را فوراً نشان می‌دهد"
            correct: true
          - text: "۱۰ خط آخر را نشان می‌دهد و خارج می‌شود"
          - text: "خطوط آخر فایل را حذف می‌کند"
          - text: "عبارت 'nginx' را جستجو می‌کند"
        labels: ["فایل‌سیستم"]
      - q: "کدام دستور بدون توجه به بزرگی/کوچکی حروف 'error' را در یک فایل جستجو می‌کند؟"
        type: select
        options:
          - text: "grep -i \"error\" datei.txt"
            correct: true
          - text: "grep -n \"error\" datei.txt"
          - text: "grep -r \"error\" datei.txt"
          - text: "grep -v \"error\" datei.txt"
        labels: ["فایل‌سیستم"]
      - q: "کدام‌یک از فلگ‌های grep از نظر معنی درست هستند؟"
        type: multiple-choice
        options:
          - text: "-i بزرگی/کوچکی حروف را نادیده می‌گیرد"
            correct: true
          - text: "-n شماره خط‌ها را نشان می‌دهد"
            correct: true
          - text: "-r پوشه‌ها را به صورت بازگشتی جستجو می‌کند"
            correct: true
          - text: "-v فقط نتایج بدون زمینه را نشان می‌دهد"
        labels: ["فایل‌سیستم"]
