version: 2
number: 4
title: "محتوای فایل"
description: "یاد بگیر چطور فایل‌ها را بخوانی، صفحه‌صفحه ورق بزنی و کلمات خاص را جستجو کنی"
image: "images/lesson-header.svg"
image_caption: "ترمینال با خروجی cat، head و grep"
sections:
  - title: "cat، less و more — خواندن فایل‌ها"
    image: "images/section-01-read.svg"
    explanation: |
      چطور توی ترمینال فایل‌ها را می‌خوانیم؟ برای این کار دستورات مختلفی وجود دارد —
      هر کدام برای یک اندازه فایل بهتر است.

      | دستور | برای چه؟ |
      |--------|----------|
      | `cat` | نمایش کامل فایل‌های کوتاه (cat = "concatenate" یعنی "به هم متصل کردن") |
      | `less` | ورق زدن فایل‌های بلند صفحه‌صفحه — مثل یک کتاب! |
      | `head` | فقط اولین خطوط یک فایل |
      | `tail` | فقط آخرین خطوط یک فایل |

      **`cat`** کل فایل را یک‌بار نشان می‌دهد:
      ```
      cat meine-datei.txt
      ```

      **`less`** مثل یک کتاب‌خوان برای متن‌های طولانی است.
      می‌توانی داخلش ورق بزنی:
      - کلیدهای جهتی یا `j`/`k`: یک خط بالا/پایین
      - فاصله: یک صفحه جلو
      - `q`: خروج (Q مثل "Quit" = "تمام شد")
      - `/کلمه`: جستجوی یک کلمه

      امتحان کن: `less /etc/hostname`
    examples:
      - q: "cat /etc/hostname"
        a: "نام کامپیوتر سیستم را نشان می‌دهد — یک فایل کوتاه، عالی برای cat"
        rel:
          - ["cat-content", "نمایش کامل محتوای فایل", "دستور cat"]
          - ["etc-hostname", "فایل حاوی نام کامپیوتر سیستم", "/etc/hostname"]
        labels: ["فایل‌سیستم", "پیکربندی"]
      - q: "cat /etc/passwd"
        a: "همه حساب‌های کاربری سیستم را نشان می‌دهد — نام، شماره، پوشه و اینکه از چه Shell‌ای استفاده می‌کنند"
        rel:
          - ["etc-passwd", "پایگاه داده کاربران سیستم", "/etc/passwd"]
        labels: ["فایل‌سیستم", "امنیت"]
      - q: "less /var/log/syslog"
        a: "گزارش سیستم را برای ورق زدن باز می‌کند — با / جستجو کن، با q خارج شو"
        rel:
          - ["less-cmd", "خواندن تعاملی فایل‌های بلند با قابلیت اسکرول", "دستور less"]
          - ["syslog", "گزارش مرکزی سیستم — لینوکس رویدادهای مهم را اینجا می‌نویسد", "/var/log/syslog"]
        labels: ["فایل‌سیستم"]

  - title: "head و tail — ابتدا و انتها"
    image: "images/section-02-head-tail.svg"
    explanation: |
      گاهی نمی‌خواهی کل فایل را ببینی — فقط ابتدا یا انتهایش.
      برای این کار `head` و `tail` هستند.

      `head` **اولین** خطوط را نشان می‌دهد (پیش‌فرض: ۱۰ خط اول).
      `tail` **آخرین** خطوط را نشان می‌دهد (پیش‌فرض: ۱۰ خط آخر).

      با `-n` می‌توانی تعیین کنی چند خط می‌خواهی ببینی:
      ```
      head -5 datei.txt    # ۵ خط اول
      tail -20 datei.txt   # ۲۰ خط آخر
      ```

      **باحال‌ترین قابلیت `tail`:** با `-f` فایل را زنده می‌بینی —
      خطوط جدید همان لحظه که نوشته می‌شوند، ظاهر می‌شوند.
      مثل تلویزیون زنده برای فایل‌ها!
      ```
      tail -f /var/log/syslog
      ```
      با `Ctrl+C` (Ctrl را نگه دار و C را فشار بده) از نمایش زنده خارج می‌شوی.
    examples:
      - q: "head -20 /etc/ssh/sshd_config"
        a: "۲۰ خط اول فایل تنظیمات سرور SSH را نشان می‌دهد (SSH یک روش برای کنترل از راه دور کامپیوترهاست)"
        rel:
          - ["head-cmd", "نمایش ابتدای فایل (پیش‌فرض: ۱۰ خط)", "دستور head"]
          - ["head-n", "تعیین تعداد خطوطی که نشان داده می‌شوند", "فلگ -n"]
          - ["sshd-config", "فایل پیکربندی سرور SSH", "/etc/ssh/sshd_config"]
        labels: ["فایل‌سیستم", "پیکربندی"]
      - q: "tail -50 /var/log/auth.log"
        a: "۵۰ خط آخر فایل ورود را نشان می‌دهد — اینجا می‌بینی چه کسی وارد شده"
        rel:
          - ["tail-cmd", "نمایش انتهای فایل (پیش‌فرض: ۱۰ خط)", "دستور tail"]
          - ["auth-log", "فایل گزارش ورودها به سیستم", "/var/log/auth.log"]
        labels: ["فایل‌سیستم", "امنیت"]
      - q: "tail -f /var/log/nginx/access.log"
        a: "همه دسترسی‌های وب‌سرور را زنده نشان می‌دهد — ورودی‌های جدید فوری ظاهر می‌شوند!"
        rel:
          - ["tail-f", "Follow — دنبال کردن فایل به صورت زنده، خطوط جدید فوری نشان داده می‌شوند", "فلگ -f"]
        labels: ["فایل‌سیستم", "شبکه"]

  - title: "grep — جستجو مثل یک کارآگاه"
    image: "images/section-03-grep.svg"
    explanation: |
      `grep` ابزار کارآگاه توست.
      فایل‌ها را به دنبال یک کلمه یا جمله خاص جستجو می‌کند — و فقط
      خطوطی را نشان می‌دهد که آن کلمه داخلشان هست.

      تصور کن یک لیست ۱۰۰۰ تایی داری
      و دنبال کلمه "خطا" می‌گردی. بدون grep باید همه را بخوانی.
      با grep در چند ثانیه پیدا می‌کند!

      | دستور | چه چیزی جستجو می‌کند |
      |--------|--------------|
      | `grep "hallo" datei.txt` | همه خطوط با "hallo" |
      | `grep -i "Hallo" datei.txt` | مهم نیست بزرگ یا کوچک نوشته شده (`-i` = ignore case) |
      | `grep -n "Fehler" log.txt` | با شماره خط — دقیقاً کجاست؟ |
      | `grep -r "TODO" ~/projekte/` | در همه فایل‌های یک پوشه جستجو می‌کند |
      | `grep -v "OK" ergebnis.txt` | همه خطوط بدون "OK" — یعنی مشکلات! |

      می‌توانی grep را با دستورات دیگر هم ترکیب کنی:
      ```
      cat /etc/passwd | grep alice
      ```
      علامت `|` (Pipe) خروجی `cat` را مستقیم به `grep` می‌فرستد.
    examples:
      - q: "grep -i \"error\" /var/log/syslog"
        a: "دنبال 'error' در گزارش سیستم می‌گردد — مهم نیست بزرگ یا کوچک نوشته شده"
        rel:
          - ["grep-cmd", "جستجوی خطوط فایل‌ها بر اساس الگو", "دستور grep"]
          - ["grep-i", "Case-insensitive — نادیده گرفتن بزرگی/کوچکی حروف", "فلگ -i"]
        labels: ["فایل‌سیستم"]
      - q: "grep -n \"TODO\" ~/projekte/app.py"
        a: "همه نظرات TODO در کد برنامه را پیدا می‌کند و شماره خط‌ها را نشان می‌دهد"
        rel:
          - ["grep-n", "Number — نمایش شماره خطوط یافت‌شده", "فلگ -n"]
        labels: ["فایل‌سیستم"]
      - q: "grep -r \"database_url\" ~/projekte/"
        a: "در همه فایل‌های پوشه projekte دنبال 'database_url' می‌گردد — تنظیمات فراموش‌شده را هم پیدا می‌کند"
        rel:
          - ["grep-r", "Recursive — جستجو در پوشه‌ها و زیرپوشه‌ها", "فلگ -r"]
        labels: ["فایل‌سیستم"]
      - q: "grep -v \"^#\" /etc/ssh/sshd_config"
        a: "تنظیمات SSH را بدون خطوط توضیح نشان می‌دهد (توضیحات با # شروع می‌شوند و فقط توضیح هستند)"
        rel:
          - ["grep-v", "Invert match — نمایش خطوط بدون الگو", "فلگ -v"]
          - ["regex-caret", "^ در الگوی جستجو یعنی: ابتدای خط", "Regex ^"]
        labels: ["فایل‌سیستم", "پیکربندی"]

  - title: "آزمون ترمینال"
    image: "images/section-04-check.svg"
    explanation: |
      حالا دانشت را امتحان کن!
    examples:
      - q: "کدام دستور به تو اجازه می‌دهد فایلی را صفحه‌صفحه ورق بزنی؟"
        type: input
        a: "less"
        labels: ["فایل‌سیستم"]
      - q: "دستور 'tail -f /var/log/syslog' چه کار می‌کند؟"
        type: select
        options:
          - text: "خطوط جدید فایل را فوری زنده نشان می‌دهد"
            correct: true
          - text: "۱۰ خط آخر را نشان می‌دهد و تمام می‌کند"
          - text: "آخرین خطوط فایل را پاک می‌کند"
          - text: "دنبال کلمه 'syslog' می‌گردد"
        labels: ["فایل‌سیستم"]
      - q: "کدام دستور بدون توجه به بزرگی و کوچکی حروف دنبال 'error' می‌گردد؟"
        type: select
        options:
          - text: "grep -i \"error\" datei.txt"
            correct: true
          - text: "grep -n \"error\" datei.txt"
          - text: "grep -r \"error\" datei.txt"
          - text: "grep -v \"error\" datei.txt"
        labels: ["فایل‌سیستم"]
      - q: "کدام‌یک از فلگ‌های grep معنی درستی دارند؟"
        type: multiple-choice
        options:
          - text: "-i بزرگی/کوچکی حروف را نادیده می‌گیرد"
            correct: true
          - text: "-n شماره خطوط را نشان می‌دهد"
            correct: true
          - text: "-r پوشه‌ها را به صورت بازگشتی جستجو می‌کند"
            correct: true
          - text: "-v فقط نتایج بدون زمینه را نشان می‌دهد"
        labels: ["فایل‌سیستم"]
