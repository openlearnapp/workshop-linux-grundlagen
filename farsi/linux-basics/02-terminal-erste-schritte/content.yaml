version: 2
number: 2
title: "ترمینال — اولین قدم‌ها"
description: "با ترمینال آشنا شو و سه دستور اول را یاد بگیر: pwd، ls و cd"
image: "images/lesson-header.svg"
image_caption: "پنجره ترمینال با Prompt و دستورات"
sections:
  - title: "ترمینال — بلندگوی تو برای صحبت با کامپیوتر"
    image: "images/section-01-open-terminal.svg"
    explanation: |
      **ترمینال** (که بهش کنسول، خط فرمان یا Shell هم می‌گویند) مثل یک بلندگو
      برای صحبت با کامپیوتر است. به جای کلیک با ماوس، دستوراتی تایپ می‌کنی —
      و کامپیوتر با متن جواب می‌دهد.

      شاید پیچیده به نظر برسد، ولی خیلی ساده‌ست!
      چند کلمه یاد می‌گیری (دستورات) — و کامپیوتر دقیقاً همان را انجام می‌دهد.

      وقتی ترمینال را باز می‌کنی، **Prompt** را می‌بینی
      (به معنی "فراخوانی" — کامپیوتر منتظر ورودی توست):
      ```
      alice@ubuntu:~$
      ```
      این یعنی:
      - `alice` = نام کاربری تو
      - `ubuntu` = نام کامپیوترت
      - `~` = الان در پوشه شخصی خودتی
      - `$` = کاربر عادی هستی (نه مدیر)

      **اولین دستور مهمت:** `pwd`
      این نشان می‌دهد الان در کدام پوشه هستی.
      PWD مخفف "Print Working Directory" است — یعنی "پوشه کاری‌ام را نشان بده".
    examples:
      - q: "pwd"
        a: "مسیر پوشه فعلی را نشان می‌دهد — مثلاً /home/alice. همیشه می‌دانی کجا هستی!"
        rel:
          - ["pwd", "Print Working Directory — نمایش پوشه فعلی", "دستور"]
        labels: ["مبانی"]
      - q: "whoami"
        a: "نام کاربری‌ات را نشان می‌دهد — به انگلیسی یعنی 'من کی هستم؟'"
        rel:
          - ["whoami", "نمایش نام کاربر فعلی", "دستور"]
        labels: ["مبانی"]
      - q: "date"
        a: "تاریخ و ساعت فعلی را نشان می‌دهد"
        rel:
          - ["date-cmd", "نمایش تاریخ و ساعت فعلی", "دستور date"]
        labels: ["مبانی"]

  - title: "ls — ببین توی پوشه چیست"
    image: "images/section-02-ls.svg"
    explanation: |
      `ls` نشان می‌دهد توی یک پوشه چه چیزی هست.
      LS مخفف "list" (لیست کردن) است.

      مثل یک کلید برق، گزینه‌های اضافه‌ای هم داری.
      بهشان **Flags** می‌گویند (گزینه‌های کوچکی که بعد از `-` اضافه می‌کنی):

      | دستور | چه نشان می‌دهد |
      |--------|-------------|
      | `ls` | فقط نام فایل‌ها و پوشه‌ها |
      | `ls -l` | جزئیات: چه کسی مجاز است، چه اندازه‌ای، کِی تغییر کرده |
      | `ls -a` | فایل‌های پنهان هم نشان می‌دهد (آنهایی که با نقطه شروع می‌شوند، مثل `.bashrc`) |
      | `ls -la` | جزئیات و فایل‌های پنهان با هم |
      | `ls -lh` | حجم فایل‌ها به شکل خوانا (KB، MB، GB به جای اعداد طولانی) |

      نکته طلایی: می‌توانی `-l` و `-a` را با هم `-la` بنویسی —
      این یک میانبر است!

      یک خط از نمایش جزئیات این‌طور است:
      ```
      -rw-r--r-- 1 alice alice 4096 Mar 20 10:23 notizen.txt
      ```
      این یعنی: دسترسی‌ها — مالک — حجم — تاریخ — نام فایل.
      دسترسی‌ها را در درس ۵ دقیق‌تر یاد می‌گیری!
    examples:
      - q: "ls -la"
        a: "همه فایل‌ها از جمله فایل‌های پنهان با جزئیات (دسترسی‌ها، حجم، تاریخ) — خیلی مفید!"
        rel:
          - ["ls-l", "Long format — نمایش جزئیات", "فلگ -l"]
          - ["ls-a", "All — فایل‌های پنهان (.dotfiles) هم نشان می‌دهد", "فلگ -a"]
        labels: ["مبانی", "فایل‌سیستم"]
      - q: "ls -lh /var/log"
        a: "فایل‌های پوشه لاگ را با حجم‌های خوانا (KB، MB) نشان می‌دهد"
        rel:
          - ["ls-h", "Human-readable — حجم فایل‌ها به شکل خوانا (KB/MB/GB)", "فلگ -h"]
          - ["var-log", "پوشه لاگ سیستم — لینوکس گزارش‌ها را اینجا ذخیره می‌کند", "/var/log"]
        labels: ["فایل‌سیستم"]
      - q: "ls -lt ~/.ssh"
        a: "فایل‌های پوشه SSH را نشان می‌دهد، جدیدترین فایل اول"
        rel:
          - ["ls-t", "Time — مرتب‌سازی بر اساس زمان تغییر، جدیدترین اول", "فلگ -t"]
          - ["ssh-dir", "پوشه کلیدهای SSH و پیکربندی", "~/.ssh"]
        labels: ["فایل‌سیستم", "امنیت"]
      - q: "ls -la /etc/nginx/"
        a: "همه فایل‌های پوشه nginx را با جزئیات نشان می‌دهد (nginx یک برنامه وب‌سرور است)"
        rel:
          - ["nginx-dir", "پوشه پیکربندی وب‌سرور Nginx", "/etc/nginx/"]
        labels: ["فایل‌سیستم", "پیکربندی"]

  - title: "cd — از پوشه‌ای به پوشه دیگر"
    image: "images/section-03-cd.svg"
    explanation: |
      با `cd` بین پوشه‌ها جابه‌جا می‌شوی.
      CD مخفف "Change Directory" — یعنی "پوشه را عوض کن".

      سیستم فایل را مثل یک خانه تصور کن: هر اتاق یک پوشه است.
      با `cd` از اتاقی به اتاق دیگر می‌روی.

      | دستور | چه اتفاقی می‌افتد؟ |
      |--------|---------------|
      | `cd /` | برو بالاترین سطح — ریشه سیستم فایل |
      | `cd ~` | برگشت به پوشه شخصی (یا فقط `cd`) |
      | `cd ..` | یک پوشه بالاتر برو (مثل Backspace) |
      | `cd ../..` | دو پوشه بالاتر برو |
      | `cd -` | برگشت به پوشه قبلی (مثل دکمه برگشت مرورگر!) |
      | `cd /etc` | مستقیم به یک پوشه خاص برو |

      **ترفند مخفی — کلید Tab:**
      `cd /etc/ngi` را تایپ کن و بعد `Tab` (کلیدی که بالای Caps Lock است) را فشار بده.
      ترمینال خودکار تکمیل می‌کند به `cd /etc/nginx/` — خیلی در تایپ صرفه‌جویی می‌کند!
    examples:
      - q: "cd /var/log"
        a: "مستقیم به پوشه لاگ می‌رود — این یک مسیر مطلق است (همیشه با / شروع می‌شود)"
        rel:
          - ["cd-cmd", "Change Directory — تغییر پوشه", "دستور cd"]
          - ["absolute-path", "مسیری که همیشه از / شروع می‌شود، مستقل از موقعیت فعلی", "مسیر مطلق"]
        labels: ["فایل‌سیستم"]
      - q: "cd .."
        a: "یک پوشه بالاتر می‌رود — از /home/alice می‌شود /home"
        rel:
          - ["dotdot", "دو نقطه = پوشه والد (پوشه بالاتر)", ".."]
        labels: ["فایل‌سیستم"]
      - q: "cd ~"
        a: "همیشه به پوشه شخصی‌ات برمی‌گردد — هر جایی که باشی"
        rel:
          - ["tilde", "میانبر برای پوشه خانگی خودت", "~"]
        labels: ["فایل‌سیستم"]
      - q: "cd -"
        a: "به پوشه‌ای که آخرین بار بودی برمی‌گردد — خیلی عملی!"
        rel:
          - ["cd-minus", "برگشت به پوشه قبلی", "cd -"]
        labels: ["فایل‌سیستم"]
      - q: "cd /home/alice/projekte && pwd"
        a: "به پوشه projekte می‌رود و بعد فوری مسیر را نشان می‌دهد"
        rel:
          - ["double-ampersand", "دو دستور پشت سر هم اجرا می‌کند — دومی فقط اگر اولی موفق شد", "&&"]
        labels: ["فایل‌سیستم"]

  - title: "آزمون ترمینال"
    image: "images/section-04-check.svg"
    explanation: |
      حالا دانشت را امتحان کن!
    examples:
      - q: "کدام دستور پوشه فعلی‌ات را نشان می‌دهد؟"
        type: input
        a: "pwd"
        labels: ["مبانی"]
      - q: "دستور 'ls -la' چه کاری می‌کند؟"
        type: select
        options:
          - text: "همه فایل‌ها از جمله پنهان‌ها را با جزئیات نشان می‌دهد"
            correct: true
          - text: "همه فایل‌ها را پاک می‌کند"
          - text: "آخرین عملیات را لغو می‌کند"
          - text: "فایل‌های لاگ را نشان می‌دهد"
        labels: ["مبانی", "فایل‌سیستم"]
      - q: "کدام دستور به پوشه‌ای که آخرین بار بودی برمی‌گردد؟"
        type: select
        options:
          - text: "cd -"
            correct: true
          - text: "cd .."
          - text: "cd ~"
          - text: "cd /"
        labels: ["فایل‌سیستم"]
      - q: "کدام‌یک از این فلگ‌ها متعلق به دستور 'ls' هستند؟"
        type: multiple-choice
        options:
          - text: "-l"
            correct: true
          - text: "-a"
            correct: true
          - text: "-x"
          - text: "-h"
            correct: true
          - text: "-t"
            correct: true
        labels: ["مبانی"]
