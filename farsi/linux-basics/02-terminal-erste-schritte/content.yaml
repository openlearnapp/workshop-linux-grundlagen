version: 2
number: 2
title: "ترمینال — اولین قدم‌ها"
description: "تسلط بر pwd، ls و cd — سه دستور پایه برای حرکت در سیستم فایل"
image: "images/lesson-header.svg"
sections:
  - title: "باز کردن ترمینال — من کجا هستم؟"
    explanation: |
      **ترمینال** (همچنین: Shell، کنسول، خط فرمان) ارتباط مستقیم شما
      با سیستم‌عامل است. بدون کلیک ماوس، بدون جستجوی منو — فقط شما و کامپیوتر.

      وقتی ترمینال را باز می‌کنید، **Prompt** را می‌بینید:
      ```
      alice@ubuntu:~$
      ```
      یعنی:
      - `alice` = نام کاربری
      - `ubuntu` = نام کامپیوتر (Hostname)
      - `~` = شما در پوشه خانگی هستید
      - `$` = کاربر عادی (اگر `#` باشد، شما root/مدیر هستید)

      **مهم‌ترین دستور اول شما:** `pwd` — *Print Working Directory*.
      همیشه به شما می‌گوید کجا هستید.
    examples:
      - q: "pwd"
        a: "مسیر فعلی را نشان می‌دهد، مثلاً /home/alice — همیشه می‌دانید کجا هستید"
        rel:
          - ["pwd", "Print Working Directory — نمایش پوشه فعلی", "دستور"]
        labels: ["مبانی"]
      - q: "whoami"
        a: "نام کاربری شما را نمایش می‌دهد — مفید وقتی با چند کاربر کار می‌کنید"
        rel:
          - ["whoami", "نمایش نام کاربر فعلی", "دستور"]
        labels: ["مبانی"]
      - q: "date"
        a: "تاریخ و ساعت فعلی را نشان می‌دهد"
        rel:
          - ["date-cmd", "نمایش تاریخ و ساعت فعلی", "دستور date"]
        labels: ["مبانی"]

  - title: "ls — اینجا چه چیزی هست؟"
    explanation: |
      `ls` محتوای پوشه فعلی را لیست می‌کند.
      با فلگ‌ها، `ls` واقعاً قدرتمند می‌شود:

      | دستور | چه چیزی نشان می‌دهد |
      |--------|-------------|
      | `ls` | فقط نام فایل‌ها |
      | `ls -l` | جزئیات: مجوزها، حجم، تاریخ |
      | `ls -a` | فایل‌های مخفی هم (که با `.` شروع می‌شوند) |
      | `ls -la` | جزئیات + فایل‌های مخفی (ترکیب!) |
      | `ls -lh` | حجم فایل‌ها در فرمت خوانا (KB، MB، GB) |
      | `ls -lt` | مرتب‌شده بر اساس تاریخ تغییر (جدیدترین اول) |

      در خروجی `-l`، ستون‌ها این معنی را دارند:
      ```
      -rw-r--r-- 1 alice alice 4096 Mar 20 10:23 dokument.txt
      ↑مجوزها    ↑لینک ↑مالک     ↑حجم  ↑تاریخ  ↑نام
      ```
    examples:
      - q: "ls -la"
        a: "تمام فایل‌ها از جمله مخفی‌ها با جزئیات (مجوزها، حجم، تاریخ)"
        rel:
          - ["ls-l", "Long format — نمای جزئیات", "فلگ -l"]
          - ["ls-a", "All — فایل‌های مخفی هم (.dotfiles)", "فلگ -a"]
        labels: ["مبانی", "فایل‌سیستم"]
      - q: "ls -lh /var/log"
        a: "فایل‌های لاگ با حجم خوانا (KB، MB) نمایش داده می‌شوند"
        rel:
          - ["ls-h", "Human-readable — حجم فایل‌ها به صورت خوانا (KB/MB/GB)", "فلگ -h"]
          - ["var-log", "پوشه لاگ‌های سیستم با فایل‌های گزارش", "/var/log"]
        labels: ["فایل‌سیستم"]
      - q: "ls -lt ~/.ssh"
        a: "فایل‌های پیکربندی SSH مرتب‌شده بر اساس آخرین تغییر"
        rel:
          - ["ls-t", "Time — مرتب‌سازی بر اساس زمان تغییر، جدیدترین اول", "فلگ -t"]
          - ["ssh-dir", "پوشه کلیدها و پیکربندی SSH", "~/.ssh"]
        labels: ["فایل‌سیستم", "امنیت"]
      - q: "ls -la /etc/nginx/"
        a: "تمام فایل‌های پیکربندی Nginx با جزئیات"
        rel:
          - ["nginx-dir", "پوشه پیکربندی وب‌سرور Nginx", "/etc/nginx/"]
        labels: ["فایل‌سیستم", "پیکربندی"]

  - title: "cd — کجا می‌خواهید بروید؟"
    explanation: |
      `cd` (Change Directory) ابزار حرکت شما در سیستم فایل است.

      **الگوهای مهم حرکت:**

      | دستور | کجا؟ |
      |--------|--------|
      | `cd /` | به پوشه Root |
      | `cd ~` | به پوشه خانگی (همچنین: فقط `cd`) |
      | `cd ..` | یک پوشه بالاتر |
      | `cd ../..` | دو سطح بالاتر |
      | `cd -` | به آخرین پوشه بازدیدشده (برگشت!) |
      | `cd /etc/nginx` | مسیر مطلق (با / شروع می‌شود) |
      | `cd projekte/webseite` | مسیر نسبی (از اینجا) |

      **تکمیل خودکار با Tab** — بهترین دوست شما:
      بنویسید `cd /etc/ngi` و `Tab` را بزنید → ترمینال خودکار تکمیل می‌کند به `/etc/nginx/`
    examples:
      - q: "cd /var/log"
        a: "مستقیماً به پوشه لاگ‌ها می‌رود (مسیر مطلق — با / شروع می‌شود)"
        rel:
          - ["cd-cmd", "Change Directory — تغییر پوشه", "دستور cd"]
          - ["absolute-path", "مسیری که همیشه با / شروع می‌شود، مستقل از مکان فعلی", "مسیر مطلق"]
        labels: ["فایل‌سیستم"]
      - q: "cd .."
        a: "یک سطح بالاتر می‌رود — از /home/alice می‌شود /home"
        rel:
          - ["dotdot", "دو نقطه = پوشه بالاتر (والد)", ".."]
        labels: ["فایل‌سیستم"]
      - q: "cd ~"
        a: "به پوشه خانگی — هر کجا که باشید"
        rel:
          - ["tilde", "میانبر برای پوشه خانگی", "~"]
        labels: ["فایل‌سیستم"]
      - q: "cd -"
        a: "به آخرین پوشه بازدیدشده برمی‌گردد — مفید برای رفت‌وبرگشت بین دو پوشه"
        rel:
          - ["cd-minus", "برگشت به پوشه قبلی", "cd -"]
        labels: ["فایل‌سیستم"]
      - q: "cd /home/alice/projekte && pwd"
        a: "به پوشه پروژه‌ها رفته و بلافاصله مسیر را تأیید می‌کند"
        rel:
          - ["double-ampersand", "اتصال دو دستور — دومی فقط اجرا می‌شود اگر اولی موفق باشد", "&&"]
        labels: ["فایل‌سیستم"]

  - title: "🖥️ آزمون ترمینال"
    explanation: |
      حالا دانش خود را تست کنید — دستورات را مستقیماً وارد کنید!
    examples:
      - q: "کدام دستور پوشه فعلی شما را نشان می‌دهد؟"
        type: input
        a: "pwd"
        labels: ["مبانی"]
      - q: "دستور 'ls -la' چه کاری انجام می‌دهد؟"
        type: select
        options:
          - text: "تمام فایل‌ها از جمله مخفی‌ها را با جزئیات نشان می‌دهد"
            correct: true
          - text: "تمام فایل‌ها را پاک می‌کند"
          - text: "آخرین عمل را برمی‌گرداند"
          - text: "فایل‌های لاگ را نشان می‌دهد"
        labels: ["مبانی", "فایل‌سیستم"]
      - q: "کدام دستور به آخرین پوشه بازدیدشده برمی‌گردد؟"
        type: select
        options:
          - text: "cd -"
            correct: true
          - text: "cd .."
          - text: "cd ~"
          - text: "cd /"
        labels: ["فایل‌سیستم"]
      - q: "کدام‌یک از این فلگ‌ها متعلق به دستور 'ls' هستند؟"
        type: multiple-choice
        options:
          - text: "-l"
            correct: true
          - text: "-a"
            correct: true
          - text: "-x"
          - text: "-h"
            correct: true
          - text: "-t"
            correct: true
        labels: ["مبانی"]
