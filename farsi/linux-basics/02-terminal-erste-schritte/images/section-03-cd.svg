<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230">
<defs>
<style>
.f{font-family:sans-serif;}
.ti{animation:tia 11s infinite}@keyframes tia{0%,3%{opacity:0}7%,87%{opacity:1}92%,100%{opacity:0}}
.c1{animation:c1a 11s infinite}@keyframes c1a{0%,12%{opacity:0}18%,87%{opacity:1}92%,100%{opacity:0}}
.c2{animation:c2a 11s infinite}@keyframes c2a{0%,30%{opacity:0}36%,87%{opacity:1}92%,100%{opacity:0}}
.c3{animation:c3a 11s infinite}@keyframes c3a{0%,48%{opacity:0}54%,87%{opacity:1}92%,100%{opacity:0}}
.c4{animation:c4a 11s infinite}@keyframes c4a{0%,65%{opacity:0}71%,87%{opacity:1}92%,100%{opacity:0}}
.ft{animation:fta 11s infinite}@keyframes fta{0%,78%{opacity:0}82%,87%{opacity:1}92%,100%{opacity:0}}
</style>
</defs>
<rect width="640" height="230" rx="12" fill="#0d1117"/>
<rect width="640" height="52" rx="12" fill="#161b22"/>
<rect y="40" width="640" height="12" fill="#161b22"/>
<g class="ti">
  <text x="320" y="32" text-anchor="middle" class="f" font-size="13" font-weight="bold" fill="#e6edf3">cd — بین پوشه‌ها حرکت کن</text>
</g>
<g class="c1">
  <rect x="10" y="62" width="143" height="118" rx="8" fill="#0d1520" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="81" y="88" text-anchor="middle" class="f" font-size="22">🏠</text>
  <text x="81" y="108" text-anchor="middle" class="f" font-size="14" font-weight="bold" fill="#58a6ff">cd ~</text>
  <text x="81" y="124" text-anchor="middle" class="f" font-size="10" fill="#8b949e">همیشه به خانه</text>
  <text x="81" y="139" text-anchor="middle" class="f" font-size="10" fill="#8b949e">برگرد</text>
</g>
<g class="c2">
  <rect x="162" y="62" width="143" height="118" rx="8" fill="#0a1a0d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="233" y="88" text-anchor="middle" class="f" font-size="22">⬆️</text>
  <text x="233" y="108" text-anchor="middle" class="f" font-size="14" font-weight="bold" fill="#3fb950">cd ..</text>
  <text x="233" y="124" text-anchor="middle" class="f" font-size="10" fill="#8b949e">یک پوشه</text>
  <text x="233" y="139" text-anchor="middle" class="f" font-size="10" fill="#8b949e">بالاتر برو</text>
</g>
<g class="c3">
  <rect x="314" y="62" width="143" height="118" rx="8" fill="#1a0f08" stroke="#f0883e" stroke-width="1.5"/>
  <text x="385" y="88" text-anchor="middle" class="f" font-size="22">🎯</text>
  <text x="385" y="108" text-anchor="middle" class="f" font-size="14" font-weight="bold" fill="#f0883e">cd /etc</text>
  <text x="385" y="124" text-anchor="middle" class="f" font-size="10" fill="#8b949e">مستقیم به</text>
  <text x="385" y="139" text-anchor="middle" class="f" font-size="10" fill="#8b949e">هر پوشه‌ای برو</text>
</g>
<g class="c4">
  <rect x="466" y="62" width="163" height="118" rx="8" fill="#110d1a" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="547" y="88" text-anchor="middle" class="f" font-size="22">↩️</text>
  <text x="547" y="108" text-anchor="middle" class="f" font-size="14" font-weight="bold" fill="#bc8cff">cd -</text>
  <text x="547" y="124" text-anchor="middle" class="f" font-size="10" fill="#8b949e">به پوشه</text>
  <text x="547" y="139" text-anchor="middle" class="f" font-size="10" fill="#8b949e">قبلی برگرد</text>
</g>
<g class="ft">
  <rect x="10" y="190" width="620" height="30" rx="4" fill="#161b22"/>
  <text x="320" y="209" text-anchor="middle" class="f" font-size="10" fill="#8b949e">کلید Tab: cd /et سپس Tab → تکمیل خودکار به cd /etc/</text>
</g>
</svg>
