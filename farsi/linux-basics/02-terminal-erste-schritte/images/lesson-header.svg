<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>

  <!-- Terminal window -->
  <rect x="80" y="40" width="480" height="280" rx="8" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <!-- Title bar -->
  <rect x="80" y="40" width="480" height="32" rx="8" fill="#21262d"/>
  <rect x="80" y="60" width="480" height="12" fill="#21262d"/>
  <!-- Window buttons -->
  <circle cx="102" cy="56" r="6" fill="#f85149"/>
  <circle cx="122" cy="56" r="6" fill="#f0883e"/>
  <circle cx="142" cy="56" r="6" fill="#3fb950"/>

  <!-- Terminal content -->
  <text x="100" y="100" font-family="monospace" font-size="14" fill="#8b949e">alice@ubuntu:~$</text>
  <text x="270" y="100" font-family="monospace" font-size="14" fill="#e6edf3"> pwd</text>
  <text x="100" y="122" font-family="monospace" font-size="14" fill="#58a6ff">/home/alice</text>

  <text x="100" y="152" font-family="monospace" font-size="14" fill="#8b949e">alice@ubuntu:~$</text>
  <text x="270" y="152" font-family="monospace" font-size="14" fill="#e6edf3"> ls</text>
  <text x="100" y="174" font-family="monospace" font-size="14" fill="#58a6ff">Documents</text>
  <text x="210" y="174" font-family="monospace" font-size="14" fill="#58a6ff">Downloads</text>
  <text x="330" y="174" font-family="monospace" font-size="14" fill="#3fb950">script.sh</text>

  <text x="100" y="204" font-family="monospace" font-size="14" fill="#8b949e">alice@ubuntu:~$</text>
  <text x="270" y="204" font-family="monospace" font-size="14" fill="#e6edf3"> cd Documents</text>

  <text x="100" y="234" font-family="monospace" font-size="14" fill="#8b949e">alice@ubuntu:~/Documents$</text>

  <!-- Blinking cursor -->
  <rect x="345" y="222" width="8" height="16" fill="#e6edf3" opacity="0.8"/>

  <!-- Decorative elements -->
  <text x="100" y="268" font-family="monospace" font-size="12" fill="#3fb950" opacity="0.5">&gt;_</text>
</svg>