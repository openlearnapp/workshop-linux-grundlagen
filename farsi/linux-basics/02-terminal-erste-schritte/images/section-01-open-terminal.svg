<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="640" height="160" fill="url(#bg)" rx="8"/>
  <!-- Decorative elements -->
  <circle cx="80" cy="60" r="2" fill="#3fb950" opacity="0.4"/><circle cx="95" cy="45" r="1.5" fill="#3fb950" opacity="0.35"/><circle cx="70" cy="100" r="1" fill="#3fb950" opacity="0.35"/>
  <circle cx="560" cy="60" r="2" fill="#3fb950" opacity="0.4"/><circle cx="545" cy="100" r="1.5" fill="#3fb950" opacity="0.35"/><circle cx="570" cy="45" r="1" fill="#3fb950" opacity="0.35"/>
  <!-- Icon -->
  
  <!-- Terminal frame -->
  <rect x="260" y="28" width="120" height="80" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="260" y="28" width="120" height="16" rx="6" fill="#21262d"/>
  <rect x="260" y="38" width="120" height="6" fill="#21262d"/>
  <circle cx="271" cy="36" r="3" fill="#f85149" opacity="1"/>
  <circle cx="281" cy="36" r="3" fill="#f0883e" opacity="1"/>
  <circle cx="291" cy="36" r="3" fill="#3fb950" opacity="1"/>
  <!-- pwd command -->
  <text x="270" y="60" font-family="monospace" font-size="9" fill="#8b949e">~$</text>
  <text x="286" y="60" font-family="monospace" font-size="9" fill="#e6edf3">pwd</text>
  <text x="270" y="74" font-family="monospace" font-size="9" fill="#3fb950">/home/user</text>
  <!-- Blinking cursor -->
  <rect x="270" y="82" width="7" height="12" fill="#e6edf3" opacity="1">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Accent bar -->
  <rect x="180" y="152" width="280" height="4" fill="#3fb950" opacity="0.8" rx="1.5"/>
</svg>
