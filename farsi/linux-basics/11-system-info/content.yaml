version: 2
number: 11
title: "اطلاعات سیستم"
description: "df، du، free، uname و history — وضعیت سیستم را زیر نظر داشته باش"
image: "images/lesson-header.svg"
image_caption: "داشبورد با نمایش مصرف CPU، RAM و دیسک"
sections:
  - title: "فضای ذخیره‌سازی — df و du"
    image: "images/section-01-disk.svg"
    explanation: |
      تصور کن کامپیوترت مثل یک اتاق است.
      وقتی اتاق پر باشد، دیگر چیزی جا نمی‌شود —
      و کامپیوتر شروع می‌کند به گیر کردن.

      با **df** (Disk Free — "فضای آزاد روی دیسک")
      می‌بینی هارددیسکت چقدر پر است:
      ```
      df -h
      ```
      `-h` مخفف "human-readable" (قابل خواندن برای انسان) است —
      GB و MB نشان می‌دهد به جای اعداد بزرگ.

      با **du** (Disk Usage — "مصرف فضا") می‌بینی
      کدام پوشه بیشترین جا را می‌خورد:
      ```
      du -sh ~/Downloads/*
      ```
      - `s` = summary (فقط حجم کل، نه هر فایل جداگانه)
      - `h` = human-readable (GB/MB به جای بایت)

      نکته: اگر می‌خواهی بزرگ‌ترین پوشه‌ها را پیدا کنی، du را با sort ترکیب کن:
      ```
      du -h --max-depth=1 /var | sort -rh | head -10
      ```
      این ۱۰ پوشه بزرگ‌تر در `/var` را نشان می‌دهد — از بزرگ به کوچک مرتب.
    examples:
      - q: "df -h"
        a: "همه بخش‌های هارددیسک را با فضای آزاد و اشغال‌شده به GB/MB نشان می‌دهد"
        rel:
          - ["df-cmd", "Disk Free — نمایش مصرف هارددیسک", "دستور df"]
          - ["df-h", "Human-readable — حجم‌ها به KB/MB/GB به جای بایت", "فلگ -h"]
        labels: ["فایل‌سیستم"]
      - q: "df -h /"
        a: "فقط بخش اصلی کامپیوتر (/) را نشان می‌دهد — مهم‌ترین فضا"
        rel:
          - ["df-root", "بررسی مصرف پارتیشن اصلی /", "df -h /"]
        labels: ["فایل‌سیستم"]
      - q: "du -sh ~/Downloads/*"
        a: "حجم هر فایل و پوشه در پوشه Downloads را نشان می‌دهد"
        rel:
          - ["du-cmd", "Disk Usage — مصرف فضای فایل‌ها/پوشه‌ها", "دستور du"]
          - ["du-sh", "s=summary (حجم کل)، h=human-readable", "فلگ‌های -sh"]
        labels: ["فایل‌سیستم"]
      - q: "du -h --max-depth=1 /var | sort -rh | head -10"
        a: "۱۰ پوشه بزرگ‌تر در /var را پیدا می‌کند — عملی برای پیدا کردن فضاخورها"
        rel:
          - ["du-max-depth", "نمایش فقط تا یک عمق مشخص از پوشه", "--max-depth=1"]
          - ["sort-rh", "r=معکوس (نزولی)، h=مرتب‌سازی حجم‌های خوانا", "sort -rh"]
        labels: ["فایل‌سیستم"]

  - title: "حافظه و CPU — free و uptime"
    image: "images/section-02-memory.svg"
    explanation: |
      کامپیوترت دو نوع حافظه دارد:
      - **هارددیسک** — مثل یک قفسه کتاب: جا زیاد، ولی کند
      - **حافظه موقت (RAM)** — مثل میز کارت: سریع، ولی محدود

      با **free** می‌بینی میزت چقدر پر است:
      ```
      free -h
      ```

      خروجی چیزی شبیه این است:
      ```
                    total   used   free  shared  cache  available
      Mem:           15Gi   4.2Gi  8.1Gi  512Mi  3.1Gi    10.4Gi
      Swap:          2.0Gi  0B     2.0Gi
      ```

      مهم: به ستون **available** نگاه کن — این فضای واقعاً آزاد است.
      ستون `free` به تنهایی چیز زیادی نمی‌گوید، چون لینوکس معمولاً حافظه را برای Cache استفاده می‌کند.

      **Swap** مثل یک توسعه اضطراری میز است —
      لینوکس چیزهای کم‌استفاده را موقتاً روی هارددیسک می‌گذارد.
      وقتی Swap پر شود، کامپیوتر کند می‌شود.

      با **uptime** می‌بینی کامپیوترت چقدر است روشن است:
      ```
      uptime
      ```
      **Load Average** (بار) را هم نشان می‌دهد —
      اعداد کوچک یعنی همه چیز آرام است.
    examples:
      - q: "free -h"
        a: "مصرف RAM را به GB/MB نشان می‌دهد — ستون available مهم‌ترین چیز است"
        rel:
          - ["free-cmd", "نمایش مصرف RAM و Swap", "دستور free"]
          - ["free-h", "Human-readable — حافظه به MB/GB به جای بایت", "free -h"]
        labels: ["مبانی"]
      - q: "uptime"
        a: "نشان می‌دهد کامپیوتر چقدر است روشن است، چند کاربر هست و چقدر تحت فشار است"
        rel:
          - ["uptime-cmd", "مدت روشن بودن سیستم و بار دقایق اخیر", "دستور uptime"]
          - ["load-average", "میانگین بار CPU: 1=۱۰۰٪ روی یک هسته", "Load Average"]
        labels: ["مبانی"]
      - q: "vmstat 2 5"
        a: "آمار سیستم را هر ۲ ثانیه، ۵ بار نشان می‌دهد — برای حرفه‌ای‌ها"
        rel:
          - ["vmstat-cmd", "Virtual Memory Statistics — داده‌های دقیق عملکرد سیستم", "دستور vmstat"]
        labels: ["مبانی"]

  - title: "history — آخرین بار چه کردم؟"
    image: "images/section-03-history.svg"
    explanation: |
      یک دستوری وارد کردی که دوباره نیازت است —
      ولی یادت نمی‌آید دقیقاً چه بود؟

      لینوکس برایت به یاد می‌آورد!
      **history** همه دستوراتی که اخیراً وارد کردی را نشان می‌دهد:
      ```
      history
      ```

      ترفندهای مفید با history:
      - `history 20` — فقط ۲۰ دستور آخر
      - `!!` — آخرین دستور را فوری تکرار کن
      - `!50` — دستور شماره ۵۰ از لیست را اجرا کن
      - `history | grep ssh` — فقط دستورات SSH را از لیست جستجو کن

      و ترفند مخفی حرفه‌ای‌ها: **Ctrl+R**
      Ctrl+R را فشار بده و یک کلمه تایپ کن —
      لینوکس خودکار به عقب در history جستجو می‌کند و آخرین دستور مطابق را نشان می‌دهد.
      خیلی در تایپ صرفه‌جویی می‌کند!

      و یک نگاه به داخل کامپیوتر —
      لینوکس اطلاعات زیادی را در "فایل‌های" ویژه‌ای زیر `/proc` ذخیره می‌کند:
      ```
      cat /proc/cpuinfo | grep "model name" | head -1
      ```
      این نشان می‌دهد کدام CPU در کامپیوترت هست.
    examples:
      - q: "history | tail -20"
        a: "۲۰ دستور آخر وارد‌شده را نشان می‌دهد — برای یادآوری عملی"
        rel:
          - ["history-cmd", "نمایش تاریخچه دستورات واردشده", "دستور history"]
        labels: ["مبانی"]
      - q: "history | grep \"apt install\""
        a: "در history دنبال همه دستوراتی می‌گردد که apt install دارند"
        rel:
          - ["history-grep", "ترکیب history با grep — جستجوی دستورات خاص از تاریخچه", "history | grep"]
        labels: ["مبانی"]
      - q: "!!"
        a: "آخرین دستور را فوری تکرار می‌کند — خصوصاً مفید به عنوان: sudo !!"
        rel:
          - ["bang-bang", "!! آخرین دستور واردشده را دوباره اجرا می‌کند", "!!"]
          - ["sudo-bang-bang", "sudo !! — آخرین دستور را با دسترسی مدیر تکرار می‌کند", "sudo !!"]
        labels: ["مبانی"]
      - q: "cat /proc/cpuinfo | grep \"model name\" | head -1"
        a: "مدل CPU کامپیوترت را نشان می‌دهد — /proc یک پنجره به داخل Kernel است"
        rel:
          - ["proc-cpuinfo", "فایل Kernel با اطلاعات دقیق CPU", "/proc/cpuinfo"]
          - ["proc-filesystem", "/proc یک سیستم فایل واقعی نیست — اطلاعات Kernel را به صورت فایل دارد", "/proc"]
        labels: ["مبانی"]

  - title: "آزمون ترمینال"
    image: "images/section-04-check.svg"
    explanation: |
      حالا دانشت را امتحان کن — دستورات را مستقیماً وارد کن!
    examples:
      - q: "کدام دستور مصرف هارددیسک همه بخش‌ها را نشان می‌دهد؟"
        type: input
        a: "df -h"
        labels: ["فایل‌سیستم"]
      - q: "ستون 'available' در 'free -h' چه چیزی نشان می‌دهد؟"
        type: select
        options:
          - text: "حافظه RAM واقعاً قابل استفاده"
            correct: true
          - text: "فضای آزاد هارددیسک"
          - text: "حافظه Swap اشغال‌شده"
          - text: "مصرف CPU به درصد"
        labels: ["مبانی"]
      - q: "کدام دستور در تاریخچه دستورات دنبال 'apt install' می‌گردد؟"
        type: select
        options:
          - text: "history | grep \"apt install\""
            correct: true
          - text: "history search \"apt install\""
          - text: "grep history \"apt install\""
          - text: "find history -name \"apt install\""
        labels: ["مبانی"]
      - q: "کدام‌یک از این دستورات اطلاعات سیستم نشان می‌دهند؟"
        type: multiple-choice
        options:
          - text: "df -h"
            correct: true
          - text: "free -h"
            correct: true
          - text: "uptime"
            correct: true
          - text: "chmod 755"
        labels: ["مبانی"]
