version: 1
number: 3
title: "فایل‌ها و پوشه‌ها"
description: "touch، mkdir، cp، mv و rm — ساخت، جابجایی و حذف فایل‌ها و پوشه‌ها"
sections:
  - title: "ساختن — touch و mkdir"
    explanation: |
      **چرا این مهم است؟** همه چیز در لینوکس با فایل‌ها و پوشه‌ها شروع می‌شود.
      راه‌اندازی پروژه‌ها، نوشتن اسکریپت‌ها، ساختن پیکربندی‌ها — شما هر روز
      به این دستورات نیاز دارید.

      `touch` یک فایل خالی می‌سازد (یا Timestamp فایل موجود را به‌روز می‌کند):
      ```
      touch notizen.txt
      touch index.html style.css script.js   # چند فایل یکجا!
      ```

      `mkdir` یک پوشه می‌سازد:
      ```
      mkdir projekte
      mkdir -p projekte/webseite/assets      # کل مسیر را یکجا!
      ```

      فلگ `-p` در `mkdir` خیلی مفید است: تمام پوشه‌های میانی ناموجود را می‌سازد
      و اگر پوشه از قبل وجود داشته باشد، خطا نمی‌دهد.
    examples:
      - q: "touch README.md"
        a: "یک فایل خالی README.md در پوشه فعلی می‌سازد"
        rel:
          - ["touch-cmd", "ساخت فایل خالی یا به‌روزرسانی Timestamp", "دستور touch"]
      - q: "touch index.html style.css app.js"
        a: "سه فایل را یکجا می‌سازد — touch چند آرگومان قبول می‌کند"
        rel:
          - ["touch-multiple", "ساخت چند فایل همزمان با touch", "touch فایل۱ فایل۲"]
      - q: "mkdir -p ~/projekte/meine-webseite/assets/img"
        a: "کل درخت پوشه‌ها را یکجا می‌سازد، بدون خطا برای پوشه‌های موجود"
        rel:
          - ["mkdir-cmd", "Make Directory — ساخت پوشه", "دستور mkdir"]
          - ["mkdir-p", "Parents — ساخت خودکار تمام پوشه‌های میانی", "فلگ -p"]

  - title: "کپی و جابجایی — cp و mv"
    explanation: |
      `cp` فایل‌ها یا پوشه‌ها را کپی می‌کند، `mv` جابجا می‌کند (یا تغییر نام می‌دهد).

      | دستور | عملکرد |
      |--------|---------|
      | `cp datei.txt backup.txt` | کپی با نام جدید |
      | `cp datei.txt /tmp/` | کپی به پوشه دیگر |
      | `cp -r ordner/ ordner_backup/` | کپی بازگشتی پوشه |
      | `mv alt.txt neu.txt` | تغییر نام |
      | `mv datei.txt /home/alice/` | جابجایی |
      | `mv *.log /var/archive/` | جابجایی چند فایل |

      **تفاوت مهم:** `cp` فایل اصلی را نگه می‌دارد، `mv` آن را حذف می‌کند.
      برای پوشه‌ها، `cp` به فلگ `-r` (بازگشتی) نیاز دارد.
    examples:
      - q: "cp ~/.bashrc ~/.bashrc.backup"
        a: "پشتیبان از پیکربندی bash — قبل از هر تغییری همیشه منطقی است!"
        rel:
          - ["cp-cmd", "Copy — کپی فایل‌ها و پوشه‌ها", "دستور cp"]
          - ["bashrc", "فایل پیکربندی Bash برای Alias‌ها، متغیرها و غیره", "~/.bashrc"]
      - q: "cp -r /etc/nginx/ ~/nginx-backup/"
        a: "کل پیکربندی Nginx را به عنوان پشتیبان در پوشه خانگی کپی می‌کند"
        rel:
          - ["cp-r", "Recursive — کپی پوشه‌ها با محتوا", "فلگ -r"]
      - q: "mv entwurf.txt final.txt"
        a: "تغییر نام فایل — mv بدون مسیر فقط نام را عوض می‌کند"
        rel:
          - ["mv-cmd", "Move — جابجایی یا تغییر نام فایل‌ها", "دستور mv"]
      - q: "mv ~/Downloads/*.pdf ~/Dokumente/PDFs/"
        a: "تمام فایل‌های PDF از Downloads به پوشه PDFs منتقل می‌شوند"
        rel:
          - ["glob-star", "علامت * با هر کاراکتری مطابقت دارد", "Wildcard *"]
          - ["mv-multiple", "جابجایی چند فایل با Wildcard", "mv *.pdf مقصد/"]

  - title: "حذف — rm و rmdir"
    explanation: |
      ⚠️ **توجه: لینوکس سطل زباله ندارد!**
      آنچه با `rm` حذف شود، **فوراً و برای همیشه** از بین می‌رود.

      | دستور | عملکرد |
      |--------|---------|
      | `rm datei.txt` | حذف فایل |
      | `rm -i datei.txt` | پرسیدن قبل از حذف (`-i` = interactive) |
      | `rm *.tmp` | حذف تمام فایل‌های .tmp |
      | `rmdir leerer-ordner/` | حذف پوشه خالی |
      | `rm -r ordner/` | حذف پوشه با محتوا |

      ⚠️ **خطرناک‌ترین دستور لینوکس:**
      ```
      rm -rf /    # همه چیز روی سیستم را پاک می‌کند — هرگز اجرا نکنید!
      rm -rf /*   # به همان اندازه خطرناک
      ```
      فلگ `-f` (force) تمام سؤالات تأیید را حذف می‌کند. ترکیب با `-r` (بازگشتی)
      و یک مسیر گسترده: فاجعه کامل.

      **جایگزین امن:** اول با `ls` بررسی کنید چه چیزی می‌خواهید حذف کنید.
    examples:
      - q: "rm -i wichtige-datei.txt"
        a: "فایل را حذف می‌کند اما قبلش می‌پرسد — برای فایل‌های مهم توصیه می‌شود"
        rel:
          - ["rm-cmd", "Remove — حذف فایل‌ها (سطل زباله ندارد!)", "دستور rm"]
          - ["rm-i", "Interactive — قبل از حذف سؤال می‌کند", "فلگ -i"]
      - q: "rm -r ~/projekte/altes-projekt/"
        a: "پوشه altes-projekt و تمام محتوایش را حذف می‌کند"
        rel:
          - ["rm-r", "Recursive — حذف پوشه‌ها و محتوا", "فلگ -r"]
      - q: "rmdir leerer-ordner/"
        a: "فقط پوشه‌های خالی را حذف می‌کند — امن‌تر از rm -r، برای پوشه غیرخالی خطا می‌دهد"
        rel:
          - ["rmdir-cmd", "Remove Directory — فقط حذف پوشه‌های خالی", "دستور rmdir"]
      - q: "ls *.log && rm *.log"
        a: "اول تمام فایل‌های .log را نشان می‌دهد، بعد حذف می‌کند — روش امن"
        rel:
          - ["safe-delete", "اول ls، بعد rm — حذف امن با پیش‌نمایش", "بهترین روش"]

  - title: "🖥️ آزمون ترمینال"
    explanation: |
      حالا دانش خود را تست کنید — دستورات را مستقیماً وارد کنید!
    examples:
      - q: "کدام دستور یک فایل خالی به نام 'notizen.txt' می‌سازد؟"
        type: input
        a: "touch notizen.txt"
      - q: "فلگ '-p' در 'mkdir -p projekte/web/assets' چه کار می‌کند؟"
        type: select
        options:
          - text: "تمام پوشه‌های میانی ناموجود را خودکار می‌سازد"
            correct: true
          - text: "قبل از ساختن سؤال می‌کند"
          - text: "پوشه ساخته‌شده را نمایش می‌دهد"
          - text: "پوشه را از حذف محافظت می‌کند"
      - q: "کدام دستور نام فایل را از 'entwurf.txt' به 'final.txt' تغییر می‌دهد؟"
        type: select
        options:
          - text: "mv entwurf.txt final.txt"
            correct: true
          - text: "cp entwurf.txt final.txt"
          - text: "rename entwurf.txt final.txt"
          - text: "touch final.txt entwurf.txt"
      - q: "کدام‌یک از این جملات درباره 'rm' درست هستند؟"
        type: multiple-choice
        options:
          - text: "rm فایل‌ها را بدون سطل زباله حذف می‌کند"
            correct: true
          - text: "rm -r پوشه‌ها را به صورت بازگشتی حذف می‌کند"
            correct: true
          - text: "rm -i قبل از حذف سؤال می‌کند"
            correct: true
          - text: "rm می‌تواند حذف را برگرداند"
