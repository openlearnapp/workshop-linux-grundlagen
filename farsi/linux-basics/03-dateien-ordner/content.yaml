version: 2
number: 3
title: "فایل‌ها و پوشه‌ها"
description: "یاد بگیر چطور فایل‌ها و پوشه‌ها را بسازی، کپی کنی، تغییر نام دهی و پاک کنی"
image: "images/lesson-header.svg"
image_caption: "درخت پوشه‌ها با فایل‌ها و دایرکتوری‌ها"
sections:
  - title: "ساختن — touch و mkdir"
    image: "images/section-01-create.svg"
    explanation: |
      قبل از اینکه بتوانی فایلی را ویرایش کنی، باید آن را بسازی.
      برای این کار دو دستور ساده داریم:

      **`touch`** یک فایل خالی می‌سازد:
      ```
      touch notizen.txt
      ```
      مثل یک برگه کاغذ سفید درست کردن.
      می‌توانی چند فایل را با هم بسازی:
      ```
      touch seite.html stil.css
      ```

      **`mkdir`** یک پوشه جدید می‌سازد.
      MKDIR مخفف "Make Directory" — یعنی "پوشه بساز":
      ```
      mkdir fotos
      ```

      فلگ `-p` در `mkdir` خیلی کاربردی است:
      چند پوشه را با هم می‌سازد، حتی اگر پوشه‌های میانی وجود نداشته باشند:
      ```
      mkdir -p projekte/meine-webseite/bilder
      ```
      این `projekte` را می‌سازد، داخلش `meine-webseite`، و داخل آن `bilder` —
      همه در یک مرحله!
    examples:
      - q: "touch README.md"
        a: "یک فایل خالی به نام README.md در پوشه فعلی می‌سازد"
        rel:
          - ["touch-cmd", "ساخت فایل خالی یا به‌روزرسانی Timestamp", "دستور touch"]
        labels: ["فایل‌سیستم"]
      - q: "touch index.html style.css app.js"
        a: "سه فایل را همزمان می‌سازد — touch می‌تواند هر تعداد نام دریافت کند"
        rel:
          - ["touch-multiple", "ساخت چند فایل همزمان با touch", "touch فایل۱ فایل۲"]
        labels: ["فایل‌سیستم"]
      - q: "mkdir -p ~/projekte/meine-webseite/assets/img"
        a: "کل مسیر پوشه‌ها را یکجا می‌سازد — همه پوشه‌های میانی هم ساخته می‌شوند"
        rel:
          - ["mkdir-cmd", "Make Directory — ساخت پوشه", "دستور mkdir"]
          - ["mkdir-p", "Parents — ساخت خودکار تمام پوشه‌های میانی", "فلگ -p"]
        labels: ["فایل‌سیستم"]

  - title: "کپی و جابجایی — cp و mv"
    image: "images/section-02-copy-move.svg"
    explanation: |
      تصور کن روی میز کارت با کاغذها کار می‌کنی:

      **`cp`** مثل یک دستگاه کپی است — اصل سر جایش می‌ماند، یک کپی می‌گیری.
      CP مخفف "Copy" (کپی کردن):
      ```
      cp notizen.txt notizen-backup.txt
      ```
      برای کپی کردن کل پوشه‌ها به `-r` (بازگشتی، یعنی "با همه محتوا") نیاز داری:
      ```
      cp -r fotos/ fotos-backup/
      ```

      **`mv`** مثل یک引اسباب‌کشی است — اصل از جای قبلی حذف می‌شود.
      MV مخفف "Move" (جابجا کردن):
      ```
      mv entwurf.txt fertig.txt
      ```
      اگر پوشه دیگری مشخص نکنی، `mv` فایل را فقط تغییر نام می‌دهد!

      | دستور | چه اتفاقی می‌افتد؟ |
      |--------|---------------|
      | `cp datei.txt kopie.txt` | کپی با نام جدید |
      | `cp datei.txt /tmp/` | کپی به پوشه دیگر |
      | `cp -r ordner/ backup/` | کپی کل پوشه |
      | `mv alt.txt neu.txt` | تغییر نام |
      | `mv datei.txt ~/dokumente/` | جابجایی |
    examples:
      - q: "cp ~/.bashrc ~/.bashrc.backup"
        a: "یک نسخه پشتیبان از فایل تنظیمات Bash می‌سازد — خوب است قبل از تغییرات!"
        rel:
          - ["cp-cmd", "Copy — کپی فایل‌ها و پوشه‌ها", "دستور cp"]
          - ["bashrc", "فایل پیکربندی Bash برای تنظیمات و میانبرها", "~/.bashrc"]
        labels: ["فایل‌سیستم"]
      - q: "cp -r /etc/nginx/ ~/nginx-backup/"
        a: "کل پوشه تنظیمات nginx را به عنوان پشتیبان در پوشه شخصی کپی می‌کند"
        rel:
          - ["cp-r", "Recursive — کپی پوشه‌ها با تمام محتوا", "فلگ -r"]
        labels: ["فایل‌سیستم", "پیکربندی"]
      - q: "mv entwurf.txt final.txt"
        a: "فایل را تغییر نام می‌دهد — از 'entwurf.txt' می‌شود 'final.txt'، دیگر اصلی وجود ندارد"
        rel:
          - ["mv-cmd", "Move — جابجایی یا تغییر نام فایل‌ها", "دستور mv"]
        labels: ["فایل‌سیستم"]
      - q: "mv ~/Downloads/*.pdf ~/Dokumente/PDFs/"
        a: "همه فایل‌های PDF از پوشه Downloads به پوشه PDFs منتقل می‌شوند"
        rel:
          - ["glob-star", "علامت ستاره * یک جایگزین است — با هر کاراکتری مطابقت دارد", "Wildcard *"]
          - ["mv-multiple", "جابجایی چند فایل با جایگزین‌ها", "mv *.pdf مقصد/"]
        labels: ["فایل‌سیستم"]

  - title: "پاک کردن — rm و rmdir"
    image: "images/section-03-delete.svg"
    explanation: |
      حالا یک نکته مهم می‌آید — لطفاً خوب بخوان!

      **لینوکس سطل زباله ندارد.**
      هر چه با `rm` پاک شود **فوری و برای همیشه** از بین می‌رود.
      هیچ راهی برای برگشت نیست!

      | دستور | چه اتفاقی می‌افتد؟ |
      |--------|---------------|
      | `rm datei.txt` | فایل را پاک می‌کند (برگشت‌ناپذیر!) |
      | `rm -i datei.txt` | پاک می‌کند، ولی اول می‌پرسد (`-i` = interactive = "ازم بپرس") |
      | `rm *.tmp` | همه فایل‌هایی که به .tmp ختم می‌شوند را پاک می‌کند |
      | `rmdir leerer-ordner/` | یک پوشه خالی را پاک می‌کند |
      | `rm -r ordner/` | یک پوشه با همه محتوایش را پاک می‌کند |

      **قانون طلایی:** قبل از پاک کردن، ببین چی پاک می‌شود:
      ```
      ls *.tmp
      ```
      وقتی مطمئن شدی، آن وقت:
      ```
      rm *.tmp
      ```

      یادت باشه: `rm -i` در ابتدا بهترین دوستته — همیشه می‌پرسد!
    examples:
      - q: "rm -i wichtige-datei.txt"
        a: "فایل را پاک می‌کند، ولی اول می‌پرسد — برای مبتدیان خیلی توصیه می‌شود!"
        rel:
          - ["rm-cmd", "Remove — پاک کردن فایل‌ها (سطل زباله ندارد!)", "دستور rm"]
          - ["rm-i", "Interactive — قبل از پاک کردن سؤال می‌کند", "فلگ -i"]
        labels: ["فایل‌سیستم"]
      - q: "rm -r ~/projekte/altes-projekt/"
        a: "پوشه 'altes-projekt' و همه چیز داخلش را پاک می‌کند — مواظب باش، سطل زباله نیست!"
        rel:
          - ["rm-r", "Recursive — پاک کردن پوشه‌ها و محتوا", "فلگ -r"]
        labels: ["فایل‌سیستم"]
      - q: "rmdir leerer-ordner/"
        a: "فقط یک پوشه خالی را پاک می‌کند — اگر هنوز فایلی داخلش باشد، پیغام خطا می‌دهد"
        rel:
          - ["rmdir-cmd", "Remove Directory — فقط پاک کردن پوشه‌های خالی", "دستور rmdir"]
        labels: ["فایل‌سیستم"]
      - q: "ls *.log && rm *.log"
        a: "اول همه فایل‌های .log را نشان می‌دهد، بعد پاک می‌کند — روش امن!"
        rel:
          - ["safe-delete", "اول ls، بعد rm — پاک کردن امن با پیش‌نمایش", "روش بهتر"]
        labels: ["فایل‌سیستم"]

  - title: "آزمون ترمینال"
    image: "images/section-04-check.svg"
    explanation: |
      حالا دانشت را امتحان کن!
    examples:
      - q: "کدام دستور یک فایل خالی به نام 'notizen.txt' می‌سازد؟"
        type: input
        a: "touch notizen.txt"
        labels: ["فایل‌سیستم"]
      - q: "فلگ '-p' در 'mkdir -p projekte/web/assets' چه کار می‌کند؟"
        type: select
        options:
          - text: "همه پوشه‌های میانی ناموجود را خودکار می‌سازد"
            correct: true
          - text: "قبل از ساختن می‌پرسد"
          - text: "پوشه ساخته‌شده را نشان می‌دهد"
          - text: "پوشه را از پاک شدن محافظت می‌کند"
        labels: ["فایل‌سیستم"]
      - q: "کدام دستور نام فایل را از 'entwurf.txt' به 'final.txt' تغییر می‌دهد؟"
        type: select
        options:
          - text: "mv entwurf.txt final.txt"
            correct: true
          - text: "cp entwurf.txt final.txt"
          - text: "rename entwurf.txt final.txt"
          - text: "touch final.txt entwurf.txt"
        labels: ["فایل‌سیستم"]
      - q: "کدام‌یک از این جملات درباره 'rm' درست هستند؟"
        type: multiple-choice
        options:
          - text: "rm فایل‌ها را بدون سطل زباله پاک می‌کند"
            correct: true
          - text: "rm -r پوشه‌ها را با همه محتوا پاک می‌کند"
            correct: true
          - text: "rm -i قبل از پاک کردن می‌پرسد"
            correct: true
          - text: "rm می‌تواند پاک کردن را برگرداند"
        labels: ["فایل‌سیستم"]
