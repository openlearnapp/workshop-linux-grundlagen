<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 270">
<defs>
<style>
.f{font-family:sans-serif;}
.ti{animation:tia 11s infinite}@keyframes tia{0%,3%{opacity:0}7%,87%{opacity:1}92%,100%{opacity:0}}
.c1{animation:c1a 11s infinite}@keyframes c1a{0%,12%{opacity:0}18%,87%{opacity:1}92%,100%{opacity:0}}
.c2{animation:c2a 11s infinite}@keyframes c2a{0%,30%{opacity:0}36%,87%{opacity:1}92%,100%{opacity:0}}
.c3{animation:c3a 11s infinite}@keyframes c3a{0%,48%{opacity:0}54%,87%{opacity:1}92%,100%{opacity:0}}
.ft{animation:fta 11s infinite}@keyframes fta{0%,78%{opacity:0}82%,87%{opacity:1}92%,100%{opacity:0}}
</style>
</defs>
<rect width="640" height="270" rx="12" fill="#0d1117"/>
<rect width="640" height="64" rx="12" fill="#161b22"/>
<rect y="52" width="640" height="12" fill="#161b22"/>
<g class="ti">
  <text x="320" y="26" text-anchor="middle" class="f" font-size="26">📁</text>
  <text x="320" y="48" text-anchor="middle" class="f" font-size="17" font-weight="bold" fill="#e6edf3">فایل‌ها و پوشه‌ها</text>
  <text x="320" y="73" text-anchor="middle" class="f" font-size="11" fill="#8b949e">touch · mkdir · cp · mv · rm</text>
</g>
<g class="c1">
  <rect x="20" y="88" width="185" height="118" rx="8" fill="#0a1a0d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="112" y="116" text-anchor="middle" class="f" font-size="26">✏️</text>
  <text x="112" y="140" text-anchor="middle" class="f" font-size="13" font-weight="bold" fill="#3fb950">ایجاد کردن</text>
  <text x="112" y="158" text-anchor="middle" class="f" font-size="11" fill="#8b949e">touch &amp; mkdir</text>
  <text x="112" y="174" text-anchor="middle" class="f" font-size="9" fill="#3fb950" opacity="0.7">فایل و پوشه جدید</text>
</g>
<g class="c2">
  <rect x="228" y="88" width="185" height="118" rx="8" fill="#0d1520" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="320" y="116" text-anchor="middle" class="f" font-size="26">📦</text>
  <text x="320" y="140" text-anchor="middle" class="f" font-size="13" font-weight="bold" fill="#58a6ff">کپی و جابجایی</text>
  <text x="320" y="158" text-anchor="middle" class="f" font-size="11" fill="#8b949e">cp &amp; mv</text>
  <text x="320" y="174" text-anchor="middle" class="f" font-size="9" fill="#58a6ff" opacity="0.7">کپی یا انتقال فایل</text>
</g>
<g class="c3">
  <rect x="435" y="88" width="185" height="118" rx="8" fill="#180a0a" stroke="#f85149" stroke-width="1.5"/>
  <text x="527" y="116" text-anchor="middle" class="f" font-size="26">🗑️</text>
  <text x="527" y="140" text-anchor="middle" class="f" font-size="13" font-weight="bold" fill="#f85149">حذف کردن</text>
  <text x="527" y="158" text-anchor="middle" class="f" font-size="11" fill="#8b949e">rm &amp; rmdir</text>
  <text x="527" y="174" text-anchor="middle" class="f" font-size="9" fill="#f85149" opacity="0.7">⚠ برگشتی نیست!</text>
</g>
<g class="ft">
  <rect x="20" y="222" width="600" height="34" rx="6" fill="#161b22"/>
  <text x="320" y="244" text-anchor="middle" class="f" font-size="10" fill="#8b949e">مدیریت فایل مهم‌ترین مهارت لینوکس است</text>
</g>
</svg>
