<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>

  <!-- Root folder icon -->
  <rect x="280" y="30" width="80" height="20" rx="4" fill="#58a6ff"/>
  <rect x="270" y="42" width="100" height="40" rx="4" fill="#58a6ff" opacity="0.8"/>
  <text x="320" y="68" font-family="monospace" font-size="14" fill="#0d1117" text-anchor="middle">/</text>

  <!-- Connection lines -->
  <line x1="320" y1="82" x2="320" y2="100" stroke="#30363d" stroke-width="2"/>
  <line x1="160" y1="100" x2="480" y2="100" stroke="#30363d" stroke-width="2"/>
  <line x1="160" y1="100" x2="160" y2="115" stroke="#30363d" stroke-width="2"/>
  <line x1="320" y1="100" x2="320" y2="115" stroke="#30363d" stroke-width="2"/>
  <line x1="480" y1="100" x2="480" y2="115" stroke="#30363d" stroke-width="2"/>

  <!-- home folder -->
  <rect x="120" y="108" width="70" height="16" rx="3" fill="#f0883e"/>
  <rect x="110" y="118" width="100" height="36" rx="4" fill="#f0883e" opacity="0.8"/>
  <text x="160" y="142" font-family="monospace" font-size="12" fill="#0d1117" text-anchor="middle">home</text>

  <!-- etc folder -->
  <rect x="280" y="108" width="70" height="16" rx="3" fill="#f0883e"/>
  <rect x="270" y="118" width="100" height="36" rx="4" fill="#f0883e" opacity="0.8"/>
  <text x="320" y="142" font-family="monospace" font-size="12" fill="#0d1117" text-anchor="middle">etc</text>

  <!-- var folder -->
  <rect x="440" y="108" width="70" height="16" rx="3" fill="#f0883e"/>
  <rect x="430" y="118" width="100" height="36" rx="4" fill="#f0883e" opacity="0.8"/>
  <text x="480" y="142" font-family="monospace" font-size="12" fill="#0d1117" text-anchor="middle">var</text>

  <!-- Second level lines from home -->
  <line x1="160" y1="154" x2="160" y2="170" stroke="#30363d" stroke-width="2"/>
  <line x1="80" y1="170" x2="240" y2="170" stroke="#30363d" stroke-width="2"/>
  <line x1="80" y1="170" x2="80" y2="185" stroke="#30363d" stroke-width="2"/>
  <line x1="160" y1="170" x2="160" y2="185" stroke="#30363d" stroke-width="2"/>
  <line x1="240" y1="170" x2="240" y2="185" stroke="#30363d" stroke-width="2"/>

  <!-- alice folder -->
  <rect x="40" y="178" width="70" height="14" rx="3" fill="#3fb950"/>
  <rect x="30" y="188" width="100" height="32" rx="4" fill="#3fb950" opacity="0.8"/>
  <text x="80" y="209" font-family="monospace" font-size="11" fill="#0d1117" text-anchor="middle">alice</text>

  <!-- bob folder -->
  <rect x="120" y="178" width="70" height="14" rx="3" fill="#3fb950"/>
  <rect x="110" y="188" width="100" height="32" rx="4" fill="#3fb950" opacity="0.8"/>
  <text x="160" y="209" font-family="monospace" font-size="11" fill="#0d1117" text-anchor="middle">bob</text>

  <!-- root folder -->
  <rect x="200" y="178" width="70" height="14" rx="3" fill="#3fb950"/>
  <rect x="190" y="188" width="100" height="32" rx="4" fill="#3fb950" opacity="0.8"/>
  <text x="240" y="209" font-family="monospace" font-size="11" fill="#0d1117" text-anchor="middle">root</text>

  <!-- Files under alice -->
  <line x1="80" y1="220" x2="80" y2="240" stroke="#30363d" stroke-width="1.5"/>
  <line x1="40" y1="240" x2="120" y2="240" stroke="#30363d" stroke-width="1.5"/>
  <line x1="40" y1="240" x2="40" y2="250" stroke="#30363d" stroke-width="1.5"/>
  <line x1="80" y1="240" x2="80" y2="250" stroke="#30363d" stroke-width="1.5"/>
  <line x1="120" y1="240" x2="120" y2="250" stroke="#30363d" stroke-width="1.5"/>

  <!-- File icons -->
  <rect x="25" y="252" width="30" height="36" rx="2" fill="#8b949e" opacity="0.6"/>
  <rect x="29" y="262" width="22" height="2" rx="1" fill="#0d1117" opacity="0.3"/>
  <rect x="29" y="268" width="18" height="2" rx="1" fill="#0d1117" opacity="0.3"/>
  <rect x="29" y="274" width="20" height="2" rx="1" fill="#0d1117" opacity="0.3"/>
  <text x="40" y="302" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">.bashrc</text>

  <rect x="65" y="252" width="30" height="36" rx="2" fill="#bc8cff" opacity="0.6"/>
  <text x="80" y="302" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">docs/</text>

  <rect x="105" y="252" width="30" height="36" rx="2" fill="#8b949e" opacity="0.6"/>
  <rect x="109" y="262" width="22" height="2" rx="1" fill="#0d1117" opacity="0.3"/>
  <rect x="109" y="268" width="18" height="2" rx="1" fill="#0d1117" opacity="0.3"/>
  <text x="120" y="302" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">notes.txt</text>

  <!-- Second level from etc -->
  <line x1="320" y1="154" x2="320" y2="170" stroke="#30363d" stroke-width="2"/>
  <line x1="280" y1="170" x2="360" y2="170" stroke="#30363d" stroke-width="1.5"/>
  <line x1="280" y1="170" x2="280" y2="250" stroke="#30363d" stroke-width="1.5"/>
  <line x1="360" y1="170" x2="360" y2="250" stroke="#30363d" stroke-width="1.5"/>
  <rect x="265" y="252" width="30" height="36" rx="2" fill="#8b949e" opacity="0.6"/>
  <text x="280" y="302" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">nginx/</text>
  <rect x="345" y="252" width="30" height="36" rx="2" fill="#8b949e" opacity="0.6"/>
  <text x="360" y="302" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">ssh/</text>

  <!-- Second level from var -->
  <line x1="480" y1="154" x2="480" y2="170" stroke="#30363d" stroke-width="2"/>
  <line x1="440" y1="170" x2="520" y2="170" stroke="#30363d" stroke-width="1.5"/>
  <line x1="440" y1="170" x2="440" y2="250" stroke="#30363d" stroke-width="1.5"/>
  <line x1="520" y1="170" x2="520" y2="250" stroke="#30363d" stroke-width="1.5"/>
  <rect x="425" y="252" width="30" height="36" rx="2" fill="#8b949e" opacity="0.6"/>
  <text x="440" y="302" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">log/</text>
  <rect x="505" y="252" width="30" height="36" rx="2" fill="#8b949e" opacity="0.6"/>
  <text x="520" y="302" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">www/</text>
</svg>