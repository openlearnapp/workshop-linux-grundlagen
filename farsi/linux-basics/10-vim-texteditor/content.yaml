version: 2
number: 10
title: "Vim و ویرایشگرهای متن"
description: "nano برای مبتدیان، vim برای حرفه‌ای‌ها — ویرایش فایل‌ها مستقیماً در ترمینال"
image: "images/lesson-header.svg"
sections:
  - title: "nano — شروع کاربرپسند"
    explanation: |
      **چرا این مهم است؟** روی سرورها رابط گرافیکی وجود ندارد.
      باید فایل‌های پیکربندی را مستقیماً در ترمینال ویرایش کنید — `nano` ساده‌ترین
      راه است، `vim` قدرتمندترین.

      **nano** در پایین صفحه تمام میانبرهای مهم را نشان می‌دهد:
      - `Ctrl+O` سپس `Enter`: ذخیره (Write **O**ut)
      - `Ctrl+X`: خروج (e**X**it)
      - `Ctrl+W`: جستجو (**W**here is)
      - `Ctrl+K`: برش خط (**K**ut)
      - `Ctrl+U`: چسباندن (**U**ncut)
      - `Ctrl+G`: راهنما (**G**et help)

      باز کردن nano و ویرایش فوری یک فایل:
      ```bash
      nano /etc/hosts
      sudo nano /etc/nginx/sites-available/default
      ```
    examples:
      - q: "nano ~/.bashrc"
        a: "ویرایش پیکربندی Bash با nano — Ctrl+O ذخیره، Ctrl+X خروج"
        rel:
          - ["nano-cmd", "ویرایشگر متن کاربرپسند ترمینال با راهنمای کلیدها", "دستور nano"]
          - ["nano-save", "Ctrl+O سپس Enter — ذخیره فایل در nano", "nano Ctrl+O"]
        labels: ["ویرایشگر", "پیکربندی"]
      - q: "nano -l /etc/hosts"
        a: "ویرایش فایل hosts با شماره خط — مفید برای فایل‌های بلند"
        rel:
          - ["nano-l", "Line numbers — نمایش شماره خط در nano", "فلگ nano -l"]
        labels: ["ویرایشگر"]
      - q: "nano +50 app.conf"
        a: "nano مستقیماً در خط ۵۰ باز می‌شود — صرفه‌جویی در اسکرول در پیکربندی‌های بلند"
        rel:
          - ["nano-jump-line", "+N فایل را مستقیماً در خط N باز می‌کند", "nano +شماره‌خط"]
        labels: ["ویرایشگر"]

  - title: "vim — ویرایشگر حرفه‌ای"
    explanation: |
      **vim** (Vi Improved) قدرتمند است اما ابتدا گیج‌کننده، چون **حالت‌ها** دارد:

      | حالت | فعال‌سازی | برای چه؟ |
      |-------|-------------|--------|
      | **Normal** | `Esc` | حرکت، دستورات |
      | **Insert** | `i`، `a`، `o` | وارد کردن متن |
      | **Visual** | `v`، `V` | انتخاب متن |
      | **Command** | `:` | ذخیره، خروج، جستجو |

      **مهم‌ترین نکات برای شروع:**
      1. vim در حالت Normal باز می‌شود
      2. `i` بزنید → حالت Insert → متن تایپ کنید
      3. `Esc` → برگشت به حالت Normal
      4. `:w` → ذخیره
      5. `:q` → خروج
      6. `:wq` → ذخیره و خروج
      7. `:q!` → خروج بدون ذخیره (اجباری)

      **چرا vim یاد بگیریم؟** روی *هر* سیستم لینوکسی از پیش نصب شده است. وقتی روی
      یک سرور تازه نصب‌شده هستید، vim همیشه در دسترس است.
    examples:
      - q: "vim /etc/nginx/nginx.conf"
        a: "باز کردن پیکربندی Nginx با vim — همیشه در دسترس، حتی روی سرورهای مینیمال"
        rel:
          - ["vim-cmd", "Vi Improved — ویرایشگر ترمینال قدرتمند با حالت‌ها", "دستور vim"]
        labels: ["ویرایشگر", "پیکربندی"]
      - q: ":wq"
        a: "در vim: ذخیره (write) و خروج (quit) — در حالت Command وارد کنید"
        rel:
          - ["vim-wq", "Write Quit — ذخیره و خروج در vim", ":wq"]
          - ["vim-command-mode", "دونقطه : حالت Command را در vim فعال می‌کند", "vim :"]
        labels: ["ویرایشگر"]
      - q: ":q!"
        a: "خروج از vim بدون ذخیره — ! عمل را اجباری می‌کند"
        rel:
          - ["vim-q-bang", "خروج اجباری بدون ذخیره — تمام تغییرات دور ریخته می‌شوند", ":q!"]
        labels: ["ویرایشگر"]
      - q: "i"
        a: "فعال‌سازی حالت Insert — حالا می‌توان متن وارد کرد"
        rel:
          - ["vim-insert", "i — رفتن به حالت Insert (قبل مکان‌نما)، a = بعد مکان‌نما", "vim i"]
        labels: ["ویرایشگر"]

  - title: "حرکت و جستجو در vim"
    explanation: |
      در **حالت Normal** بدون کلیدهای جهتی حرکت می‌کنید (کارآمدتر!):

      | کلید | عمل |
      |-------|--------|
      | `h`، `j`، `k`، `l` | چپ، پایین، بالا، راست |
      | `w` | کلمه بعدی جلو |
      | `b` | کلمه قبلی عقب |
      | `0` | ابتدای خط |
      | `$` | انتهای خط |
      | `gg` | ابتدای فایل |
      | `G` | انتهای فایل |
      | `50G` | رفتن به خط ۵۰ |

      **جستجو و جایگزینی در vim:**
      ```
      /عبارت‌جستجو      → جستجوی رو به جلو، n = نتیجه بعدی
      ?عبارت‌جستجو      → جستجوی رو به عقب
      :%s/قدیم/جدید/g     → جایگزینی تمام موارد
      :%s/قدیم/جدید/gc    → جایگزینی با تأیید
      ```
    examples:
      - q: ":%s/localhost/example.com/g"
        a: "در vim: جایگزینی تمام موارد 'localhost' با 'example.com'"
        rel:
          - ["vim-substitute", ":%s/قدیم/جدید/g — جستجو و جایگزینی در کل فایل", "vim :%s"]
          - ["vim-g-flag", "g = global — جایگزینی تمام موارد در یک خط", "فلگ vim /g"]
        labels: ["ویرایشگر"]
      - q: "/ERROR"
        a: "در vim: جستجوی ERROR — n برای نتیجه بعدی، N برای قبلی"
        rel:
          - ["vim-search", "/عبارت جستجوی رو به جلو در vim", "vim /"]
        labels: ["ویرایشگر"]
      - q: "dd"
        a: "در vim (حالت Normal): حذف خط فعلی — p برای چسباندن"
        rel:
          - ["vim-dd", "Delete — حذف کل خط در vim (و ذخیره در بافر)", "vim dd"]
        labels: ["ویرایشگر"]
      - q: "yy"
        a: "در vim: کپی خط فعلی (yank) — p برای چسباندن در مکان بعدی"
        rel:
          - ["vim-yy", "Yank — کپی خط در vim", "vim yy"]
          - ["vim-p", "Put/Paste — چسباندن محتوای کپی/حذف‌شده", "vim p"]
        labels: ["ویرایشگر"]

  - title: "🖥️ آزمون ترمینال"
    explanation: |
      حالا دانش خود را تست کنید — دستورات را مستقیماً وارد کنید!
    examples:
      - q: "کدام دستور vim فایل را ذخیره کرده و از ویرایشگر خارج می‌شود؟"
        type: input
        a: ":wq"
        labels: ["ویرایشگر"]
      - q: "چگونه در vim به حالت Insert می‌رویم؟"
        type: select
        options:
          - text: "فشردن کلید 'i'"
            correct: true
          - text: "فشردن کلید 'Esc'"
          - text: "وارد کردن ':i'"
          - text: "فشردن کلید 'v'"
        labels: ["ویرایشگر"]
      - q: "دستور ':q!' در vim چه کار می‌کند؟"
        type: select
        options:
          - text: "خروج از vim بدون ذخیره"
            correct: true
          - text: "ذخیره و خروج از vim"
          - text: "جستجوی کاراکتر !"
          - text: "باز کردن فایل جدید"
        labels: ["ویرایشگر"]
      - q: "کدام‌یک از حالت‌های vim وجود دارند؟"
        type: multiple-choice
        options:
          - text: "حالت Normal"
            correct: true
          - text: "حالت Insert"
            correct: true
          - text: "حالت Visual"
            correct: true
          - text: "حالت Debug"
        labels: ["ویرایشگر"]
