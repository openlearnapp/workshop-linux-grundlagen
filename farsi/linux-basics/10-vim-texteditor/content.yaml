version: 2
number: 10
title: "Vim و ویرایشگرهای متن"
description: "nano برای مبتدیان، vim برای حرفه‌ای‌ها — ویرایش فایل‌ها مستقیماً در ترمینال"
image: "images/lesson-header.svg"
image_caption: "رابط Vim با نمایش حالت‌ها (Normal، Insert، Visual، Command)"
sections:
  - title: "nano — ویرایشگر متن دوستانه"
    image: "images/section-01-nano.svg"
    explanation: |
      تصور کن روی یک سرور هستی بدون ماوس، بدون پنجره —
      فقط ترمینال. و باید یک فایل را ویرایش کنی.

      برای این کار **ویرایشگرهای متن برای ترمینال** وجود دارند.
      ساده‌ترینشان **nano** نام دارد.
      به شکلی طراحی شده که مبتدیان بتوانند فوری باهاش کار کنند.

      این‌طور یک فایل را با nano باز می‌کنی:
      ```
      nano meine-datei.txt
      ```

      در پایین صفحه nano مهم‌ترین کلیدهای میانبر را نشان می‌دهد.
      `^` همیشه یعنی کلید `Ctrl`:
      - `Ctrl+O` بعد `Enter` — ذخیره (O مخفف "Output")
      - `Ctrl+X` — خروج (X مخفف "Exit")
      - `Ctrl+W` — جستجو (W مخفف "Where is this text?")
      - `Ctrl+K` — برش خط (K مخفف "Kill the line")
      - `Ctrl+U` — جای‌گذاری دوباره (U مخفف "Uncut")
      - `Ctrl+G` — نمایش راهنما (G مخفف "Get help")

      راحت امتحانش کن — nano خیلی بخشنده است!
    examples:
      - q: "nano ~/.bashrc"
        a: "فایل پیکربندی Bash را باز می‌کند — Ctrl+O برای ذخیره، Ctrl+X برای خروج"
        rel:
          - ["nano-cmd", "ویرایشگر متن ترمینال کاربرپسند با راهنمای کلیدها", "دستور nano"]
          - ["nano-save", "Ctrl+O بعد Enter — ذخیره فایل در nano", "nano Ctrl+O"]
        labels: ["ویرایشگر", "پیکربندی"]
      - q: "nano -l /etc/hosts"
        a: "فایل را باز می‌کند و شماره خطوط را نشان می‌دهد — برای فایل‌های بلند مفید است"
        rel:
          - ["nano-l", "Line numbers — نمایش شماره خطوط در nano", "فلگ nano -l"]
        labels: ["ویرایشگر"]
      - q: "nano +50 app.conf"
        a: "فایل را مستقیم از خط ۵۰ باز می‌کند — نیازی به اسکرول طولانی نیست"
        rel:
          - ["nano-jump-line", "+N فایل را مستقیماً از خط N باز می‌کند", "nano +شماره‌خط"]
        labels: ["ویرایشگر"]

  - title: "vim — ویرایشگر حرفه‌ای"
    image: "images/section-02-vim.svg"
    explanation: |
      **vim** (Vi Improved — "Vi بهبودیافته") یک ویرایشگر متن است
      که اول عجیب به نظر می‌رسد، ولی خیلی سریع است.

      ویژگی خاصش: vim **حالت‌ها** (Mode) دارد.
      مثل یک بازی ویدیویی است —
      گاهی می‌دوی، گاهی می‌جنگی، گاهی حرف می‌زنی.

      مهم‌ترین حالت‌ها:
      - **حالت Normal** — برای حرکت و دادن دستورات (حالت پیش‌فرض هنگام شروع)
      - **حالت Insert** — برای تایپ کردن متن
      - **حالت Command** — برای دستوراتی مثل ذخیره یا جستجو

      شروع با vim، قدم به قدم:
      1. vim را باز کن: `vim meine-datei.txt`
      2. vim در حالت Normal شروع می‌کند — هنوز نمی‌توانی متن تایپ کنی
      3. `i` را فشار بده — حالا در حالت Insert هستی، پایین صفحه `-- INSERT --` نشان داده می‌شود
      4. متنت را بنویس
      5. `Esc` را فشار بده — برگشت به حالت Normal
      6. `:wq` را تایپ کن — این ذخیره می‌کند (w = write) و خارج می‌شود (q = quit)

      دستورات اضطراری مهم در vim:
      - `:wq` — ذخیره و خروج
      - `:q!` — خروج بدون ذخیره (! = اجبار)
      - `:w` — فقط ذخیره، بدون خروج

      چرا vim یاد بگیری؟
      روی تقریباً هر سیستم لینوکسی از قبل نصب است.
      وقتی روی یک سرور جدید هستی، vim همیشه آنجاست.
    examples:
      - q: "vim /etc/nginx/nginx.conf"
        a: "یک فایل پیکربندی را با vim باز می‌کند — روی هر سیستم لینوکسی اجرا می‌شود"
        rel:
          - ["vim-cmd", "Vi Improved — ویرایشگر ترمینال قدرتمند با حالت‌ها", "دستور vim"]
        labels: ["ویرایشگر", "پیکربندی"]
      - q: ":wq"
        a: "در vim: فایل را ذخیره کن و از ویرایشگر خارج شو — در حالت Command با : شروع می‌کنی"
        rel:
          - ["vim-wq", "Write Quit — ذخیره و خروج در vim", ":wq"]
          - ["vim-command-mode", "دو نقطه : حالت Command را در vim فعال می‌کند", "vim :"]
        labels: ["ویرایشگر"]
      - q: ":q!"
        a: "vim را بدون ذخیره کردن ترک می‌کند — ! یعنی 'اجبارش کن، هر چه شد'"
        rel:
          - ["vim-q-bang", "خروج اجباری بدون ذخیره — تمام تغییرات دور ریخته می‌شوند", ":q!"]
        labels: ["ویرایشگر"]
      - q: "i"
        a: "به حالت Insert تغییر می‌دهد — حالا می‌توانی متن تایپ کنی"
        rel:
          - ["vim-insert", "i — رفتن به حالت Insert (قبل از مکان‌نما)، a = بعد مکان‌نما", "vim i"]
        labels: ["ویرایشگر"]

  - title: "vim — حرکت و جستجو"
    image: "images/section-03-vim-nav.svg"
    explanation: |
      در حالت Normal می‌توانی در فایل حرکت کنی —
      حتی بدون کلیدهای جهتی!

      کلیدهای **hjkl** برای ناوبری هستند:
      - `h` — به چپ
      - `j` — به پایین
      - `k` — به بالا
      - `l` — به راست

      عجیب به نظر می‌رسد، ولی حرفه‌ای‌ها از این کلیدها استفاده می‌کنند
      چون انگشتان از ردیف اصلی کیبورد نمی‌روند.

      پرش‌های مفید دیگر:
      - `w` — یک کلمه به جلو
      - `b` — یک کلمه به عقب
      - `gg` — به ابتدای فایل
      - `G` — به انتهای فایل
      - `50G` — رفتن به خط ۵۰

      **جستجو در vim:**
      ```
      /fehler
      ```
      `/` را تایپ کن و بعد کلمه — vim به اولین نتیجه می‌پرد.
      با `n` به نتیجه بعدی می‌روی.

      **جایگزینی در کل فایل:**
      ```
      :%s/alt/neu/g
      ```
      یعنی: "در کل فایل `:` هر `%s` نمونه از 'alt' را با 'neu' عوض کن، همه جا `g`."
    examples:
      - q: ":%s/localhost/example.com/g"
        a: "در vim همه موارد 'localhost' را با 'example.com' جایگزین می‌کند"
        rel:
          - ["vim-substitute", ":%s/قدیم/جدید/g — جستجو و جایگزینی در کل فایل", "vim :%s"]
          - ["vim-g-flag", "g = global — جایگزینی همه موارد در یک خط", "فلگ vim /g"]
        labels: ["ویرایشگر"]
      - q: "/ERROR"
        a: "در vim دنبال 'ERROR' می‌گردد — n برای نتیجه بعدی، N برای قبلی"
        rel:
          - ["vim-search", "/کلمه جستجوی رو به جلو در vim", "vim /"]
        labels: ["ویرایشگر"]
      - q: "dd"
        a: "خط فعلی را در vim پاک می‌کند — در بافر ذخیره می‌شود، p دوباره جای می‌گذارد"
        rel:
          - ["vim-dd", "Delete — پاک کردن کل خط در vim (و ذخیره در بافر)", "vim dd"]
        labels: ["ویرایشگر"]
      - q: "yy"
        a: "خط فعلی را در vim کپی می‌کند (yank = کپی کردن) — p بعد از آن جای می‌گذارد"
        rel:
          - ["vim-yy", "Yank — کپی خط در vim", "vim yy"]
          - ["vim-p", "Put/Paste — جای‌گذاری محتوای کپی/پاک‌شده", "vim p"]
        labels: ["ویرایشگر"]

  - title: "آزمون ترمینال"
    image: "images/section-04-check.svg"
    explanation: |
      حالا دانشت را امتحان کن — دستورات را مستقیماً وارد کن!
    examples:
      - q: "کدام دستور vim فایل را ذخیره می‌کند و از ویرایشگر خارج می‌شود؟"
        type: input
        a: ":wq"
        labels: ["ویرایشگر"]
      - q: "چطور در vim به حالت Insert می‌رویم؟"
        type: select
        options:
          - text: "کلید 'i' را فشار بده"
            correct: true
          - text: "کلید 'Esc' را فشار بده"
          - text: "':i' را تایپ کن"
          - text: "کلید 'v' را فشار بده"
        labels: ["ویرایشگر"]
      - q: "دستور ':q!' در vim چه کار می‌کند؟"
        type: select
        options:
          - text: "vim را بدون ذخیره کردن ترک می‌کند"
            correct: true
          - text: "ذخیره می‌کند و از vim خارج می‌شود"
          - text: "دنبال علامت ! می‌گردد"
          - text: "یک فایل جدید باز می‌کند"
        labels: ["ویرایشگر"]
      - q: "کدام‌یک از این حالت‌های vim وجود دارند؟"
        type: multiple-choice
        options:
          - text: "حالت Normal"
            correct: true
          - text: "حالت Insert"
            correct: true
          - text: "حالت Visual"
            correct: true
          - text: "حالت Debug"
        labels: ["ویرایشگر"]
